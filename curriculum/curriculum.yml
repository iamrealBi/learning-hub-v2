# ============================================================================
# SPINE — Trục học DUY NHẤT (một đường zero → senior), KHÔNG phải nhiều track song song.
# ----------------------------------------------------------------------------
# File này là NGUỒN SỰ THẬT cho: thứ tự bài, đồ thị prerequisite (DAG), tầng
# (fast/deep), chủ sở hữu, và ai là 'canonical owner' của mỗi khái niệm.
#   - nav của MkDocs nên được sinh/đối chiếu từ file này (scripts/nav_audit.py).
#   - CI FAIL nếu: có chu trình trong DAG, có trang mồ côi, hoặc link tới
#     khái niệm chưa nằm trong prerequisite bắc cầu.
#
# tier: fast  = nằm trên FAST PATH (~lõi tối thiểu để làm được việc)
# tier: deep  = deep-dive tuỳ chọn, KHÔNG BAO GIỜ chặn tiến độ
# status: core = đã kiểm chứng đầy đủ | draft = nav-stub 'sắp có' | edge = thử nghiệm
# ============================================================================

meta:
  title: "Learning Hub v2 — Fullstack .NET + AI"
  spine_version: "0.1"
  fast_path_target: "6–8 tuần zero→làm-được-việc (bản rút gọn 2 ngày: xem FAST-PATH-2-NGAY.md)"

# Mỗi khái niệm dùng lại (JWT, value-vs-reference…) có ĐÚNG MỘT trang canonical.
# Mọi nơi khác phải transclude/link, không giải thích lại (chống trùng lặp).
concepts:
  value-vs-reference: p1-csharp/bo-nho-va-kieu-du-lieu.md
  oop:                p1-csharp/oop.md
  generics:           p1-csharp/generics.md
  delegates-events:   p1-csharp/delegates-events.md
  records-patterns:   p1-csharp/records-pattern-matching.md
  collections:        p1-csharp/collections.md
  linq:               p1-csharp/collections-linq.md
  async-await:        p1-csharp/async-await.md
  exceptions:         p1-csharp/exceptions.md
  jwt:                p4-bao-mat/jwt.md
  di:                 p3-web-api/dependency-injection.md
  ef-core-query:      p2-du-lieu/ef-core-truy-van.md

phases:
  - id: P0
    title: "Thiết lập & Workflow AI"
    nodes:
      - { id: p0-setup, file: 00-thiet-lap/index.md, tier: fast, status: core, owner: core-team,
          objective: "Cài .NET + chạy 'green' bài tập đầu tiên trong <30 phút", requires: [] }

  - id: P1
    title: "Ngôn ngữ C#"
    nodes:
      - { id: p1-nen-tang, file: p1-csharp/nen-tang.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng đúng kiểu dữ liệu, điều kiện, vòng lặp, method — nền tảng để đọc mọi code C# sau này",
          requires: [p0-setup] }
      - { id: p1-memory, file: p1-csharp/bo-nho-va-kieu-du-lieu.md, tier: fast, status: core, owner: core-team,
          objective: "PHÂN BIỆT đúng value vs reference semantics và bác bỏ được huyền thoại 'value type = stack'",
          requires: [p1-nen-tang] }
      - { id: p1-oop, file: p1-csharp/oop.md, tier: fast, status: core, owner: core-team,
          objective: "Thiết kế hệ phân cấp lớp áp dụng đóng gói/kế thừa/đa hình; chọn đúng interface vs abstract vs composition",
          requires: [p1-memory] }
      - { id: p1-generics, file: p1-csharp/generics.md, tier: fast, status: core, owner: core-team,
          objective: "Viết generic class/method với ràng buộc where đúng loại; phân biệt covariance/contravariance",
          requires: [p1-oop] }
      - { id: p1-delegates-events, file: p1-csharp/delegates-events.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng Func/Action/event đúng cách; tránh rò rỉ bộ nhớ do quên unsubscribe",
          requires: [p1-oop] }
      - { id: p1-records-patterns, file: p1-csharp/records-pattern-matching.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng record cho value-equality; viết pattern matching (property/positional/list pattern)",
          requires: [p1-oop] }
      - { id: p1-collections, file: p1-csharp/collections.md, tier: fast, status: core, owner: core-team,
          objective: "Chọn đúng cấu trúc dữ liệu (List/Dictionary/HashSet/Queue/Stack...) theo Big-O của thao tác cần dùng",
          requires: [p1-generics] }
      - { id: p1-linq, file: p1-csharp/collections-linq.md, tier: fast, status: core, owner: core-team,
          objective: "Viết pipeline LINQ đúng; giải thích deferred execution và IEnumerable vs IQueryable",
          requires: [p1-collections] }
      - { id: p1-async, file: p1-csharp/async-await.md, tier: fast, status: core, owner: core-team,
          objective: "Giải thích async/await qua state machine; tránh async void & deadlock",
          requires: [p1-memory, p1-linq] }
      - { id: p1-exceptions, file: p1-csharp/exceptions.md, tier: fast, status: core, owner: core-team,
          objective: "Xử lý ngoại lệ đúng chỗ; phân biệt throw vs throw ex; tránh dùng exception cho control-flow",
          requires: [p1-nen-tang] }

  - id: P2
    title: "Dữ liệu — SQL & EF Core"
    nodes:
      - { id: p2-sql, file: p2-du-lieu/sql-nen-tang.md, tier: fast, status: core, owner: core-team,
          objective: "Viết đúng SELECT/WHERE/ORDER BY/LIMIT, chọn đúng kiểu PostgreSQL, hiểu NULL ba-trị",
          requires: [p1-nen-tang] }
      - { id: p2-loc-nang-cao, file: p2-du-lieu/loc-nang-cao.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng đúng LIKE/ILIKE, IN/NOT IN (và bẫy NULL), CASE, COALESCE/NULLIF",
          requires: [p2-sql] }
      - { id: p2-constraints, file: p2-du-lieu/constraints.md, tier: fast, status: core, owner: core-team,
          objective: "Áp dụng đúng PK/FK/UNIQUE/CHECK, hiểu B-tree (không phải Hash) cho PK",
          requires: [p2-sql] }
      - { id: p2-thiet-ke-schema, file: p2-du-lieu/thiet-ke-schema.md, tier: fast, status: core, owner: core-team,
          objective: "Chuẩn hoá 1NF-3NF, chọn đúng loại khoá, thiết kế quan hệ 1-1/1-N/N-N",
          requires: [p2-constraints] }
      - { id: p2-index-transaction, file: p2-du-lieu/index-transaction.md, tier: fast, status: core, owner: core-team,
          objective: "Giải thích index B-tree, dùng transaction đúng, phân biệt mức isolation",
          requires: [p2-thiet-ke-schema] }
      - { id: p2-joins-aggregation, file: p2-du-lieu/joins-aggregation.md, tier: fast, status: core, owner: core-team,
          objective: "Viết đúng INNER/LEFT/RIGHT/FULL JOIN, GROUP BY/HAVING, anti-join",
          requires: [p2-loc-nang-cao] }
      - { id: p2-subquery-cte, file: p2-du-lieu/subquery-cte.md, tier: fast, status: core, owner: core-team,
          objective: "Viết subquery/CTE đúng, phân biệt EXISTS vs IN, recursive CTE",
          requires: [p2-joins-aggregation] }
      - { id: p2-window-functions, file: p2-du-lieu/window-functions.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng ROW_NUMBER/RANK/LAG/LEAD với OVER/PARTITION BY",
          requires: [p2-subquery-cte] }
      - { id: p2-ef, file: p2-du-lieu/ef-core.md, tier: fast, status: core, owner: core-team,
          objective: "Map domain sang EF Core qua DbContext/DbSet, truy vấn LINQ dịch sang SQL",
          requires: [p2-index-transaction, p2-window-functions] }
      - { id: p2-ef-quan-he, file: p2-du-lieu/ef-core-quan-he.md, tier: fast, status: core, owner: core-team,
          objective: "Cấu hình navigation property, nhận diện và tránh N+1 query",
          requires: [p2-ef] }
      - { id: p2-ef-migration, file: p2-du-lieu/ef-core-migration.md, tier: fast, status: core, owner: core-team,
          objective: "Quản lý schema qua migration, seed dữ liệu, rollback an toàn",
          requires: [p2-ef-quan-he] }

  - id: P3
    title: "ASP.NET Core Web API"
    nodes:
      - { id: p3-api, file: p3-web-api/minimal-api.md, tier: fast, status: draft, owner: core-team,
          objective: "Dựng REST API bằng Minimal API + DI", requires: [p2-ef] }
      - { id: p3-di, file: p3-web-api/dependency-injection.md, tier: fast, status: draft, owner: core-team,
          objective: "Chọn đúng DI lifetime (Singleton/Scoped/Transient)", requires: [p3-api] }

  - id: P4
    title: "Auth, Bảo mật, Test & Deploy"
    nodes:
      - { id: p4-jwt, file: p4-bao-mat/jwt.md, tier: fast, status: core, owner: security-expert,
          objective: "Cấp/kiểm JWT an toàn (UtcNow, HTTPS, ClockSkew) — trang canonical duy nhất về JWT",
          requires: [p3-di], risk_tier: T3 }
      - { id: p4-upload, file: p4-bao-mat/tai-file-an-toan.md, tier: fast, status: draft, owner: security-expert,
          objective: "Nhận file an toàn: chống path traversal, kiểm MIME/magic-byte", requires: [p4-jwt], risk_tier: T3 }
      - { id: p4-test, file: p4-bao-mat/testing.md, tier: fast, status: draft, owner: core-team,
          objective: "Viết test xUnit làm-tài-liệu-sống cho API", requires: [p3-api] }

  - id: P5
    title: "AI Engineering (fast-churn — 'run-it-to-verify')"
    nodes:
      - { id: p5-claude-code, file: p5-ai/claude-code.md, tier: fast, status: draft, owner: ai-expert,
          objective: "Dùng Claude Code đúng: SKILL.md, hooks PascalCase, mcp add", requires: [p4-test], risk_tier: T3 }
      - { id: p5-capstone, file: p5-ai/capstone.md, tier: fast, status: draft, owner: core-team,
          objective: "Ghép P1–P5 thành một app TaskFlow chạy được đầu-cuối", requires: [p5-claude-code, p4-jwt, p2-ef] }
