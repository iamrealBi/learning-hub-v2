# ============================================================================
# SPINE — Trục học DUY NHẤT (một đường zero → senior), KHÔNG phải nhiều track song song.
# ----------------------------------------------------------------------------
# File này là NGUỒN SỰ THẬT cho: thứ tự bài, đồ thị prerequisite (DAG), tầng
# (fast/deep), chủ sở hữu, và ai là 'canonical owner' của mỗi khái niệm.
#   - nav của MkDocs nên được sinh/đối chiếu từ file này (scripts/nav_audit.py).
#   - CI FAIL nếu: có chu trình trong DAG, có trang mồ côi, hoặc link tới
#     khái niệm chưa nằm trong prerequisite bắc cầu.
#
# tier: fast  = nằm trên FAST PATH (~lõi tối thiểu để làm được việc)
# tier: deep  = deep-dive tuỳ chọn, KHÔNG BAO GIỜ chặn tiến độ
# status: core = đã kiểm chứng đầy đủ | draft = nav-stub 'sắp có' | edge = thử nghiệm
# ============================================================================

meta:
  title: "Learning Hub v2 — Fullstack .NET + AI"
  spine_version: "0.1"
  fast_path_target: "6–8 tuần zero→làm-được-việc (bản rút gọn 2 ngày: xem FAST-PATH-2-NGAY.md)"

# Mỗi khái niệm dùng lại (JWT, value-vs-reference…) có ĐÚNG MỘT trang canonical.
# Mọi nơi khác phải transclude/link, không giải thích lại (chống trùng lặp).
concepts:
  value-vs-reference: p1-csharp/bo-nho-va-kieu-du-lieu.md
  oop:                p1-csharp/oop.md
  generics:           p1-csharp/generics.md
  delegates-events:   p1-csharp/delegates-events.md
  records-patterns:   p1-csharp/records-pattern-matching.md
  collections:        p1-csharp/collections.md
  linq:               p1-csharp/collections-linq.md
  async-await:        p1-csharp/async-await.md
  exceptions:         p1-csharp/exceptions.md
  jwt:                p4-bao-mat/jwt.md
  di:                 p3-web-api/dependency-injection.md
  ef-core-query:      p2-du-lieu/ef-core.md

phases:
  - id: P0
    title: "Thiết lập & Workflow AI"
    nodes:
      - { id: p0-setup, file: 00-thiet-lap/index.md, tier: fast, status: core, owner: core-team,
          objective: "Cài .NET + chạy 'green' bài tập đầu tiên trong <30 phút", requires: [] }

  - id: P1
    title: "Ngôn ngữ C#"
    nodes:
      - { id: p1-nen-tang, file: p1-csharp/nen-tang.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng đúng kiểu dữ liệu, điều kiện, vòng lặp, method — nền tảng để đọc mọi code C# sau này",
          requires: [p0-setup] }
      - { id: p1-memory, file: p1-csharp/bo-nho-va-kieu-du-lieu.md, tier: fast, status: core, owner: core-team,
          objective: "PHÂN BIỆT đúng value vs reference semantics và bác bỏ được huyền thoại 'value type = stack'",
          requires: [p1-nen-tang] }
      - { id: p1-oop, file: p1-csharp/oop.md, tier: fast, status: core, owner: core-team,
          objective: "Thiết kế hệ phân cấp lớp áp dụng đóng gói/kế thừa/đa hình; chọn đúng interface vs abstract vs composition",
          requires: [p1-memory] }
      - { id: p1-generics, file: p1-csharp/generics.md, tier: fast, status: core, owner: core-team,
          objective: "Viết generic class/method với ràng buộc where đúng loại; phân biệt covariance/contravariance",
          requires: [p1-oop] }
      - { id: p1-delegates-events, file: p1-csharp/delegates-events.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng Func/Action/event đúng cách; tránh rò rỉ bộ nhớ do quên unsubscribe",
          requires: [p1-oop] }
      - { id: p1-records-patterns, file: p1-csharp/records-pattern-matching.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng record cho value-equality; viết pattern matching (property/positional/list pattern)",
          requires: [p1-oop] }
      - { id: p1-collections, file: p1-csharp/collections.md, tier: fast, status: core, owner: core-team,
          objective: "Chọn đúng cấu trúc dữ liệu (List/Dictionary/HashSet/Queue/Stack...) theo Big-O của thao tác cần dùng",
          requires: [p1-generics] }
      - { id: p1-linq, file: p1-csharp/collections-linq.md, tier: fast, status: core, owner: core-team,
          objective: "Viết pipeline LINQ đúng; giải thích deferred execution và IEnumerable vs IQueryable",
          requires: [p1-collections] }
      - { id: p1-async, file: p1-csharp/async-await.md, tier: fast, status: core, owner: core-team,
          objective: "Giải thích async/await qua state machine; tránh async void & deadlock",
          requires: [p1-memory, p1-linq] }
      - { id: p1-exceptions, file: p1-csharp/exceptions.md, tier: fast, status: core, owner: core-team,
          objective: "Xử lý ngoại lệ đúng chỗ; phân biệt throw vs throw ex; tránh dùng exception cho control-flow",
          requires: [p1-nen-tang] }

  - id: P2
    title: "Dữ liệu — SQL & EF Core"
    nodes:
      - { id: p2-sql, file: p2-du-lieu/sql-nen-tang.md, tier: fast, status: core, owner: core-team,
          objective: "Viết đúng SELECT/WHERE/ORDER BY/LIMIT, chọn đúng kiểu PostgreSQL, hiểu NULL ba-trị",
          requires: [p1-nen-tang] }
      - { id: p2-loc-nang-cao, file: p2-du-lieu/loc-nang-cao.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng đúng LIKE/ILIKE, IN/NOT IN (và bẫy NULL), CASE, COALESCE/NULLIF",
          requires: [p2-sql] }
      - { id: p2-constraints, file: p2-du-lieu/constraints.md, tier: fast, status: core, owner: core-team,
          objective: "Áp dụng đúng PK/FK/UNIQUE/CHECK, hiểu B-tree (không phải Hash) cho PK",
          requires: [p2-sql] }
      - { id: p2-thiet-ke-schema, file: p2-du-lieu/thiet-ke-schema.md, tier: fast, status: core, owner: core-team,
          objective: "Chuẩn hoá 1NF-3NF, chọn đúng loại khoá, thiết kế quan hệ 1-1/1-N/N-N",
          requires: [p2-constraints] }
      - { id: p2-index-transaction, file: p2-du-lieu/index-transaction.md, tier: fast, status: core, owner: core-team,
          objective: "Giải thích index B-tree, dùng transaction đúng, phân biệt mức isolation",
          requires: [p2-thiet-ke-schema] }
      - { id: p2-joins-aggregation, file: p2-du-lieu/joins-aggregation.md, tier: fast, status: core, owner: core-team,
          objective: "Viết đúng INNER/LEFT/RIGHT/FULL JOIN, GROUP BY/HAVING, anti-join",
          requires: [p2-loc-nang-cao] }
      - { id: p2-subquery-cte, file: p2-du-lieu/subquery-cte.md, tier: fast, status: core, owner: core-team,
          objective: "Viết subquery/CTE đúng, phân biệt EXISTS vs IN, recursive CTE",
          requires: [p2-joins-aggregation] }
      - { id: p2-window-functions, file: p2-du-lieu/window-functions.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng ROW_NUMBER/RANK/LAG/LEAD với OVER/PARTITION BY",
          requires: [p2-subquery-cte] }
      - { id: p2-ef, file: p2-du-lieu/ef-core.md, tier: fast, status: core, owner: core-team,
          objective: "Map domain sang EF Core qua DbContext/DbSet, truy vấn LINQ dịch sang SQL",
          requires: [p2-index-transaction, p2-window-functions] }
      - { id: p2-ef-quan-he, file: p2-du-lieu/ef-core-quan-he.md, tier: fast, status: core, owner: core-team,
          objective: "Cấu hình navigation property, nhận diện và tránh N+1 query",
          requires: [p2-ef] }
      - { id: p2-ef-migration, file: p2-du-lieu/ef-core-migration.md, tier: fast, status: core, owner: core-team,
          objective: "Quản lý schema qua migration, seed dữ liệu, rollback an toàn",
          requires: [p2-ef-quan-he] }

  - id: P3
    title: "ASP.NET Core Web API"
    nodes:
      - { id: p3-api, file: p3-web-api/minimal-api.md, tier: fast, status: core, owner: core-team,
          objective: "Dựng REST API bằng Minimal API: routing, HTTP method, status code chuẩn",
          requires: [p2-ef] }
      - { id: p3-di, file: p3-web-api/dependency-injection.md, tier: fast, status: core, owner: core-team,
          objective: "Đăng ký service đúng lifetime (Singleton/Scoped/Transient), tránh captive dependency",
          requires: [p3-api] }
      - { id: p3-routing, file: p3-web-api/routing-model-binding.md, tier: fast, status: core, owner: core-team,
          objective: "Bind route/query/body/header đúng cách, ràng buộc route constraint",
          requires: [p3-di] }
      - { id: p3-config, file: p3-web-api/configuration-options.md, tier: fast, status: core, owner: core-team,
          objective: "Đọc cấu hình qua IConfiguration/Options pattern theo environment",
          requires: [p3-di] }
      - { id: p3-validation, file: p3-web-api/validation.md, tier: fast, status: core, owner: core-team,
          objective: "Validate input bằng DataAnnotations & FluentValidation, trả lỗi 400 chuẩn",
          requires: [p3-routing] }
      - { id: p3-middleware, file: p3-web-api/middleware.md, tier: fast, status: core, owner: core-team,
          objective: "Hiểu thứ tự pipeline middleware, viết custom middleware đúng chỗ",
          requires: [p3-config] }
      - { id: p3-error-handling, file: p3-web-api/xu-ly-loi-toan-cuc.md, tier: fast, status: core, owner: core-team,
          objective: "Bắt lỗi toàn cục, trả ProblemDetails chuẩn RFC 7807",
          requires: [p3-middleware] }
      - { id: p3-openapi, file: p3-web-api/openapi-swagger.md, tier: fast, status: core, owner: core-team,
          objective: "Sinh tài liệu OpenAPI/Swagger, mô tả contract API rõ ràng",
          requires: [p3-validation] }
      - { id: p3-httpclient, file: p3-web-api/goi-api-ngoai.md, tier: fast, status: core, owner: core-team,
          objective: "Gọi API bên ngoài an toàn qua IHttpClientFactory, xử lý timeout/lỗi mạng",
          requires: [p3-config] }

  - id: P4
    title: "Auth, Bảo mật, Test & Deploy"
    nodes:
      - { id: p4-jwt, file: p4-bao-mat/jwt.md, tier: fast, status: core, owner: security-expert,
          objective: "Cấp/kiểm JWT an toàn (UtcNow, HTTPS, ClockSkew) — trang canonical duy nhất về JWT",
          requires: [p3-di], risk_tier: T3 }
      - { id: p4-upload, file: p4-bao-mat/tai-file-an-toan.md, tier: fast, status: core, owner: security-expert,
          objective: "Nhận file an toàn: chống path traversal, kiểm MIME/magic-byte", requires: [p4-jwt], risk_tier: T3 }
      - { id: p4-test, file: p4-bao-mat/testing.md, tier: fast, status: core, owner: core-team,
          objective: "Viết test xUnit làm-tài-liệu-sống cho API", requires: [p4-upload] }
      - { id: p4-logging, file: p4-bao-mat/logging-exceptions.md, tier: fast, status: core, owner: core-team,
          objective: "Structured logging với ILogger: log level, correlation id, Serilog", requires: [p4-test] }
      - { id: p4-deploy, file: p4-bao-mat/deploy-docker.md, tier: fast, status: core, owner: core-team,
          objective: "Đóng gói .NET bằng Docker multi-stage, chạy qua docker-compose", requires: [p4-logging] }

  - id: P5
    title: "AI Engineering (fast-churn — 'run-it-to-verify')"
    nodes:
      - { id: p5-claude-code, file: p5-ai/claude-code.md, tier: fast, status: core, owner: ai-expert,
          objective: "Dùng Claude Code đúng: CLAUDE.md, SKILL.md, hooks PascalCase, subagent", requires: [p4-deploy], risk_tier: T3 }
      - { id: p5-mcp, file: p5-ai/mcp.md, tier: fast, status: core, owner: ai-expert,
          objective: "Kết nối agent với công cụ ngoài qua MCP: tools/resources/prompts, stdio/HTTP", requires: [p5-claude-code], risk_tier: T3 }
      - { id: p5-capstone, file: p5-ai/capstone.md, tier: fast, status: core, owner: core-team,
          objective: "Capstone trung gian: ghép P1–P4 thành app TaskFlow chạy được đầu-cuối", requires: [p5-mcp, p4-jwt, p2-ef] }

  - id: P6
    title: "Kiến trúc & Design Patterns"
    nodes:
      - { id: p6-layered, file: p6-kien-truc/kien-truc-phan-lop.md, tier: fast, status: core, owner: core-team,
          objective: "Tách Presentation/Application/Data đúng luật phụ thuộc một chiều", requires: [p5-capstone] }
      - { id: p6-repository, file: p6-kien-truc/repository-unit-of-work.md, tier: fast, status: core, owner: core-team,
          objective: "Biết khi nào Repository/Unit of Work riêng thật sự cần, khi nào DbSet là đủ", requires: [p6-layered] }
      - { id: p6-patterns-basic, file: p6-kien-truc/design-patterns-co-ban.md, tier: fast, status: core, owner: core-team,
          objective: "Áp dụng đúng Factory/Strategy/Decorator, nhận diện khi nào là thừa", requires: [p6-repository] }
      - { id: p6-patterns-advanced, file: p6-kien-truc/design-patterns-nang-cao.md, tier: fast, status: core, owner: core-team,
          objective: "Áp dụng Observer/Singleton(GoF)/Adapter, phân biệt Singleton pattern vs DI lifetime", requires: [p6-patterns-basic] }
      - { id: p6-clean-architecture, file: p6-kien-truc/clean-architecture.md, tier: fast, status: core, owner: core-team,
          objective: "Áp dụng Dependency Rule & Dependency Inversion ở tầng kiến trúc", requires: [p6-patterns-advanced] }
      - { id: p6-cqrs, file: p6-kien-truc/cqrs.md, tier: fast, status: core, owner: core-team,
          objective: "Quyết định đúng khi nào tách Command/Query, tránh over-engineering CRUD", requires: [p6-clean-architecture] }
      - { id: p6-ddd, file: p6-kien-truc/ddd-co-ban.md, tier: fast, status: core, owner: core-team,
          objective: "Phân biệt Entity/Value Object/Aggregate, dùng Aggregate Root đúng cách", requires: [p6-cqrs] }
      - { id: p6-messaging, file: p6-kien-truc/message-queue-event-driven.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng message queue đúng lúc: Point-to-point vs Pub/Sub, Dead Letter Queue", requires: [p6-ddd] }

  - id: P7
    title: "Blazor Frontend"
    nodes:
      - { id: p7-overview, file: p7-blazor/blazor-tong-quan.md, tier: fast, status: core, owner: core-team,
          objective: "Chọn đúng hosting model Blazor (Server/WebAssembly/Hybrid) theo tình huống", requires: [p6-messaging] }
      - { id: p7-component, file: p7-blazor/component-co-ban.md, tier: fast, status: core, owner: core-team,
          objective: "Viết component .razor với Parameter/ChildContent/lifecycle đúng thứ tự", requires: [p7-overview] }
      - { id: p7-binding, file: p7-blazor/data-binding-events.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng @bind/@onclick/EventCallback đúng, tránh quên StateHasChanged", requires: [p7-component] }
      - { id: p7-routing, file: p7-blazor/routing-navigation.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng @page/route parameter/NavigationManager đúng, chọn route vs query string", requires: [p7-component] }
      - { id: p7-forms, file: p7-blazor/forms-validation.md, tier: fast, status: core, owner: core-team,
          objective: "Dùng EditForm/InputText/DataAnnotationsValidator đúng, phân biệt OnValidSubmit/OnSubmit", requires: [p7-binding] }
      - { id: p7-state, file: p7-blazor/state-management.md, tier: fast, status: core, owner: core-team,
          objective: "Chọn đúng CascadingParameter vs state container service theo phạm vi dữ liệu", requires: [p7-routing] }
      - { id: p7-httpclient, file: p7-blazor/goi-api-tu-blazor.md, tier: fast, status: core, owner: core-team,
          objective: "Gọi API backend từ Blazor WASM đúng cách, quản lý loading/error state", requires: [p7-state] }
      - { id: p7-auth, file: p7-blazor/blazor-authentication.md, tier: fast, status: core, owner: core-team,
          objective: "Lưu JWT & bảo vệ route bằng AuthenticationStateProvider/AuthorizeView", requires: [p7-httpclient, p4-jwt] }
      - { id: p7-jsinterop, file: p7-blazor/js-interop-lifecycle-sau.md, tier: fast, status: core, owner: core-team,
          objective: "Gọi JS Interop đúng cú pháp, dùng OnAfterRender/@key/IDisposable đúng chỗ", requires: [p7-auth] }
      - { id: p7-deploy, file: p7-blazor/blazor-performance-deploy.md, tier: fast, status: core, owner: core-team,
          objective: "Tối ưu re-render, publish & deploy Blazor WASM lên static hosting", requires: [p7-jsinterop] }
