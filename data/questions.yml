# Q&A data — nguồn sự thật duy nhất, kiểm bằng scripts/qa_lint.py (mọi câu PHẢI có answer, không trùng prompt)
questions:
- id: q-mem-01
  node: p1-memory
  tier: fast
  prompt: Khác biệt THẬT giữa value type và reference type là gì?
  answer: 'Là CÁCH SAO CHÉP: value type chép toàn bộ giá trị (bản độc lập), reference type chép tham chiếu
    (cùng một object). KHÔNG phải ''stack vs heap'' — chỗ nằm chỉ là chi tiết cài đặt.

    '
  code_ref: p1-csharp/bo-nho-va-kieu-du-lieu.md#chung_minh
- id: q-mem-02
  node: p1-memory
  tier: fast
  prompt: Một struct là field của một class thì nằm ở stack hay heap?
  answer: Heap — nó nằm inline bên trong object của class trên heap. (Bác bỏ huyền thoại 'value type luôn
    ở stack'.)
- id: q-mem-03
  node: p1-memory
  tier: deep
  prompt: GC của .NET dùng thuật toán gì? 'Mark-and-sweep' có đúng không?
  answer: 'Là tracing, generational, MARK-AND-COMPACT cho SOH (gen 0/1/2) — nén để chống phân mảnh. ''Mark-and-sweep''
    là mô tả SAI/thiếu. LOH mặc định sweep (không nén).

    '
- id: q-jwt-01
  node: p4-jwt
  tier: fast
  prompt: Vì sao nên dùng DateTime.UtcNow cho 'expires', và vì sao câu 'DateTime.Now lệch 7 giờ' là sai?
  answer: 'exp là mốc UTC. Thư viện tự chuyển DateTime.Now (Kind=Local) sang UTC nên KHÔNG lệch 7 giờ
    (cùng exp như UtcNow). Bẫy thật là Kind=Unspecified (từ Parse/DB) bị coi là UTC. Dùng UtcNow để luôn
    tường minh, không phụ thuộc Kind.

    '
  code_ref: p4-bao-mat/jwt.md#2-cap-token-code-dung
- id: q-jwt-02
  node: p4-jwt
  tier: fast
  prompt: JWT lưu trong localStorage dính lỗ hổng gì, khác cookie thế nào?
  answer: 'localStorage -> rủi ro XSS (script đọc được token). Cookie -> rủi ro CSRF, nhưng chặn được
    bằng SameSite/anti-forgery và HttpOnly khiến JS không đọc token.

    '
- id: nen-tang-q1
  node: nen-tang
  tier: fast
  prompt: Kiểu nào nên dùng để lưu số tiền, và vì sao?
  answer: decimal — biểu diễn thập phân chính xác, tránh sai số làm tròn khi cộng dồn tiền tệ.
- id: nen-tang-q2
  node: nen-tang
  tier: fast
  prompt: Khác biệt cốt lõi giữa const và readonly là gì?
  answer: const cố định lúc biên dịch (chỉ literal); readonly gán một lần lúc chạy, thường trong constructor.
- id: nen-tang-q3
  node: nen-tang
  tier: fast
  prompt: Vì sao int.TryParse an toàn hơn int.Parse khi xử lý input người dùng?
  answer: TryParse trả về bool và không ném exception với chuỗi lỗi nên không làm sập chương trình; Parse
    ném FormatException.
- id: nen-tang-q4
  node: nen-tang
  tier: fast
  prompt: (int)3.9 cho kết quả gì? Muốn 4 thì dùng cái gì?
  answer: Cho 3 (cắt phần thập phân). Muốn 4 dùng Math.Round(3.9).
- id: nen-tang-q5
  node: nen-tang
  tier: fast
  prompt: var total = 0m; — total có kiểu tĩnh là gì?
  answer: decimal — var vẫn là kiểu tĩnh, suy ra từ literal 0m.
- id: oop-q1
  node: oop
  tier: fast
  prompt: Class và object khác nhau thế nào?
  answer: Class là bản thiết kế/khuôn; object là thực thể cụ thể tạo từ class bằng new, mỗi object có
    trạng thái riêng.
- id: oop-q2
  node: oop
  tier: fast
  prompt: 'Khi nào phương thức được chọn theo kiểu thực tế lúc chạy: override hay new?'
  answer: override (kèm virtual ở lớp cha) — đó là đa hình runtime; new chọn theo kiểu khai báo lúc biên
    dịch.
- id: oop-q3
  node: oop
  tier: fast
  prompt: Nêu một điểm khác biệt then chốt giữa abstract class và interface.
  answer: abstract class chứa được field và cài đặt sẵn và chỉ kế thừa một lớp cha; interface không chứa
    field và một lớp cài đặt được nhiều interface.
- id: oop-q4
  node: oop
  tier: fast
  prompt: Đóng gói được thực hiện bằng công cụ nào trong C#?
  answer: private field kết hợp property (có validate), giấu trạng thái nội bộ và kiểm soát truy cập.
- id: oop-q5
  node: oop
  tier: fast
  prompt: Nguyên tắc DIP nói gì và vì sao hữu ích khi test?
  answer: Phụ thuộc vào trừu tượng (interface) thay vì cài đặt cụ thể; nhờ đó thay được bằng mock/fake
    khi test.
- id: oop-q6
  node: oop
  tier: fast
  prompt: Interface có được chứa field lưu trữ dữ liệu không? Nếu class implement interface mà thiếu một
    method thì chuyện gì xảy ra?
  answer: Không - interface chỉ khai báo chữ ký method/property, không có field lưu trữ. Nếu class thiếu
    implement một method, trình biên dịch báo lỗi CS0535 ngay lúc build.
- id: oop-q7
  node: oop
  tier: fast
  prompt: Default interface method (C# 8+) dùng để giải quyết vấn đề gì?
  answer: Cho phép thêm method mới vào một interface đã có nhiều lớp thực thi mà không bắt buộc mọi lớp
    cũ phải sửa code - lớp cũ tự động dùng bản mặc định.
- id: collections-linq-q1
  node: collections-linq
  tier: fast
  prompt: Cần tra cứu giá trị theo khoá cực nhanh, khoá duy nhất — chọn collection nào?
  answer: Dictionary<K,V> — tra theo khoá O(1) trung bình.
- id: collections-linq-q2
  node: collections-linq
  tier: fast
  prompt: orders.Where(...) đã chạy phép lọc ngay tại dòng đó chưa? Vì sao?
  answer: Chưa. Where là toán tử deferred, chỉ mô tả; phép lọc chạy khi query bị duyệt (foreach/ToList/Sum...).
- id: collections-linq-q3
  node: collections-linq
  tier: fast
  prompt: Khác biệt cốt lõi giữa First và FirstOrDefault?
  answer: First ném InvalidOperationException khi rỗng; FirstOrDefault trả về default(T) (null hoặc 0).
- id: collections-linq-q4
  node: collections-linq
  tier: fast
  prompt: Muốn lọc dữ liệu ngay tại database (dịch sang SQL) thì dùng IEnumerable hay IQueryable?
  answer: IQueryable<T> — lambda thành expression tree, được provider (EF Core) dịch sang SQL, lọc tại
    DB.
- id: collections-linq-q5
  node: collections-linq
  tier: fast
  prompt: Vì sao nên dùng .Any() thay cho .Count() > 0?
  answer: Any() dừng ngay khi gặp phần tử đầu tiên; Count() có thể duyệt toàn bộ nguồn.
- id: p1-async-q1
  node: async-await
  tier: fast
  prompt: Vì sao await một tác vụ I/O không làm phát sinh thread mới?
  answer: Trong lúc chờ I/O, thread được trả về thread pool; OS báo hoàn tất qua callback nên không thread
    nào đứng chờ.
- id: p1-async-q2
  node: async-await
  tier: fast
  prompt: Đoạn await A(); await B(); (mỗi cái 1s) tổng bao lâu, và sửa thế nào để còn ~1s?
  answer: '~2 giây (tuần tự). Sửa: khởi động cả hai trước rồi await Task.WhenAll(ta, tb) → ~1 giây.'
- id: p1-async-q3
  node: async-await
  tier: fast
  prompt: Vì sao nên tránh task.Result trong web app?
  answer: Nó block thread để chờ, gây deadlock (khi có SynchronizationContext) hoặc thread-pool starvation;
    dùng await thay thế.
- id: p1-async-q4
  node: async-await
  tier: fast
  prompt: Khi nào dùng WhenAny thay vì WhenAll?
  answer: 'Khi chỉ cần task đầu tiên hoàn tất: timeout, đua nhiều nguồn, lấy phản hồi nhanh nhất. WhenAll
    chờ tất cả.'
- id: p1-async-q5
  node: async-await
  tier: fast
  prompt: async void sai ở chỗ nào, ngoại lệ duy nhất được phép là gì?
  answer: Exception từ async void không bắt được ở nơi gọi nên gây crash; chỉ chấp nhận cho event handler
    UI, còn lại trả Task/Task<T>.
- id: sql-nen-tang-q1
  node: sql-nen-tang
  tier: fast
  prompt: Vì sao SQL được gọi là ngôn ngữ khai báo (declarative)?
  answer: Bạn chỉ mô tả muốn dữ liệu gì, không mô tả cách lấy từng bước; PostgreSQL (query planner) tự
    quyết định cách thực thi tối ưu.
- id: sql-nen-tang-q2
  node: sql-nen-tang
  tier: fast
  prompt: Trong câu SELECT price * 2 AS gia_doi FROM products WHERE gia_doi > 100 — câu này lỗi. Vì sao?
  answer: Alias gia_doi tạo ở bước SELECT nhưng WHERE chạy trước SELECT nên alias chưa tồn tại; phải viết
    WHERE price * 2 > 100.
- id: sql-nen-tang-q3
  node: sql-nen-tang
  tier: fast
  prompt: SELECT count(*) FROM users WHERE age <> 30 với An=30, Bình=NULL, Cường=25 trả về mấy?
  answer: 1 (chỉ Cường); dòng Bình có age NULL nên NULL <> 30 là UNKNOWN, bị loại.
- id: sql-nen-tang-q4
  node: sql-nen-tang
  tier: fast
  prompt: Kiểu nào phù hợp lưu số tiền 450000.50, và tại sao không dùng float/double precision?
  answer: numeric(p,s) ví dụ numeric(10,2); float/double là dấu phẩy động nhị phân, không chính xác tuyệt
    đối nên gây sai số tích luỹ với tiền tệ.
- id: sql-nen-tang-q5
  node: sql-nen-tang
  tier: fast
  prompt: Khác nhau giữa serial và GENERATED ALWAYS AS IDENTITY, vì sao nên ưu tiên cái sau?
  answer: serial cho phép ghi đè giá trị khoá chính âm thầm; GENERATED ALWAYS AS IDENTITY là identity
    column chuẩn SQL, chặn ghi đè vô ý trừ khi dùng OVERRIDING SYSTEM VALUE.
- id: sql-nen-tang-q6
  node: sql-nen-tang
  tier: fast
  prompt: Câu UPDATE products SET price = 0; (không có WHERE) có báo lỗi không, điều gì xảy ra?
  answer: Không báo lỗi; sửa giá của toàn bộ dòng trong bảng thành 0 vì thiếu WHERE nghĩa là áp dụng cho
    mọi dòng — lỗi logic chứ không phải lỗi cú pháp.
- id: sql-nen-tang-q7
  node: sql-nen-tang
  tier: fast
  prompt: Thứ tự thực thi logic của FROM, WHERE, SELECT, ORDER BY, LIMIT (chưa tính GROUP BY/HAVING) là
    gì?
  answer: FROM → WHERE → SELECT → ORDER BY → LIMIT/OFFSET.
- id: sql-nen-tang-q8
  node: sql-nen-tang
  tier: fast
  prompt: Vì sao SELECT * FROM demo_null WHERE stock = NULL; luôn trả về 0 dòng, cách viết đúng là gì?
  answer: stock = NULL luôn cho UNKNOWN chứ không bao giờ TRUE, kể cả khi stock thực sự NULL; phải dùng
    WHERE stock IS NULL.
- id: joins-aggregation-q1
  node: joins-aggregation
  tier: fast
  prompt: INNER JOIN và LEFT JOIN khác nhau ở điểm nào về dòng không khớp?
  answer: INNER JOIN loại bỏ dòng không khớp cả hai bên; LEFT JOIN giữ toàn bộ dòng bảng trái, điền NULL
    cho cột bảng phải khi không khớp.
- id: joins-aggregation-q2
  node: joins-aggregation
  tier: fast
  prompt: Vì sao không được viết WHERE COUNT(*) > 5?
  answer: COUNT là hàm tổng hợp chỉ tồn tại sau GROUP BY, còn WHERE chạy trước khi gom nhóm; phải dùng
    HAVING COUNT(*) > 5.
- id: joins-aggregation-q3
  node: joins-aggregation
  tier: fast
  prompt: COUNT(*) khác COUNT(col) thế nào khi col có NULL?
  answer: COUNT(*) đếm mọi dòng; COUNT(col) chỉ đếm dòng có col không NULL.
- id: joins-aggregation-q4
  node: joins-aggregation
  tier: fast
  prompt: Viết mệnh đề tìm khách chưa có đơn bằng NOT EXISTS.
  answer: SELECT c.name FROM customers c WHERE NOT EXISTS (SELECT 1 FROM orders o WHERE o.customer_id
    = c.id);
- id: joins-aggregation-q5
  node: joins-aggregation
  tier: fast
  prompt: Correlated subquery khác subquery thường ở đâu?
  answer: Correlated subquery tham chiếu cột truy vấn ngoài và chạy lại cho từng dòng ngoài; subquery
    thường độc lập, chạy một lần.
- id: p2-ef-core-1
  node: ef-core
  tier: fast
  prompt: IQueryable được thực thi lúc nào?
  answer: Khi materialize (ToList/ToListAsync, foreach, First, Count, Any), không phải lúc gọi .Where;
    LINQ là deferred.
- id: p2-ef-core-2
  node: ef-core
  tier: fast
  prompt: Hai lệnh CLI nào tạo migration rồi áp vào database?
  answer: dotnet ef migrations add <Ten> rồi dotnet ef database update.
- id: p2-ef-core-3
  node: ef-core
  tier: fast
  prompt: Khi nào nên dùng AsNoTracking()?
  answer: Khi truy vấn chỉ đọc (hiển thị/báo cáo), không định sửa và SaveChanges; nhanh và ít tốn RAM
    hơn.
- id: p2-ef-core-4
  node: ef-core
  tier: fast
  prompt: N+1 xảy ra thế nào và cách khắc phục cơ bản?
  answer: Truy cập navigation trong vòng lặp mà không nạp sẵn tạo 1 câu chính + N câu con; khắc phục bằng
    Include hoặc projection Select.
- id: p2-ef-core-5
  node: ef-core
  tier: fast
  prompt: Vì sao không nên trả IQueryable ra khỏi repository?
  answer: Vì bên ngoài có thể nối thêm LINQ chạy SQL ngoài kiểm soát, phụ thuộc DbContext đã đóng và phá
    ranh giới tầng; nên đóng bằng ToListAsync/FirstOrDefaultAsync và trả kiểu cụ thể như List<T>.
- id: minimal-api-q1
  node: minimal-api
  tier: fast
  prompt: REST dựa trên khái niệm cốt lõi nào để quyết định cách đặt tên URL và chọn HTTP method?
  answer: Tài nguyên (resource) - mỗi tài nguyên có một URL riêng viết bằng danh từ số nhiều, còn HTTP
    method diễn tả hành động lên tài nguyên đó, không nhồi động từ vào URL.
- id: minimal-api-q2
  node: minimal-api
  tier: fast
  prompt: WebApplicationBuilder và WebApplication (kết quả của Build()) khác nhau ở vai trò gì?
  answer: WebApplicationBuilder dùng để cấu hình trước khi chạy (đăng ký service, đọc config); WebApplication
    dùng để định tuyến (MapGet...) và chạy (Run()). Gọi nhầm phương thức định tuyến trên builder gây lỗi
    biên dịch CS1061.
- id: minimal-api-q3
  node: minimal-api
  tier: fast
  prompt: POST /orders tạo đơn hàng thành công thì trả status code nào và kèm header gì?
  answer: 201 Created, kèm header Location trỏ tới URL tài nguyên vừa tạo (Results.Created).
- id: minimal-api-q4
  node: minimal-api
  tier: fast
  prompt: Trong app.MapGet("/users/{id:int}", (int id) => ...), tham số id được bind từ đâu?
  answer: Từ route param {id:int} trong path; constraint :int chỉ khớp giá trị số. Gọi /users/abc không
    khớp route, trả 404 trước khi vào tới handler.
- id: minimal-api-q5
  node: minimal-api
  tier: fast
  prompt: Vì sao nên trả Results.NotFound() thay vì object rỗng với status 200?
  answer: 'Status code là hợp đồng ngữ nghĩa: 404 nói rõ không có tài nguyên; 200 + body rỗng khiến client
    hiểu nhầm là thành công.'
- id: minimal-api-q6
  node: minimal-api
  tier: fast
  prompt: Dùng PUT /products/5 để chỉ sửa một trường (ví dụ giá) có nguy cơ gì?
  answer: PUT thay thế toàn bộ tài nguyên; nếu body chỉ gửi một trường, các trường khác bị gán về giá
    trị mặc định, mất dữ liệu ngoài ý muốn. Nên dùng PATCH với DTO nhỏ chỉ chứa trường cần sửa.
- id: minimal-api-q7
  node: minimal-api
  tier: fast
  prompt: URL POST /createUser vi phạm nguyên tắc REST nào?
  answer: URL phải là danh từ số nhiều chỉ tài nguyên, không nhét động từ; hành động do HTTP method diễn
    đạt. Đúng là POST /users.
- id: minimal-api-q8
  node: minimal-api
  tier: fast
  prompt: Vì sao dùng First()/Single() trong handler tìm-theo-id có thể biến 404 hợp lệ thành 500?
  answer: First()/Single() ném InvalidOperationException khi không có phần tử khớp; nếu không bắt và chuyển
    thành Results.NotFound(), ASP.NET Core trả 500 thay vì 404 hợp lý. Nên dùng FirstOrDefault().
- id: p3-di-q1
  node: dependency-injection
  tier: fast
  prompt: AddScoped tạo bao nhiêu instance trong một request HTTP có 3 chỗ cùng yêu cầu service đó?
  answer: Đúng 1 instance, tái dùng trong suốt scope của request.
- id: p3-di-q2
  node: dependency-injection
  tier: fast
  prompt: Vì sao DbContext nên là Scoped chứ không phải Singleton?
  answer: DbContext không an toàn đa luồng và mang trạng thái theo request; Singleton sẽ chia sẻ một instance
    cho mọi request đồng thời gây lỗi dữ liệu/concurrency.
- id: p3-di-q3
  node: dependency-injection
  tier: fast
  prompt: Captive dependency là gì?
  answer: Service sống-lâu (Singleton) giữ tham chiếu tới service sống-ngắn hơn (Scoped), khiến nó bị
    giam và tồn tại sai vòng đời.
- id: p3-di-q4
  node: dependency-injection
  tier: fast
  prompt: Cách đúng để một Singleton dùng một service Scoped là gì?
  answer: Tiêm IServiceScopeFactory, mở CreateScope() mỗi lần cần, lấy Scoped qua GetRequiredService rồi
    Dispose scope.
- id: p3-di-q5
  node: dependency-injection
  tier: fast
  prompt: Nguyên tắc thiết kế nào cho phép đổi implementation mà không sửa code dùng nó, và DI hiện thực
    thế nào?
  answer: Nghịch đảo phụ thuộc (Dependency Inversion) — phụ thuộc vào abstraction; DI tiêm implementation
    qua constructor nên chỉ đổi dòng đăng ký.
- id: tai-file-an-toan-q1
  node: tai-file-an-toan
  tier: fast
  prompt: Hàm BCL nào bóc bỏ mọi thành phần đường dẫn khỏi tên file client, và nó có nhược điểm gì trên
    hệ điều hành không phải Windows?
  answer: 'Path.GetFileName — chỉ giữ phần tên cuối, loại bỏ .. và thư mục cha. Nhược điểm: trên hệ điều
    hành không phải Windows, nó không coi \ là dấu phân tách, nên một chuỗi kiểu ..\..\cmd.exe lọt qua
    gần như nguyên vẹn, vẫn nên kiểm thêm ký tự lạ.'
- id: tai-file-an-toan-q2
  node: tai-file-an-toan
  tier: fast
  prompt: Vì sao không được tin Content-Type hay đuôi file khi phân loại nội dung?
  answer: Cả hai đều là giá trị do client tự khai — không có cơ chế nào bắt buộc chúng khớp với nội dung
    thật; chỉ magic byte (đọc trực tiếp nội dung) mới đáng tin.
- id: tai-file-an-toan-q3
  node: tai-file-an-toan
  tier: fast
  prompt: Nên kiểm kích thước file trước hay sau khi đọc toàn bộ nội dung vào bộ nhớ? Vì sao?
  answer: Trước. Từ chối sớm bằng giới hạn ở tầng server (RequestSizeLimit/MaxRequestBodySize) tránh nạp
    file khổng lồ vào bộ nhớ/đĩa trước — đây là điều kiện để chống DoS thật sự.
- id: tai-file-an-toan-q4
  node: tai-file-an-toan
  tier: fast
  prompt: Lưu file upload trong wwwroot gây rủi ro cụ thể gì?
  answer: File bị phục vụ tĩnh; nội dung độc có thể chạy dưới domain của bạn dẫn tới stored XSS/thực thi.
    Phải lưu ngoài webroot hoặc chặn thực thi.
- id: tai-file-an-toan-q5
  node: tai-file-an-toan
  tier: fast
  prompt: Vì sao đặt tên lưu bằng Guid an toàn hơn dùng tên client, ngay cả khi tên đó đã qua Path.GetFileName?
  answer: Path.GetFileName chỉ loại bỏ phần đường dẫn, nhưng vẫn giữ nguyên tên — hai client khác nhau
    gửi cùng tên sẽ ghi đè lẫn nhau. Guid.NewGuid() do server sinh, đảm bảo không trùng, loại bỏ hoàn
    toàn cả traversal và va chạm/ghi đè tên.
- id: testing-q1
  node: testing
  tier: fast
  prompt: Vì sao test tự động phát hiện lỗi sớm hơn việc tự tay chạy thử một lần?
  answer: Vì test tự động chạy lại mọi lần build/commit, kể cả khi người sửa code không biết đoạn code
    họ sửa có liên quan tới test đó — nó bảo vệ được cả những thay đổi không lường trước, còn tự tay chạy
    thử chỉ kiểm tại một thời điểm.
- id: testing-q2
  node: testing
  tier: fast
  prompt: Ba khối Arrange-Act-Assert lần lượt trả lời câu hỏi gì?
  answer: 'Arrange: đầu vào/dữ liệu là gì. Act: gọi đúng một hành động cần kiểm. Assert: kết quả thực
    tế có khớp kết quả kỳ vọng không.'
- id: testing-q3
  node: testing
  tier: fast
  prompt: Khi nào nên dùng [Theory] + [InlineData] thay vì viết nhiều [Fact]?
  answer: Khi cùng một logic cần kiểm với nhiều bộ dữ liệu khác nhau — gộp thành một [Theory] tránh lặp
    code, và mỗi [InlineData] vẫn là một test độc lập, báo lỗi rõ đúng bộ tham số nào gây fail.
- id: testing-q4
  node: testing
  tier: fast
  prompt: Tiêu chí duy nhất để phân biệt unit test và integration test là gì?
  answer: Có I/O thật (mạng, database, file) hay không. Unit test không có I/O thật, mọi dependency ngoài
    bị thay giả; integration test có I/O thật hoặc gần thật, ví dụ WebApplicationFactory<T>.
- id: testing-q5
  node: testing
  tier: fast
  prompt: Vì sao mock qua interface hoạt động được, mà không mock được nếu code gọi trực tiếp một lớp
    cụ thể?
  answer: Vì service chỉ phụ thuộc vào abstraction (interface), không phụ thuộc cài đặt cụ thể — cho phép
    cắm bất kỳ implementation nào, kể cả một implementation giả chỉ tồn tại trong test.
- id: claude-code-1
  node: claude-code
  tier: fast
  prompt: Nêu 2 lệnh để quản lý ngữ cảnh phiên và khác biệt của chúng.
  answer: /compact nén lịch sử nhưng giữ ý chính (tiếp tục cùng task); /clear xoá sạch để bắt đầu task
    mới.
- id: claude-code-2
  node: claude-code
  tier: fast
  prompt: File nào là bộ nhớ dự án mà agent tự nạp mỗi phiên, và lệnh nào tạo nó?
  answer: File CLAUDE.md ở gốc repo; lệnh /init sinh bản khởi đầu.
- id: claude-code-3
  node: claude-code
  tier: fast
  prompt: Lệnh nào để thêm một MCP server?
  answer: claude mcp add <tên> -- <lệnh khởi chạy server>.
- id: claude-code-4
  node: claude-code
  tier: fast
  prompt: Muốn ghi audit trước mỗi lần agent chạy công cụ thì dùng event hook nào (PascalCase)?
  answer: PreToolUse (chạy sau thì PostToolUse); harness thực thi hook.
- id: claude-code-5
  node: claude-code
  tier: fast
  prompt: Vì sao agent chạy test xanh chưa đủ để commit?
  answer: Vì agent có thể đã sửa test cho khớp bug; phải đọc diff và tin test trước khi commit.
- id: exceptions-q1
  node: exceptions
  tier: fast
  prompt: Sự khác biệt giữa throw; và throw ex; là gì?
  answer: throw; giữ nguyên stack trace gốc; throw ex; reset stack trace, làm mất nơi lỗi thật phát sinh.
- id: exceptions-q2
  node: exceptions
  tier: fast
  prompt: finally có chạy khi try chứa return không?
  answer: Có, finally luôn chạy trước khi return thực sự trả giá trị.
- id: exceptions-q3
  node: exceptions
  tier: fast
  prompt: Nên dùng TryParse hay try/catch để đọc số người dùng nhập? Vì sao?
  answer: TryParse — vì nhập sai là tình huống thường ngày, không nên dùng exception cho control-flow
    (tốn chi phí và khó đọc).
- id: exceptions-q4
  node: exceptions
  tier: fast
  prompt: Hai guard hiện đại nào thay thế cho việc tự viết if (x == null) throw ...?
  answer: ArgumentNullException.ThrowIfNull(x) và ArgumentException.ThrowIfNullOrEmpty(s).
- id: exceptions-q5
  node: exceptions
  tier: fast
  prompt: Vì sao catch (Exception) cho mọi thứ là thói quen xấu?
  answer: Nó nuốt cả lỗi nghiêm trọng bạn không xử lý được, che giấu bug và làm khó chẩn đoán nguyên nhân.
- id: validation-q1
  node: validation
  tier: fast
  prompt: Vì sao không được tin dữ liệu từ client dù frontend đã validate rồi?
  answer: Vì kẻ tấn công (hoặc Postman, script test) có thể gọi thẳng vào API, bỏ qua hoàn toàn giao diện
    web — validation ở frontend chỉ để trải nghiệm mượt, không phải hàng rào bảo mật.
- id: validation-q2
  node: validation
  tier: fast
  prompt: Gọi API với Quantity = -5 mà không có validation gì, hậu quả cụ thể có thể là gì?
  answer: Nếu code làm Stock -= Quantity mà không kiểm tra, số âm khiến kho tăng thay vì giảm; hoặc nếu
    Quantity dùng để cấp phát vòng lặp/mảng, có thể gây crash hay treo server.
- id: validation-q3
  node: validation
  tier: fast
  prompt: Cần gọi phương thức nào trên builder.Services để bật validation tự động cho Minimal API, và
    nếu quên gọi thì chuyện gì xảy ra?
  answer: builder.Services.AddValidation(). Nếu quên gọi, attribute Data Annotations vẫn nằm trên property
    nhưng không ai kiểm tra khi chạy — dữ liệu sai lọt qua thẳng vào handler.
- id: validation-q4
  node: validation
  tier: fast
  prompt: Response lỗi validation nên có status code nào, và tại sao không phải 500?
  answer: 400 Bad Request, vì lỗi nằm ở phía client gửi dữ liệu sai định dạng — 500 chỉ dành cho lỗi phía
    server.
- id: validation-q5
  node: validation
  tier: fast
  prompt: Cho ví dụ một rule mà Data Annotations khó diễn đạt nhưng FluentValidation làm tự nhiên.
  answer: Rule liên-field như Confirm phải khớp Password, hoặc rule có điều kiện như nếu ShippingMethod
    là Express thì PhoneNumber bắt buộc — FluentValidation có .Equal(), .When() diễn đạt tự nhiên, Data
    Annotations không hỗ trợ trực tiếp.
- id: logging-exceptions-1
  node: logging-exceptions
  tier: fast
  prompt: Vì sao structured logging tốt hơn nối chuỗi?
  answer: Nó giữ message template và các trường có tên riêng biệt, cho phép truy vấn/lọc theo giá trị
    (ví dụ OrderId=42) thay vì chỉ có chuỗi phẳng.
- id: logging-exceptions-2
  node: logging-exceptions
  tier: fast
  prompt: Kể đúng thứ tự 6 log level từ thấp đến cao.
  answer: Trace, Debug, Information, Warning, Error, Critical.
- id: logging-exceptions-3
  node: logging-exceptions
  tier: fast
  prompt: IExceptionHandler.TryHandleAsync trả true nghĩa là gì?
  answer: Exception đã được xử lý xong; pipeline không chuyển tiếp cho handler khác.
- id: logging-exceptions-4
  node: logging-exceptions
  tier: fast
  prompt: Ở production, được phép đưa gì và không được đưa gì vào response lỗi?
  answer: 'Được: title, status, correlationId. Không được: stack trace, SQL, tên biến/đường dẫn nội bộ,
    thông điệp exception thô.'
- id: logging-exceptions-5
  node: logging-exceptions
  tier: fast
  prompt: Correlation id dùng để làm gì?
  answer: Nối tất cả dòng log của cùng một request lại với nhau để truy vết lỗi từ mã do client cung cấp.
- id: deploy-docker-q1
  node: deploy-docker
  tier: fast
  prompt: Container khác VM ở điểm cách ly nào — cụ thể là kernel?
  answer: Container dùng chung kernel của host (cách ly ở tầng tiến trình qua namespace/cgroup); VM có
    kernel riêng hoàn toàn được hypervisor giả lập.
- id: deploy-docker-q2
  node: deploy-docker
  tier: fast
  prompt: Từ một image, docker run ba lần thì có ba image hay ba container?
  answer: Ba container. Image không đổi số lượng — nó vẫn là một bản thiết kế bất biến; mỗi lần docker
    run tạo một container mới từ đó.
- id: deploy-docker-q3
  node: deploy-docker
  tier: fast
  prompt: Vì sao multi-stage build không COPY toàn bộ mã nguồn và SDK vào image cuối?
  answer: Vì production chỉ cần kết quả đã publish để chạy; mang SDK làm image nặng hơn và tăng bề mặt
    tấn công, mang mã nguồn làm lộ logic nội bộ nếu ai đó lấy được image.
- id: deploy-docker-q4
  node: deploy-docker
  tier: fast
  prompt: .dockerignore giải quyết vấn đề gì mà .gitignore không giải quyết được cho Docker?
  answer: .dockerignore lọc file trước khi gửi build context cho Docker daemon và trước khi COPY vào image
    — Docker không đọc .gitignore, nên file như bin/ hay obj/ vẫn cần lọc riêng ở đây.
- id: deploy-docker-q5
  node: deploy-docker
  tier: fast
  prompt: EXPOSE 8080 trong Dockerfile có tự mở cổng ra host không? Cái gì mới thực sự mở cổng?
  answer: 'Không. EXPOSE chỉ là tài liệu hoá cổng dự kiến. Cổng thực sự mở bằng -p host:container ở docker
    run hoặc ports: trong docker-compose.yml.'
- id: p5-mcp-q1
  node: mcp
  tier: fast
  prompt: MCP giải bài toán tích hợp từ độ phức tạp nào xuống độ phức tạp nào?
  answer: Từ N × M xuống N + M nhờ một giao thức chung.
- id: p5-mcp-q2
  node: mcp
  tier: fast
  prompt: Primitive nào do model chủ động gọi và thường có tác dụng phụ?
  answer: Tools (model-controlled).
- id: p5-mcp-q3
  node: mcp
  tier: fast
  prompt: Lệnh CLI nào dùng để thêm một server MCP vào Claude Code?
  answer: claude mcp add <tên> -- <lệnh chạy server>.
- id: p5-mcp-q4
  node: mcp
  tier: fast
  prompt: Vì sao không nên nhúng token trực tiếp vào .mcp.json?
  answer: Dễ bị commit gây rò rỉ bí mật; nên dùng biến môi trường và .gitignore.
- id: p5-mcp-q5
  node: mcp
  tier: fast
  prompt: Đâu là ranh giới quyền thực sự của một server truy cập database?
  answer: Quyền của tài khoản/scope kết nối DB (ví dụ user readonly), thực thi ở lớp database.
- id: capstone-q1
  node: capstone
  tier: fast
  prompt: Tại sao .RequireAuthorization() không đủ để chặn lỗ hổng BOLA ở endpoint PUT /tasks/{id}?
  answer: Vì .RequireAuthorization() chỉ kiểm authentication (biết ai đang gọi) — nó không kiểm authorization
    theo dữ liệu (người gọi có quyền sửa bản ghi cụ thể này không). Phải tự so task.UserId == currentUserId
    trong logic endpoint/service.
- id: capstone-q2
  node: capstone
  tier: fast
  prompt: Navigation property User.Tasks và cột khoá ngoại TaskItem.UserId khác nhau ở điểm nào?
  answer: TaskItem.UserId là cột thật tồn tại trong bảng database. User.Tasks là navigation property —
    chỉ là thuộc tính C# giúp điều hướng trong code, không ánh xạ tới cột nào.
- id: capstone-q3
  node: capstone
  tier: fast
  prompt: Nếu dotnet build chạy sạch nhưng gọi endpoint bị lỗi Unable to resolve service, nguyên nhân
    thường gặp nhất là gì?
  answer: Quên đăng ký service đó vào DI container — lỗi này chỉ xuất hiện lúc runtime, không phải lúc
    build.
- id: capstone-q4
  node: capstone
  tier: fast
  prompt: Vì sao lọc GET /tasks phải dùng userId từ ClaimsPrincipal chứ không phải từ query string?
  answer: Vì claim trong JWT đã được ký — client không thể tự sửa mà không làm hỏng chữ ký. Query string
    thì client tự do gõ bất kỳ giá trị nào; nếu dùng để lọc, ai cũng đọc được dữ liệu của người khác.
- id: capstone-q5
  node: capstone
  tier: fast
  prompt: Definition of Done yêu cầu ít nhất 2 test xUnit. Vì sao một trong hai bắt buộc phải kiểm luồng
    401/403, không chỉ happy path?
  answer: Vì thiếu phân quyền là lỗ hổng nghiêm trọng và dễ lọt qua review bằng mắt; chỉ test happy path
    không phát hiện được trường hợp endpoint quên RequireAuthorization() hoặc quên kiểm chủ sở hữu.
- id: generics-q1
  node: generics
  tier: fast
  prompt: Vì sao ArrayList gây boxing với int còn List<int> thì không?
  answer: ArrayList.Add nhận object nên int (value type) phải được box (cấp phát heap + copy) để thành
    object. List<int> được JIT sinh mã riêng với int nằm trực tiếp trong mảng nội bộ int[], không cần
    chuyển sang object nên không boxing.
- id: generics-q2
  node: generics
  tier: fast
  prompt: Liệt kê thứ tự bắt buộc khi kết hợp nhiều ràng buộc where.
  answer: '(1) ràng buộc chính chọn tối đa một trong class/struct/unmanaged/notnull đứng đầu; (2) base
    class tối đa một; (3) các interface; (4) new() luôn cuối cùng. Ví dụ: where T : class, IFoo, new().'
- id: generics-q3
  node: generics
  tier: fast
  prompt: IEnumerable<out T> covariant nghĩa là gì, và vì sao IList<T> không thể covariant?
  answer: Covariant nghĩa IEnumerable<Dog> được coi là IEnumerable<Animal> vì T chỉ ở vị trí trả về (chỉ
    lấy ra). IList<T> có Add(T) với T ở vị trí tham số vào; nếu covariant thì có thể Add(new Cat()) vào
    danh sách Dog, phá type-safety, nên T không được đánh dấu out.
- id: generics-q4
  node: generics
  tier: fast
  prompt: Tại sao không thể viết hai overload Foo<T>() where T:class và Foo<T>() where T:struct?
  answer: Ràng buộc where không thuộc chữ ký phương thức, nên hai method có chữ ký giống hệt (Foo<T>()),
    gây lỗi trùng định nghĩa CS0111. Muốn phân nhánh value/reference phải kiểm tra typeof(T).IsValueType
    bên trong một method duy nhất.
- id: generics-q5
  node: generics
  tier: fast
  prompt: default(int), default(string), default(bool?) lần lượt là gì?
  answer: default(int) = 0; default(string) = null; default(bool?) = null (nullable value không có giá
    trị). Reference type là null, value type là giá trị 0/struct rỗng.
- id: generics-q6
  node: generics
  tier: fast
  prompt: Counter<int>.Total và Counter<string>.Total có dùng chung ô nhớ không? Vì sao?
  answer: Không. CLR coi Counter<int> và Counter<string> là hai closed type độc lập, mỗi cái có bộ static
    field riêng. Tăng Counter<int>.Total không ảnh hưởng Counter<string>.Total.
- id: generics-q7
  node: generics
  tier: fast
  prompt: Cách đúng để so sánh bằng nhau giữa hai giá trị kiểu T trong generic là gì, và vì sao không
    dùng ==?
  answer: Dùng EqualityComparer<T>.Default.Equals(x, y). Không dùng == vì với T chưa ràng buộc thường
    không biên dịch, và với reference type == so sánh tham chiếu chứ không so nội dung. EqualityComparer<T>.Default
    tự gọi IEquatable<T> nếu có (không boxing).
- id: generics-q8
  node: generics
  tier: fast
  prompt: typeof(List<>) khác typeof(List<int>) như thế nào, và List`1 nghĩa là gì?
  answer: typeof(List<>) là open generic type definition (IsGenericTypeDefinition == true), chưa điền
    tham số kiểu, không tạo instance được. typeof(List<int>) là closed type đã điền int, tạo instance
    được. List`1 = tên List + arity (số tham số kiểu) là 1; Dictionary<,> là Dictionary`2.
- id: delegates-events-q1
  node: delegates-events
  tier: fast
  prompt: Đâu là khác biệt giữa Func<int,string> và Action<int,string>?
  answer: Func<int,string> nhận một tham số int và trả về string (kiểu cuối là kết quả). Action<int,string>
    nhận hai tham số int và string, không trả về gì (void).
- id: delegates-events-q2
  node: delegates-events
  tier: fast
  prompt: Vòng for (int i=0;i<3;i++) list.Add(() => i); rồi gọi hết cho ra gì? Vì sao? Cách sửa?
  answer: 'Ra 3,3,3 vì i là một biến duy nhất dùng chung cả vòng lặp, mọi lambda capture cùng ô nhớ và
    khi chạy i đã bằng 3. Sửa: copy vào biến nội vòng (int copy=i; () => copy) hoặc dùng foreach.'
- id: delegates-events-q3
  node: delegates-events
  tier: fast
  prompt: Khi gọi một multicast Func<int> gồm ba hàm trả 1, 2, 3 — giá trị nhận được là gì?
  answer: Là 3 — multicast chạy hết cả ba hàm nhưng chỉ trả về kết quả của hàm cuối cùng. Muốn lấy đủ
    phải duyệt GetInvocationList().
- id: delegates-events-q4
  node: delegates-events
  tier: fast
  prompt: Vì sao event an toàn hơn một field public delegate?
  answer: Vì event giới hạn bên ngoài chỉ được += và -=; việc gán = (xóa handler người khác) và raise
    (gọi) chỉ làm được bên trong lớp khai báo. Field delegate public cho phép ai cũng gán đè và tự gọi.
- id: delegates-events-q5
  node: delegates-events
  tier: fast
  prompt: Vì sao quên unsubscribe gây rò rỉ bộ nhớ, và trong tình huống nào nặng nhất?
  answer: Publisher giữ delegate, delegate giữ Target = subscriber, nên publisher tham chiếu ngược subscriber
    khiến nó không được GC. Nặng nhất khi publisher sống lâu (singleton/service) còn subscriber ngắn hạn
    (view/form). Phòng bằng -= đối xứng, IDisposable, hoặc weak event.
- id: delegates-events-q6
  node: delegates-events
  tier: fast
  prompt: Khác biệt cốt lõi giữa Func<T,bool> và Expression<Func<T,bool>>, và vì sao EF Core cần cái thứ
    hai?
  answer: Func<T,bool> đã biên dịch thành IL chạy được, chỉ gọi được. Expression<Func<T,bool>> là cây
    đối tượng mô tả cấu trúc lambda, đọc/phân tích/dịch được lúc runtime. EF Core cần nó để dịch lambda
    sang SQL chạy server-side; nếu dùng Func, EF phải tải cả bảng về rồi lọc — hỏng hiệu năng.
- id: delegates-events-q7
  node: delegates-events
  tier: fast
  prompt: Nếu một handler trong chuỗi multicast ném exception, các handler sau có chạy không?
  answer: Không. Exception làm đứt chuỗi ngay lập tức; các handler đăng ký sau nó không chạy. Muốn chạy
    hết bất chấp lỗi, tự duyệt GetInvocationList() và bọc try/catch từng phần tử.
- id: delegates-events-q8
  node: delegates-events
  tier: fast
  prompt: static x => x * 2 khác x => x * 2 chỗ nào?
  answer: 'static lambda bị cấm capture biến ngoài (dùng biến bao ngoài sẽ lỗi biên dịch). Lợi ích: khẳng
    định hàm thuần, tránh cấp phát display class ẩn khi vô tình capture — tốt cho hiệu năng và độ rõ ràng.'
- id: records-pattern-matching-q1
  node: records-pattern-matching
  tier: fast
  prompt: Điều gì thật sự định nghĩa một record, immutability hay value equality?
  answer: Value equality. Record có thể mutable (property set) nhưng vẫn là record. Bản chất record là
    compiler luôn sinh Equals/GetHashCode/operator== so theo giá trị các thành viên (cộng EqualityContract
    với record class).
- id: records-pattern-matching-q2
  node: records-pattern-matching
  tier: fast
  prompt: new Team("A", new[]{"x"}) == new Team("A", new[]{"x"}) cho kết quả gì với record Team(string
    Name, string[] Members)? Vì sao?
  answer: False. Field string[] so bằng EqualityComparer<string[]>.Default = reference equality; hai mảng
    là hai object khác nhau. Muốn True phải override Equals+GetHashCode so theo phần tử (SequenceEqual).
- id: records-pattern-matching-q3
  node: records-pattern-matching
  tier: fast
  prompt: Khác biệt property positional sinh ra giữa record class và record struct (không readonly)?
  answer: record class sinh property init (bất biến). record struct sinh property set (mutable). Muốn
    record struct bất biến phải dùng readonly record struct (sinh init + field readonly).
- id: records-pattern-matching-q4
  node: records-pattern-matching
  tier: fast
  prompt: Trong switch expression, đặt arm '> 0 =>' trước arm '> 100 =>' gây ra chuyện gì?
  answer: Arm > 100 trở thành unreachable (không bao giờ chạy được) vì > 0 đã nuốt mọi số dương kể cả
    > 100. Đây là LỖI BIÊN DỊCH CS8510 (không chỉ cảnh báo) - code sẽ không compile được. Phải xếp arm
    hẹp (> 100) trước arm rộng (> 0).
- id: records-pattern-matching-q5
  node: records-pattern-matching
  tier: fast
  prompt: x is var y khi x là null cho kết quả gì?
  answer: Luôn True, và y sẽ là null. var pattern khớp mọi giá trị, không lọc null. Muốn lọc null dùng
    is not null hoặc is { }.
- id: records-pattern-matching-q6
  node: records-pattern-matching
  tier: fast
  prompt: a with { } (ngoặc rỗng) làm gì? Object kết quả có ReferenceEquals với a không?
  answer: Tạo một bản sao nông giống hệt a. a == kết_quả là True (value equality) nhưng ReferenceEquals(a,
    kết_quả) là False (object mới). Đây là clone không phá huỷ.
- id: records-pattern-matching-q7
  node: records-pattern-matching
  tier: fast
  prompt: Vì sao record Cat và record Dog cùng kế thừa Animal, cùng Name/Age, lại không bằng nhau?
  answer: Vì Equals tự sinh so cả EqualityContract (= typeof kiểu runtime). Cat có EqualityContract ==
    typeof(Cat), Dog có typeof(Dog) nên khác nhau, không bằng dù nội dung giống hệt.
- id: records-pattern-matching-q8
  node: records-pattern-matching
  tier: fast
  prompt: Bao nhiêu slice .. được phép trong một list pattern? Cho ví dụ hợp lệ và không hợp lệ.
  answer: 'Tối đa một .. Hợp lệ: [1, .., 9], [.., x], [a, ..]. Không hợp lệ (lỗi biên dịch): [.., 3, ..]
    vì hai slice khiến compiler không biết cắt ở đâu.'
- id: collections-q1
  node: collections
  tier: fast
  prompt: Vì sao Add của List<T> là O(1) khấu hao (amortized) chứ không phải O(1) tuyệt đối?
  answer: Vì thỉnh thoảng mảng nền đầy, phải cấp mảng gấp đôi và copy toàn bộ (O(n)). Nhưng vì mỗi lần
    gấp đôi kéo dài rất nhiều lần Add rẻ, chi phí trung bình mỗi Add vẫn là O(1) — gọi là khấu hao (amortized).
- id: collections-q2
  node: collections
  tier: fast
  prompt: Một class làm key Dictionary mà chỉ override Equals, quên GetHashCode, hậu quả gì?
  answer: 'Vi phạm hợp đồng: hai key bằng nhau có thể có hash khác nhau nên rơi vào bucket khác và không
    tìm thấy — phần tử biến mất. Bắt buộc override cả hai và bảo đảm Equals suy ra cùng hash (dùng HashCode.Combine).'
- id: collections-q3
  node: collections
  tier: fast
  prompt: Khác nhau giữa dict.Add(k,v) và dict[k]=v khi khoá đã tồn tại?
  answer: Add ném ArgumentException; indexer ghi đè không lỗi. Dùng Add khi muốn phát hiện trùng khoá,
    dùng indexer khi muốn upsert.
- id: collections-q4
  node: collections
  tier: fast
  prompt: Vì sao foreach rồi list.Remove(x) bên trong lại ném exception, và hai cách sửa?
  answer: 'Enumerator phát hiện collection đổi phiên bản (_version) giữa chừng nên ném InvalidOperationException.
    Sửa: (a) list.RemoveAll(predicate); (b) duyệt ngược for (i=Count-1; i>=0; i--) + RemoveAt; (c) duyệt
    list.ToList() rồi sửa gốc.'
- id: collections-q5
  node: collections
  tier: fast
  prompt: Nên nhận tham số kiểu gì cho hàm chỉ duyệt để tính tổng, và vì sao?
  answer: IEnumerable<T> — rộng nhất, nhận được mảng, List, HashSet, kết quả LINQ; đồng thời báo rõ hàm
    không sửa collection của caller. Nhận List<T> là khoá cứng và cho phép sửa ngầm.
- id: collections-q6
  node: collections
  tier: fast
  prompt: Span<T> khác Memory<T> ở đâu; khi nào phải dùng Memory<T>?
  answer: Span<T> là ref struct, chỉ sống trên stack — không làm field, không qua async/await, không box.
    Cần giữ lát cắt vùng nhớ lâu dài hoặc truyền qua ranh giới async thì dùng Memory<T>/ReadOnlyMemory<T>
    (được phép nằm trên heap).
- id: collections-q7
  node: collections
  tier: fast
  prompt: So sánh SortedDictionary và SortedList về chèn và bộ nhớ.
  answer: 'SortedDictionary là cây đỏ-đen: chèn/xoá O(log n) nhưng tốn bộ nhớ cho node. SortedList là
    hai mảng song song: chèn O(n) (dịch mảng) nhưng liền khối, ít bộ nhớ, truy cập theo index O(1). Nhiều
    thay đổi chọn SortedDictionary; ít thay đổi/nhiều đọc theo thứ tự chọn SortedList.'
- id: collections-q8
  node: collections
  tier: fast
  prompt: '[..a, ..b] nghĩa là gì, và khác a[1..3] chỗ nào?'
  answer: '[..a, ..b] là collection expression với toán tử spread — trải mọi phần tử của a rồi b vào một
    collection mới. a[1..3] là range — lát cắt của a từ chỉ số 1 đến trước 3. Cùng ký hiệu .. nhưng khác
    ngữ cảnh (spread bên trong [] vs range khi lập chỉ mục).'
- id: q_enum_constraint
  node: generics
  tier: deep
  prompt: 'Ràng buộc `where T : Enum` mở khoá điều gì mà một `T` không ràng buộc không làm được, và vì
    sao nó khác với `where T : SomeClass` thông thường?'
  answer: '`where T : Enum` cho phép gọi các API tĩnh dành riêng cho enum trên biến kiểu T (ví dụ dùng
    `Enum.GetNames(typeof(T))`, `HasFlag`), điều mà T không ràng buộc không cho phép vì trình biên dịch
    không biết T có phải enum hay không. Nó khác `where T : SomeClass` (kế thừa lớp cụ thể) ở chỗ `Enum`
    là một ràng buộc "đặc biệt" được trình biên dịch nhận diện cho MỌI kiểu enum bất kỳ (không phải một
    lớp cụ thể duy nhất) — tương tự `Delegate` cho mọi kiểu delegate.'
- id: q_generic_delegates
  node: generics
  tier: deep
  prompt: '`Func<T, TOut>` và `Action<T>` có phải là "phép màu ngôn ngữ" riêng của C# không? Giải thích
    bản chất của chúng.'
  answer: Không. `Func<>`/`Action<>` chỉ là các generic delegate được định nghĩa sẵn trong namespace `System`
    của BCL (nhiều bản overload theo số tham số), hoạt động theo đúng cơ chế đóng kiểu (closed type) như
    `List<T>` hay bất kỳ generic class nào khác. Bạn hoàn toàn có thể tự khai báo một generic delegate
    tương đương, ví dụ `delegate TOut Transformer<T, TOut>(T input);`.
- id: q_mystack_bigo
  node: generics
  tier: deep
  prompt: Vì sao `Push` của `MyStack<T>` được coi là O(1) amortized dù thỉnh thoảng nó gọi `Array.Resize`
    tốn O(n)?
  answer: Vì mảng nội bộ được nhân đôi kích thước mỗi lần resize thay vì tăng dần từng ô, nên số lần resize
    trong N lần Push chỉ là O(log N), và tổng chi phí copy phần tử qua tất cả các lần resize là O(N) —
    chia đều ra thì trung bình mỗi lần Push chỉ tốn O(1) (chi phí amortized), dù một vài lần Push riêng
    lẻ (đúng lúc mảng đầy) sẽ tốn O(n).
- id: '9'
  node: delegates-events
  tier: deep
  prompt: Vì sao `Action<object> aObject = o => {...}; Action<string> aString = aObject;` biên dịch được,
    còn chiều ngược lại (`Action<string>` gán cho `Action<object>`) thì không? Đây gọi là gì?
  answer: 'Đây là contravariance (phản biến) theo tham số: Action<in T> cho phép một delegate nhận tham
    số kiểu cha (object) đứng thay cho biến khai báo nhận kiểu con (string), vì bất kỳ string nào truyền
    vào cũng là một object hợp lệ. Chiều ngược lại sai vì một hàm chỉ biết xử lý string không thể nhận
    một object bất kỳ (có thể không phải string) một cách an toàn.'
- id: '10'
  node: delegates-events
  tier: deep
  prompt: '`Func<string> fString = () => "x"; Func<object> fObject = fString;` — vì sao gán được mà không
    cần ép kiểu? Nếu đổi Func thành Action<string>/Action<object> ở vị trí tham số thì chiều hiệp biến
    có còn đúng không?'
  answer: 'Vì Func<out TResult> được đánh dấu out (hiệp biến — covariant): kiểu trả về cụ thể hơn (string,
    kiểu con) luôn dùng thay được cho kiểu trả về tổng quát hơn (object, kiểu cha). Đổi sang vị trí tham
    số (Action<in T>) thì chiều đảo ngược — đó là contravariance, không phải covariance: tham số phải
    nới rộng lên kiểu cha, không thu hẹp xuống kiểu con.'
- id: '11'
  node: delegates-events
  tier: deep
  prompt: Vì sao dùng async void cho event handler lại nguy hiểm hơn async Task? Nếu handler bên trong
    ném exception, ai bắt được nó?
  answer: Với async Task, exception được đóng gói vào đối tượng Task để caller await rồi try/catch. Với
    async void, không có Task nào chứa exception — nó bị ném thẳng ra SynchronizationContext/thread pool
    hiện tại ngay khi xảy ra, và nơi raise event (Ev?.Invoke()) không thể bắt được dù có bọc try/catch
    quanh đó. Chỉ chính bản thân handler mới có thể tự bắt lỗi của mình, bằng cách bọc try/catch toàn
    bộ thân handler.
- id: priority-queue-order
  node: collections
  tier: deep
  prompt: PriorityQueue<TElement, TPriority> rút phần tử ra theo tiêu chí nào, và Enqueue/Dequeue/Peek
    có độ phức tạp gì?
  answer: Luôn Dequeue phần tử có TPriority nhỏ nhất trước (min-heap), bất kể thứ tự Enqueue. Enqueue/Dequeue
    là O(log n) (sift-up/sift-down trên heap dựng bằng mảng), Peek là O(1) vì phần tử ưu tiên nhất luôn
    ở gốc heap.
- id: custom-equality-comparer
  node: collections
  tier: deep
  prompt: Muốn Dictionary<string,int> coi "AN" và "an" là cùng một khoá thì làm thế nào, và cơ chế nào
    cho phép việc đó?
  answer: Truyền một IEqualityComparer<string> tuỳ chỉnh vào constructor, ví dụ new Dictionary<string,int>(StringComparer.OrdinalIgnoreCase).
    Dictionary sẽ dùng Equals/GetHashCode của comparer này thay vì của kiểu khoá mặc định khi băm và so
    sánh.
- id: concurrent-dictionary-when
  node: collections
  tier: deep
  prompt: Khi nào nên đổi từ Dictionary<K,V> + lock thủ công sang ConcurrentDictionary<K,V>?
  answer: Khi thật sự có nhiều luồng cùng ghi đồng thời vào cùng một bảng với tần suất cao. ConcurrentDictionary
    cung cấp thao tác nguyên tử (AddOrUpdate, GetOrAdd) mà không cần khoá toàn bộ bảng, giảm tranh chấp
    so với lock thô. Nếu chỉ một luồng ghi rồi nhiều luồng chỉ đọc, Dictionary thường + đồng bộ đơn giản
    vẫn đủ.
- id: icomparer-vs-icomparable
  node: collections
  tier: deep
  prompt: IComparer<T> khác IComparable<T> ở điểm nào, và khi nào bắt buộc phải dùng IComparer<T>?
  answer: IComparable<T> triển khai ngay trên kiểu để định nghĩa một thứ tự tự nhiên duy nhất. IComparer<T>
    là đối tượng so sánh tách biệt, truyền vào constructor của SortedSet/SortedDictionary/Sort, cho phép
    nhiều cách sắp xếp khác nhau. Bắt buộc dùng IComparer<T> khi kiểu khoá không do bạn viết (ví dụ string).
- id: nen-tang-z01
  node: nen-tang
  tier: fast
  prompt: Trong 'if (tuoi = 18) { ... }' với tuoi là int, điều gì xảy ra?
  answer: 'Không biên dịch được — CS0029: không thể ngầm chuyển int (kết quả của phép gán ''='') sang
    bool. Phải dùng ''=='' để so sánh.'
- id: nen-tang-z02
  node: nen-tang
  tier: fast
  prompt: Khác biệt cốt lõi giữa vòng lặp for và while là gì?
  answer: for khai báo biến đếm, điều kiện, và bước cập nhật ngay trên một dòng (phù hợp khi biết trước
    số lần lặp); while chỉ kiểm tra điều kiện trước mỗi vòng và người viết phải tự cập nhật biến điều
    khiển bên trong thân vòng lặp (dễ quên, gây lặp vô hạn).
- id: nen-tang-z03
  node: nen-tang
  tier: fast
  prompt: out parameter dùng để làm gì, và tại sao 'int.TryParse("42", ketQua)' (thiếu out) không biên
    dịch được?
  answer: 'out cho phép method trả thêm giá trị ra ngoài qua tham số. Vì tham số đó được khai báo với
    ''out'' trong chữ ký method, lời gọi bắt buộc phải lặp lại từ khoá ''out'' — thiếu nó gây lỗi CS1620:
    Argument must be passed with the ''out'' keyword.'
- id: nen-tang-z04
  node: nen-tang
  tier: fast
  prompt: switch expression 'thu switch { 1 => "CN", 2 => "T2" }' (không có nhánh _) với thu là int có
    biên dịch được không? Vì sao?
  answer: Không — lỗi CS8509 (switch expression không exhaustive) vì hai nhánh liệt kê không bao phủ hết
    mọi giá trị int có thể có. Cần thêm nhánh mặc định '_' để xử lý mọi giá trị còn lại.
- id: nen-tang-z05
  node: nen-tang
  tier: fast
  prompt: Console.WriteLine("Xin chào {ten}") (thiếu dấu $) in ra gì, và vì sao không phải là lỗi biên
    dịch?
  answer: In ra nguyên văn 'Xin chào {ten}' vì thiếu '$' nên chuỗi không được coi là interpolated string
    — cặp {} chỉ là ký tự thường. Đây là lỗi hành vi (logic sai) chứ không phải lỗi biên dịch, vì cú pháp
    chuỗi thường vẫn hợp lệ.
- id: nen-tang-z06
  node: nen-tang
  tier: fast
  prompt: Không dùng checked, 'int wrongSilently = int.MaxValue + 1;' cho kết quả gì, và khác gì so với
    bọc trong checked(...)?
  answer: Kết quả là -2147483648 (tràn số quấn vòng về âm) mà KHÔNG có bất kỳ lỗi hay cảnh báo nào lúc
    chạy — vì mặc định C# dùng ngữ cảnh unchecked. Nếu bọc trong checked(int.MaxValue + 1), C# sẽ ném
    OverflowException để bạn phát hiện tràn số ngay lập tức thay vì để nó âm thầm sai.
- id: bo-nho-va-kieu-du-lieu-z01
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: struct và class khác nhau cơ bản ở điểm nào khi bạn gán một biến struct/class cho biến khác?
  answer: struct là value type nên gán/truyền sẽ sao chép TOÀN BỘ giá trị (hai bản độc lập); class là
    reference type nên gán/truyền chỉ sao chép THAM CHIẾU (hai tên cùng trỏ một object, sửa qua tên này
    thấy ở tên kia).
- id: bo-nho-va-kieu-du-lieu-z02
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: record struct Money(decimal Amount) khác gì so với một struct thường (vd struct Money { public
    decimal Amount; }) về mặt so sánh bằng ==?
  answer: record struct tự động sinh sẵn == (và Equals/GetHashCode) so sánh theo GIÁ TRỊ từng field, dùng
    được ngay không cần code thêm. struct thường KHÔNG có sẵn == cho kiểu tự định nghĩa (viết p1 == p2
    sẽ lỗi biên dịch), phải dùng .Equals() hoặc tự overload toán tử.
- id: bo-nho-va-kieu-du-lieu-z03
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: Nếu một class cài đặt (implement) một interface nhưng thiếu một phương thức mà interface yêu
    cầu, chuyện gì xảy ra và mã lỗi là gì?
  answer: Trình biên dịch báo lỗi CS0535 ('does not implement interface member') ngay lúc build, không
    đợi tới lúc chạy — vì interface là hợp đồng bắt buộc phải cài đặt đủ.
- id: bo-nho-va-kieu-du-lieu-z04
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: Viết int x = null; (không có dấu ?) sẽ gây lỗi gì, và cách sửa là gì?
  answer: 'Lỗi biên dịch CS0037 (''Cannot convert null to int because it is a non-nullable value type'')
    vì int thường không được phép là null. Cách sửa: khai báo x là int? (Nullable<int>) thay vì int.'
- id: bo-nho-va-kieu-du-lieu-z05
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: Tham số out dùng để làm gì, và nếu bên trong phương thức quên gán giá trị cho tham số out trước
    khi kết thúc thì lỗi gì xảy ra?
  answer: Tham số out cho phép phương thức 'trả thêm' một giá trị qua tham số đó (ngoài giá trị return
    bình thường). Nếu quên gán giá trị cho nó trước khi hàm kết thúc, trình biên dịch báo lỗi CS0177 ('The
    out parameter must be assigned before control leaves the current method').
- id: bo-nho-va-kieu-du-lieu-z06
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: List<int> khác int[] (mảng) ở điểm nào khiến bạn chọn List<T> khi cần thêm phần tử dần dần?
  answer: int[] có kích thước CỐ ĐỊNH ngay khi tạo, không thể Add thêm phần tử. List<T> là kiểu tham chiếu
    trong thư viện chuẩn, tự động phình to khi gọi .Add(...), nên phù hợp khi số lượng phần tử chưa biết
    trước hoặc thay đổi theo thời gian.
- id: collections-linq-z01
  node: collections-linq
  tier: fast
  prompt: LINQ là viết tắt của gì, và nó chạy được trên những kiểu nào?
  answer: LINQ = Language Integrated Query, bộ toán tử chạy trên bất kỳ IEnumerable<T> nào (List<T>, Dictionary<K,V>,
    HashSet<T>, mảng...) và cả IQueryable<T> (vd EF Core).
- id: collections-linq-z02
  node: collections-linq
  tier: fast
  prompt: Select khác Where ở điểm cốt lõi nào?
  answer: Where lọc bớt phần tử (giữ số lượng <= nguồn) dựa trên điều kiện đúng/sai; Select biến đổi MỖI
    phần tử thành giá trị mới nhưng giữ nguyên số lượng phần tử.
- id: collections-linq-z03
  node: collections-linq
  tier: fast
  prompt: GroupBy(x => x.Key) trả về gì cho mỗi nhóm, và làm sao lấy các phần tử trong một nhóm?
  answer: Mỗi nhóm là một IGrouping có thuộc tính Key (giá trị khoá dùng để nhóm) và có thể duyệt (foreach/string.Join)
    để lấy ra các phần tử thuộc nhóm đó.
- id: collections-linq-z04
  node: collections-linq
  tier: fast
  prompt: Aggregate (không seed) trên một mảng rỗng sẽ xảy ra chuyện gì, và vì sao?
  answer: Ném InvalidOperationException, vì dạng không seed dùng phần tử đầu tiên của nguồn làm giá trị
    tích luỹ khởi đầu — mảng rỗng không có phần tử nào để bắt đầu.
- id: collections-linq-z05
  node: collections-linq
  tier: fast
  prompt: Anonymous type (new { ... }) thường được dùng khi nào trong pipeline LINQ?
  answer: Khi cần gom vài giá trị tạm thời (ví dụ trong Select sau GroupBy) mà không muốn định nghĩa hẳn
    một class/record riêng cho việc đó.
- id: collections-linq-z06
  node: collections-linq
  tier: fast
  prompt: Vì sao gọi một hàm C# tuỳ ý (không dịch được sang SQL) bên trong lambda của một IQueryable<T>
    lại gây lỗi lúc chạy?
  answer: Vì lambda trên IQueryable được lưu dưới dạng expression tree để provider (vd EF Core) dịch sang
    SQL; nếu hàm đó không có cách dịch tương ứng, provider ném NotSupportedException khi thực thi query.
- id: async-await-z01
  node: async-await
  tier: fast
  prompt: Sự khác biệt cốt lõi giữa Task và Task<T> là gì?
  answer: Task đại diện cho một công việc bất đồng bộ sẽ hoàn tất nhưng không mang giá trị kết quả; Task<T>
    cũng là một công việc bất đồng bộ nhưng khi hoàn tất sẽ mang theo một giá trị kiểu T, lấy được bằng
    await.
- id: async-await-z02
  node: async-await
  tier: fast
  prompt: Đoạn code `Task<int> tuoi = LayTuoi(); int namSau = tuoi + 5;` bị lỗi biên dịch gì, và vì sao?
  answer: Lỗi CS0029 (Cannot implicitly convert type 'Task<int>' to 'int'). Vì tuoi là đối tượng Task<int>
    (cái 'lời hứa'), không phải giá trị int bên trong nó — phải await để lấy ra giá trị thật.
- id: async-await-z03
  node: async-await
  tier: fast
  prompt: Tại sao dùng await bên trong một method không đánh dấu async lại gây lỗi biên dịch, và mã lỗi
    là gì?
  answer: 'Vì await chỉ hợp lệ trong method async — trình biên dịch cần method đó là một state machine
    bất đồng bộ để có thể tạm dừng/tiếp tục. Lỗi là CS4032: ''The await operator can only be used within
    an async method''.'
- id: async-await-z04
  node: async-await
  tier: fast
  prompt: CancellationToken là gì, và tại sao gọi Cancel() trên CancellationTokenSource không tự động
    dừng một Task.Delay nếu bạn quên truyền token vào?
  answer: CancellationToken là tín hiệu hợp tác báo 'hãy dừng sớm'. Việc huỷ chỉ có tác dụng với các lời
    gọi async NHẬN token đó làm tham số; nếu Task.Delay được gọi không kèm token, nó không hề biết token
    đã bị huỷ nên vẫn chạy hết thời gian như bình thường — runtime không tự ép dừng code không được truyền
    token.
- id: async-await-z05
  node: async-await
  tier: fast
  prompt: Vì sao viết await bên trong vòng foreach để gọi nhiều task I/O độc lập lại chậm hơn dùng Task.WhenAll,
    dù cả hai đều không có lỗi biên dịch?
  answer: Vì await trong foreach khiến mỗi vòng lặp phải chờ task hiện tại xong hẳn rồi mới khởi động
    task cho phần tử kế tiếp (tuần tự, tổng thời gian cộng dồn). Trong khi đó, khởi động tất cả các task
    trước (ví dụ qua Select) rồi mới await Task.WhenAll cho phép chúng chạy chồng thời gian song song,
    nên tổng thời gian chỉ bằng thời gian của task lâu nhất.
- id: async-await-z06
  node: async-await
  tier: fast
  prompt: LINQ Select trong biểu thức `ids.Select(id => LayTrang(id))` trả về kiểu gì, và vì sao các task
    bên trong đã 'chạy' ngay cả khi chưa await?
  answer: Trả về IEnumerable<Task<string>> — một dãy các đối tượng Task, mỗi phần tử là một task ĐÃ được
    khởi động. Điều này xảy ra vì gọi LayTrang(id) khiến method async đó chạy ngay lập tức tới điểm await
    đầu tiên bên trong nó rồi trả về một Task đại diện cho phần còn lại, chứ không phải đợi Select mới
    bắt đầu chạy.
- id: generics-z01
  node: generics
  tier: fast
  prompt: 'Khác biệt giữa `where T : class` và `where T : class?` là gì?'
  answer: 'Cả hai đều buộc T là reference type. `class` coi T là non-nullable mặc định (gán null trực
    tiếp cho tham số kiểu T sẽ phát sinh warning nullability trong ngữ cảnh #nullable enable). `class?`
    nới lỏng để T có thể được xem là nullable reference (string?) ngay từ đầu, cho phép API generic nhận
    cả string lẫn string? mà không bị cảnh báo.'
- id: generics-z02
  node: generics
  tier: fast
  prompt: Tại sao trước C# 13 không thể viết `static T Identity<T>(T value) => value;` rồi gọi `Identity(mySpan)`
    với `mySpan` là `Span<int>`? Lỗi gì xảy ra?
  answer: 'Vì ref struct (như Span<int>) trước C# 13 hoàn toàn bị cấm dùng làm đối số kiểu (type argument)
    cho một tham số kiểu generic thông thường. Trình biên dịch báo lỗi CS0306 (''The type may not be used
    as a type argument''). Phải thêm ràng buộc `where T : allows ref struct` để cho phép.'
- id: generics-z03
  node: generics
  tier: fast
  prompt: '`where T : allows ref struct` có tự động cho phép bạn gọi các member cụ thể của Span<T> (như
    .Length) bên trong thân method generic không?'
  answer: Không. `allows ref struct` chỉ gỡ bỏ lệnh cấm dùng ref struct làm T — nó không mở khoá member
    nào. Muốn gọi member cụ thể của Span<T>, phải thiết kế API nhận thẳng Span<T> thay vì T chung chung,
    hoặc thêm ràng buộc khác phù hợp.
- id: generics-z04
  node: generics
  tier: fast
  prompt: Trong bảng tổng kết ràng buộc ở mục 4.10, 4 dòng cuối (class?, Enum, Delegate, allows ref struct)
    có vai trò gì, và bạn nên đọc phần nào tiếp theo nếu chưa từng gặp chúng?
  answer: Bảng 4.10 chỉ đóng vai trò tra cứu nhanh / mục lục xem trước, không phải nơi dạy khái niệm lần
    đầu. Nếu chưa từng gặp 4 ràng buộc đó, cần đọc mục 4.11 ngay sau — nơi mỗi ràng buộc có định nghĩa
    và ví dụ chạy được đầy đủ.
- id: generics-z05
  node: generics
  tier: fast
  prompt: Nếu một lớp Order không implement IComparable<Order>, gọi `orders.Sort()` (không tham số) trên
    `List<Order>` sẽ xảy ra chuyện gì — lỗi biên dịch hay lỗi runtime? Loại exception nào?
  answer: Biên dịch OK (vì List<T>.Sort() không tham số không đòi hỏi ràng buộc IComparable<T> tại compile-time).
    Lúc chạy, Comparer<T>.Default cố tìm IComparable<T>/IComparable trên T, không thấy sẽ ném InvalidOperationException.
- id: generics-z06
  node: generics
  tier: fast
  prompt: Nếu Person không implement IComparable<Person>, làm sao vẫn sắp xếp được một List<Person> mà
    không phải sửa lớp Person?
  answer: Truyền một IComparer<Person> riêng vào List<Person>.Sort(IComparer<T>), ví dụ một lớp ByNameComparer
    implement IComparer<Person> với logic Compare tuỳ ý — không cần động vào định nghĩa lớp Person.
- id: delegates-events-z01
  node: delegates-events
  tier: fast
  prompt: Vì sao method `static string MakeString() => "x";` gán được vào biến `Func<object> makeObj =
    MakeString;` dù kiểu trả về khai báo trên delegate là `object` còn method trả `string`? Đây gọi là
    gì?
  answer: 'Vì đây là return-type covariance: method được phép trả về một kiểu con (string) cụ thể hơn
    kiểu trả về khai báo trên delegate (object), vì mọi string đều là một object hợp lệ nên luôn an toàn
    kiểu khi dùng thay.'
- id: delegates-events-z02
  node: delegates-events
  tier: fast
  prompt: Đoạn code `Func<object> fObject = () => new object(); Func<string> fString = fObject;` có biên
    dịch được không? Vì sao?
  answer: Không biên dịch được (lỗi CS0029). Covariance của Func<out TResult> chỉ cho phép gán theo chiều
    con sang cha (Func<string> gán được cho Func<object>), không được chiều ngược lại, vì một object bất
    kỳ do fObject trả về không chắc chắn là string.
- id: delegates-events-z03
  node: delegates-events
  tier: fast
  prompt: Anonymous method là gì, và nó khác lambda ở điểm cú pháp nào?
  answer: Anonymous method là một hàm không tên được định nghĩa ngay tại chỗ dùng bằng từ khoá delegate
    kèm thân {}, ra đời ở C# 2.0 (ví dụ delegate (int x) { return x*x; }). Lambda (C# 3.0) làm cùng việc
    nhưng gọn hơn, dùng cú pháp x => x*x, không cần từ khoá delegate.
- id: delegates-events-z04
  node: delegates-events
  tier: fast
  prompt: Lambda `(int x, int y = 10) => x + y` gọi bằng `withDefault(5)` cho kết quả gì, và tính năng
    này có từ phiên bản C# nào?
  answer: Kết quả là 15 (x=5, y dùng giá trị mặc định 10). Default parameter trong lambda là tính năng
    của C# 12+.
- id: delegates-events-z05
  node: delegates-events
  tier: fast
  prompt: Viết một lambda dùng params để tính tổng số lượng tuỳ ý số nguyên, và cho biết gọi `sum()` không
    truyền gì thì trả về bao nhiêu?
  answer: var sum = (params int[] xs) => xs.Sum(); Gọi sum() (không truyền đối số) trả về 0 vì mảng xs
    rỗng và Sum() của mảng rỗng là 0.
- id: delegates-events-z06
  node: delegates-events
  tier: fast
  prompt: Vì sao `var bad = (int x = 10, int y) => x + y;` không biên dịch được?
  answer: Vì tham số có giá trị mặc định (x = 10) phải đứng sau mọi tham số bắt buộc, ở đây x có default
    lại đứng trước y không có default nên trình biên dịch báo lỗi CS1737.
- id: delegates-events-z07
  node: delegates-events
  tier: fast
  prompt: init là gì, và điều gì xảy ra nếu bạn cố gán lại một property khai báo `{ get; init; }` sau
    khi đối tượng đã được khởi tạo xong?
  answer: init là một setter chỉ cho phép gán trong lúc khởi tạo đối tượng (object-initializer hoặc constructor),
    có từ C# 9+. Nếu gán lại property đó sau khi đối tượng đã khởi tạo xong (ví dụ e.Attempted = 300m
    sau khi e đã được new), trình biên dịch báo lỗi CS8852 (init-only property chỉ gán được lúc khởi tạo).
- id: delegates-events-z08
  node: delegates-events
  tier: fast
  prompt: Sau đoạn code `pipeline += A; pipeline += B; pipeline += C; pipeline -= null;`, GetInvocationList().Length
    của pipeline là bao nhiêu? Giải thích vì sao.
  answer: Vẫn là 3. -= chỉ gỡ một mục khớp hệt (cùng Target và Method) với toán hạng bên phải; null không
    khớp với A, B hay C nào trong invocation list nên phép trừ không tìm thấy gì để gỡ, delegate giữ nguyên
    cả 3 handler và không ném exception.
- id: records-pattern-matching-z01
  node: records-pattern-matching
  tier: fast
  prompt: HashSet<T> quyết định một phần tử "đã có trong tập hợp chưa" bằng cách nào, và tại sao điều
    này khiến record hoạt động "just works" như key/phần tử trong HashSet nhưng class thường thì không?
  answer: HashSet<T> dùng Equals/GetHashCode của phần tử để kiểm tra trùng lặp. Record tự sinh value equality
    (so theo giá trị thành viên) nên hai record cùng nội dung được xem là trùng dù là hai object khác
    nhau trên heap. Class thường mặc định dùng reference equality nên hai object khác địa chỉ luôn được
    coi là khác nhau, dù nội dung giống hệt, khiến Contains trả về False một cách bất ngờ.
- id: records-pattern-matching-z02
  node: records-pattern-matching
  tier: fast
  prompt: 'Trong ví dụ mục 2.2, cú pháp `record Cat(string Name, int Age) : Animal(Name, Age)` thể hiện
    điều gì, và mục nào trong chương sẽ dạy chi tiết cơ chế này?'
  answer: 'Đây là cú pháp kế thừa record: Cat là một record dẫn xuất, kế thừa từ record Animal, và gọi
    constructor của Animal với Name, Age. Mục 2.7 (Kế thừa giữa các record) dạy chi tiết cơ chế này, bao
    gồm cách Equals/GetHashCode/PrintMembers được nối theo chuỗi kế thừa.'
- id: records-pattern-matching-z03
  node: records-pattern-matching
  tier: fast
  prompt: Cú pháp `(int a, int b)` làm tham số kiểu trong `static string Sign((int a, int b) t)` là gì,
    và nó khác một record hay class ở điểm nào về mục đích sử dụng?
  answer: Đó là kiểu tuple dựng sẵn của C#, gộp nhiều giá trị có tên (a, b) thành một "gói" nhẹ mà không
    cần khai báo class/record riêng. Khác với record — vốn dùng để mô hình hoá một khái niệm nghiệp vụ
    có tên riêng, có thể mở rộng property/method — tuple thường dùng cho nhóm giá trị tạm thời, cục bộ,
    không cần định danh kiểu riêng.
- id: records-pattern-matching-z04
  node: records-pattern-matching
  tier: fast
  prompt: Theo chương này, nếu cần so sánh mảng theo phần tử trong record một cách "chuẩn thư viện" thay
    vì tự viết Equals/GetHashCode, hai hướng nào được nhắc tới, và chúng có được dạy chi tiết trong chương
    này không?
  answer: Hai hướng được nhắc tới là dùng ImmutableArray<T> kết hợp comparer, hoặc bọc bằng IStructuralEquatable.
    Cả hai được chương này gắn nhãn rõ là NGOÀI PHẠM VI chương — chỉ nêu tên để biết hướng tồn tại, người
    học cần tự tìm hiểu thêm nếu muốn dùng; chương chỉ dạy chi tiết cách tự viết Equals/GetHashCode so
    theo phần tử.
- id: records-pattern-matching-z05
  node: records-pattern-matching
  tier: fast
  prompt: Stack<T> và Queue<T> khác nhau ở thứ tự lấy phần tử ra như thế nào? Với `Stack<int>` chứa lần
    lượt 1, 2, 3 (theo thứ tự thêm vào), gọi Pop ba lần sẽ ra thứ tự nào?
  answer: 'Stack<T> là LIFO (vào sau ra trước): phần tử thêm vào gần nhất được lấy ra đầu tiên. Queue<T>
    là FIFO (vào trước ra trước): phần tử thêm vào sớm nhất được lấy ra đầu tiên. Với Stack chứa 1, 2,
    3 theo thứ tự đó, ba lần gọi Pop sẽ cho ra 3, 2, 1.'
- id: records-pattern-matching-z06
  node: records-pattern-matching
  tier: fast
  prompt: HashCode.Combine(Amount, Currency) trong ví dụ Money viết-tay dùng để làm gì, và tại sao nó
    phải được giữ đồng bộ với Equals?
  answer: 'HashCode.Combine là hàm tiện ích trộn nhiều giá trị (ở đây là Amount và Currency) thành một
    mã băm (hash code) duy nhất cho object. Nó phải đồng bộ với Equals vì quy tắc bắt buộc của .NET: hai
    object được Equals coi là bằng nhau thì PHẢI có cùng GetHashCode; nếu lệch, các cấu trúc dựa trên
    hash như Dictionary/HashSet sẽ hoạt động sai (ví dụ không tìm thấy phần tử dù nó tồn tại).'
- id: collections-z13
  node: collections
  tier: fast
  prompt: Vì sao hàm chỉ cần đếm số phần tử của một collection (không sửa, không cần chỉ số) nên nhận
    tham số kiểu IReadOnlyCollection<T> thay vì List<T>?
  answer: IReadOnlyCollection<T> chỉ đòi hỏi caller cung cấp thứ gì đó có Count và duyệt được — rộng hơn
    List<T> nhiều (nhận cả mảng, HashSet, ReadOnlyCollection...) và tự tài liệu hoá cam kết 'hàm không
    sửa collection của caller'. Nhận List<T> khoá cứng kiểu cụ thể và ngầm cho phép hàm gọi Add/Remove/Clear
    phá vỡ dữ liệu của caller.
- id: collections-z14
  node: collections
  tier: fast
  prompt: Trong 8 interface collection, interface nào cho phép đọc/ghi qua this[int] và interface nào
    chỉ cho phép đọc qua this[int]? Nêu tên cụ thể.
  answer: IList<T> cho phép đọc/ghi qua this[int] (đặt lại phần tử tại chỉ số). IReadOnlyList<T> chỉ cho
    phép đọc qua this[int] — gán qua interface này (vd xs[0] = 9) sẽ không biên dịch vì indexer chỉ có
    getter.
- id: collections-z15
  node: collections
  tier: fast
  prompt: Cho một Dictionary<SanPham,int> dùng comparer tự viết chỉ so theo trường Ma (không phân biệt
    hoa/thường), tại sao GetHashCode(SanPham obj) phải băm theo Ma.ToUpperInvariant() chứ không phải băm
    toàn bộ đối tượng?
  answer: 'Vì phải tôn trọng hợp đồng Equals/GetHashCode: nếu Equals(a,b) trả true (hai Ma giống nhau
    không phân biệt hoa/thường) thì GetHashCode(a) phải bằng GetHashCode(b). Nếu băm theo Ten hoặc toàn
    bộ đối tượng, hai SanPham có Ma bằng nhau nhưng Ten khác nhau sẽ cho hash khác nhau, vi phạm hợp đồng
    và làm ContainsKey/TryGetValue có thể trả sai (không tìm thấy phần tử dù Equals coi là bằng nhau).'
- id: collections-z16
  node: collections
  tier: fast
  prompt: Dùng SortedList<K,V> làm khoá với một class không cài IComparable<T> và không truyền IComparer<T>,
    thêm phần tử thứ hai sẽ ném exception gì, và exception đó ở lớp SortedDictionary<K,V>/SortedSet<T>
    có giống hệt không?
  answer: 'SortedList<K,V> ném InvalidOperationException với message ''Failed to compare two elements
    in the array'' (vì bên trong dùng Array.Sort/Array.BinarySearch). SortedDictionary<K,V> và SortedSet<T>
    gặp cùng nguyên nhân (khoá không so sánh được) nhưng ném ArgumentException (''At least one object
    must implement IComparable'') vì cây đỏ-đen bên trong gọi thẳng Comparer<T>.Default.Compare. Cách
    sửa ở cả ba giống nhau: cài IComparable<T> lên khoá hoặc truyền IComparer<T>.'
- id: collections-z17
  node: collections
  tier: fast
  prompt: ConcurrentQueue<T>.TryDequeue và ConcurrentStack<T>.TryPop khác Queue<T>.Dequeue/Stack<T>.Pop
    ở điểm nào khi collection rỗng?
  answer: Queue<T>.Dequeue và Stack<T>.Pop ném InvalidOperationException khi rỗng. ConcurrentQueue<T>.TryDequeue
    và ConcurrentStack<T>.TryPop không ném — chúng trả về bool (false nếu rỗng) và giá trị ra qua tham
    số out, phù hợp với ngữ cảnh đa luồng nơi trạng thái rỗng/không-rỗng có thể đổi giữa lúc kiểm tra
    và lúc lấy phần tử.
- id: collections-z18
  node: collections
  tier: fast
  prompt: SortedList<K,V> hỗ trợ truy cập theo index qua Keys[i] và Values[i] — SortedDictionary<K,V>
    có hỗ trợ tương tự không? Vì sao?
  answer: Không. SortedDictionary<K,V> bên trong là cây đỏ-đen (node liên kết qua con trỏ), không có mảng
    liền khối để truy cập O(1) theo chỉ số như SortedList<K,V> (hai mảng song song khoá/giá trị). Muốn
    lấy phần tử theo vị trí thứ i trong SortedDictionary phải duyệt O(n) hoặc chuyển sang cấu trúc khác.
- id: exceptions-z01
  node: exceptions
  tier: fast
  prompt: Nếu khối catch khai báo sai loại exception (không khớp loại thực sự được ném và cũng không phải
    lớp cha của nó), điều gì xảy ra?
  answer: Khối catch đó không chạy — exception tiếp tục bay lên (unwind) tìm catch phù hợp ở ngoài, nếu
    không có catch nào phù hợp thì chương trình crash.
- id: exceptions-z02
  node: exceptions
  tier: fast
  prompt: 'So sánh stack trace: dùng throw; thì stack trace vẫn trỏ tới đâu, còn throw ex; thì trỏ tới
    đâu?'
  answer: throw; giữ nguyên stack trace, dòng đầu tiên vẫn là nơi lỗi thật sự phát sinh (ví dụ FailDeep()).
    throw ex; reset stack trace, dòng đầu tiên trở thành chính dòng throw ex; đó, làm mất dấu vết nơi
    lỗi gốc xảy ra.
- id: exceptions-z03
  node: exceptions
  tier: fast
  prompt: using var res = new X(); khác gì so với using (var res = new X()) { ... } về phạm vi (scope)
    mà Dispose() được gọi?
  answer: using var không có dấu ngoặc giới hạn — Dispose() chỉ chạy khi biến ra khỏi scope hiện tại (thường
    là cuối phương thức/khối chứa nó), có thể giữ tài nguyên mở lâu hơn cần thiết. using (...) { } tường
    minh cho phép giới hạn scope hẹp, đóng tài nguyên ngay khi ra khỏi khối.
- id: exceptions-z04
  node: exceptions
  tier: fast
  prompt: Khi nhiều Task chạy song song đều lỗi và bạn gọi Task.WaitAll(...), loại exception nào thực
    sự được ném ra ở ngoài, và làm sao lấy được từng lỗi con?
  answer: AggregateException được ném ra (không phải loại lỗi gốc của từng task). Dùng thuộc tính InnerExceptions
    để lấy danh sách các exception con; nếu có AggregateException lồng nhau thì gọi ex.Flatten() để gộp
    về danh sách phẳng.
- id: exceptions-z05
  node: exceptions
  tier: fast
  prompt: Vì sao try/catch bao quanh lời gọi một phương thức async void không bắt được exception ném ra
    bên trong nó, trong khi async Task thì bắt được?
  answer: Với async Task, exception được lưu vào đối tượng Task và chỉ ném lại khi có await, nên try/catch
    quanh await bắt được bình thường. Với async void, không có Task nào lưu exception, lỗi ném thẳng ra
    context gọi ngay khi hàm đang chạy (không đồng bộ với điểm gọi), nên try/catch bao quanh lời gọi không
    có tác dụng.
- id: exceptions-z06
  node: exceptions
  tier: fast
  prompt: Nếu constructor của custom exception quên gọi base(message), thuộc tính Message sẽ trả về gì?
  answer: Message sẽ rơi về thông điệp mặc định chung chung của .NET (dạng "Exception of type '...' was
    thrown.") thay vì mô tả lỗi nghiệp vụ cụ thể mà bạn muốn truyền vào.
- id: loc-nang-cao-q1
  node: loc-nang-cao
  tier: fast
  prompt: SELECT * FROM t WHERE col NOT IN (1, 2, NULL); trả về bao nhiêu dòng bất kể col là gì?
  answer: 0 dòng. NOT IN giãn thành col<>1 AND col<>2 AND col<>NULL; vế cuối luôn UNKNOWN, và UNKNOWN
    lan trong AND khiến toàn bộ biểu thức không bao giờ TRUE.
- id: loc-nang-cao-q2
  node: loc-nang-cao
  tier: fast
  prompt: Khác biệt giữa LIKE và ILIKE là gì?
  answer: LIKE phân biệt hoa/thường; ILIKE (chỉ có ở PostgreSQL) không phân biệt hoa/thường. Cả hai dùng
    % (0+ ký tự) và _ (đúng 1 ký tự) làm đại diện.
- id: loc-nang-cao-q3
  node: loc-nang-cao
  tier: fast
  prompt: SELECT price BETWEEN 300 AND 200; có báo lỗi cú pháp không? Kết quả là gì?
  answer: Không báo lỗi cú pháp. BETWEEN a AND b giãn thành x>=a AND x<=b; với a=300,b=200 không giá trị
    nào thoả cả hai nên kết quả luôn FALSE (0 dòng) — lỗi logic âm thầm.
- id: loc-nang-cao-q4
  node: loc-nang-cao
  tier: fast
  prompt: COALESCE và NULLIF khác nhau ở điểm nào?
  answer: COALESCE(v1,...,vn) trả giá trị khác NULL đầu tiên (thay NULL bằng giá trị khác). NULLIF(a,b)
    trả NULL nếu a=b, ngược lại trả a (biến một giá trị cụ thể thành NULL, ví dụ tránh chia cho 0).
- id: loc-nang-cao-q5
  node: loc-nang-cao
  tier: fast
  prompt: Vì sao SELECT total / count_ FROM stats; có thể ném lỗi runtime, và cách phòng tránh?
  answer: Nếu count_ = 0, phép chia ném lỗi division by zero lúc thực thi. Phòng tránh bằng total / NULLIF(count_,
    0) — khi count_=0, NULLIF trả NULL và chia cho NULL cho kết quả NULL thay vì lỗi.
- id: loc-nang-cao-q6
  node: loc-nang-cao
  tier: fast
  prompt: SELECT DISTINCT city, country FROM visits; loại trùng theo cột nào?
  answer: Theo tổ hợp cả hai cột (city, country) — hai dòng chỉ coi là trùng khi cả city VÀ country giống
    hệt nhau, không lọc trùng riêng từng cột.
- id: loc-nang-cao-q7
  node: loc-nang-cao
  tier: fast
  prompt: Toán tử ~ khác LIKE ở điểm cốt lõi nào, và khi nào nên chọn ~?
  answer: ~ khớp theo biểu thức chính quy (regex), mạnh hơn nhiều so với %/_ của LIKE (hỗ trợ lớp ký tự,
    số lần lặp, neo đầu/cuối chuỗi). Nên chọn ~ khi cần ràng buộc định dạng chính xác như 'đúng N chữ
    số'.
- id: joins-aggregation-q6
  node: joins-aggregation
  tier: fast
  prompt: Vì sao NOT IN (SELECT khach_hang_id FROM don_hang) có thể trả về rỗng một cách sai lệch, còn
    NOT EXISTS thì không?
  answer: NOT IN (list) tương đương chuỗi <> nối bằng AND với từng phần tử; nếu list chứa một NULL, so
    sánh <> NULL cho UNKNOWN khiến cả AND không bao giờ TRUE, nên toàn bộ kết quả rỗng. NOT EXISTS không
    so sánh giá trị trực tiếp mà chỉ kiểm tra sự tồn tại, nên không bị ảnh hưởng bởi NULL.
- id: joins-aggregation-q7
  node: joins-aggregation
  tier: fast
  prompt: Đặt d.so_tien > 50 trong ON của một LEFT JOIN khác gì so với đặt trong WHERE sau LEFT JOIN đó?
  answer: 'Đặt trong ON: dòng trái không khớp vẫn được giữ (đúng bản chất LEFT JOIN). Đặt trong WHERE
    sau LEFT JOIN: vì NULL > 50 là UNKNOWN, dòng trái không khớp bị loại — LEFT JOIN bị biến thành INNER
    JOIN trên thực tế.'
- id: subquery-cte-q1
  node: subquery-cte
  tier: fast
  prompt: Subquery trong WHERE khác subquery trong FROM (derived table) ở điểm nào về vai trò trong câu
    lệnh?
  answer: Subquery trong WHERE trả về một giá trị hoặc một tập giá trị dùng để lọc dòng của truy vấn ngoài;
    subquery trong FROM (derived table) đóng vai trò một bảng nguồn để truy vấn ngoài SELECT/JOIN tiếp
    lên trên, không dùng để so sánh trực tiếp.
- id: subquery-cte-q2
  node: subquery-cte
  tier: fast
  prompt: Vì sao scalar subquery trong SELECT bắt buộc phải trả về đúng một dòng, một cột — và điều gì
    xảy ra nếu nó không khớp dòng nào (khác với khớp nhiều dòng)?
  answer: Vì kết quả phải đặt vừa vào một ô của hàng kết quả ngoài — SQL không biểu diễn được nhiều giá
    trị trong một ô. Nếu subquery trả nhiều dòng, PostgreSQL báo lỗi runtime 'more than one row returned
    by a subquery used as an expression'; nếu không khớp dòng nào, subquery trả về NULL một cách hợp lệ,
    không phải lỗi.
- id: subquery-cte-q3
  node: subquery-cte
  tier: fast
  prompt: Correlated subquery khác subquery thường (không tương quan) ở điểm nào, và vì sao correlated
    subquery thường chạy chậm hơn với bảng lớn?
  answer: Correlated subquery tham chiếu cột của truy vấn ngoài nên phải đánh giá lại cho từng dòng ngoài;
    subquery thường độc lập, chỉ tính một lần. Vì chạy lại nhiều lần (tối đa bằng số dòng ngoài), correlated
    subquery dễ chậm hơn khi bảng lớn, đặc biệt nếu bên trong nó quét toàn bảng mỗi lần.
- id: subquery-cte-q4
  node: subquery-cte
  tier: fast
  prompt: Vì sao NOT IN (subquery) có thể trả về kết quả rỗng một cách sai lệch, còn NOT EXISTS thì không
    bị vấn đề này?
  answer: Nếu subquery của NOT IN trả về tập chứa NULL, so sánh giá trị với NULL cho UNKNOWN, và phép
    phủ định/AND ẩn bên trong NOT IN khiến toàn bộ điều kiện thành UNKNOWN (coi như FALSE) cho mọi dòng
    — dẫn tới kết quả rỗng bất ngờ. NOT EXISTS không so sánh giá trị trực tiếp, chỉ hỏi 'có dòng khớp
    hay không', nên không bị NULL trong subquery ảnh hưởng.
- id: subquery-cte-q5
  node: subquery-cte
  tier: fast
  prompt: CTE (WITH) có phải luôn nhanh hơn subquery lồng trực tiếp không? Giải thích ngắn gọn.
  answer: Không. Từ PostgreSQL 12, CTE không đệ quy có thể được trình tối ưu inline (nhúng) như một subquery
    thường, trừ khi ép MATERIALIZED, dùng đệ quy, hoặc được tham chiếu nhiều lần. Hiệu năng thực tế cần
    kiểm chứng bằng EXPLAIN ANALYZE, không nên giả định.
- id: subquery-cte-q6
  node: subquery-cte
  tier: fast
  prompt: Recursive CTE gồm hai phần nào, nối với nhau bằng từ khoá gì, và điều kiện gì khiến nó dừng
    đệ quy?
  answer: Gồm anchor member (truy vấn khởi tạo, không tham chiếu tên CTE) và recursive member (truy vấn
    tham chiếu lại chính tên CTE), nối bằng UNION hoặc UNION ALL. Nó dừng khi recursive member, chạy trên
    tập kết quả mới nhất, không còn sinh ra dòng nào nữa.
- id: subquery-cte-q7
  node: subquery-cte
  tier: fast
  prompt: Vì sao nên ưu tiên UNION ALL hơn UNION trong hầu hết recursive CTE thực chiến?
  answer: Vì UNION khử trùng lặp bằng cách so sánh toàn bộ cột sau mỗi vòng lặp, tốn chi phí hơn UNION
    ALL; đồng thời nếu CTE có cột luôn tăng dần (như cấp độ), mỗi dòng luôn khác nhau nên UNION không
    loại được vòng lặp — điều kiện dừng tường minh (WHERE cap < N) mới thực sự đáng tin cậy.
- id: subquery-cte-q8
  node: subquery-cte
  tier: fast
  prompt: Viết truy vấn dùng EXISTS (không dùng IN) để tìm khách hàng có ít nhất một đơn hàng, cho bảng
    customers(id) và orders(id, customer_id).
  answer: SELECT c.id FROM customers c WHERE EXISTS (SELECT 1 FROM orders o WHERE o.customer_id = c.id);
- id: window-functions-q1
  node: window-functions
  tier: fast
  prompt: OVER() khác GROUP BY ở điểm cốt lõi nào về số dòng trả về?
  answer: GROUP BY gộp N dòng đầu vào thành ít dòng hơn (mỗi nhóm một dòng), mất chi tiết dòng gốc; OVER()
    giữ nguyên toàn bộ N dòng gốc trong kết quả, chỉ thêm một cột tính từ cửa sổ (window) mà dòng đó thuộc
    về — không gộp dòng.
- id: window-functions-q2
  node: window-functions
  tier: fast
  prompt: PARTITION BY trong OVER(...) có tác dụng gì, và nó khác GROUP BY ở đâu dù ý tưởng "chia nhóm"
    giống nhau?
  answer: 'PARTITION BY chia các dòng thành nhiều nhóm con theo giá trị cột, và window function tính riêng
    cho từng nhóm — giống ý tưởng GROUP BY. Khác biệt: PARTITION BY KHÔNG gộp dòng, mỗi dòng gốc vẫn xuất
    hiện trong kết quả kèm giá trị tổng hợp của nhóm nó thuộc về, trong khi GROUP BY thay N dòng bằng
    một dòng đại diện mỗi nhóm.'
- id: window-functions-q3
  node: window-functions
  tier: fast
  prompt: Cho hai dòng đồng hạng nhất theo ORDER BY, dòng thứ ba sẽ nhận hạng bao nhiêu với RANK(), và
    bao nhiêu với DENSE_RANK()?
  answer: RANK() cho hạng 3 (nhảy số, bỏ qua hạng 2 vì đã có 2 dòng chiếm hạng 1). DENSE_RANK() cho hạng
    2 (không nhảy số, hạng luôn liên tục theo số mức giá trị khác nhau đã xuất hiện).
- id: window-functions-q4
  node: window-functions
  tier: fast
  prompt: Vì sao không thể viết WHERE ROW_NUMBER() OVER (...) = 1 trực tiếp trong cùng một câu SELECT?
    Cách khắc phục là gì?
  answer: 'Vì window function được tính SAU giai đoạn WHERE trong thứ tự thực thi logic của PostgreSQL
    (FROM -> WHERE -> GROUP BY -> HAVING -> window function -> SELECT -> ORDER BY) — tại thời điểm WHERE
    chạy, giá trị window function chưa tồn tại. Khắc phục: bọc câu lệnh có window function trong một CTE
    (WITH ... AS (...)) hoặc subquery ở FROM, rồi lọc bằng WHERE ở câu lệnh bên ngoài.'
- id: window-functions-q5
  node: window-functions
  tier: fast
  prompt: SUM(x) OVER (ORDER BY y) khác SUM(x) OVER () (không có ORDER BY) như thế nào về kết quả?
  answer: SUM(x) OVER (ORDER BY y) tính tổng LUỸ KẾ (cộng dồn từ dòng đầu cửa sổ đến dòng hiện tại theo
    thứ tự y, vì frame mặc định là RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW). SUM(x) OVER ()
    không có ORDER BY tính tổng TOÀN BỘ cửa sổ và lặp lại đúng giá trị đó ở mọi dòng.
- id: window-functions-q6
  node: window-functions
  tier: fast
  prompt: LAG(cot) ở dòng đầu tiên của một cửa sổ trả về giá trị gì, và vì sao?
  answer: Trả về NULL, vì không có dòng nào đứng trước dòng đầu tiên trong cửa sổ (theo ORDER BY) để LAG
    lấy giá trị.
- id: window-functions-q7
  node: window-functions
  tier: fast
  prompt: Muốn tính "so với tháng trước, chỉ trong cùng một vùng" mà không bị lẫn dữ liệu vùng khác khi
    dùng LAG(), cần thêm điều gì vào OVER(...)?
  answer: Thêm PARTITION BY <cột vùng> vào OVER(...) của LAG(), để nó chỉ tìm dòng trước đó TRONG CÙNG
    PARTITION (cùng vùng) thay vì tìm trên toàn bộ tập dữ liệu bất kể vùng.
- id: window-functions-q8
  node: window-functions
  tier: fast
  prompt: LAST_VALUE() với frame mặc định của OVER() có tự động trả về dòng cuối cùng thật sự của cả partition
    không? Vì sao đây là cạm bẫy nguy hiểm?
  answer: Không. Frame mặc định khi có ORDER BY là RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW,
    nên LAST_VALUE() chỉ "thấy" đến dòng hiện tại, không thấy toàn bộ partition — kết quả thường trùng
    với giá trị của chính dòng đang xét. Đây là cạm bẫy nguy hiểm vì câu lệnh chạy không lỗi và kết quả
    trông hợp lý, nhưng sai về nghiệp vụ; phải tự mở rộng frame bằng ROWS BETWEEN UNBOUNDED PRECEDING
    AND UNBOUNDED FOLLOWING để lấy đúng dòng cuối của cả partition.
- id: constraints-q1
  node: constraints
  tier: fast
  prompt: Vì sao PRIMARY KEY có thể coi là UNIQUE + NOT NULL gộp lại? Cho ví dụ lỗi minh hoạ từng phần.
  answer: Vì khai báo PRIMARY KEY tự động tạo một unique index (B-tree) trên cột đó và bắt buộc cột không
    được NULL. Vi phạm phần UNIQUE cho lỗi 'duplicate key value violates unique constraint'; vi phạm phần
    NOT NULL cho lỗi 'null value in column ... violates not-null constraint'.
- id: constraints-q2
  node: constraints
  tier: fast
  prompt: Loại index nào được PostgreSQL dùng để ép ràng buộc PRIMARY KEY? Vì sao loại đó phù hợp hơn
    loại còn lại cho khoá chính?
  answer: B-tree, không phải Hash. B-tree hỗ trợ cả so sánh bằng lẫn so sánh khoảng/sắp xếp (<, >, BETWEEN,
    ORDER BY), phù hợp với cách khoá chính thường được dùng để tra cứu và sắp xếp. Hash index chỉ hỗ trợ
    so sánh bằng.
- id: constraints-q3
  node: constraints
  tier: fast
  prompt: Bảng books(id PK, author_id FK REFERENCES authors(id) ON DELETE CASCADE). Xoá một tác giả đang
    có 3 cuốn sách thì điều gì xảy ra?
  answer: Cả 3 dòng trong books tham chiếu tới tác giả đó cũng bị xoá theo, vì ON DELETE CASCADE lan truyền
    việc xoá từ bảng cha sang bảng con.
- id: constraints-q4
  node: constraints
  tier: fast
  prompt: Cho bảng emails(id PK, email text UNIQUE) đã có 2 dòng với email = NULL. Việc chèn dòng thứ
    3 cũng có email = NULL có bị chặn bởi UNIQUE không? Vì sao?
  answer: Không bị chặn. UNIQUE không coi hai giá trị NULL là 'trùng nhau' (vì NULL nghĩa là không xác
    định), nên có thể chèn bao nhiêu dòng NULL tuỳ ý. Đây là bẫy UNIQUE/NULL kinh điển.
- id: constraints-q5
  node: constraints
  tier: fast
  prompt: Cột price numeric(10,2) DEFAULT 0 (không có NOT NULL). Câu INSERT INTO t (price) VALUES (NULL)
    sẽ lưu giá trị gì cho price? Vì sao không phải 0?
  answer: Lưu NULL. DEFAULT chỉ áp dụng khi câu INSERT không cung cấp giá trị cho cột; ở đây giá trị NULL
    được truyền tường minh, nên PostgreSQL ghi đúng những gì được truyền, không thay bằng giá trị mặc
    định.
- id: constraints-q6
  node: constraints
  tier: fast
  prompt: Muốn thêm CHECK (age >= 18) vào bảng users đã có 10000 dòng, trong đó có 5 dòng age = 15. Lệnh
    ALTER TABLE users ADD CONSTRAINT ... CHECK (age >= 18); sẽ thành công hay lỗi?
  answer: 'Lỗi: ''check constraint ... is violated by some row''. PostgreSQL quét toàn bộ dữ liệu hiện
    có trước khi chấp nhận constraint mới; phải sửa/xoá 5 dòng vi phạm trước, rồi mới ADD CONSTRAINT lại
    được.'
- id: constraints-q7
  node: constraints
  tier: fast
  prompt: Khác biệt cú pháp giữa việc thêm NOT NULL và thêm CHECK/UNIQUE/FOREIGN KEY vào một bảng đã tồn
    tại là gì?
  answer: NOT NULL dùng ALTER TABLE ... ALTER COLUMN <cot> SET NOT NULL (và gỡ bằng DROP NOT NULL), vì
    nó là thuộc tính của cột chứ không phải named constraint độc lập. Các loại còn lại (CHECK, UNIQUE,
    FOREIGN KEY, PRIMARY KEY) dùng chung cú pháp ALTER TABLE ... ADD CONSTRAINT <ten> <loai> (...).
- id: thiet-ke-schema-q1
  node: thiet-ke-schema
  tier: fast
  prompt: Phân biệt "candidate key" và "primary key" bằng một câu.
  answer: Candidate key là mọi cột (hoặc tổ hợp cột) đủ điều kiện làm khoá chính (duy nhất, không NULL);
    primary key là một candidate key được chọn làm khoá chính chính thức — một bảng có thể có nhiều candidate
    key nhưng chỉ một primary key.
- id: thiet-ke-schema-q2
  node: thiet-ke-schema
  tier: fast
  prompt: Vì sao nên ưu tiên surrogate key (id tự tăng) hơn natural key (như email) làm PRIMARY KEY khi
    khoá đó sẽ bị bảng khác tham chiếu?
  answer: Vì natural key có thể đổi giá trị theo thời gian; nếu đã bị FOREIGN KEY tham chiếu, đổi giá
    trị sẽ bị PostgreSQL từ chối trừ khi có ON UPDATE CASCADE ở mọi nơi tham chiếu (dễ sót). Surrogate
    key không mang ý nghĩa nghiệp vụ nên không bao giờ cần đổi.
- id: thiet-ke-schema-q3
  node: thiet-ke-schema
  tier: fast
  prompt: Bảng A(id PK, x, y) có khoá chính một cột và đã đạt 1NF. Bảng này có tự động đạt 2NF không?
    Vì sao?
  answer: Có. Vi phạm 2NF chỉ xảy ra khi khoá chính là composite và có cột không-khoá phụ thuộc một phần
    khoá. Với khoá một cột, mọi cột không-khoá đương nhiên phụ thuộc toàn bộ khoá, nên tự động đạt 2NF.
- id: thiet-ke-schema-q4
  node: thiet-ke-schema
  tier: fast
  prompt: Cho bảng orders(id PK, customer_id FK, customer_city) trong đó customer_city suy ra được từ
    bảng customers. Đây là vi phạm chuẩn hoá dạng nào?
  answer: 'Vi phạm 3NF — phụ thuộc bắc cầu: customer_city phụ thuộc vào customer_id (cột không-khoá khác),
    không phụ thuộc trực tiếp vào khoá chính id.'
- id: thiet-ke-schema-q5
  node: thiet-ke-schema
  tier: fast
  prompt: Tại sao quan hệ N-N không thể hiện thực bằng cách thêm một cột khoá ngoại vào bảng A trỏ sang
    bảng B?
  answer: Vì một cột chỉ lưu được một giá trị mỗi dòng nên chỉ trỏ được tới đúng một dòng bên kia. Cần
    bảng trung gian, mỗi dòng đại diện một cặp liên kết cụ thể, cho phép cả A và B lặp lại ở nhiều dòng
    trung gian khác nhau.
- id: thiet-ke-schema-q6
  node: thiet-ke-schema
  tier: fast
  prompt: Bảng trung gian enrollments(student_id FK, course_id FK) không có PRIMARY KEY. Hậu quả cụ thể
    là gì, và PostgreSQL có tự báo lỗi không?
  answer: Có thể chèn trùng lặp cùng một cặp (student_id, course_id) nhiều lần (ghi danh trùng). PostgreSQL
    không tự báo lỗi vì không có ràng buộc nào bị vi phạm — đây là lỗi logic âm thầm; sửa bằng cách thêm
    PRIMARY KEY (student_id, course_id).
- id: thiet-ke-schema-q7
  node: thiet-ke-schema
  tier: fast
  prompt: Nêu một tình huống cụ thể (có số liệu) mà denormalize là quyết định hợp lý, và điều kiện bắt
    buộc đi kèm là gì?
  answer: 'Ví dụ: tỷ lệ đọc:ghi 500:1, JOIN+SUM mất 40ms so với đọc cột lưu sẵn dưới 1ms, endpoint gọi
    hàng nghìn lần/phút. Điều kiện bắt buộc: phải có cơ chế đồng bộ rõ ràng (cập nhật trong cùng transaction
    hoặc trigger), nếu không dữ liệu sẽ lệch âm thầm.'
- id: index-transaction-q1
  node: index-transaction
  tier: fast
  prompt: Vì sao B-tree index giúp WHERE email = '...' nhanh hơn nhưng thường không giúp WHERE email LIKE
    '%example.com'?
  answer: B-tree lưu giá trị đã sắp xếp theo thứ tự từ đầu chuỗi, nên tra cứu theo tiền tố hoặc so sánh
    bằng rất nhanh. Mẫu LIKE '%...' bắt đầu bằng ký tự đại diện ở đầu khiến B-tree không thể loại trừ
    nhanh phần nào của cây — PostgreSQL thường phải quét toàn bảng thay vì dùng index.
- id: index-transaction-q2
  node: index-transaction
  tier: fast
  prompt: Trong output EXPLAIN ANALYZE, con số nào phản ánh thời gian thực tế (mili-giây), và con số nào
    chỉ là ước lượng chi phí nội bộ?
  answer: actual time=... và Execution Time là thời gian thực tế tính bằng mili-giây (chỉ xuất hiện khi
    dùng ANALYZE). cost=0.00..1791.00 là đơn vị chi phí ước lượng nội bộ của PostgreSQL, không phải thời
    gian.
- id: index-transaction-q3
  node: index-transaction
  tier: fast
  prompt: Vì sao thêm nhiều index vào một bảng lại làm INSERT chậm hơn?
  answer: Vì mỗi INSERT không chỉ ghi một dòng vào bảng chính mà còn phải cập nhật (chèn và cân bằng lại)
    từng cấu trúc B-tree của mọi index liên quan tới bảng đó — càng nhiều index, càng nhiều cấu trúc phải
    cập nhật đồng thời.
- id: index-transaction-q4
  node: index-transaction
  tier: fast
  prompt: Sau khi một câu lệnh bên trong BEGIN...COMMIT bị lỗi (ví dụ vi phạm CHECK), việc gọi tiếp một
    câu SELECT vô hại trong cùng transaction có chạy được không? Vì sao?
  answer: Không chạy được — PostgreSQL trả lỗi 'current transaction is aborted, commands ignored until
    end of transaction block'. Sau khi một lệnh lỗi, toàn bộ transaction bị đánh dấu aborted; phải ROLLBACK
    trước khi thực hiện bất kỳ câu lệnh nào khác.
- id: index-transaction-q5
  node: index-transaction
  tier: fast
  prompt: Trong bốn chữ cái ACID, chữ nào đảm bảo dữ liệu đã COMMIT không bị mất dù server mất điện ngay
    sau đó?
  answer: Durability — PostgreSQL ghi thay đổi vào write-ahead log trên đĩa trước khi báo COMMIT thành
    công cho ứng dụng, nên dữ liệu đã commit tồn tại vĩnh viễn dù có sự cố ngay sau đó.
- id: index-transaction-q6
  node: index-transaction
  tier: fast
  prompt: Mức isolation mặc định của PostgreSQL là gì? Ở mức đó, đọc cùng một dòng hai lần trong cùng
    transaction có đảm bảo ra cùng kết quả không?
  answer: Read Committed là mặc định. Không đảm bảo — nếu một transaction khác commit thay đổi ở giữa
    hai lần đọc, lần đọc sau có thể thấy giá trị mới hơn (anomaly non-repeatable read), chỉ được ngăn
    ở mức REPEATABLE READ trở lên.
- id: index-transaction-q7
  node: index-transaction
  tier: fast
  prompt: Write skew là gì, và tại sao REPEATABLE READ không ngăn được nó nhưng SERIALIZABLE thì ngăn
    được?
  answer: Write skew là khi hai transaction đồng thời đọc dữ liệu chồng lấn rồi mỗi bên ghi vào một dòng
    khác nhau dựa trên điều kiện đọc được, dẫn tới kết quả tổng thể sai dù mỗi UPDATE riêng lẻ hợp lệ.
    REPEATABLE READ chỉ phát hiện xung đột khi hai transaction ghi đè cùng một dòng vật lý, nên không
    bắt được write skew. SERIALIZABLE phân tích cả phụ thuộc đọc-ghi chéo giữa các transaction nên phát
    hiện và từ chối một bên.
- id: index-transaction-q8
  node: index-transaction
  tier: fast
  prompt: Nếu ứng dụng dùng isolation level SERIALIZABLE và thỉnh thoảng nhận lỗi could not serialize
    access, đây có phải là bug cần sửa ở tầng SQL không? Ứng dụng nên xử lý thế nào?
  answer: Không phải bug SQL — đây là hành vi được kỳ vọng của SERIALIZABLE dưới tải đồng thời, đảm bảo
    tính đúng đắn thay vì để lọt anomaly. Ứng dụng phải bắt lỗi này (SQLSTATE 40001) và tự động thử lại
    toàn bộ transaction từ đầu.
- id: ef-core-q1
  node: ef-core
  tier: fast
  prompt: DbContext có phải là bản thân kết nối TCP tới database không? Nó thật sự đại diện cho điều gì?
  answer: Không. DbContext là một phiên làm việc (session) — nó quản lý cấu hình kết nối, tập hợp các
    DbSet<T>, và change tracker; kết nối TCP thật do Npgsql mở/đóng bên dưới khi cần, không phải là chính
    DbContext.
- id: ef-core-q2
  node: ef-core
  tier: fast
  prompt: DbSet<Order> Orders dùng để làm gì, và khi nào dữ liệu thật sự được đọc từ database?
  answer: DbSet<Order> là điểm bắt đầu để viết truy vấn LINQ (và gọi Add/Remove) trên bảng Orders. Dữ
    liệu chỉ thật sự được đọc khi thực thi (materialize) truy vấn, ví dụ ToListAsync(), FirstOrDefaultAsync(),
    hay foreach — không phải ngay khi khai báo DbSet hay viết Where.
- id: ef-core-q3
  node: ef-core
  tier: fast
  prompt: Điều gì xảy ra nếu một entity không có thuộc tính nào khớp quy ước đặt tên khoá chính?
  answer: 'EF Core ném InvalidOperationException: "The entity type ''...'' requires a primary key to be
    defined" khi build model, vì nó không tự suy luận được đâu là khoá chính; phải cấu hình tường minh
    bằng [Key] hoặc Fluent API HasKey.'
- id: ef-core-q4
  node: ef-core
  tier: fast
  prompt: AsNoTracking() khác gì so với hành vi mặc định của EF Core, và nên dùng khi nào?
  answer: AsNoTracking() tắt việc giữ snapshot theo dõi thay đổi cho truy vấn đó; mặc định EF Core luôn
    giữ snapshot để so sánh khi SaveChanges. Nên dùng AsNoTracking() khi truy vấn chỉ để đọc/hiển thị,
    không có ý định sửa rồi gọi SaveChanges() trên các entity đó.
- id: ef-core-q5
  node: ef-core
  tier: fast
  prompt: Điều gì xảy ra (có báo lỗi không) nếu bạn sửa thuộc tính của một entity đọc bằng AsNoTracking()
    rồi gọi SaveChangesAsync()?
  answer: Không có lỗi/exception nào cả, nhưng thay đổi bị bỏ qua hoàn toàn một cách âm thầm — vì entity
    đó không nằm trong change tracker của DbContext, SaveChangesAsync() không biết để sinh UPDATE.
- id: ef-core-q6
  node: ef-core
  tier: fast
  prompt: FirstOrDefaultAsync khác FirstAsync ở điểm nào khi không tìm thấy phần tử khớp?
  answer: FirstOrDefaultAsync trả về null nếu không tìm thấy phần tử khớp; FirstAsync ném InvalidOperationException
    ("Sequence contains no elements") trong cùng tình huống.
- id: ef-core-q7
  node: ef-core
  tier: fast
  prompt: Add() trên DbSet<T> có ngay lập tức ghi dữ liệu xuống database không? Vì sao?
  answer: Không. Add() chỉ chuyển trạng thái của entity trong change tracker thành Added (hoàn toàn trong
    bộ nhớ); phải gọi SaveChanges()/SaveChangesAsync() thì EF Core mới sinh và gửi câu lệnh INSERT xuống
    database.
- id: ef-core-q8
  node: ef-core
  tier: fast
  prompt: Vì sao AddDbContext<T> thường đăng ký DbContext với vòng đời scoped thay vì singleton?
  answer: DbContext được thiết kế để sống ngắn hạn và giữ trạng thái (change tracker) đặc thù cho một
    đơn vị công việc; singleton sẽ khiến change tracker phình to không giới hạn và không an toàn khi nhiều
    request/luồng dùng chung một DbContext cùng lúc (EF Core không thread-safe cho một instance dùng đồng
    thời). Scoped tạo instance mới, sạch, cho mỗi HTTP request.
- id: ef-core-quan-he-q1
  node: ef-core-quan-he
  tier: fast
  prompt: Navigation property có ánh xạ tới một cột trong database không? Nếu không, quan hệ thật sự được
    lưu bằng gì?
  answer: Không. Navigation property là thuộc tính C# dùng để điều hướng giữa các entity liên quan trong
    code; quan hệ thật sự được lưu trong database bằng cột khoá ngoại (foreign key) trên bảng phía "nhiều"
    (ví dụ Book.AuthorId).
- id: ef-core-quan-he-q2
  node: ef-core-quan-he
  tier: fast
  prompt: Nếu không Include() và không bật lazy loading, việc truy cập một navigation property tập hợp
    (ví dụ author.Books) trả về gì?
  answer: Null hoặc một tập hợp rỗng (tuỳ có khởi tạo = new() sẵn hay không) — không có exception, chỉ
    là dữ liệu chưa được nạp, dễ gây hiểu nhầm là 'không có dữ liệu con'.
- id: ef-core-quan-he-q3
  node: ef-core-quan-he
  tier: fast
  prompt: Vấn đề N+1 query là gì — mô tả bằng số lượng truy vấn cụ thể với N bản ghi cha?
  answer: 1 truy vấn ban đầu để lấy danh sách cha, cộng thêm N truy vấn riêng biệt (mỗi cha một truy vấn)
    để lấy dữ liệu con — tổng cộng N+1 lượt truy vấn.
- id: ef-core-quan-he-q4
  node: ef-core-quan-he
  tier: fast
  prompt: Vì sao Include() giúp tránh được N+1, xét về số lượt round-trip tới database?
  answer: Include() gộp việc nạp dữ liệu con vào cùng một truy vấn (thường dùng JOIN) với truy vấn lấy
    danh sách cha, nên chỉ tốn 1 lượt round-trip bất kể có bao nhiêu bản ghi cha.
- id: ef-core-quan-he-q5
  node: ef-core-quan-he
  tier: fast
  prompt: ThenInclude() nạp tiếp navigation property của entity nào — entity gốc hay kết quả của bước
    Include/ThenInclude liền trước?
  answer: Của kết quả bước Include/ThenInclude liền trước nó, không phải của entity gốc ban đầu.
- id: ef-core-quan-he-q6
  node: ef-core-quan-he
  tier: fast
  prompt: Vì sao lazy loading dễ khiến N+1 trở nên khó phát hiện hơn so với việc thiếu Include() (không
    bật lazy loading)?
  answer: Vì với lazy loading, dòng code truy cập navigation property trông giống hệt một phép đọc thuộc
    tính bình thường trong bộ nhớ — không có dấu hiệu nào cho thấy nó âm thầm kích hoạt một truy vấn SQL
    mới.
- id: ef-core-quan-he-q7
  node: ef-core-quan-he
  tier: fast
  prompt: Explicit loading khác eager loading ở điểm nào về thời điểm và cách gọi?
  answer: Eager loading (Include) nạp dữ liệu con tường minh ngay trong truy vấn ban đầu; explicit loading
    nạp bằng một lệnh riêng (Entry(...).Collection(...).LoadAsync()), gọi sau khi đã có entity cha, chỉ
    khi thật sự cần.
- id: ef-core-quan-he-q8
  node: ef-core-quan-he
  tier: fast
  prompt: Khai báo navigation property tập hợp chỉ ở một phía của quan hệ N-N gây ra hậu quả gì?
  answer: EF Core hiểu đây là quan hệ N-N một chiều thay vì hai chiều; phía không khai báo sẽ không có
    cách truy cập chiều ngược lại qua code C#, cố dùng sẽ gặp lỗi biên dịch CS1061.
- id: ef-core-migration-q1
  node: ef-core-migration
  tier: fast
  prompt: dotnet ef migrations add có làm thay đổi gì trên database thật không? Nếu không, nó làm gì?
  answer: Không. Nó chỉ so sánh model C# với ModelSnapshot gần nhất rồi sinh ra file code C# mới trên
    ổ đĩa (chứa Up/Down); phải chạy dotnet ef database update thì thay đổi mới thật sự được áp xuống database.
- id: ef-core-migration-q2
  node: ef-core-migration
  tier: fast
  prompt: Method Down trong file migration dùng để làm gì, và khi nào nó được chạy?
  answer: Down chứa các thao tác hoàn tác đúng những gì Up của migration đó đã làm; nó được chạy khi rollback
    (dotnet ef database update <tên-migration-trước>) lùi qua migration này.
- id: ef-core-migration-q3
  node: ef-core-migration
  tier: fast
  prompt: HasData khác seeding thủ công ở điểm nào về thời điểm chạy và yêu cầu dữ liệu biết trước?
  answer: HasData chạy một lần duy nhất khi migration chứa nó được áp dụng, và yêu cầu dữ liệu (kể cả
    khoá chính) phải cố định biết trước lúc viết code. Seeding thủ công chạy mỗi lần ứng dụng khởi động,
    tự kiểm tra điều kiện, và có thể dùng dữ liệu tính toán lúc chạy (ví dụ đọc biến môi trường).
- id: ef-core-migration-q4
  node: ef-core-migration
  tier: fast
  prompt: Sau khi rollback qua một migration có DropColumn trên một cột từng có dữ liệu thật, dữ liệu
    cũ của cột đó có được khôi phục lại không?
  answer: Không. Down chỉ khôi phục lại cấu trúc (thêm lại cột/bảng), không khôi phục dữ liệu đã bị DROP
    — dữ liệu thật đã mất vĩnh viễn từ lúc Up chạy DROP COLUMN/DROP TABLE.
- id: ef-core-migration-q5
  node: ef-core-migration
  tier: fast
  prompt: dotnet ef migrations remove có xoá được một migration đã chạy database update thành công trên
    database dev của chính bạn không?
  answer: Không. EF Core từ chối với thông báo yêu cầu revert trước. Phải rollback bằng dotnet ef database
    update <tên-migration-trước> để gỡ migration khỏi __EFMigrationsHistory trước, rồi mới migrations
    remove được.
- id: ef-core-migration-q6
  node: ef-core-migration
  tier: fast
  prompt: Nếu đổi tên thuộc tính Name thành FullName qua hai lần migrations add riêng biệt thay vì sửa
    cùng lúc, migration sinh ra dùng RenameColumn hay DropColumn/AddColumn? Hậu quả là gì?
  answer: 'Dùng cặp DropColumn/AddColumn, vì EF Core không biết đó là cùng một phép đổi tên. Hậu quả:
    DropColumn xoá vĩnh viễn dữ liệu cột Name, AddColumn tạo cột FullName trống — mất dữ liệu âm thầm
    không có exception cảnh báo.'
- id: ef-core-migration-q7
  node: ef-core-migration
  tier: fast
  prompt: Sửa Name của một dòng HasData đã tồn tại (giữ nguyên Id) rồi migrations add lại sinh ra thao
    tác gì?
  answer: UpdateData — EF Core so sánh theo khoá chính không đổi, nhận ra là sửa dòng đã có chứ không
    phải thêm mới.
- id: dependency-injection-q1
  node: dependency-injection
  tier: fast
  prompt: AddScoped<T>() tạo bao nhiêu instance khi CÙNG một request gọi GetRequiredService<T>() ba lần?
  answer: Đúng 1 instance — Scoped tái dùng cùng một instance trong suốt một scope (mặc định là một request
    HTTP), bất kể được yêu cầu bao nhiêu lần bên trong scope đó.
- id: dependency-injection-q2
  node: dependency-injection
  tier: fast
  prompt: Vì sao một class tự new dependency của nó bên trong constructor lại khó unit test?
  answer: Vì không có cách nào từ bên ngoài thay thế dependency đó bằng một bản giả/mock — class luôn
    dùng đúng implementation cụ thể bị new cứng bên trong, nên test luôn phải chạy với implementation
    thật.
- id: dependency-injection-q3
  node: dependency-injection
  tier: fast
  prompt: Captive dependency là gì, và ASP.NET Core mặc định phản ứng thế nào khi phát hiện nó lúc khởi
    động?
  answer: Captive dependency là khi một service sống lâu hơn (thường Singleton) giữ tham chiếu trực tiếp
    tới một service sống ngắn hơn (thường Scoped) qua constructor injection. Mặc định (Development, ValidateScopes
    = true), builder.Build() sẽ ném InvalidOperationException ngay khi khởi động thay vì để lỗi âm thầm
    xảy ra lúc runtime.
- id: dependency-injection-q4
  node: dependency-injection
  tier: fast
  prompt: Cách đúng để một Singleton cần dùng một service Scoped mà không tạo captive dependency là gì?
  answer: Không tiêm Scoped trực tiếp qua constructor. Thay vào đó, tiêm IServiceScopeFactory vào Singleton,
    rồi mỗi khi cần dùng thì tự CreateScope(), lấy service Scoped bằng GetRequiredService từ scope.ServiceProvider,
    dùng xong Dispose scope đó.
- id: dependency-injection-q5
  node: dependency-injection
  tier: fast
  prompt: Vì sao constructor injection được ưu tiên hơn Service Locator (tự gọi IServiceProvider.GetService<T>()
    bên trong logic nghiệp vụ)?
  answer: Constructor injection khai báo dependency một cách tường minh trong chữ ký constructor. Service
    Locator giấu dependency thật sự bên trong thân hàm, khiến lỗi quên đăng ký chỉ lộ ra sâu bên trong
    lúc runtime thay vì rõ ràng ngay ở chữ ký.
- id: dependency-injection-q6
  node: dependency-injection
  tier: fast
  prompt: Nếu bạn resolve một type chưa được đăng ký trong IServiceCollection từ một Minimal API handler,
    điều gì xảy ra khi có request gọi tới, và lỗi đó xuất hiện ở giai đoạn nào?
  answer: 'Request đó trả về 500 Internal Server Error, với ngoại lệ InvalidOperationException: Unable
    to resolve service for type .... Đây là lỗi runtime, chỉ xảy ra khi có request thật gọi tới — code
    vẫn biên dịch bình thường.'
- id: dependency-injection-q7
  node: dependency-injection
  tier: fast
  prompt: Vì sao một Singleton có trạng thái mutable (như bộ đếm dùng chung) thường cần đồng bộ hoá, nhưng
    thường không cần với trạng thái tương tự trong một service Scoped?
  answer: Singleton chỉ có một instance duy nhất dùng chung cho mọi request đồng thời — nhiều luồng có
    thể cùng đọc/ghi cùng lúc, gây race condition. Scoped có instance riêng cho mỗi request, nên không
    bị nhiều request khác chia sẻ cùng instance.
- id: routing-model-binding-q1
  node: routing-model-binding
  tier: fast
  prompt: Route template {id:int} khác gì so với {id} khi client gửi một giá trị không phải số?
  answer: '{id} (không constraint) vẫn khớp route nhưng bước binding sau đó thất bại khi ép sang int →
    400 Bad Request. {id:int} loại giá trị không phải số ngay từ bước khớp route → nếu không route nào
    khác khớp thì 404 Not Found.'
- id: routing-model-binding-q2
  node: routing-model-binding
  tier: fast
  prompt: Vì sao tham số string? sort trong MapGet("/products", (string? sort) => ...) không cần viết
    [FromQuery]?
  answer: Vì sort là kiểu đơn giản (string) và tên của nó không khớp bất kỳ route parameter nào trong
    template /products — Minimal API tự suy luận nguồn là query string.
- id: routing-model-binding-q3
  node: routing-model-binding
  tier: fast
  prompt: Một handler khai (ProductInput a, AddressInput b) với cả hai đều là record (kiểu phức tạp),
    không có attribute. Điều gì xảy ra?
  answer: 'Ở request đầu tiên khớp route đó, ASP.NET Core ném InvalidOperationException: Failure to infer
    one or more parameters → trả về 500 Internal Server Error, vì Minimal API chỉ cho phép một tham số
    tự suy luận bind từ JSON body.'
- id: routing-model-binding-q4
  node: routing-model-binding
  tier: fast
  prompt: Header có nằm trong chuỗi suy luận tự động (route → service → query → body) không? Muốn bind
    từ header phải làm gì?
  answer: Không. Header luôn phải khai [FromHeader] tường minh (có thể kèm Name = "..." nếu tên header
    khác tên biến C#); không có suy luận tự động cho header.
- id: routing-model-binding-q5
  node: routing-model-binding
  tier: fast
  prompt: 'Cho route /products/{id:int} và request PUT /products/5 thiếu header Content-Type: application/json
    dù có body JSON hợp lệ. Server trả gì?'
  answer: 415 Unsupported Media Type — vì thiếu Content-Type đúng, ASP.NET Core không xác định được cách
    parse body nên từ chối trước khi thử bind.
- id: routing-model-binding-q6
  node: routing-model-binding
  tier: fast
  prompt: MapGroup mang lại lợi ích gì ngoài việc gộp tiền tố URL?
  answer: Cho phép áp dụng một lần các cấu hình chung (như RequireAuthorization, endpoint filter) cho
    toàn bộ endpoint trong nhóm, đảm bảo tính nhất quán và tránh quên áp dụng ở một endpoint lẻ.
- id: routing-model-binding-q7
  node: routing-model-binding
  tier: fast
  prompt: Vì sao route /products/{id} (không constraint) và /products/featured dễ gây nhầm lẫn hơn /products/{id:int}
    và /products/featured?
  answer: Không có constraint, {id} khớp mọi chuỗi kể cả "featured", khiến việc route nào được ưu tiên
    khớp trở nên mơ hồ. Thêm :int loại "featured" khỏi route id ngay từ bước khớp, làm rõ ràng hai route
    không chồng lấn.
- id: configuration-options-q1
  node: configuration-options
  tier: fast
  prompt: Biến môi trường nào quyết định file appsettings.{Environment}.json nào được nạp?
  answer: ASPNETCORE_ENVIRONMENT. Không đặt thì mặc định Production.
- id: configuration-options-q2
  node: configuration-options
  tier: fast
  prompt: Giữa appsettings.json và appsettings.Development.json, file nào được nạp sau và do đó thắng
    khi trùng khoá?
  answer: appsettings.Development.json được nạp sau appsettings.json nên đè lên; biến môi trường OS và
    tham số dòng lệnh còn đè lên cả hai file này.
- id: configuration-options-q3
  node: configuration-options
  tier: fast
  prompt: Vì sao nên dùng Options pattern (class C#) thay vì đọc trực tiếp IConfiguration["Key"] ở khắp
    nơi trong code?
  answer: Vì IConfiguration["Key"] dùng chuỗi rời rạc không được kiểm tra lúc biên dịch — sai chính tả
    âm thầm trả về null. Options pattern gom cấu hình vào class C# có thuộc tính thật, được IDE/compiler
    hỗ trợ, và tiêm được qua DI.
- id: configuration-options-q4
  node: configuration-options
  tier: fast
  prompt: IOptionsSnapshot<T> có lifetime gì, và điều gì xảy ra nếu tiêm nó vào một service Singleton?
  answer: Scoped. Tiêm vào Singleton gây captive dependency, ném InvalidOperationException lúc khởi động.
- id: configuration-options-q5
  node: configuration-options
  tier: fast
  prompt: Trong ba loại IOptions<T> / IOptionsSnapshot<T> / IOptionsMonitor<T>, loại nào đúng cho một
    Singleton cần thấy cấu hình thay đổi lúc đang chạy?
  answer: IOptionsMonitor<T> — bản thân nó là Singleton (tiêm an toàn vào Singleton khác) và đọc .CurrentValue
    luôn cập nhật, khác IOptions<T> chỉ đọc một lần lúc khởi động.
- id: configuration-options-q6
  node: configuration-options
  tier: fast
  prompt: Nếu quên gọi builder.Services.Configure<EmailOptions>(...) nhưng vẫn tiêm IOptions<EmailOptions>
    vào một endpoint, chuyện gì xảy ra khi request tới?
  answer: Không có exception. IOptions<EmailOptions>.Value trả về một EmailOptions mới với giá trị mặc
    định của C# cho từng thuộc tính — lỗi âm thầm, không phải lỗi biên dịch hay crash runtime.
- id: configuration-options-q7
  node: configuration-options
  tier: fast
  prompt: GetValue<int>("Email:Port") sẽ có hành vi gì nếu giá trị JSON tại khoá đó là một chuỗi không
    phải số, ví dụ "abc"?
  answer: Ném InvalidOperationException lúc gọi (runtime), vì không thể ép kiểu chuỗi "abc" sang int.
- id: validation-q6
  node: validation
  tier: fast
  prompt: Số dư tài khoản không đủ để rút tiền là validation dữ liệu hay business rule? Nên trả mã HTTP
    nào?
  answer: Business rule (cần truy vấn trạng thái hệ thống), không phải validation định dạng. Nên trả 409
    Conflict hoặc 422 Unprocessable Entity, không phải 400.
- id: validation-q7
  node: validation
  tier: fast
  prompt: Khi validate một List<OrderItem> và phần tử thứ 2 (index 1) sai, key lỗi trong response trông
    như thế nào?
  answer: Dạng Lines[1].Quantity — dùng chỉ số index trong ngoặc vuông để chỉ đúng phần tử sai trong danh
    sách.
- id: middleware-q1
  node: middleware
  tier: fast
  prompt: 'Middleware trong ASP.NET Core thực thi theo cấu trúc nào: tuần tự (hàng đợi) hay lồng nhau
    (nested)?'
  answer: Lồng nhau — middleware đăng ký trước bọc middleware đăng ký sau. Phần trước next() chạy theo
    thứ tự đăng ký; phần sau next() chạy theo thứ tự ngược lại.
- id: middleware-q2
  node: middleware
  tier: fast
  prompt: Điều gì xảy ra nếu một middleware không gọi await next()?
  answer: Pipeline dừng lại tại đó (short-circuit) — mọi middleware và endpoint phía sau không chạy. Có
    thể là chủ đích hoặc lỗi quên gọi next().
- id: middleware-q3
  node: middleware
  tier: fast
  prompt: Vì sao UseAuthorization() phải đặt sau UseRouting()?
  answer: UseAuthorization cần biết endpoint nào đã được match (do UseRouting xác định) để kiểm tra endpoint
    đó có RequireAuthorization() hay không.
- id: middleware-q4
  node: middleware
  tier: fast
  prompt: Nếu sửa context.Response.Headers sau khi response đã bắt đầu gửi, chuyện gì xảy ra?
  answer: 'Ném InvalidOperationException: Headers are read-only, response has already started — vì HTTP
    yêu cầu gửi header trước body.'
- id: middleware-q5
  node: middleware
  tier: fast
  prompt: UseStaticFiles() thường đặt ở đâu trong pipeline và vì sao?
  answer: Đặt sớm nhất (trước UseRouting). Nếu request khớp file tĩnh có sẵn, nó trả file ngay và short-circuit,
    tránh tốn chi phí routing/authorization không cần thiết.
- id: middleware-q6
  node: middleware
  tier: fast
  prompt: Cho hai middleware A (đăng ký trước) và B (đăng ký sau), cả hai log trước và sau next(). Thứ
    tự in ra console là gì?
  answer: A-trước, B-trước, [endpoint chạy], B-sau, A-sau — vì A bọc B nên phần sau của A luôn in cuối
    cùng.
- id: middleware-q7
  node: middleware
  tier: fast
  prompt: app.Run(...) khác app.Use(...) ở điểm nào?
  answer: app.Run là terminal middleware — không nhận tham số next, luôn kết thúc pipeline tại đó. app.Use
    nhận next và có thể chọn gọi hoặc không gọi middleware kế tiếp.
- id: xu-ly-loi-toan-cuc-q1
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: Vì sao không nên viết try/catch giống nhau ở mọi endpoint thay vì xử lý lỗi toàn cục?
  answer: Vì nó lặp code ở mọi endpoint và rất dễ để sót — chỉ cần một endpoint mới quên copy khối catch
    là hệ thống có hai định dạng lỗi khác nhau tồn tại song song.
- id: xu-ly-loi-toan-cuc-q2
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: UseExceptionHandler phải được đặt ở đâu trong pipeline, và vì sao?
  answer: Gần đầu pipeline nhất có thể, vì middleware bọc theo thứ tự đăng ký — nó chỉ bắt được exception
    từ middleware/endpoint đăng ký sau nó.
- id: xu-ly-loi-toan-cuc-q3
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: ProblemDetails là gì và tại sao dùng nó thay vì tự bịa cấu trúc JSON lỗi riêng?
  answer: ProblemDetails là định dạng JSON chuẩn hoá cho lỗi HTTP (RFC 7807), gồm các trường cố định như
    title, status, detail, instance — giúp mọi client đọc và xử lý lỗi theo cùng một cấu trúc.
- id: xu-ly-loi-toan-cuc-q4
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: IExceptionHandler.TryHandleAsync trả về false có ý nghĩa gì?
  answer: Nghĩa là handler này không xử lý được exception đó — nhường lại cho handler tiếp theo đã đăng
    ký, hoặc để hành vi mặc định của framework chạy.
- id: xu-ly-loi-toan-cuc-q5
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: Vì sao lỗi validation (400) không nên được xử lý bằng cách throw exception rồi để IExceptionHandler
    bắt?
  answer: Vì IExceptionHandler mặc định trả 500 (lỗi không mong đợi phía server), trong khi lỗi validation
    là lỗi phía client. Dùng exception cho validation khiến client hiểu nhầm đây là lỗi server.
- id: xu-ly-loi-toan-cuc-q6
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: Trường nào trong ProblemDetails không nên chứa exception.ToString() hoặc exception.StackTrace
    ở production, và vì sao?
  answer: Trường detail (hoặc bất kỳ trường nào khác) — stack trace lộ ra cấu trúc nội bộ hệ thống, là
    lỗ hổng bảo mật cho kẻ tấn công.
- id: xu-ly-loi-toan-cuc-q7
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: Nếu bạn gọi app.UseExceptionHandler() không tham số nhưng quên builder.Services.AddExceptionHandler<T>(),
    chuyện gì xảy ra khi có exception?
  answer: 'Không có handler nào được gọi — hành vi rơi về mặc định của framework. Đây là lỗi câm: không
    cảnh báo lúc build, chỉ lộ khi thực sự test endpoint gây lỗi.'
- id: openapi-swagger-q1
  node: openapi-swagger
  tier: fast
  prompt: OpenAPI là một công cụ hay một định dạng đặc tả? Giải thích khác biệt với Swagger UI.
  answer: OpenAPI là một định dạng đặc tả (file JSON/YAML mô tả API), không phải công cụ. Swagger UI là
    một công cụ đọc đặc tả đó và hiển thị cho con người.
- id: openapi-swagger-q2
  node: openapi-swagger
  tier: fast
  prompt: Cần gọi hai phương thức nào để bật tính năng sinh OpenAPI có sẵn trong .NET 9+, và mỗi phương
    thức làm gì?
  answer: builder.Services.AddOpenApi() đăng ký dịch vụ sinh đặc tả; app.MapOpenApi() mở endpoint HTTP
    (mặc định /openapi/v1.json) để trả về file đặc tả đó.
- id: openapi-swagger-q3
  node: openapi-swagger
  tier: fast
  prompt: Nếu gọi AddOpenApi() nhưng quên MapOpenApi(), gọi /openapi/v1.json sẽ trả về gì?
  answer: Trả về 404 Not Found — ứng dụng vẫn chạy bình thường, chỉ là chưa có route nào phục vụ đường
    dẫn đó.
- id: openapi-swagger-q4
  node: openapi-swagger
  tier: fast
  prompt: WithSummary và WithDescription khác nhau ở điểm gì?
  answer: WithSummary là dòng tóm tắt ngắn (hiển thị làm tiêu đề); WithDescription là đoạn mô tả dài hơn,
    giải thích chi tiết hành vi endpoint.
- id: openapi-swagger-q5
  node: openapi-swagger
  tier: fast
  prompt: Produces<T>(200) cung cấp thông tin gì cho đặc tả OpenAPI mà nếu không gọi, framework có thể
    suy luận thiếu chính xác?
  answer: Nó khai báo tường minh schema (cấu trúc field, kiểu dữ liệu) của response ứng với đúng status
    code đó — hữu ích khi endpoint có nhiều nhánh trả về khác kiểu nhau.
- id: openapi-swagger-q6
  node: openapi-swagger
  tier: fast
  prompt: Vì sao không nên luôn để /openapi/v1.json và Swagger UI mở công khai ở production cho mọi loại
    API?
  answer: Vì file đặc tả liệt kê toàn bộ route nội bộ, kiểu dữ liệu, và đôi khi thông tin nghiệp vụ nhạy
    cảm — với API nội bộ, để lộ ra Internet là trao bản đồ hệ thống cho người ngoài dò quét.
- id: openapi-swagger-q7
  node: openapi-swagger
  tier: fast
  prompt: Khi nào nên chọn Swashbuckle thay vì AddOpenApi/MapOpenApi thuần?
  answer: Khi cần giao diện trực quan để người dùng tự bấm thử API trên trình duyệt mà không cần Postman,
    hoặc dự án đã quen thuộc với hệ sinh thái Swashbuckle từ trước.
- id: goi-api-ngoai-q1
  node: goi-api-ngoai
  tier: fast
  prompt: Vì sao gọi new HttpClient() bên trong mỗi request lại nguy hiểm dưới tải cao?
  answer: Mỗi new HttpClient() mở một socket TCP riêng; sau khi đóng, socket kẹt ở trạng thái TIME_WAIT
    trước khi hệ điều hành thu hồi. Dưới tải cao, số socket TIME_WAIT tích luỹ nhanh hơn tốc độ giải phóng,
    dẫn tới cạn cổng khả dụng (socket exhaustion).
- id: goi-api-ngoai-q2
  node: goi-api-ngoai
  tier: fast
  prompt: IHttpClientFactory giải quyết đồng thời hai vấn đề nào so với new HttpClient() mỗi request và
    so với một static HttpClient dùng chung mãi mãi?
  answer: 'So với new HttpClient() mỗi request: tránh socket exhaustion nhờ tái sử dụng handler. So với
    static HttpClient dùng chung mãi mãi: tránh stale DNS, vì factory luân phiên loại bỏ và tạo handler
    mới định kỳ.'
- id: goi-api-ngoai-q3
  node: goi-api-ngoai
  tier: fast
  prompt: GetFromJsonAsync<T> sẽ ném exception gì nếu body response không phải JSON hợp lệ?
  answer: System.Text.Json.JsonException. Đây là lý do phải kiểm tra IsSuccessStatusCode trước khi tin
    tưởng body là JSON hợp lệ.
- id: goi-api-ngoai-q4
  node: goi-api-ngoai
  tier: fast
  prompt: Khi HttpClient.Timeout hết hạn, loại exception nào được ném ra, và tại sao bắt nhầm TimeoutException
    là một lỗi phổ biến?
  answer: TaskCanceledException (kế thừa từ OperationCanceledException), không phải TimeoutException.
    Nếu code chỉ catch (TimeoutException), exception timeout thật sự sẽ không được bắt.
- id: goi-api-ngoai-q5
  node: goi-api-ngoai
  tier: fast
  prompt: EnsureSuccessStatusCode() làm gì, và nó ném loại exception gì khi status code không phải 2xx?
  answer: Nó kiểm tra status code của response; nếu không nằm trong khoảng 200-299, ném HttpRequestException
    với thông điệp mô tả status code cụ thể, và thuộc tính StatusCode để đọc lại status gốc.
- id: goi-api-ngoai-q6
  node: goi-api-ngoai
  tier: fast
  prompt: Vì sao đăng ký AddHttpClient("PaymentApi", ...) với BaseAddress sẵn lại tốt hơn gọi factory.CreateClient()
    rồi tự set BaseAddress ở mỗi nơi dùng?
  answer: Named client gom cấu hình vào một chỗ đăng ký duy nhất, tránh lặp lại và sai lệch cấu hình.
    Nếu quên set BaseAddress ở client không tên, gọi URL tương đối sẽ ném InvalidOperationException ngay
    lúc chạy.
- id: goi-api-ngoai-q7
  node: goi-api-ngoai
  tier: fast
  prompt: Polly giải quyết vấn đề gì mà retry/circuit breaker tự viết tay dễ làm sai?
  answer: Retry tự viết tay dễ quên backoff tăng dần và dễ retry nhầm cả lỗi vĩnh viễn (như 400). Circuit
    breaker tự viết tay khó cài đúng ngưỡng và thời gian ngắt mạch. Polly cung cấp sẵn cả hai chính sách
    đã kiểm chứng.
- id: goi-api-ngoai-q8
  node: goi-api-ngoai
  tier: fast
  prompt: response.Content.ReadFromJsonAsync<T>() gọi hai lần trên cùng một response sẽ có vấn đề gì?
  answer: HttpContent là một stream chỉ đọc được một lần. Đọc lần thứ hai sẽ gây lỗi hoặc trả về dữ liệu
    rỗng — nếu cần dùng lại, phải đọc một lần thành biến rồi xử lý từ biến đó.
- id: jwt-q1
  node: jwt
  tier: fast
  prompt: JWT gồm 3 phần nào, và phần nào chứa dữ liệu (claim) mà bất kỳ ai cũng đọc được?
  answer: Header.Payload.Signature. Phần Payload chỉ là Base64URL (không phải mã hoá), ai cũng decode
    đọc được nguyên văn JSON claim bên trong.
- id: jwt-q2
  node: jwt
  tier: fast
  prompt: Đơn vị của claim exp/iat/nbf là gì? Nếu nhét nhầm giá trị millisecond vào đó, hậu quả gì?
  answer: Unix timestamp tính bằng giây. Nếu nhét nhầm millisecond (lớn hơn 1000 lần), thư viện hiểu token
    hết hạn ở một thời điểm cách xa hàng nghìn năm sau — token coi như không bao giờ hết hạn, một lỗ hổng
    bảo mật.
- id: jwt-q3
  node: jwt
  tier: fast
  prompt: ClockSkew mặc định của TokenValidationParameters là bao nhiêu? Vì sao cần biết điều này khi
    viết test kiểm token hết hạn?
  answer: Mặc định 5 phút, không phải 0. Một token hết hạn 4 phút trước vẫn được coi là hợp lệ vì nằm
    trong biên độ lệch cho phép — test kỳ vọng hết hạn ngay lập tức sẽ fail nếu không set ClockSkew =
    TimeSpan.Zero tường minh.
- id: jwt-q4
  node: jwt
  tier: fast
  prompt: Vì sao nói JWT không mã hoá, chỉ ký? Nếu một kẻ tấn công sửa claim role trong payload rồi gửi
    lại token, chuyện gì xảy ra khi server kiểm?
  answer: JWT dùng Base64URL (đảo ngược tự do) cho payload, không dùng thuật toán mã hoá cần khoá giải
    mã. Chữ ký phụ thuộc toàn bộ vào payload gốc + secret key — nếu kẻ tấn công sửa payload nhưng giữ
    chữ ký cũ, server tính lại chữ ký từ payload mới, kết quả không khớp chữ ký cũ, server phát hiện và
    từ chối token.
- id: jwt-q5
  node: jwt
  tier: fast
  prompt: Vì sao access token nên sống ngắn (phút) trong khi refresh token sống dài (ngày/tuần)? Refresh
    token nên lưu ở đâu phía client, và vì sao?
  answer: Access token ngắn hạn để giảm thiệt hại nếu bị đánh cắp. Refresh token cần sống dài để người
    dùng không phải đăng nhập lại liên tục, nhưng phải lưu trong cookie HttpOnly + Secure + SameSite để
    giảm rủi ro bị đánh cắp qua XSS, đồng thời gắn với bản ghi phía server để có thể thu hồi khi cần.
- id: jwt-q6
  node: jwt
  tier: fast
  prompt: Nếu bạn quên set ValidateIssuerSigningKey = true (hoặc set thành false), điều gì có thể xảy
    ra?
  answer: Server sẽ chấp nhận token bất kể chữ ký có khớp hay không — bất kỳ ai tự tạo một token với claim
    tuỳ ý (ví dụ role=admin) cũng được coi là hợp lệ. Đây là lỗ hổng nghiêm trọng nhất khi cấu hình sai
    TokenValidationParameters.
- id: jwt-q7
  node: jwt
  tier: fast
  prompt: app.UseAuthentication() phải đứng trước hay sau app.UseAuthorization()? Nếu đặt sai thứ tự,
    hiện tượng cụ thể là gì?
  answer: Phải đứng trước. Nếu đặt sau, HttpContext.User chưa được điền thông tin khi UseAuthorization()
    chạy kiểm tra quyền — mọi request bị trả 401 dù client gửi token hợp lệ.
- id: tai-file-an-toan-q6
  node: tai-file-an-toan
  tier: fast
  prompt: Byte đầu tiên của một file PNG hợp lệ là giá trị hex nào?
  answer: 0x89 (byte đầu trong chữ ký 8-byte chuẩn 89 50 4E 47 0D 0A 1A 0A).
- id: tai-file-an-toan-q7
  node: tai-file-an-toan
  tier: fast
  prompt: Khi kiểm magic byte, vì sao phải dùng số byte thực sự đọc được (bytesDaDoc) chứ không dùng độ
    dài của mảng buffer đã cấp phát?
  answer: Buffer được cấp phát sẵn với kích thước cố định và giữ giá trị 0x00 mặc định ở các vị trí chưa
    được ghi; nếu stream chỉ đọc được ít byte hơn kích thước buffer, dùng độ dài buffer sẽ vô tình so
    khớp trên dữ liệu chưa từng tồn tại trong file thật, gây kết quả sai.
- id: testing-q6
  node: testing
  tier: fast
  prompt: Test không có Assert nào có làm tăng coverage không? Vì sao đây là vấn đề?
  answer: Có — dòng code được chạy qua vẫn tính vào coverage dù không có Assert. Đây là vấn đề vì test
    đó không kiểm tra gì cả, luôn pass bất kể kết quả đúng sai, tạo cảm giác an toàn giả.
- id: testing-q7
  node: testing
  tier: fast
  prompt: 100% test coverage có đảm bảo không có bug không? Vì sao?
  answer: Không. Coverage chỉ đo tỉ lệ code được chạy qua trong lúc test, không đo việc kết quả có được
    kiểm tra đúng hay không. Một dự án 100% coverage với assert hời hợt vẫn có thể chứa nhiều bug.
- id: logging-exceptions-q1
  node: logging-exceptions
  tier: fast
  prompt: ILogger<T> — tham số T dùng để làm gì, và bạn có nên tự new nó thay vì để DI cấp không?
  answer: 'T dùng làm category — tên nguồn phát ra dòng log, thường là tên class. Không nên tự new: để
    DI cấp đảm bảo logger được nối đúng với mọi provider đã cấu hình sẵn; tự tạo thủ công dễ thiếu kết
    nối, khiến log biến mất mà không rõ lý do.'
- id: logging-exceptions-q2
  node: logging-exceptions
  tier: fast
  prompt: Sắp xếp đúng thứ tự nghiêm trọng tăng dần của 6 log level.
  answer: Trace < Debug < Information < Warning < Error < Critical.
- id: logging-exceptions-q3
  node: logging-exceptions
  tier: fast
  prompt: Vì sao logger.LogInformation($"User {userId} logged in") bị coi là sai trong code review, dù
    console hiển thị đúng nội dung mong muốn?
  answer: Vì nội suy chuỗi hoà giá trị userId vào chuỗi ngay lập tức, hệ thống log tập trung không còn
    tách được userId thành một trường riêng để truy vấn — chỉ còn full-text search kém chính xác trên
    chuỗi phẳng.
- id: logging-exceptions-q4
  node: logging-exceptions
  tier: fast
  prompt: LoggerMessage source generator giải quyết vấn đề gì, và khi nào bạn NÊN cân nhắc dùng nó?
  answer: Nó sinh code ghi log tại thời điểm compile, tránh chi phí boxing tham số và kiểm tra level lặp
    lại. Nên cân nhắc dùng khi đã đo được logging là điểm nghẽn hiệu năng thật sự — không nên dùng tràn
    lan vì tăng độ phức tạp không cần thiết.
- id: logging-exceptions-q5
  node: logging-exceptions
  tier: fast
  prompt: BeginScope dùng để làm gì, và điều gì xảy ra nếu bạn không đặt nó trong khối using?
  answer: Dùng để gắn context (ví dụ correlation id) vào mọi dòng log ghi bên trong scope đó. Nếu không
    đặt trong using, scope không kết thúc đúng thời điểm — dữ liệu context có thể dính vào các dòng log
    không liên quan được ghi sau đó.
- id: logging-exceptions-q6
  node: logging-exceptions
  tier: fast
  prompt: Trong appsettings.json, mục Logging:LogLevel:Default và một mục ghi đè riêng cho một category
    cụ thể khác nhau ở điểm nào?
  answer: Default áp dụng cho mọi category không được liệt kê riêng. Mục ghi đè riêng chỉ áp dụng cho
    đúng category đó (và các category con theo namespace), cho phép hạ/nâng mức log của một phần nhỏ hệ
    thống mà không ảnh hưởng phần còn lại.
- id: logging-exceptions-q7
  node: logging-exceptions
  tier: fast
  prompt: Sink trong Serilog là gì?
  answer: Sink là đích đến cụ thể mà log chảy tới, ví dụ Console, File, Seq, Elasticsearch. Serilog cho
    phép cấu hình nhiều sink cùng lúc cho cùng một dòng log.
- id: logging-exceptions-q8
  node: logging-exceptions
  tier: fast
  prompt: 'Nếu bạn để "Default": "Trace" sót lại trong appsettings.Production.json, hậu quả cụ thể là
    gì?'
  answer: Hệ thống production ghi log ở mức chi tiết nhất cho mọi request thật, khiến lượng log tăng vọt
    — có thể làm đầy disk, vượt hạn mức dịch vụ log tập trung, hoặc khiến log quan trọng bị tự động xoá
    sớm hơn đúng lúc cần nó nhất.
- id: deploy-docker-q6
  node: deploy-docker
  tier: fast
  prompt: Container ở trạng thái Up có chắc là app đang hoạt động đúng không? Vì sao cần HEALTHCHECK?
  answer: Không chắc. Up chỉ nghĩa tiến trình chính chưa thoát; app có thể deadlock hoặc kẹt mà vẫn Up.
    HEALTHCHECK (hoặc endpoint /health) kiểm tra app có phản hồi đúng, không chỉ còn tồn tại.
- id: deploy-docker-q7
  node: deploy-docker
  tier: fast
  prompt: 'Trong docker-compose.yml, condition: service_healthy khác gì so với việc chỉ khai depends_on
    không kèm condition?'
  answer: 'depends_on không kèm condition chỉ đợi container khởi động; condition: service_healthy đợi
    đến khi healthcheck của service đó thực sự báo PASS, tức service sẵn sàng nhận request/kết nối thật.'
- id: claude-code-q1
  node: claude-code
  tier: fast
  prompt: Claude Code có phải một plugin autocomplete trong IDE không? Nếu không, nó là gì?
  answer: Không. Nó là một CLI agent chạy trong terminal, tự đọc/sửa file, tự chạy lệnh, và lặp lại chuỗi
    hành động nhiều bước — khác autocomplete, vốn chỉ gợi ý một đoạn mã tại một vị trí và không tự thực
    thi gì.
- id: claude-code-q2
  node: claude-code
  tier: fast
  prompt: CLAUDE.md có phải file cấu hình bắt buộc để Claude Code khởi động không? Giá trị thật của nó
    là gì?
  answer: 'Không bắt buộc — Claude Code chạy tốt dù file này không tồn tại. Giá trị thật: agent tự nạp
    CLAUDE.md mỗi phiên như bộ nhớ dự án, nên không phải nhắc lại cùng ngữ cảnh ở đầu mỗi cuộc hội thoại.'
- id: claude-code-q3
  node: claude-code
  tier: fast
  prompt: Điều gì khiến một SKILL.md được Claude Code tự kích hoạt đúng lúc?
  answer: Phần description trong front-matter phải chứa các cụm từ khớp với cách người dùng thật sẽ diễn
    đạt yêu cầu — đây là thứ được so khớp để kích hoạt, không phải tên file hay nội dung chi tiết bên
    trong.
- id: claude-code-q4
  node: claude-code
  tier: fast
  prompt: Ai thực thi một hook — model hay harness? Vì sao điều này quan trọng để ép một chính sách?
  answer: Harness (chương trình chạy Claude Code, đứng ngoài model) thực thi hook, không phải model. Vì
    vậy hook luôn chạy khi event khai báo xảy ra, không phụ thuộc việc model có nhớ quy tắc hay không.
- id: claude-code-q5
  node: claude-code
  tier: fast
  prompt: Tên event hook viết theo quy tắc nào? Cho 2 ví dụ và nêu khác biệt giữa chúng.
  answer: 'PascalCase. Ví dụ: PreToolUse (chạy trước khi tool được gọi, có thể chặn hành động) và PostToolUse
    (chạy sau khi tool chạy xong, không thể chặn vì hành động đã xảy ra rồi).'
- id: claude-code-q6
  node: claude-code
  tier: fast
  prompt: Khi nào nên giao việc cho subagent thay vì làm trong phiên chính?
  answer: Khi task tốn nhiều ngữ cảnh để hoàn thành nhưng bạn chỉ cần kết quả tóm tắt cuối cùng, không
    cần theo dõi hoặc can thiệp từng bước.
- id: claude-code-q7
  node: claude-code
  tier: fast
  prompt: --dangerously-skip-permissions tắt cái gì? Trong điều kiện nào mới nên dùng?
  answer: Tắt toàn bộ bước hỏi-xác-nhận trước khi agent chạy lệnh hoặc sửa file. Chỉ nên dùng trong container/VM
    dùng-một-lần, không có dữ liệu thật, không mạng nhạy cảm.
- id: claude-code-q8
  node: claude-code
  tier: fast
  prompt: Vì sao vẫn cần permission mode hỏi-từng-bước dù đã có hook PreToolUse chặn một số lệnh nguy
    hiểm cụ thể?
  answer: Vì hook chỉ chặn được những pattern cụ thể đã lường trước; permission mode là lớp bảo vệ tổng
    quát, áp dụng cho mọi hành động có tác dụng phụ, kể cả tình huống chưa kịp viết hook riêng.
- id: mcp-q1
  node: mcp
  tier: fast
  prompt: MCP là sản phẩm riêng của công ty nào, hay là gì khác?
  answer: Không của riêng công ty nào — MCP là một chuẩn mở; bất kỳ ai cũng viết được client hoặc server
    tuân theo chuẩn này, Claude Code chỉ là một client triển khai chuẩn đó.
- id: mcp-q2
  node: mcp
  tier: fast
  prompt: 'Nêu định nghĩa một câu cho mỗi primitive: tools, resources, prompts.'
  answer: 'Tools: hành động có tên/tham số mà model tự quyết định gọi (model-controlled). Resources: dữ
    liệu chỉ-đọc, do ứng dụng/người dùng chọn nạp vào ngữ cảnh (app-controlled). Prompts: mẫu lời nhắc
    dựng sẵn, do người dùng chủ động chọn chạy (user-controlled).'
- id: mcp-q3
  node: mcp
  tier: fast
  prompt: Trong kiến trúc client-server của MCP, Claude Code đóng vai trò nào?
  answer: Client — nó chủ động mở kết nối tới server; MCP server chỉ đứng chờ và trả lời khi được gọi,
    không bao giờ tự ý gọi vào Claude Code.
- id: mcp-q4
  node: mcp
  tier: fast
  prompt: Lệnh CLI thật nào dùng để thêm một MCP server (stdio) vào Claude Code, và lệnh nào để xem trạng
    thái kết nối?
  answer: claude mcp add <tên> -- <lệnh chạy server> để thêm; claude mcp list hoặc /mcp trong phiên để
    xem trạng thái kết nối.
- id: mcp-q5
  node: mcp
  tier: fast
  prompt: stdio và HTTP/SSE khác nhau chủ yếu ở điểm nào, và HTTP bắt buộc phải có gì mà stdio không cần?
  answer: 'stdio: server chạy như tiến trình con cùng máy, không ra mạng. HTTP/SSE: server chạy ở xa qua
    mạng, bắt buộc phải có xác thực và TLS vì thông điệp đi qua mạng.'
- id: mcp-q6
  node: mcp
  tier: fast
  prompt: Vì sao không nên nhúng token trực tiếp vào .mcp.json rồi commit vào git?
  answer: Vì file .mcp.json thường bị commit vào repo chia sẻ — ai đọc được repo cũng đọc được bí mật;
    nên dùng biến môi trường và thêm file chứa giá trị thật vào .gitignore.
- id: mcp-q7
  node: mcp
  tier: fast
  prompt: Nếu một MCP server bị xâm nhập hoặc độc hại, nó có thể gây hại theo cách nào với dữ liệu agent
    gửi qua nó?
  answer: Nó có thể đọc/ghi log mọi dữ liệu đi qua nó và gửi ra ngoài mà bạn không biết, hoặc cấy chỉ
    thị ẩn (prompt injection) vào dữ liệu trả về để điều khiển hành vi model ở lượt sau.
- id: mcp-q8
  node: mcp
  tier: fast
  prompt: Ba scope (local, project, user) của một MCP server khác nhau chủ yếu ở điểm nào?
  answer: 'Ở ai nhìn thấy cấu hình: local chỉ máy bạn, project ghi vào .mcp.json và chia sẻ với team qua
    git, user áp dụng cho mọi dự án bạn mở trên máy đó.'
- id: capstone-q6
  node: capstone
  tier: fast
  prompt: Middleware nào chạy trước Endpoint trong sơ đồ kiến trúc, và mỗi middleware làm gì?
  answer: 'Theo đúng thứ tự: UseAuthentication (giải mã/kiểm chữ ký JWT) -> UseAuthorization (kiểm quyền)
    -> exception handler toàn cục (bắt lỗi chưa xử lý). Chỉ sau khi qua cả ba, request mới tới Endpoint.'
- id: capstone-q7
  node: capstone
  tier: fast
  prompt: Nếu bạn chọn xoá mềm (IsDeleted) cho DELETE /tasks/{id}, endpoint GET /tasks cần thay đổi gì
    để không hiển thị nhầm task đã xoá?
  answer: Endpoint GET /tasks phải lọc thêm điều kiện !t.IsDeleted trong Where(...) — nếu quên, task đã
    xoá vẫn hiện ra vì xoá mềm chỉ đổi cờ, không thật sự xoá dòng dữ liệu.
- id: kien-truc-phan-lop-q1
  node: kien-truc-phan-lop
  tier: fast
  prompt: Kể tên 3 lớp trong kiến trúc Presentation — Application — Data, và công việc chính của mỗi lớp
    trong đúng một câu.
  answer: 'Presentation: nhận/parse HTTP, validate hình thức, ánh xạ kết quả thành mã HTTP. Application
    (Service): chứa quy tắc nghiệp vụ thật, không biết gì về HTTP. Data (Repository/DbContext): đọc/ghi
    dữ liệu bền, không tự quyết định quy tắc nghiệp vụ.'
- id: kien-truc-phan-lop-q2
  node: kien-truc-phan-lop
  tier: fast
  prompt: Luật phụ thuộc trong kiến trúc phân lớp quy định điều gì, theo đúng một chiều nào?
  answer: 'Lớp ngoài được gọi lớp trong: Presentation → Application → Data. Lớp trong tuyệt đối không
    được gọi ngược lại hoặc biết gì về lớp ngoài.'
- id: kien-truc-phan-lop-q3
  node: kien-truc-phan-lop
  tier: fast
  prompt: Vì sao đoạn code gộp validate + query + business logic trong một endpoint lại khó viết unit
    test, dù về mặt chức năng nó vẫn chạy đúng?
  answer: Vì quy tắc nghiệp vụ không tồn tại như một đơn vị gọi được độc lập — nó dính chặt vào DbContext/HTTP
    pipeline bên trong lambda endpoint, nên test nó buộc phải kéo theo cả HTTP và database thật.
- id: kien-truc-phan-lop-q4
  node: kien-truc-phan-lop
  tier: fast
  prompt: Với EF Core, vì sao wrap thêm một lớp Repository quanh DbSet<T> thường là dư thừa? Khi nào thì
    Repository riêng THẬT SỰ có giá trị?
  answer: Dư thừa vì DbContext/DbSet<T> đã là một Unit-of-Work + Repository-like abstraction có sẵn. Repository
    riêng có giá trị khi cần gom logic query phức tạp, dùng lại ở nhiều Service khác nhau.
- id: kien-truc-phan-lop-q5
  node: kien-truc-phan-lop
  tier: fast
  prompt: Cho ví dụ cụ thể một vi phạm luật phụ thuộc ở lớp Data, và hậu quả thực tế của nó.
  answer: 'Ví dụ: ProductRepository trả về IResult thay vì trả Product? thuần. Hậu quả: OrderService buộc
    phải xử lý IResult — nếu gọi từ nơi không có HTTP (background job), phải unwrap IResult một cách vô
    nghĩa.'
- id: kien-truc-phan-lop-q6
  node: kien-truc-phan-lop
  tier: fast
  prompt: CQRS đáng dùng khi nào, và vì sao dùng nó cho một CRUD đơn giản là over-engineering?
  answer: Đáng dùng khi model đọc và model ghi thật sự khác biệt đáng kể. Với CRUD đơn giản, tách riêng
    Command/Query/Handler chỉ thêm nhiều class và độ phức tạp mà không giải quyết vấn đề gì.
- id: kien-truc-phan-lop-q7
  node: kien-truc-phan-lop
  tier: fast
  prompt: Singleton pattern (GoF) khác Singleton lifetime (DI container) ở điểm nào?
  answer: Singleton pattern là một pattern cổ điển tự code (constructor private, thuộc tính tĩnh Instance).
    Singleton lifetime chỉ là một cấu hình cho DI container biết tạo một instance dùng chung — không tự
    quản gì.
- id: kien-truc-phan-lop-q8
  node: kien-truc-phan-lop
  tier: fast
  prompt: Nếu Service tự đọc HttpContext.User trực tiếp thay vì nhận userId qua tham số, hậu quả cụ thể
    là gì khi viết unit test cho Service đó?
  answer: Mọi unit test buộc phải giả lập cả IHttpContextAccessor và toàn bộ HttpContext.User chỉ để test
    một quy tắc nghiệp vụ không liên quan gì đến HTTP, và Service không gọi được từ nơi không có HTTP
    context.
- id: kien-truc-phan-lop-q9
  node: kien-truc-phan-lop
  tier: fast
  prompt: Vì sao OrderService nhận IProductRepository (interface) qua constructor thay vì nhận thẳng class
    cụ thể lại giúp test dễ hơn? Cho một ví dụ khi việc tạo interface là KHÔNG cần thiết.
  answer: 'Nhận qua interface nghĩa là OrderService chỉ biết hợp đồng, có thể thay bằng FakeProductRepository
    trong test. Ví dụ không cần interface: một class tiện ích thuần tính toán, chỉ có đúng một cài đặt
    duy nhất.'
- id: repository-unit-of-work-q1
  node: repository-unit-of-work
  tier: fast
  prompt: Repository pattern định nghĩa là gì, và nó giải quyết vấn đề cụ thể nào khi viết unit test?
  answer: 'Repository là một interface trừu tượng hoá việc truy cập dữ liệu. Nó giải quyết vấn đề: Service
    phụ thuộc trực tiếp một class cụ thể rất khó mock; phụ thuộc một interface thì mock được bằng fake
    class, test chạy không cần database.'
- id: repository-unit-of-work-q2
  node: repository-unit-of-work
  tier: fast
  prompt: Unit of Work là gì? Cho ví dụ cụ thể trong EF Core chứng minh nó đã có sẵn.
  answer: Unit of Work gom nhiều thay đổi dữ liệu thành một giao dịch lưu một lần. Trong EF Core, DbContext.SaveChangesAsync()
    chính là Unit of Work có sẵn.
- id: repository-unit-of-work-q3
  node: repository-unit-of-work
  tier: fast
  prompt: Vì sao viết một GenericRepository<T> bọc quanh DbSet<T> với chỉ Add/Get/Update/Delete thường
    là thừa khi dùng EF Core?
  answer: Vì DbSet<T> đã là Repository-like abstraction + Unit of Work có sẵn. Bọc thêm không thêm giá
    trị trừu tượng hoá thật, mà che mất Include, Select projection, AsNoTracking.
- id: repository-unit-of-work-q4
  node: repository-unit-of-work
  tier: fast
  prompt: Nêu hai trường hợp cụ thể khi viết Repository riêng THẬT SỰ hữu ích với EF Core.
  answer: (1) Có logic query phức tạp được tái sử dụng ở nhiều nơi — gói vào một phương thức để không
    lặp code. (2) Thật sự cần trừu tượng hoá để đổi database provider, hoặc mock hoàn toàn trong test.
- id: repository-unit-of-work-q5
  node: repository-unit-of-work
  tier: fast
  prompt: Nếu gọi SaveChangesAsync() hai lần rời rạc cho hai thay đổi liên quan, điều gì có thể xảy ra
    nếu bước thứ hai thất bại?
  answer: Hai lần gọi là hai transaction độc lập — nếu bước thứ hai thất bại, thay đổi của bước đầu (đã
    lưu thành công) không bị rollback theo. Phải sửa cả hai entity trước, rồi gọi SaveChangesAsync() một
    lần.
- id: repository-unit-of-work-q6
  node: repository-unit-of-work
  tier: fast
  prompt: Interface Repository nên chứa bao nhiêu phương thức — càng nhiều cho đủ dùng sau càng tốt, hay
    chỉ vừa đủ nhu cầu hiện tại?
  answer: Chỉ nên chứa đúng những phương thức mà caller thật sự đang gọi. Thêm phương thức cho đủ trước
    khi có nhu cầu thật làm interface phình to, khó mock, vi phạm Interface Segregation.
- id: repository-unit-of-work-q7
  node: repository-unit-of-work
  tier: fast
  prompt: Một API CRUD đơn giản, không có logic query phức tạp, không có kế hoạch đổi database — có nên
    viết Repository riêng bọc DbSet<T> không? Vì sao?
  answer: Không nên. Không rơi vào hai trường hợp cần Repository riêng — viết thêm chỉ tạo code dư thừa,
    mất tính năng EF Core mà không có lợi ích thật.
- id: repository-unit-of-work-q8
  node: repository-unit-of-work
  tier: fast
  prompt: Repository đặc thù (IOrderRepository) khác Repository generic (IGenericRepository<T>) ở điểm
    thiết kế nào, và vì sao khác biệt đó giúp không che mất Include/projection?
  answer: Repository đặc thù có phương thức đặt tên theo câu hỏi nghiệp vụ cụ thể, không phải theo động
    từ CRUD chung áp dụng cho mọi T — mỗi phương thức tự do trả về đúng hình dạng dữ liệu cần.
- id: repository-unit-of-work-q9
  node: repository-unit-of-work
  tier: fast
  prompt: Khi nào cần một IUnitOfWork tường minh? Nếu đăng ký sai lifetime cho Repository/IUnitOfWork
    so với DbContext, hậu quả cụ thể là gì?
  answer: Cần khi một nghiệp vụ phải phối hợp nhiều Repository trong cùng một giao dịch. Nếu đăng ký Singleton
    trong khi DbContext là Scoped, ASP.NET Core ném lỗi ngay khi khởi động (captive dependency).
- id: design-patterns-co-ban-q1
  node: design-patterns-co-ban
  tier: fast
  prompt: Factory pattern giải quyết vấn đề cụ thể gì — nêu đúng triệu chứng code trước khi áp dụng.
  answer: Logic tạo object (switch-case/if-else tạo instance) lặp lại ở nhiều nơi gọi khác nhau, khiến
    việc thêm một loại object mới phải sửa nhiều chỗ, dễ quên sửa sót gây bug.
- id: design-patterns-co-ban-q2
  node: design-patterns-co-ban
  tier: fast
  prompt: Vì sao if-else chọn thuật toán khác về bản chất với Strategy pattern, không chỉ là viết dài
    hơn?
  answer: if-else chọn cứng trong một hàm, không tách được thành đơn vị độc lập, không test riêng được,
    không đổi được lúc runtime. Strategy đóng gói mỗi thuật toán vào một class riêng cài cùng interface,
    đổi được mà không sửa context gọi nó.
- id: design-patterns-co-ban-q3
  node: design-patterns-co-ban
  tier: fast
  prompt: Decorator có sửa class gốc để thêm hành vi mới không? Vì sao đây là điểm mấu chốt của pattern
    này?
  answer: Không — Decorator bọc object gốc bằng một class khác cùng interface, hành vi mới thêm ở lớp
    bọc, class gốc không đổi một dòng nào.
- id: design-patterns-co-ban-q4
  node: design-patterns-co-ban
  tier: fast
  prompt: Nêu một tình huống Strategy pattern là over-engineering, và cách đơn giản hơn nên dùng.
  answer: Chỉ có 2 mức giá vận chuyển cố định, hiếm khi thay đổi — dùng enum + switch đơn giản hơn hẳn
    so với dựng interface + nhiều class.
- id: design-patterns-co-ban-q5
  node: design-patterns-co-ban
  tier: fast
  prompt: Nêu một tình huống Decorator pattern là over-engineering.
  answer: Chỉ cần thêm log cho đúng một service, một nơi dùng, không có kế hoạch tái dùng — viết thẳng
    dòng log vào class đó đơn giản hơn dựng cả decorator riêng.
- id: design-patterns-co-ban-q6
  node: design-patterns-co-ban
  tier: fast
  prompt: Lỗi lập trình phổ biến nhất khi viết Decorator là gì, và vì sao khó phát hiện bằng mắt?
  answer: Quên gọi _inner (hành vi gốc). Khó phát hiện vì code vẫn compile và chạy bình thường, không
    có exception — chỉ trả về kết quả sai hoặc giá trị mặc định.
- id: design-patterns-co-ban-q7
  node: design-patterns-co-ban
  tier: fast
  prompt: Vì sao một Strategy có trạng thái (stateful) đăng ký làm singleton trong DI container lại nguy
    hiểm?
  answer: Nếu strategy đó có field lưu trạng thái mutable, nhiều request đồng thời sẽ đọc/ghi chung trạng
    thái đó, gây race condition khó tái hiện.
- id: design-patterns-nang-cao-q1
  node: design-patterns-nang-cao
  tier: fast
  prompt: Trong Observer pattern, vì sao subject (publisher) không cần biết cụ thể observer là kiểu gì?
  answer: Vì subject chỉ giữ một event/delegate với chữ ký cố định — nó thông báo qua chữ ký đó, không
    quan tâm ai đã đăng ký hay có bao nhiêu người.
- id: design-patterns-nang-cao-q2
  node: design-patterns-nang-cao
  tier: fast
  prompt: event/delegate của C# liên quan gì tới Observer pattern của GoF?
  answer: event/delegate chính là cách C# cài đặt sẵn ngữ nghĩa Observer trong ngôn ngữ — GoF mô tả Observer
    bằng interface tự viết vì Java/C++ thời đó chưa có delegate hạng nhất.
- id: design-patterns-nang-cao-q3
  node: design-patterns-nang-cao
  tier: fast
  prompt: Singleton pattern (GoF) và Singleton lifetime (DI container) khác nhau ở điểm nào về constructor?
  answer: Singleton GoF bắt buộc constructor private. Singleton lifetime của DI container yêu cầu constructor
    public vì chính container phải gọi constructor đó — hai yêu cầu đối lập, không trộn được trên cùng
    một class.
- id: design-patterns-nang-cao-q4
  node: design-patterns-nang-cao
  tier: fast
  prompt: Vì sao Singleton pattern GoF khó test hơn Singleton lifetime của DI?
  answer: Singleton GoF là global mutable state truy cập qua điểm tĩnh — không có cách tráo bằng fake
    khi test. Singleton lifetime của DI cho phép đăng ký implementation khác riêng cho test.
- id: design-patterns-nang-cao-q5
  node: design-patterns-nang-cao
  tier: fast
  prompt: Adapter pattern giải quyết vấn đề gì khi tích hợp thư viện thanh toán bên thứ ba?
  answer: Thư viện ngoài có interface khác IPaymentGateway nội bộ, không sửa được thư viện ngoài. Adapter
    bọc lại, implement IPaymentGateway, gọi đúng API ngoài và chuyển đổi dữ liệu.
- id: design-patterns-nang-cao-q6
  node: design-patterns-nang-cao
  tier: fast
  prompt: Vì sao Adapter nên trả về kiểu dữ liệu nội bộ thay vì kiểu của thư viện ngoài?
  answer: Nếu Adapter trả thẳng kiểu ngoài, code gọi vẫn phải biết cấu trúc dữ liệu ngoài — chưa cách
    ly thật. Trả kiểu nội bộ đảm bảo code gọi không biết thư viện ngoài tồn tại.
- id: design-patterns-nang-cao-q7
  node: design-patterns-nang-cao
  tier: fast
  prompt: Cho một ứng dụng chỉ có một chỗ gọi API ngoài, không có kế hoạch đổi nhà cung cấp — có nên tạo
    interface + Adapter không? Vì sao?
  answer: Không cần — over-engineering. Adapter chỉ đáng giá khi có nhu cầu thay thế/cách ly thật.
- id: design-patterns-nang-cao-q8
  node: design-patterns-nang-cao
  tier: fast
  prompt: Vì sao C# trong thực tế chỉ dùng được Object Adapter (composition) mà hiếm khi dùng Class Adapter
    theo đúng nghĩa GoF?
  answer: Vì C# không hỗ trợ đa kế thừa class, nên Class Adapter (kế thừa cả interface đích lẫn class
    cần bọc) không viết được nếu thứ cần bọc là một class cụ thể.
- id: clean-architecture-q1
  node: clean-architecture
  tier: fast
  prompt: Trong kiến trúc phân lớp thông thường, điều gì SAI về hướng phụ thuộc, cụ thể là ai phụ thuộc
    vào ai?
  answer: Application (chứa quy tắc nghiệp vụ, đáng lẽ ổn định nhất) lại phụ thuộc trực tiếp vào Data/hạ
    tầng cụ thể — lớp quan trọng phụ thuộc lớp chi tiết dễ đổi.
- id: clean-architecture-q2
  node: clean-architecture
  tier: fast
  prompt: Phát biểu chính xác Dependency Rule bằng một câu.
  answer: Phụ thuộc luôn trỏ vào trong, về phía Domain; Domain — vòng trung tâm — không phụ thuộc vào
    bất kỳ vòng nào khác.
- id: clean-architecture-q3
  node: clean-architecture
  tier: fast
  prompt: IOrderRepository nên được định nghĩa trong project nào, và implement trong project nào?
  answer: Định nghĩa trong Application (hoặc Domain). Implement (ví dụ bằng EF Core) trong Infrastructure.
- id: clean-architecture-q4
  node: clean-architecture
  tier: fast
  prompt: Vì sao đặt IOrderRepository trong project Infrastructure rồi để Application using nó là một
    lỗi phổ biến?
  answer: Vì hướng tham chiếu .csproj vẫn là Application --> Infrastructure — thêm interface không đảo
    được gì nếu nó nằm sai project.
- id: clean-architecture-q5
  node: clean-architecture
  tier: fast
  prompt: Nêu 2 dấu hiệu cho thấy áp Clean Architecture là over-engineering cho một dự án cụ thể.
  answer: Dự án nhỏ, một developer, không có kế hoạch thật đổi hạ tầng; hoặc team chưa có kỷ luật giữ
    hướng phụ thuộc.
- id: clean-architecture-q6
  node: clean-architecture
  tier: fast
  prompt: DbSet<T> của EF Core có phải là một dạng Repository/Unit-of-Work sẵn có không? Điều này ảnh
    hưởng gì tới quyết định viết thêm interface Repository riêng?
  answer: Đúng, DbSet<T> + DbContext đã là Unit-of-Work + Repository-like abstraction có sẵn. Viết thêm
    là dư thừa nếu không có nhu cầu thật.
- id: clean-architecture-q7
  node: clean-architecture
  tier: fast
  prompt: Trong ví dụ OrderService/IOrderRepository, viết unit test cho OrderService cần gì trước và sau
    khi đảo hướng phụ thuộc?
  answer: 'Trước: cần AppDbContext thật hoặc InMemory provider. Sau: chỉ cần một class nhỏ implement IOrderRepository
    bằng List<Order> trong bộ nhớ.'
- id: clean-architecture-q8
  node: clean-architecture
  tier: fast
  prompt: Domain có được phép biết Application, Infrastructure, hay Presentation không?
  answer: Không. Domain là vòng trung tâm, không phụ thuộc bất kỳ vòng nào khác.
- id: cqrs-q1
  node: cqrs
  tier: fast
  prompt: CQRS là viết tắt của gì, và hai chữ C và Q tương ứng với loại hành động nào?
  answer: Command Query Responsibility Segregation. C (Command) là hành động thay đổi trạng thái; Q (Query)
    là hành động chỉ đọc, không gây tác dụng phụ.
- id: cqrs-q2
  node: cqrs
  tier: fast
  prompt: Vì sao dùng chung một model cho cả đọc và ghi lại gây khó khăn khi hệ thống lớn lên?
  answer: Model đọc (cần denormalize, JOIN, tính toán) và model ghi (chỉ cần dữ liệu tối thiểu) có nhu
    cầu khác nhau; dùng chung khiến mỗi lần đổi field cho một bên rung chuyển bên còn lại.
- id: cqrs-q3
  node: cqrs
  tier: fast
  prompt: Một Command có nên trả về toàn bộ object chi tiết vừa tạo/sửa không? Vì sao?
  answer: Không nên. Command chỉ trả về thông tin tối thiểu (id, thành công/thất bại); trả dữ liệu chi
    tiết là trách nhiệm của Query.
- id: cqrs-q4
  node: cqrs
  tier: fast
  prompt: CQRS có bắt buộc phải tách thành hai database riêng không?
  answer: Không. CQRS ở mức cơ bản chỉ tách model và luồng xử lý trong code, vẫn dùng chung một database.
    Tách hẳn hai database là biến thể nâng cao (Event Sourcing).
- id: cqrs-q5
  node: cqrs
  tier: fast
  prompt: Nêu một ví dụ cụ thể mà áp dụng CQRS là over-engineering.
  answer: Một API CRUD đơn giản (quản lý Category/Tag) với model đọc và ghi giống nhau gần như 100%, không
    có logic nghiệp vụ phức tạp riêng.
- id: cqrs-q6
  node: cqrs
  tier: fast
  prompt: MediatR khác CQRS ở điểm nào — cái nào là khái niệm kiến trúc, cái nào là công cụ cài đặt?
  answer: CQRS là nguyên tắc kiến trúc, áp dụng được bằng class C# thuần. MediatR là một thư viện NuGet
    cụ thể tổ chức CQRS theo một khuôn thống nhất — không bắt buộc phải dùng.
- id: cqrs-q7
  node: cqrs
  tier: fast
  prompt: Nêu checklist 3 câu hỏi để quyết định có nên áp dụng CQRS hay không.
  answer: (1) Model đọc và ghi có khác nhau đáng kể không? (2) Có logic nghiệp vụ phức tạp ở phía ghi
    khác biệt với phía đọc không? (3) Phía đọc có cần denormalize/JOIN phức tạp mà phía ghi không quan
    tâm không?
- id: cqrs-q8
  node: cqrs
  tier: fast
  prompt: Command handler và Query handler có bắt buộc phải dùng hai Repository/DbContext khác nhau không?
  answer: Không bắt buộc. Cả hai có thể tiêm cùng một DbContext, chỉ khác cách gọi API (Command dùng Add+SaveChanges,
    Query dùng AsNoTracking+Select).
- id: cqrs-q9
  node: cqrs
  tier: fast
  prompt: Vì sao nên bắt đầu từ mức CQRS-lite thay vì áp dụng ngay CQRS kèm Event Sourcing?
  answer: Vì chi phí vận hành của Event Sourcing (đồng bộ hai luồng lưu trữ, eventual consistency) phải
    trả ngay từ đầu, trong khi lý do thật sự cần nó thường chưa xảy ra ở giai đoạn đầu.
- id: ddd-co-ban-q1
  node: ddd-co-ban
  tier: fast
  prompt: Entity được xác định bằng gì? Value Object được xác định bằng gì? Nêu sự khác biệt cốt lõi.
  answer: Entity được xác định bằng danh tính (Id) — hai Entity cùng Id là một, dù dữ liệu khác nhau.
    Value Object được xác định hoàn toàn bởi giá trị — hai Value Object cùng giá trị là một.
- id: ddd-co-ban-q2
  node: ddd-co-ban
  tier: fast
  prompt: Vì sao dùng record để cài đặt Entity là một lựa chọn dễ gây lỗi, dù record viết ngắn hơn class?
  answer: Vì record mặc định so sánh theo giá trị — hai bản ghi Entity khác Id nhưng trùng dữ liệu khác
    sẽ bị coi là bằng nhau (sai), trong khi Entity chỉ cần so sánh theo Id.
- id: ddd-co-ban-q3
  node: ddd-co-ban
  tier: fast
  prompt: Vì sao record lại là cách cài đặt tự nhiên nhất cho Value Object trong C#?
  answer: 'Vì Value Object cần đúng thứ record đã có sẵn: so sánh bằng nhau theo giá trị, không cần tự
    viết Equals/GetHashCode.'
- id: ddd-co-ban-q4
  node: ddd-co-ban
  tier: fast
  prompt: Aggregate Root có vai trò gì? Nêu một hệ quả cụ thể nếu cho phép sửa thành phần con trực tiếp
    từ ngoài.
  answer: Aggregate Root là cửa duy nhất để thay đổi dữ liệu bên trong Aggregate. Nếu sửa trực tiếp thành
    phần con, rule nghiệp vụ viết trong method của Aggregate Root sẽ bị bỏ qua hoàn toàn.
- id: ddd-co-ban-q5
  node: ddd-co-ban
  tier: fast
  prompt: Bounded Context giải quyết vấn đề gì khi hai team dùng chung một tên khái niệm?
  answer: Bounded Context cho phép cùng một tên khái niệm có hai model khác nhau ở hai ngữ cảnh nghiệp
    vụ khác nhau mà không xung đột.
- id: ddd-co-ban-q6
  node: ddd-co-ban
  tier: fast
  prompt: Nêu một ví dụ mà áp dụng Entity/Aggregate đầy đủ là over-engineering.
  answer: Một API quản lý Currency (chỉ Code, Symbol), không có rule nghiệp vụ, không có thành phần con
    — một record CurrencyDto đơn giản là đủ.
- id: ddd-co-ban-q7
  node: ddd-co-ban
  tier: fast
  prompt: Trong ví dụ Order/OrderLine, vì sao OrderLine không nên là Aggregate Root riêng?
  answer: Vì OrderLine không có ý nghĩa tồn tại độc lập — chỉ có nghĩa khi gắn với một Order cụ thể, và
    rule nghiệp vụ cần được kiểm tra ở phạm vi toàn bộ Order.
- id: ddd-co-ban-q8
  node: ddd-co-ban
  tier: fast
  prompt: Cách đúng để đổi một Value Object bất biến là gì — sửa trực tiếp field hay tạo bản mới?
  answer: Phải tạo bản mới, dùng cú pháp with của record, ví dụ var newAddress = oldAddress with { City
    = "Hà Nội" }.
- id: message-queue-event-driven-q1
  node: message-queue-event-driven
  tier: fast
  prompt: Nếu OrderService gọi trực tiếp EmailService qua HTTP đồng bộ và EmailService đang down, điều
    gì xảy ra với request tạo đơn?
  answer: Request tạo đơn cũng fail theo dù đơn hàng đã lưu thành công vào database ở bước trước — vì
    gọi đồng bộ, lỗi ở service phụ lan sang phá hỏng luồng nghiệp vụ chính.
- id: message-queue-event-driven-q2
  node: message-queue-event-driven
  tier: fast
  prompt: Nêu định nghĩa một câu của Message Queue và giải thích vì sao nó không yêu cầu người gửi và
    nhận online cùng lúc.
  answer: Message Queue là một service trung gian nhận message và giữ lại cho đến khi người nhận sẵn sàng
    lấy; người gửi chỉ cần gửi xong là hoàn tất, không cần đợi người nhận xử lý ngay.
- id: message-queue-event-driven-q3
  node: message-queue-event-driven
  tier: fast
  prompt: Phân biệt Point-to-point và Publish/Subscribe dựa trên số lượng người nhận xử lý mỗi message.
  answer: 'Point-to-point: mỗi message chỉ được đúng một consumer nhận dù có nhiều consumer lắng nghe.
    Publish/Subscribe: mỗi message được giao tới tất cả subscriber đã đăng ký.'
- id: message-queue-event-driven-q4
  node: message-queue-event-driven
  tier: fast
  prompt: Competing Consumers là gì, và nó xây dựng trên nền Point-to-point hay Publish/Subscribe?
  answer: Competing Consumers là chạy nhiều instance của cùng một consumer, cùng lắng nghe một queue để
    chia tải. Xây dựng trên Point-to-point, vì mỗi message vẫn chỉ được đúng một instance xử lý.
- id: message-queue-event-driven-q5
  node: message-queue-event-driven
  tier: fast
  prompt: RabbitMQ và Azure Service Bus khác nhau cơ bản ở điểm gì?
  answer: RabbitMQ là phần mềm self-host — tự vận hành hạ tầng; Azure Service Bus là dịch vụ managed cloud
    — Microsoft vận hành hạ tầng, chỉ cần tạo resource và trả tiền theo mức dùng.
- id: message-queue-event-driven-q6
  node: message-queue-event-driven
  tier: fast
  prompt: Vì sao đọc message qua JsonElement/dynamic nguy hiểm hơn deserialize thẳng về một record message
    contract cụ thể?
  answer: Đọc qua JsonElement/dynamic khi tên field không khớp sẽ không throw lỗi — chỉ đọc ra giá trị
    mặc định âm thầm. Deserialize về record cụ thể giúp lỗi lộ ra rõ ràng ngay khi field bắt buộc thiếu/sai
    kiểu.
- id: message-queue-event-driven-q7
  node: message-queue-event-driven
  tier: fast
  prompt: Dead Letter Queue giải quyết vấn đề gì?
  answer: DLQ là một queue phụ mà hạ tầng tự động chuyển message vào sau khi giao lại thất bại quá số
    lần giới hạn, giúp lấy message lỗi ra khỏi luồng xử lý chính để không chặn message hợp lệ khác.
- id: message-queue-event-driven-q8
  node: message-queue-event-driven
  tier: fast
  prompt: Nêu một ví dụ cụ thể mà thêm message queue vào hệ thống là over-engineering.
  answer: Một ứng dụng nội bộ nhỏ, một service duy nhất, ghi log vào file trong cùng tiến trình — đây
    là lời gọi method nội bộ, không cần bất đồng bộ, không cần thêm hạ tầng.
- id: blazor-tong-quan-q1
  node: blazor-tong-quan
  tier: fast
  prompt: Vấn đề cụ thể nào Blazor giải quyết cho một team backend .NET?
  answer: Blazor giải quyết vấn đề team backend .NET phải học thêm một ngôn ngữ/framework riêng (JavaScript,
    React/Vue/Angular) để làm frontend — Blazor cho phép viết UI web bằng C#/Razor, chạy trên .NET runtime.
- id: blazor-tong-quan-q2
  node: blazor-tong-quan
  tier: fast
  prompt: Blazor Server chạy logic ứng dụng ở đâu, và UI được cập nhật qua công nghệ gì?
  answer: Blazor Server chạy toàn bộ logic ứng dụng trên server; UI được cập nhật qua kết nối SignalR
    liên tục.
- id: blazor-tong-quan-q3
  node: blazor-tong-quan
  tier: fast
  prompt: Vì sao Blazor Server không phù hợp với ứng dụng mà người dùng thường mất kết nối mạng?
  answer: Vì Blazor Server phụ thuộc kết nối SignalR liên tục — mất kết nối đồng nghĩa mất khả năng tương
    tác, trang bị đứng, nút bấm không phản hồi cho tới khi kết nối được thiết lập lại.
- id: blazor-tong-quan-q4
  node: blazor-tong-quan
  tier: fast
  prompt: Blazor WebAssembly khác Blazor Server ở điểm nào về nơi logic chạy sau khi đã tải trang xong?
  answer: Blazor WebAssembly tải toàn bộ app cùng .NET runtime xuống trình duyệt, sau đó logic chạy hoàn
    toàn client-side; Blazor Server luôn cần server chạy logic qua SignalR.
- id: blazor-tong-quan-q5
  node: blazor-tong-quan
  tier: fast
  prompt: Blazor Hybrid dùng để xây loại ứng dụng nào, và công nghệ nào đứng sau nó?
  answer: Blazor Hybrid dùng để xây ứng dụng desktop/mobile; công nghệ đứng sau là .NET MAUI, với component
    Blazor chạy trong một BlazorWebView nhúng trong app native.
- id: blazor-tong-quan-q6
  node: blazor-tong-quan
  tier: fast
  prompt: Trong dự án Blazor WebAssembly tối thiểu, file nào chứa div#app, và điều gì xảy ra nếu Program.cs
    thiếu dòng RootComponents.Add?
  answer: File wwwroot/index.html chứa div#app. Nếu thiếu RootComponents.Add<App>("#app"), app vẫn build
    thành công nhưng lúc runtime hiển thị trang trắng hoàn toàn — lỗi runtime im lặng.
- id: blazor-tong-quan-q7
  node: blazor-tong-quan
  tier: fast
  prompt: Nêu trình tự tổng quát khi trình duyệt tải một trang Blazor WebAssembly lần đầu.
  answer: (1) tải index.html; (2) tải script blazor.webassembly.js, script này tải .NET runtime + DLL
    app dạng WASM; (3) Program.cs chạy, cắm component App vào div#app; (4) App.razor (Router) đọc URL,
    chọn trang tương ứng.
- id: blazor-tong-quan-q8
  node: blazor-tong-quan
  tier: fast
  prompt: Vì sao Blazor Server tốn thêm bộ nhớ server khi số người dùng đồng thời tăng, còn Blazor WebAssembly
    thì gần như không?
  answer: Blazor Server phải giữ một kết nối SignalR sống (circuit) và trạng thái UI riêng cho mỗi người
    dùng. Blazor WebAssembly không giữ trạng thái riêng nào trên server — server chỉ xử lý request API
    rời rạc.
- id: blazor-tong-quan-q9
  node: blazor-tong-quan
  tier: fast
  prompt: Nêu một khác biệt cụ thể trong cách viết code truy cập dữ liệu giữa Blazor Server và Blazor
    WebAssembly.
  answer: Trong Blazor Server, component có thể gọi trực tiếp DbContext vì logic chạy trên server. Trong
    Blazor WebAssembly, phải gọi qua HttpClient tới một Web API riêng chạy trên server.
- id: component-co-ban-q1
  node: component-co-ban
  tier: fast
  prompt: Component trong Blazor là gì, và nó tương ứng với loại file nào?
  answer: Là một đơn vị UI tái sử dụng được, gói cả markup và logic C# trong một file .razor — compiler
    biến file này thành một class C# kế thừa ComponentBase.
- id: component-co-ban-q2
  node: component-co-ban
  tier: fast
  prompt: Vì sao chỉ khai báo public string Title mà không thêm [Parameter] sẽ gây lỗi biên dịch khi component
    cha truyền Title="..."?
  answer: Vì Blazor compiler kiểm tra tại thời điểm build rằng mọi attribute gán trên tag component phải
    khớp một thuộc tính có [Parameter] — một thuộc tính public trơn không đủ điều kiện.
- id: component-co-ban-q3
  node: component-co-ban
  tier: fast
  prompt: ChildContent là gì, và tên thuộc tính này có bắt buộc viết đúng chính tả không?
  answer: Là một [Parameter] đặc biệt kiểu RenderFragment giữ nội dung cha đặt giữa tag mở-đóng của component
    con. Bắt buộc đúng tên ChildContent — Blazor chỉ tự động gom nội dung vào đúng tên này.
- id: component-co-ban-q4
  node: component-co-ban
  tier: fast
  prompt: OnInitializedAsync chạy bao nhiêu lần trong đời sống một component? OnParametersSetAsync thì
    sao?
  answer: OnInitializedAsync chạy đúng một lần, ngay sau khi component được tạo. OnParametersSetAsync
    chạy mỗi khi component cha truyền giá trị Parameter mới xuống.
- id: component-co-ban-q5
  node: component-co-ban
  tier: fast
  prompt: Vì sao gọi một API bất đồng bộ trong constructor của component là sai?
  answer: Vì constructor trong C# là đồng bộ tuyệt đối, không await được. Component vẽ giao diện trước
    khi dữ liệu API trả về, gây giao diện trống hoặc NullReferenceException. Cách đúng là dùng OnInitializedAsync.
- id: component-co-ban-q6
  node: component-co-ban
  tier: fast
  prompt: Một component không cập nhật giao diện khi cha đổi Parameter — nguyên nhân phổ biến nhất là
    gì?
  answer: Logic tải/tính dữ liệu phụ thuộc Parameter bị đặt sai trong OnInitialized (chỉ chạy 1 lần) thay
    vì OnParametersSet (chạy lại mỗi khi Parameter đổi).
- id: component-co-ban-q7
  node: component-co-ban
  tier: fast
  prompt: Quy ước đặt tên file .razor là gì, và điều gì xảy ra nếu vi phạm?
  answer: Phải viết hoa chữ đầu (PascalCase), vì compiler sinh ra một class C# cùng tên. Vi phạm khiến
    Blazor không nhận diện được như một tag component hợp lệ.
- id: component-co-ban-q8
  node: component-co-ban
  tier: fast
  prompt: Nếu một component gán giá trị mặc định cho một [Parameter], giá trị đó có giữ nguyên khi cha
    KHÔNG truyền Parameter đó không? Còn khi cha CÓ truyền?
  answer: Nếu cha không truyền, giá trị mặc định giữ nguyên. Nếu cha có truyền, Blazor ghi đè giá trị
    mặc định trước khi OnInitialized chạy.
- id: component-co-ban-q9
  node: component-co-ban
  tier: fast
  prompt: OnParametersSet có tự động biết Parameter có thực sự thay đổi giá trị hay không trước khi chạy?
  answer: Không — nó chạy mỗi khi cha render lại và truyền Parameter xuống lần nữa, bất kể giá trị có
    đổi thật hay không. Nếu logic bên trong tốn kém, nó sẽ bị gọi lại lãng phí.
- id: component-co-ban-q10
  node: component-co-ban
  tier: fast
  prompt: Khi nào một thuộc tính trong @code KHÔNG cần [Parameter]?
  answer: Khi đó là dữ liệu component tự quản lý bên trong nó, không cần component cha truyền vào — ví
    dụ một field đếm số lần bấm nút nội bộ.
- id: data-binding-events-q1
  node: data-binding-events
  tier: fast
  prompt: '@onclick="TenMethod" và @onclick="TenMethod()" khác nhau thế nào?'
  answer: '@onclick="TenMethod" gắn method làm handler, gọi lại mỗi lần click. @onclick="TenMethod()"
    gọi method ngay lúc render — với method void gây lỗi build; với method trả kiểu khác, chỉ chạy đúng
    một lần.'
- id: data-binding-events-q2
  node: data-binding-events
  tier: fast
  prompt: '@bind="ten" tương đương với việc tự viết hai thứ gì bằng tay?'
  answer: Tương đương value="@ten" (chiều C# → HTML) cộng với một @onchange tự sinh gán giá trị ngược
    lại vào ten (chiều HTML → C#).
- id: data-binding-events-q3
  node: data-binding-events
  tier: fast
  prompt: '@bind mặc định cập nhật biến C# vào lúc nào? Nếu cần cập nhật ngay lúc gõ, phải thêm gì?'
  answer: Mặc định cập nhật lúc input mất focus. Muốn cập nhật ngay mỗi ký tự, thêm @bind:event="oninput".
- id: data-binding-events-q4
  node: data-binding-events
  tier: fast
  prompt: Vì sao các ví dụ dùng @onclick/@bind không cần gọi StateHasChanged() thủ công, nhưng ví dụ Timer
    lại cần?
  answer: '@onclick/@onchange là event Blazor tự điều phối, tự gọi StateHasChanged() sau khi chạy xong.
    Timer chạy trên luồng riêng, ngoài vòng event Blazor theo dõi, nên phải gọi InvokeAsync(StateHasChanged)
    thủ công.'
- id: data-binding-events-q5
  node: data-binding-events
  tier: fast
  prompt: Nếu quên gọi StateHasChanged() trong callback của Timer, điều gì xảy ra cụ thể — có exception
    không?
  answer: Không có exception. Biến state vẫn tăng đúng trong bộ nhớ, nhưng UI đứng yên không cập nhật
    — lỗi hành vi im lặng.
- id: data-binding-events-q6
  node: data-binding-events
  tier: fast
  prompt: Component tạo Timer nhưng không implement IDisposable sẽ gặp vấn đề gì khi người dùng điều hướng
    rời trang?
  answer: Timer vẫn tiếp tục chạy dù component đã bị loại khỏi cây UI — memory leak, tích lũy dần nếu
    người dùng vào-ra trang nhiều lần.
- id: data-binding-events-q7
  node: data-binding-events
  tier: fast
  prompt: EventCallback<T> dùng để làm gì, và vì sao nên dùng nó thay vì Action<T>?
  answer: Cho phép con gọi ngược lên method của cha kèm giá trị kiểu T, tích hợp sẵn với vòng render (tự
    gọi StateHasChanged() sau callback). Action<T> không có tích hợp này, dễ nuốt exception nếu handler
    cha là async.
- id: data-binding-events-q8
  node: data-binding-events
  tier: fast
  prompt: Trong ví dụ NutGuiSo/TrangCha, NutGuiSo (con) có biết gì về biến bên TrangCha (cha) không?
  answer: Không. NutGuiSo chỉ biết nó có parameter OnGuiSo kiểu EventCallback<int> — không biết cha là
    ai hay cha làm gì với giá trị đó.
- id: routing-navigation-q1
  node: routing-navigation
  tier: fast
  prompt: Điều gì xảy ra khi một component không có @page — nó có báo lỗi build không?
  answer: Component vẫn compile được, không báo lỗi build — nhưng gõ URL vào nó sẽ không tìm thấy trang,
    Router hiển thị <NotFound>.
- id: routing-navigation-q2
  node: routing-navigation
  tier: fast
  prompt: Vì sao tên property [Parameter] phải khớp tên route parameter trong @page, và sai tên có báo
    lỗi build không?
  answer: Router dùng đúng tên để gán giá trị từ URL. Sai tên không báo lỗi build — property giữ giá trị
    mặc định, lỗi runtime im lặng.
- id: routing-navigation-q3
  node: routing-navigation
  tier: fast
  prompt: Khác biệt hành vi giữa <a href> và <NavLink href> khi URL hiện tại khớp chính xác href đó?
  answer: Cả hai đều điều hướng đúng, nhưng NavLink tự động thêm class CSS active khi khớp URL hiện tại.
- id: routing-navigation-q4
  node: routing-navigation
  tier: fast
  prompt: Vì sao onclick="TenHam()" (không có @) không gọi được phương thức C# trong @code{}?
  answer: onclick (không @) là thuộc tính HTML chuẩn, trình duyệt hiểu là gọi hàm JavaScript toàn cục
    — gây lỗi console ReferenceError. Phải dùng @onclick.
- id: routing-navigation-q5
  node: routing-navigation
  tier: fast
  prompt: Query string thiếu [Parameter] đi kèm [SupplyParameterFromQuery] gây lỗi ở giai đoạn nào?
  answer: Ở giai đoạn build — Blazor analyzer từ chối compile property thiếu [Parameter] đi kèm.
- id: routing-navigation-q6
  node: routing-navigation
  tier: fast
  prompt: Nêu khác biệt về cách báo lỗi khi route constraint {id:int} không khớp, so với khi query string
    ?page=abc không parse được thành int.
  answer: Route constraint không khớp khiến cả route không khớp, hiển thị not found toàn trang. Query
    string không parse được thì route vẫn khớp, property chỉ im lặng giữ giá trị mặc định.
- id: routing-navigation-q7
  node: routing-navigation
  tier: fast
  prompt: Router trong App.razor dùng phần nào để hiển thị nội dung khi không có @page nào khớp URL?
  answer: <NotFound> — render khi URL hiện tại không khớp bất kỳ @page nào đã khai báo.
- id: routing-navigation-q8
  node: routing-navigation
  tier: fast
  prompt: 'NavigateTo(url, forceLoad: true) khác NavigateTo(url) như thế nào?'
  answer: 'NavigateTo(url) điều hướng phía client, giữ nguyên state trong bộ nhớ. forceLoad: true buộc
    tải lại toàn bộ trang từ server, mất hoàn toàn state đang có.'
- id: routing-navigation-q9
  node: routing-navigation
  tier: fast
  prompt: Vì sao customerId nên là route parameter còn status nên là query string?
  answer: customerId là dữ liệu bắt buộc, định danh chính — thiếu nó nên là not found. status chỉ là bộ
    lọc tuỳ chọn — thiếu nó vẫn xem được danh sách đầy đủ.
- id: forms-validation-q1
  node: forms-validation
  tier: fast
  prompt: EditForm cần tối thiểu parameter nào để hoạt động, và nếu thiếu thì lỗi gì xảy ra?
  answer: Cần Model (hoặc EditContext). Thiếu cả hai, EditForm ném InvalidOperationException lúc render.
- id: forms-validation-q2
  node: forms-validation
  tier: fast
  prompt: Vì sao <input> HTML thuần gắn @bind không hiện lỗi validation dù model có [Required], còn InputText
    thì hiện?
  answer: <input> thuần không tự đăng ký với EditContext của EditForm; InputText tự làm việc này qua cascading
    parameter EditContext.
- id: forms-validation-q3
  node: forms-validation
  tier: fast
  prompt: Thành phần nào chịu trách nhiệm đọc attribute Data Annotations trên model và đẩy kết quả vào
    EditContext?
  answer: DataAnnotationsValidator, đặt bên trong EditForm.
- id: forms-validation-q4
  node: forms-validation
  tier: fast
  prompt: OnValidSubmit và OnSubmit khác nhau ở điểm nào khi dữ liệu form không hợp lệ?
  answer: OnValidSubmit không được gọi nếu dữ liệu sai. OnSubmit vẫn chạy đầy đủ bất kể hợp lệ hay không,
    phải tự gọi EditContext.Validate().
- id: forms-validation-q5
  node: forms-validation
  tier: fast
  prompt: Nếu gắn cả OnValidSubmit và OnSubmit cùng lúc trên một EditForm, chuyện gì xảy ra?
  answer: EditForm ném InvalidOperationException lúc render vì hai cơ chế xung đột.
- id: forms-validation-q6
  node: forms-validation
  tier: fast
  prompt: Object con (nested) trong model có cần attribute riêng trên property đó để được validate không?
  answer: Không cần — DataAnnotationsValidator tự đi sâu vào bên trong và kiểm tra attribute trên property
    con.
- id: forms-validation-q7
  node: forms-validation
  tier: fast
  prompt: Điều gì xảy ra nếu property object con không được khởi tạo (null) mà InputText lại bind vào
    field bên trong nó?
  answer: InputText cố đọc giá trị field bên trong object null, gây NullReferenceException ngay lúc render,
    trước khi người dùng nhập gì.
- id: state-management-q1
  node: state-management
  tier: fast
  prompt: Prop drilling là gì, và vì sao nó trở thành vấn đề khi cây component sâu?
  answer: Prop drilling là truyền dữ liệu qua nhiều cấp Parameter trung gian chỉ để chuyển tiếp. Mỗi component
    mới cần dữ liệu buộc phải sửa Parameter ở tất cả các cấp trung gian.
- id: state-management-q2
  node: state-management
  tier: fast
  prompt: CascadingValue giải quyết prop drilling như thế nào, khác gì so với [Parameter] thông thường?
  answer: CascadingValue chia sẻ một giá trị cho toàn bộ cây con — component con/cháu nào khai [CascadingParameter]
    cùng kiểu đều tự nhận được, không cần truyền tay qua từng cấp.
- id: state-management-q3
  node: state-management
  tier: fast
  prompt: Nếu một component khai [CascadingParameter] nhưng không nằm trong CascadingValue nào, điều gì
    xảy ra?
  answer: Không lỗi biên dịch. Lúc chạy, property giữ giá trị mặc định — lỗi runtime âm thầm.
- id: state-management-q4
  node: state-management
  tier: fast
  prompt: State container service là gì, và nó có gì mà CascadingValue không có?
  answer: Là một service C# đăng ký DI chứa state chung + event thông báo. Vì tiêm qua DI, nó không phụ
    thuộc vị trí trong cây component.
- id: state-management-q5
  node: state-management
  tier: fast
  prompt: Nếu một component subscribe vào OnChange của state container service nhưng không implement IDisposable,
    hậu quả cụ thể là gì?
  answer: 'Memory leak: mỗi lần component tạo lại, một đăng ký mới thêm vào OnChange không bị huỷ, service
    giữ tham chiếu tới các instance component cũ.'
- id: state-management-q6
  node: state-management
  tier: fast
  prompt: Vì sao dùng biến static chứa giỏ hàng chung là sai, trong khi AddScoped<CartState>() lại đúng?
  answer: Biến static chỉ có một bản cho toàn process, không phân biệt người dùng — dữ liệu nhiều người
    dùng sẽ lẫn vào nhau. AddScoped tạo instance riêng cho mỗi người dùng.
- id: state-management-q7
  node: state-management
  tier: fast
  prompt: Vì sao dùng CascadingValue cho dữ liệu đổi liên tục gây lãng phí hiệu năng?
  answer: Mỗi lần giá trị đổi, Blazor mặc định re-render toàn bộ cây con bên trong nó, kể cả component
    không đọc giá trị đó.
- id: state-management-q8
  node: state-management
  tier: fast
  prompt: Nếu state container service expose dữ liệu qua List<T> công khai thay vì qua method riêng, hậu
    quả khi component sửa trực tiếp là gì?
  answer: Dữ liệu vẫn thay đổi thật, nhưng OnChange không được gọi — component khác đang subscribe sẽ
    không biết để cập nhật UI.
- id: goi-api-tu-blazor-q1
  node: goi-api-tu-blazor
  tier: fast
  prompt: Vì sao code HttpClient trong Blazor WASM dùng lại đúng các API đã học ở backend, không có method
    mới nào?
  answer: HttpClient là một phần của .NET, không phụ thuộc việc code chạy server hay browser. Khác biệt
    duy nhất là bị chi phối bởi luật bảo mật của browser (CORS).
- id: goi-api-tu-blazor-q2
  node: goi-api-tu-blazor
  tier: fast
  prompt: CORS là luật của ai — .NET, backend, hay browser? Nó chặn điều gì cụ thể?
  answer: CORS là luật của browser. Nó chặn không cho JS/WASM đang chạy ở một origin đọc response từ request
    tới origin khác, trừ khi server trả header Access-Control-Allow-Origin cho phép.
- id: goi-api-tu-blazor-q3
  node: goi-api-tu-blazor
  tier: fast
  prompt: Nếu backend chưa cấu hình CORS, lỗi hiện ra ở đâu — exception .NET hay console browser?
  answer: Chỉ hiện trong console browser (F12), không xuất hiện trong exception .NET — dễ gây nhầm lẫn
    khi debug.
- id: goi-api-tu-blazor-q4
  node: goi-api-tu-blazor
  tier: fast
  prompt: Hai lỗi cấu hình AddCors/UseCors phổ biến nhất khiến CORS vẫn bị chặn?
  answer: (1) Quên gọi app.UseCors(...). (2) Gọi app.UseCors(...) sau khi đã map endpoint — thứ tự middleware
    sai.
- id: goi-api-tu-blazor-q5
  node: goi-api-tu-blazor
  tier: fast
  prompt: Nếu thiếu BaseAddress khi đăng ký HttpClient trong Blazor WASM, gọi API với đường dẫn tương
    đối lỗi gì?
  answer: 'Ném InvalidOperationException: BaseAddress must be set.'
- id: goi-api-tu-blazor-q6
  node: goi-api-tu-blazor
  tier: fast
  prompt: Vì sao đặt isLoading = false trong nhánh try (không dùng finally) là một lỗi?
  answer: Nếu lời gọi API ném exception, dòng isLoading = false không được thực thi vì luồng nhảy sang
    catch trước — isLoading giữ nguyên true vĩnh viễn.
- id: goi-api-tu-blazor-q7
  node: goi-api-tu-blazor
  tier: fast
  prompt: Vì sao gọi API trực tiếp trong một method được @foreach/@if trong markup gọi lại là sai?
  answer: Blazor render lại markup (gồm mọi method gọi trong đó) mỗi khi StateHasChanged() kích hoạt —
    method gọi API sẽ chạy lại mỗi lần đó, gửi request không kiểm soát.
- id: goi-api-tu-blazor-q8
  node: goi-api-tu-blazor
  tier: fast
  prompt: Nơi đúng để gọi API trong một component Blazor là gì?
  answer: Trong OnInitializedAsync() hoặc trong một event handler — kết quả lưu vào field, markup chỉ
    đọc field đó.
- id: goi-api-tu-blazor-q9
  node: goi-api-tu-blazor
  tier: fast
  prompt: Method TaiDuLieu() được gọi từ hai nơi khác nhau. Đó là hai nơi nào, và vì sao cả hai đều hợp
    lệ?
  answer: OnInitializedAsync() (gọi 1 lần lúc khởi tạo) và @onclick trên nút Tải lại (gọi khi người dùng
    bấm) — cả hai là lời gọi rời rạc, có chủ đích.
- id: goi-api-tu-blazor-q10
  node: goi-api-tu-blazor
  tier: fast
  prompt: Vì sao gõ vào ô tìm kiếm lại kích hoạt gọi API không liên quan tới tồn kho?
  answer: Vì method gọi API được gọi trực tiếp trong markup. Mỗi lần ô tìm kiếm đổi, Blazor re-render,
    và việc re-render chạy lại toàn bộ markup bao gồm method đó.
- id: blazor-authentication-q1
  node: blazor-authentication
  tier: fast
  prompt: Vì sao lưu JWT trong một biến C# thường không sống sót qua việc tải lại trang (F5) trong Blazor
    WebAssembly?
  answer: Vì Blazor WebAssembly chạy hoàn toàn qua WASM runtime — tải lại trang xoá toàn bộ chương trình
    .NET trong bộ nhớ. localStorage là bộ nhớ trình duyệt, tồn tại độc lập với vòng đời chương trình .NET.
- id: blazor-authentication-q2
  node: blazor-authentication
  tier: fast
  prompt: AuthenticationStateProvider là gì, và tại sao phải tự kế thừa nó?
  answer: Là lớp trừu tượng của Blazor đóng vai trò nguồn sự thật duy nhất cho 'ai đang đăng nhập'. Phải
    tự kế thừa vì lớp cha không biết cách tìm ra danh tính trong ứng dụng cụ thể của bạn.
- id: blazor-authentication-q3
  node: blazor-authentication
  tier: fast
  prompt: AuthenticationStateProvider phía Blazor WASM có kiểm chữ ký JWT không?
  answer: Không, vì trình duyệt không có secret key. Bảo vệ dữ liệu thật luôn phải nằm ở server qua AddJwtBearer/[Authorize]
    trên API.
- id: blazor-authentication-q4
  node: blazor-authentication
  tier: fast
  prompt: AuthorizeView khác [Authorize] trên @page như thế nào về phạm vi tác động?
  answer: AuthorizeView chỉ ẩn/hiện một phần UI. [Authorize] trên @page chặn hiển thị toàn bộ trang, cần
    AuthorizeRouteView trong App.razor.
- id: blazor-authentication-q5
  node: blazor-authentication
  tier: fast
  prompt: Vì sao [Authorize] trên component Blazor không bảo vệ được API mà trang đó gọi tới?
  answer: Vì code Blazor WASM chạy trong trình duyệt người dùng — họ có thể gọi thẳng API bằng công cụ
    khác. Nếu API backend không có [Authorize] riêng, request trực tiếp vẫn thành công.
- id: blazor-authentication-q6
  node: blazor-authentication
  tier: fast
  prompt: Đăng xuất gồm những bước nào và vì sao phải đúng thứ tự?
  answer: (1) xoá token khỏi localStorage, (2) gọi NotifyAuthenticationStateChanged. Phải xoá token trước,
    nếu đảo thứ tự sẽ đọc token còn tồn tại.
- id: blazor-authentication-q7
  node: blazor-authentication
  tier: fast
  prompt: Nếu quên gọi NotifyAuthenticationStateChanged sau khi đăng xuất, hậu quả runtime cụ thể là gì?
  answer: Không có exception. Token đã xoá thật nhưng AuthorizeView không được báo đổi — UI vẫn hiện như
    đã đăng nhập cho tới khi tải lại trang.
- id: blazor-authentication-q8
  node: blazor-authentication
  tier: fast
  prompt: Vì sao context.User.Identity?.Name có thể trả về null dù ClaimsIdentity đã được dựng đúng dữ
    liệu?
  answer: Vì Identity.Name đọc claim type chuẩn ClaimTypes.Name. Nếu claim dựng bằng tên tuỳ ý mà không
    map sang ClaimTypes.Name, Identity.Name trả null.
- id: blazor-authentication-q9
  node: blazor-authentication
  tier: fast
  prompt: localStorage có bảo vệ được JWT khỏi tấn công XSS không?
  answer: Không. Một script độc hại chèn vào trang đọc được toàn bộ localStorage, bao gồm JWT — hạn chế
    cố hữu.
- id: blazor-authentication-q10
  node: blazor-authentication
  tier: fast
  prompt: Vì sao cần kiểm claim exp ngay trong GetAuthenticationStateAsync(), dù server cũng đã kiểm?
  answer: Để UI phản ánh đúng trạng thái sớm hơn — không phải cơ chế bảo mật, server vẫn phải tự kiểm
    exp độc lập.
- id: blazor-authentication-q11
  node: blazor-authentication
  tier: fast
  prompt: Khi nào buộc phải tự tiêm AuthenticationStateProvider và gọi GetAuthenticationStateAsync() trong
    @code thay vì chỉ dùng AuthorizeView?
  answer: Khi cần logic C# tuỳ biến theo trạng thái đăng nhập không chỉ là ẩn/hiện UI — ví dụ chọn API
    để gọi trong OnInitializedAsync().
- id: blazor-authentication-q12
  node: blazor-authentication
  tier: fast
  prompt: Nếu ClaimsIdentity không khai roleClaimType, [Authorize(Roles = "admin")] có cho người dùng
    có claim role:admin vào không?
  answer: Sẽ chặn lại dù có đúng claim. ClaimsIdentity mặc định tìm vai trò theo ClaimTypes.Role — thiếu
    roleClaimType khiến IsInRole() luôn trả false.
- id: js-interop-lifecycle-sau-q1
  node: js-interop-lifecycle-sau
  tier: fast
  prompt: Vì sao Blazor cần JS Interop, dù đã là một framework C# đầy đủ?
  answer: Vì nhiều hành vi (focus, clipboard, localStorage, thư viện JS bên thứ ba) là hành vi trình duyệt
    thực thi bởi JavaScript — Blazor không thể bọc sẵn API cho mọi hành vi.
- id: js-interop-lifecycle-sau-q2
  node: js-interop-lifecycle-sau
  tier: fast
  prompt: InvokeVoidAsync và InvokeAsync<T> khác nhau ở điểm nào?
  answer: InvokeVoidAsync dùng khi hàm JS không cần trả về giá trị. InvokeAsync<T> dùng khi cần lấy kết
    quả trả về, chuyển thành kiểu T.
- id: js-interop-lifecycle-sau-q3
  node: js-interop-lifecycle-sau
  tier: fast
  prompt: '[JSInvokable] dùng để làm gì?'
  answer: Đánh dấu một method C# public để JavaScript gọi ngược lại qua DotNet.invokeMethodAsync, tên
    method phải khớp chính xác.
- id: js-interop-lifecycle-sau-q4
  node: js-interop-lifecycle-sau
  tier: fast
  prompt: OnAfterRenderAsync khác OnInitializedAsync ở điểm nào về thời điểm chạy so với DOM thật?
  answer: OnInitializedAsync chạy trước lần render đầu (DOM chưa tồn tại). OnAfterRenderAsync chạy sau
    khi đã vẽ xong HTML ra DOM thật.
- id: js-interop-lifecycle-sau-q5
  node: js-interop-lifecycle-sau
  tier: fast
  prompt: Tham số firstRender có giá trị gì ở lần gọi đầu và các lần sau?
  answer: true chỉ ở lần gọi đầu tiên, false ở mọi lần sau — cần kiểm tra khi logic chỉ nên chạy một lần.
- id: js-interop-lifecycle-sau-q6
  node: js-interop-lifecycle-sau
  tier: fast
  prompt: Nếu một component tạo Timer nhưng không implement IDisposable, hậu quả cụ thể là gì?
  answer: Timer tiếp tục chạy độc lập với vòng đời component dù đã gỡ khỏi cây UI — rò rỉ bộ nhớ tăng
    dần.
- id: js-interop-lifecycle-sau-q7
  node: js-interop-lifecycle-sau
  tier: fast
  prompt: '@key giải quyết vấn đề gì khi render danh sách, và dùng index làm @key có giải quyết được không?'
  answer: '@key giúp Blazor so khớp phần tử theo danh tính ổn định, tránh gán nhầm trạng thái khi danh
    sách sắp xếp lại. Dùng index không giải quyết được vì vẫn đổi theo vị trí.'
- id: js-interop-lifecycle-sau-q8
  node: js-interop-lifecycle-sau
  tier: fast
  prompt: ElementReference giải quyết vấn đề gì mà document.getElementById với id cố định không giải quyết
    được?
  answer: Khi component dùng nhiều lần trên một trang, id cố định bị trùng. ElementReference (qua @ref)
    luôn tham chiếu đúng phần tử DOM của chính instance đó.
- id: blazor-performance-deploy-q1
  node: blazor-performance-deploy
  tier: fast
  prompt: Vì sao Blazor WebAssembly tải lần đầu chậm hơn một trang HTML/JS thường?
  answer: Vì trước khi chạy được code C#, trình duyệt phải tải thêm runtime .NET biên dịch sang WebAssembly
    và các assembly .dll — trang JS thường chỉ cần tải và chạy ngay.
- id: blazor-performance-deploy-q2
  node: blazor-performance-deploy
  tier: fast
  prompt: AOT compilation đánh đổi cái gì để lấy cái gì?
  answer: Đánh đổi kích thước file tải xuống lớn hơn để lấy tốc độ thực thi nhanh hơn (biên dịch sẵn thành
    native WASM, không cần diễn giải IL lúc runtime).
- id: blazor-performance-deploy-q3
  node: blazor-performance-deploy
  tier: fast
  prompt: ShouldRender() dùng để làm gì, và trả về false có nghĩa là gì?
  answer: Quyết định component có cần render lại hay không. Trả về false khiến Blazor bỏ qua hoàn toàn
    lần render đó.
- id: blazor-performance-deploy-q4
  node: blazor-performance-deploy
  tier: fast
  prompt: Vì sao viết lambda trực tiếp trong markup trong một @foreach có thể gây re-render dư thừa?
  answer: Mỗi lần cha render lại, lambda được tạo ra một delegate instance mới — component con nhận qua
    [Parameter] thấy giá trị đổi (tham chiếu khác) và bị buộc render lại.
- id: blazor-performance-deploy-q5
  node: blazor-performance-deploy
  tier: fast
  prompt: dotnet publish -c Release cho Blazor WebAssembly sinh ra loại nội dung gì, có cần process nào
    chạy để phục vụ không?
  answer: Sinh ra thư mục wwwroot chỉ chứa file static — không cần process ASP.NET Core nào chạy phía
    sau.
- id: blazor-performance-deploy-q6
  node: blazor-performance-deploy
  tier: fast
  prompt: Vì sao có thể deploy Blazor WebAssembly lên GitHub Pages, nhưng không thể deploy Blazor Server?
  answer: Blazor WASM sau publish chỉ là file static, phù hợp GitHub Pages. Blazor Server cần một process
    ASP.NET Core chạy liên tục giữ kết nối SignalR — GitHub Pages không hỗ trợ.
- id: blazor-performance-deploy-q7
  node: blazor-performance-deploy
  tier: fast
  prompt: Deploy Blazor WASM lên GitHub Pages gặp trang trắng, file _framework/*.wasm báo 404 — nguyên
    nhân phổ biến nhất?
  answer: Quên sửa <base href="/" /> thành đường dẫn con đúng tên repository, vì GitHub Pages phục vụ
    tại /ten-repo/, không phải gốc domain.
- id: blazor-performance-deploy-q8
  node: blazor-performance-deploy
  tier: fast
  prompt: Health check endpoint có áp dụng trực tiếp cho một ứng dụng Blazor WebAssembly thuần không?
  answer: Không, vì nó không có process server chạy phía sau. Chỉ liên quan nếu ứng dụng gọi tới một Web
    API backend riêng.
- id: caching-q1
  node: caching
  tier: fast
  prompt: IMemoryCache lưu dữ liệu ở đâu, và điều gì xảy ra với cache đó khi ứng dụng restart?
  answer: Lưu trong RAM của chính tiến trình .NET đang chạy. Khi tiến trình restart, toàn bộ cache biến
    mất hoàn toàn — không có cách khôi phục.
- id: caching-q2
  node: caching
  tier: fast
  prompt: Vì sao chạy 2 instance ứng dụng load-balance mà cả hai đều dùng IMemoryCache lại có thể dẫn
    tới hai người dùng thấy hai kết quả khác nhau?
  answer: Mỗi instance có một vùng IMemoryCache tách biệt trong RAM riêng. Nếu instance A cập nhật/xoá
    cache, instance B không biết và vẫn giữ giá trị cũ — hai instance trả về hai kết quả khác nhau.
- id: caching-q3
  node: caching
  tier: fast
  prompt: IDistributedCache giải quyết đúng vấn đề gì mà IMemoryCache không giải quyết được?
  answer: IDistributedCache lưu dữ liệu ở một server riêng, tách khỏi tiến trình — mọi instance đọc/ghi
    cùng một nơi lưu trữ, nên khi một instance cập nhật/xoá, mọi instance khác thấy thay đổi ngay.
- id: caching-q4
  node: caching
  tier: fast
  prompt: Trong cache-aside pattern, thứ tự đúng của các bước khi cache miss là gì?
  answer: (1) Đọc cache, phát hiện miss. (2) Truy vấn database. (3) Ghi dữ liệu vào cache (kèm TTL). (4)
    Trả dữ liệu về client. Ứng dụng chịu trách nhiệm điều phối toàn bộ luồng này.
- id: caching-q5
  node: caching
  tier: fast
  prompt: Cache invalidation là gì, và vì sao nó được xem là một vấn đề khó?
  answer: Là việc chủ động xoá/cập nhật entry cache khi dữ liệu gốc đổi. Khó vì xoá quá sớm mất lợi ích
    hiệu năng, xoá quá muộn làm người dùng thấy dữ liệu sai — mức nghiêm trọng phụ thuộc loại dữ liệu.
- id: caching-q6
  node: caching
  tier: fast
  prompt: Nếu quên gọi Remove/RemoveAsync sau khi cập nhật database, người dùng sẽ thấy hậu quả gì, và
    trong bao lâu?
  answer: Tiếp tục thấy dữ liệu cũ (stale) từ cache, cho tới khi entry tự hết hạn theo TTL đã đặt.
- id: caching-q7
  node: caching
  tier: fast
  prompt: IDistributedCache.SetStringAsync khác IMemoryCache.Set như thế nào về kiểu dữ liệu chấp nhận?
  answer: IMemoryCache.Set chấp nhận trực tiếp bất kỳ object C# nào. IDistributedCache chỉ làm việc với
    string hoặc byte[] — muốn lưu object phải tự serialize/deserialize.
- id: caching-q8
  node: caching
  tier: fast
  prompt: Vì sao đặt TTL quá dài cho dữ liệu về quyền truy cập của người dùng có thể là một lỗ hổng bảo
    mật?
  answer: Nếu quyền bị thu hồi trong database nhưng cache còn giữ thông tin cũ, người dùng vẫn có thể
    thực hiện hành động với quyền đã gỡ trong suốt thời gian TTL còn lại — đây là truy cập trái phép thực
    sự.
- id: rate-limiting-q1
  node: rate-limiting
  tier: fast
  prompt: Rate limiting giải quyết vấn đề gốc nào, với ví dụ cụ thể?
  answer: Ngăn một client gọi API quá nhiều lần gây quá tải server hoặc lạm dụng logic nghiệp vụ — ví
    dụ brute-force dò mật khẩu ở endpoint đăng nhập.
- id: rate-limiting-q2
  node: rate-limiting
  tier: fast
  prompt: Phải gọi thêm phương thức nào ngoài AddRateLimiter để middleware thực sự hoạt động, và điều
    gì xảy ra nếu quên?
  answer: Phải gọi app.UseRateLimiter(). Nếu quên, các policy đã đăng ký không có hiệu lực — mọi request
    đều lọt qua, không có exception nào báo.
- id: rate-limiting-q3
  node: rate-limiting
  tier: fast
  prompt: Fixed Window và Sliding Window khác nhau ở điểm nào?
  answer: Fixed Window reset bộ đếm về 0 mỗi khung mới, cho phép gấp đôi giới hạn quanh ranh giới hai
    khung. Sliding Window chia khung thành segment nhỏ và tính tổng có trọng số, phản ánh đúng số request
    trong bất kỳ khoảng thời gian liên tục.
- id: rate-limiting-q4
  node: rate-limiting
  tier: fast
  prompt: Token Bucket khác Fixed/Sliding Window ở điểm cốt lõi nào?
  answer: Token Bucket cho phép tích trữ token khi không gọi, rồi xả hết thành một loạt request dồn (burst).
    Fixed/Sliding Window giới hạn cứng tổng số request trong mỗi khung, không cho tích trữ.
- id: rate-limiting-q5
  node: rate-limiting
  tier: fast
  prompt: Concurrency Limiter khác biệt về bản chất thế nào so với ba thuật toán còn lại?
  answer: Ba thuật toán khác đếm request theo THỜI GIAN. Concurrency Limiter giới hạn số request ĐANG
    xử lý đồng thời — một request chạy lâu chỉ chiếm một slot suốt thời gian chạy.
- id: rate-limiting-q6
  node: rate-limiting
  tier: fast
  prompt: Status code 429 nghĩa là gì, và header Retry-After dùng để làm gì?
  answer: 429 báo request bị từ chối vì vượt giới hạn tốc độ. Retry-After cho client biết nên chờ bao
    nhiêu giây trước khi gọi lại.
- id: rate-limiting-q7
  node: rate-limiting
  tier: fast
  prompt: Vì sao endpoint /login phải giới hạn theo IP chứ không thể giới hạn theo user-id?
  answer: Tại thời điểm gọi /login, hệ thống chưa xác thực được người gọi là ai — chưa có user-id đáng
    tin cậy để dùng làm khoá phân vùng.
- id: rate-limiting-q8
  node: rate-limiting
  tier: fast
  prompt: Nhược điểm của giới hạn theo IP là gì?
  answer: Nhiều người dùng hợp lệ có thể đứng sau cùng một IP công cộng (NAT chung), khiến họ chia sẻ
    chung một bộ đếm — một người gọi nhiều có thể khiến người khác cùng IP bị chặn oan.
- id: rate-limiting-q9
  node: rate-limiting
  tier: fast
  prompt: Một endpoint cần vừa giới hạn tổng số lần gọi/ngày, vừa giới hạn số request chạy song song.
    Có thể dùng một thuật toán duy nhất không?
  answer: Không. Bốn thuật toán trả lời hai loại câu hỏi khác nhau (theo thời gian vs theo đồng thời).
    Cần kết hợp Fixed Window cho giới hạn theo ngày và Concurrency Limiter cho giới hạn đồng thời.
- id: rate-limiting-q10
  node: rate-limiting
  tier: fast
  prompt: Ví dụ kết hợp Fixed Window và Concurrency Limiter trên cùng một endpoint hoạt động thế nào?
  answer: Cả hai policy hoạt động độc lập và cộng dồn — một request phải vượt qua cả hai để được xử lý;
    vượt quá giới hạn của bất kỳ bên nào, request bị từ chối.
- id: rate-limiting-q11
  node: rate-limiting
  tier: fast
  prompt: Trả 403 Forbidden khi client vượt giới hạn tốc độ có đúng ngữ nghĩa HTTP không?
  answer: Không đúng. 403 nghĩa là bị từ chối vĩnh viễn vì không có quyền, còn 429 nghĩa là request hợp
    lệ nhưng đến quá sớm — có thể thử lại thành công sau khi chờ.
- id: health-checks-observability-q1
  node: health-checks-observability
  tier: fast
  prompt: Liveness check thất bại thì hành động đúng là gì, và vì sao không phải là rút traffic?
  answer: Restart instance. Liveness kiểm tra process còn sống không — nếu thất bại, process đã treo/deadlock,
    không có cách hồi phục ngoài restart. Rút traffic là vai trò của Readiness.
- id: health-checks-observability-q2
  node: health-checks-observability
  tier: fast
  prompt: Vì sao endpoint /health/live không nên kiểm tra kết nối database?
  answer: Vì nếu database lỗi tạm thời, Liveness trả Unhealthy khiến orchestrator hiểu nhầm process bị
    treo và restart, trong khi process vẫn khỏe — chỉ cần rút traffic (Readiness) là đủ.
- id: health-checks-observability-q3
  node: health-checks-observability
  tier: fast
  prompt: AddNpgSql(...) dùng để làm gì trong health check?
  answer: Tự động mở kết nối thử tới PostgreSQL và trả Unhealthy nếu thất bại/timeout — dùng cho Readiness
    check.
- id: health-checks-observability-q4
  node: health-checks-observability
  tier: fast
  prompt: Ai gọi endpoint /health trong vận hành thật?
  answer: Hạ tầng vận hành (load balancer, orchestrator, hệ thống giám sát) — gọi tự động định kỳ để quyết
    định route traffic hoặc restart instance.
- id: health-checks-observability-q5
  node: health-checks-observability
  tier: fast
  prompt: Metrics khác Logs ở điểm nào?
  answer: Logs ghi từng sự kiện rời rạc tại một thời điểm. Metrics là số liệu tích lũy theo thời gian,
    cho biết hệ thống vận hành ở mức nào theo xu hướng.
- id: health-checks-observability-q6
  node: health-checks-observability
  tier: fast
  prompt: Traces giải quyết vấn đề gì mà Logs và Metrics không giải quyết được?
  answer: Theo dõi một request cụ thể đi qua nhiều service, gắn cùng trace ID xuyên suốt, để thấy request
    tốn bao lâu ở mỗi tầng.
- id: health-checks-observability-q7
  node: health-checks-observability
  tier: fast
  prompt: OpenTelemetry là một sản phẩm giám sát cụ thể của một hãng, đúng hay sai?
  answer: Sai. OpenTelemetry là một chuẩn mở định nghĩa cách thu thập/định dạng dữ liệu cho Logs, Metrics,
    Traces — vẫn cần chọn một backend riêng để lưu trữ/hiển thị.
- id: health-checks-observability-q8
  node: health-checks-observability
  tier: fast
  prompt: Một endpoint có 3 check Healthy, Healthy, Unhealthy. Trạng thái tổng hợp là gì?
  answer: Unhealthy — theo quy tắc mức độ tệ nhất thắng, chỉ cần một check Unhealthy là toàn bộ endpoint
    trả Unhealthy.
- id: background-jobs-q1
  node: background-jobs
  tier: fast
  prompt: Vì sao gửi email đồng bộ ngay trong request /register là một thiết kế có vấn đề?
  answer: Việc gửi email không cần hoàn tất ngay để client biết kết quả — chặn request để chờ khiến client
    chờ lâu không cần thiết, và có thể gây timeout dù tài khoản đã tạo thành công.
- id: background-jobs-q2
  node: background-jobs
  tier: fast
  prompt: IHostedService có hai phương thức nào, và ai gọi chúng?
  answer: StartAsync và StopAsync. Host của .NET tự động gọi hai phương thức này lúc app khởi động và
    tắt — không phải tự gọi.
- id: background-jobs-q3
  node: background-jobs
  tier: fast
  prompt: Vì sao hầu như không ai tự implement IHostedService trực tiếp mà dùng BackgroundService?
  answer: StartAsync phải trả về nhanh; tự viết vòng lặp vô hạn trực tiếp trong StartAsync sẽ khiến app
    treo lúc khởi động. BackgroundService đã xử lý đúng việc chạy ExecuteAsync trong Task riêng.
- id: background-jobs-q4
  node: background-jobs
  tier: fast
  prompt: Điều gì xảy ra nếu vòng lặp trong ExecuteAsync không kiểm tra stoppingToken.IsCancellationRequested?
  answer: App không tắt đúng hạn lúc shutdown — vòng lặp tiếp tục chạy, host phải đợi hết thời gian ân
    hạn rồi buộc kill tiến trình.
- id: background-jobs-q5
  node: background-jobs
  tier: fast
  prompt: Đăng ký một BackgroundService bằng AddSingleton<T>() thay vì AddHostedService<T>() có chạy được
    không?
  answer: Biên dịch và chạy được, nhưng vòng lặp nền không bao giờ tự chạy vì không có gì gọi StartAsync/ExecuteAsync
    — lỗi âm thầm, không có exception.
- id: background-jobs-q6
  node: background-jobs
  tier: fast
  prompt: Channel<T> khác message queue thực sự ở điểm quan trọng nào?
  answer: Channel<T> chỉ hoạt động trong-tiến-trình — dữ liệu mất khi app restart, không chia sẻ được
    giữa nhiều instance. Message queue thực sự lưu bền và hoạt động qua mạng.
- id: background-jobs-q7
  node: background-jobs
  tier: fast
  prompt: Khi nào dùng Channel<T> là phù hợp, khi nào nên dùng message queue thực sự?
  answer: Channel<T> phù hợp cho việc nền chấp nhận mất khi restart, trong một service. Message queue
    thực sự cần khi nghiệp vụ quan trọng không được mất, hoặc cần chia sẻ giữa nhiều instance.
- id: background-jobs-q8
  node: background-jobs
  tier: fast
  prompt: Nếu ExecuteAsync ném một exception không được bắt, hành vi mặc định của .NET là gì?
  answer: Từ .NET 6, mặc định host dừng toàn bộ ứng dụng, không chỉ worker gây lỗi.
- id: background-jobs-q9
  node: background-jobs
  tier: fast
  prompt: Vì sao cần bắt OperationCanceledException riêng thay vì để chung vào catch (Exception ex)?
  answer: OperationCanceledException là tín hiệu shutdown hợp lệ, không phải lỗi nghiệp vụ. Bắt chung
    sẽ hiểu nhầm thành lỗi, log sai và trì hoãn worker kết thúc đúng hạn.
- id: background-jobs-q10
  node: background-jobs
  tier: fast
  prompt: Vì sao một BackgroundService không thể tiêm trực tiếp một DbContext (Scoped) qua constructor?
  answer: 'BackgroundService có lifetime tương đương Singleton, DbContext là Scoped — tiêm Scoped vào
    Singleton bị chặn. Cách đúng: tiêm IServiceScopeFactory rồi tự tạo scope khi cần.'
- id: api-versioning-q1
  node: api-versioning
  tier: fast
  prompt: Vì sao đổi trực tiếp một endpoint đang có client thật dùng có thể làm crash ứng dụng client?
  answer: Client cũ đã viết code cố định dựa trên hình dạng response cũ; đổi trực tiếp khiến code đó đọc
    sai dữ liệu, có thể crash ngay khi gọi lại.
- id: api-versioning-q2
  node: api-versioning
  tier: fast
  prompt: Nêu định nghĩa một câu của URL Path Versioning, kèm ví dụ URL.
  answer: Đưa số version vào đường dẫn, ví dụ /v1/products và /v2/products là hai đường dẫn khác nhau.
- id: api-versioning-q3
  node: api-versioning
  tier: fast
  prompt: Nêu định nghĩa một câu của Query String Versioning, kèm ví dụ URL.
  answer: Chỉ định version qua tham số trong URL, ví dụ /products?api-version=2, giữ nguyên đường dẫn
    gốc.
- id: api-versioning-q4
  node: api-versioning
  tier: fast
  prompt: Nêu định nghĩa một câu của Header Versioning, kèm ví dụ.
  answer: 'Chỉ định version qua một HTTP header riêng, ví dụ X-Api-Version: 2, URL không đổi.'
- id: api-versioning-q5
  node: api-versioning
  tier: fast
  prompt: Thêm một field mới optional vào response có phải breaking change không?
  answer: Không — client cũ không đọc field này, không bị ảnh hưởng gì; các field cũ vẫn đọc đúng.
- id: api-versioning-q6
  node: api-versioning
  tier: fast
  prompt: Đổi kiểu dữ liệu của một field đã tồn tại có phải breaking change không?
  answer: Có — client cũ code cứng kiểu dữ liệu cũ sẽ lỗi parse hoặc đọc sai khi nhận kiểu mới, dù tên
    field vẫn giữ nguyên.
- id: api-versioning-q7
  node: api-versioning
  tier: fast
  prompt: Gói Asp.Versioning.Http giải quyết vấn đề gì so với tự viết if/else đọc version bằng tay?
  answer: Tự động đọc version và định tuyến tới đúng handler, tự trả lỗi rõ ràng khi version không tồn
    tại — thay vì if/else lặp lại ở mọi endpoint.
- id: api-versioning-q8
  node: api-versioning
  tier: fast
  prompt: Vì sao xoá version cũ ngay trong lần deploy version mới (không qua deprecate) có thể gây lỗi
    client?
  answer: Một số client chưa cập nhật sang version mới vẫn đang gọi version cũ; xoá ngay khiến họ nhận
    404 ngay lập tức, không có thời gian chuẩn bị.
- id: resilience-patterns-q1
  node: resilience-patterns
  tier: fast
  prompt: Vì sao retry không có backoff lại nguy hiểm dưới tải cao, và tên gọi của hiện tượng này là gì?
  answer: Gây thundering herd — số lần gọi thực tế tăng gấp nhiều lần đúng lúc dịch vụ đích yếu nhất,
    có thể khiến sự cố nhỏ trở thành sập hoàn toàn.
- id: resilience-patterns-q2
  node: resilience-patterns
  tier: fast
  prompt: Circuit Breaker có bao nhiêu trạng thái, kể tên và mô tả ngắn.
  answer: 'Ba trạng thái: Closed (bình thường), Open (chặn hoàn toàn, trả lỗi ngay), Half-Open (cho thử
    một số request để kiểm tra hồi phục).'
- id: resilience-patterns-q3
  node: resilience-patterns
  tier: fast
  prompt: Trong trạng thái Open, exception nào được ném ra, và nó có nghĩa dịch vụ đích đã nhận request
    không?
  answer: BrokenCircuitException. Không có nghĩa dịch vụ đích nhận được — nó ném ra ngay tại tầng client
    bởi Polly, request chưa từng được gửi ra mạng.
- id: resilience-patterns-q4
  node: resilience-patterns
  tier: fast
  prompt: Polly Timeout khác HttpClient.Timeout như thế nào?
  answer: HttpClient.Timeout chỉ giới hạn một request đơn lẻ. Polly Timeout có thể bọc quanh bất kỳ logic
    nào, bao gồm cả toàn bộ chuỗi retry.
- id: resilience-patterns-q5
  node: resilience-patterns
  tier: fast
  prompt: Khi kết hợp Retry + Circuit Breaker + Timeout, thứ tự thêm policy nào là đúng?
  answer: Timeout tổng → Circuit Breaker → Retry. Policy thêm trước nằm ở ngoài, chạy trước và kết thúc
    sau.
- id: resilience-patterns-q6
  node: resilience-patterns
  tier: fast
  prompt: Vì sao Circuit Breaker cần nằm ngoài Retry trong pipeline kết hợp?
  answer: Để Circuit Breaker nhìn thấy toàn bộ các lần thử retry khi tính tỷ lệ lỗi, và có thể chặn cả
    chuỗi retry ngay từ đầu khi mạch đang Open.
- id: resilience-patterns-q7
  node: resilience-patterns
  tier: fast
  prompt: MinimumThroughput trong circuit breaker dùng để làm gì?
  answer: Là số request tối thiểu cần có trong cửa sổ thời gian trước khi tính tỷ lệ lỗi. Đặt quá thấp
    gây false positive — vài lỗi ngẫu nhiên đã đủ mở mạch.
- id: resilience-patterns-q8
  node: resilience-patterns
  tier: fast
  prompt: Nếu chỉ catch (TaskCanceledException) nhưng dùng Polly Timeout bọc ngoài retry, điều gì xảy
    ra khi Polly Timeout hết hạn?
  answer: Polly Timeout ném TimeoutRejectedException, không phải TaskCanceledException — sẽ không được
    bắt và lọt ra ngoài thành lỗi chưa xử lý.
- id: security-headers-cors-q1
  node: security-headers-cors
  tier: fast
  prompt: CORS được thực thi bởi server hay trình duyệt?
  answer: Trình duyệt. Server chỉ trả về header CORS; trình duyệt đọc header đó và quyết định có cho JavaScript
    đọc response hay không.
- id: security-headers-cors-q2
  node: security-headers-cors
  tier: fast
  prompt: http://localhost:3000 và http://localhost:5000 có cùng origin không?
  answer: Không — khác port. Origin gồm scheme+domain+port; chỉ cần một khác là origin khác.
- id: security-headers-cors-q3
  node: security-headers-cors
  tier: fast
  prompt: Điều gì xảy ra nếu quên gọi app.UseCors sau khi đã AddCors?
  answer: Middleware CORS không được thêm vào pipeline — mọi request vẫn bị chặn CORS như chưa cấu hình
    gì, không có exception nào báo.
- id: security-headers-cors-q4
  node: security-headers-cors
  tier: fast
  prompt: Vì sao AllowAnyOrigin() và AllowCredentials() không thể dùng cùng lúc?
  answer: Vì nếu cho phép, bất kỳ trang độc hại nào cũng có thể mượn cookie của người dùng để gọi API
    — giới hạn bảo mật cố ý của chuẩn web.
- id: security-headers-cors-q5
  node: security-headers-cors
  tier: fast
  prompt: 'X-Content-Type-Options: nosniff giải quyết rủi ro gì?'
  answer: Chặn trình duyệt tự đoán sai loại file, ngăn một file trông giống ảnh nhưng chứa script độc
    hại bị thực thi như HTML.
- id: security-headers-cors-q6
  node: security-headers-cors
  tier: fast
  prompt: HSTS bảo vệ người dùng khỏi kiểu tấn công gì?
  answer: Tấn công downgrade — kẻ tấn công ép trình duyệt dùng http:// không mã hoá. HSTS báo trình duyệt
    luôn tự động dùng https://.
- id: security-headers-cors-q7
  node: security-headers-cors
  tier: fast
  prompt: Một API không xác thực nhưng CORS rất chặt có an toàn trước việc gọi trực tiếp bằng curl không?
  answer: Không. CORS chỉ kiểm soát trình duyệt — không ngăn được gọi trực tiếp bằng công cụ không phải
    trình duyệt.
- id: security-headers-cors-q8
  node: security-headers-cors
  tier: fast
  prompt: Vì sao không nên bật app.UseHsts() khi phát triển trên localhost bằng http://?
  answer: HSTS khiến trình duyệt ép https:// cho domain đó — bật trên localhost http:// có thể khiến trình
    duyệt từ chối kết nối http://localhost ở lần chạy sau.
- id: security-headers-cors-q9
  node: security-headers-cors
  tier: fast
  prompt: Hai nhóm endpoint cần chính sách CORS mâu thuẫn nhau. Giải pháp đúng là gì?
  answer: Định nghĩa hai policy riêng, gán từng policy cho đúng nhóm endpoint bằng .RequireCors() hoặc
    [EnableCors()].
- id: security-headers-cors-q10
  node: security-headers-cors
  tier: fast
  prompt: Content-Security-Policy bảo vệ đúng nguyên nhân gốc của XSS hay chỉ là lớp phòng thủ bổ sung?
  answer: Chỉ là lớp phòng thủ bổ sung — CSP chặn thực thi script từ nguồn không cho phép, nhưng không
    sửa nguyên nhân gốc là dữ liệu chưa được lọc/encode đúng.
- id: cicd-github-actions-q1
  node: cicd-github-actions
  tier: fast
  prompt: CI trả lời câu hỏi gì, CD trả lời câu hỏi gì?
  answer: CI trả lời code này có build/test đúng không — chạy mỗi lần push hoặc mở pull request. CD trả
    lời code đã xác nhận đúng có nên đưa lên chạy thật không — chỉ chạy sau khi CI đã báo xanh.
- id: cicd-github-actions-q2
  node: cicd-github-actions
  tier: fast
  prompt: Trong file .github/workflows/ci.yml của Learning Hub, trigger nào khiến CI tự chạy khi có người
    mở pull request đề xuất merge vào main?
  answer: 'pull_request: { branches: [main] }. Trigger này kích hoạt workflow mỗi khi có pull request
    mở hoặc cập nhật, nhắm merge vào nhánh main.'
- id: cicd-github-actions-q3
  node: cicd-github-actions
  tier: fast
  prompt: Job gates và job dotnet chạy trên cùng một máy ảo hay hai máy ảo khác nhau? Vì sao điều này
    quan trọng?
  answer: Hai máy ảo khác nhau — mỗi job chạy trên máy ảo riêng, không chia sẻ state. Đây là lý do job
    dotnet phải tự pip install lại từ đầu dù job gates đã cài rồi.
- id: cicd-github-actions-q4
  node: cicd-github-actions
  tier: fast
  prompt: 'needs: [gates, dotnet] trong job deploy nghĩa là gì?'
  answer: Job deploy chỉ bắt đầu chạy khi cả gates và dotnet đều đã chạy xong và thành công. Nếu một trong
    hai fail, deploy bị bỏ qua hoàn toàn.
- id: cicd-github-actions-q5
  node: cicd-github-actions
  tier: fast
  prompt: 'Nếu xoá needs: [gates, dotnet] khỏi job deploy, điều gì thay đổi về thứ tự chạy?'
  answer: Ba job sẽ chạy song song ngay từ đầu — deploy có thể đẩy site lên thật trong khi gates/dotnet
    vẫn đang chạy hoặc đã fail.
- id: cicd-github-actions-q6
  node: cicd-github-actions
  tier: fast
  prompt: 'permissions: { contents: write } trong job deploy dùng để làm gì?'
  answer: Cấp quyền ghi vào nội dung repo, cần thiết vì mkdocs gh-deploy --force tạo/ghi đè nhánh gh-pages
    rồi push lên repo. Job gates/dotnet chỉ đọc, không cần quyền này.
- id: cicd-github-actions-q7
  node: cicd-github-actions
  tier: fast
  prompt: Một dự án có CI tự động nhưng deploy vẫn do kỹ sư tự tay làm sau khi xem CI xanh. Dự án này
    có CD không?
  answer: Không có CD theo đúng định nghĩa — CD nghĩa là việc đưa code lên chạy thật cũng được tự động
    hoá, không phải chỉ CI tự động còn deploy vẫn thao tác tay.
- id: cloud-fundamentals-q1
  node: cloud-fundamentals
  tier: fast
  prompt: On-premise khác IaaS ở điểm nào — cụ thể là ai sở hữu và bảo trì phần cứng vật lý?
  answer: 'On-premise: tổ chức tự mua và bảo trì phần cứng. IaaS: nhà cung cấp cloud sở hữu và bảo trì
    phần cứng, tổ chức chỉ thuê máy chủ ảo, trả tiền theo thời gian dùng.'
- id: cloud-fundamentals-q2
  node: cloud-fundamentals
  tier: fast
  prompt: Vì sao nói PaaS ẩn tầng hệ điều hành, còn IaaS thì không?
  answer: Với IaaS, người dùng nhận máy chủ ảo trống, phải tự cài OS và vá lỗi bảo mật. Với PaaS, nhà
    cung cấp đã cài sẵn và tự quản lý OS/runtime — người dùng chỉ deploy code.
- id: cloud-fundamentals-q3
  node: cloud-fundamentals
  tier: fast
  prompt: Một tổ chức dùng CRM online qua trình duyệt, không viết code. Đây là mô hình nào?
  answer: SaaS. Tổ chức không tự quản lý tầng nào về hạ tầng hay code — chỉ sử dụng phần mềm hoàn chỉnh
    do nhà cung cấp xây dựng và vận hành.
- id: cloud-fundamentals-q4
  node: cloud-fundamentals
  tier: fast
  prompt: Scale up và scale out khác nhau ở điểm cơ bản nào?
  answer: Scale up nâng cấp MỘT máy hiện có lên mạnh hơn, số lượng máy không đổi. Scale out thêm NHIỀU
    máy chạy song song, phân phối tải qua load balancer.
- id: cloud-fundamentals-q5
  node: cloud-fundamentals
  tier: fast
  prompt: Vì sao scale up vẫn giữ nguyên một điểm lỗi duy nhất, còn scale out thì không?
  answer: Scale up chỉ nâng cấp một máy — hệ thống vẫn phụ thuộc đúng máy đó, nếu nó gặp sự cố thì toàn
    bộ ngừng hoạt động. Scale out phân tán tải ra nhiều máy độc lập.
- id: cloud-fundamentals-q6
  node: cloud-fundamentals
  tier: fast
  prompt: Vì sao công ty on-premise khó phản ứng kịp với tải tăng vọt (Black Friday), còn công ty dùng
    IaaS có thể phản ứng trong vài phút?
  answer: On-premise cần mua phần cứng vật lý mới — quy trình mất nhiều tuần. IaaS chỉ cần thuê thêm máy
    chủ ảo qua API, không có bước lắp đặt vật lý.
- id: cloud-fundamentals-q7
  node: cloud-fundamentals
  tier: fast
  prompt: Một đội nhỏ không có kỹ năng quản trị OS chuyên sâu, cần deploy nhanh ASP.NET Core. Giữa IaaS
    và PaaS, lựa chọn nào phù hợp hơn?
  answer: PaaS phù hợp hơn — đã cài sẵn và tự quản lý OS/runtime, đội chỉ cần build và deploy code, không
    cần kỹ năng quản trị hệ điều hành.
- id: container-orchestration-q1
  node: container-orchestration
  tier: fast
  prompt: Vì sao chạy vài chục container thủ công bằng docker run không mở rộng được, cụ thể là ba việc
    nào trở nên bất khả thi?
  answer: 'Ba việc: (1) tự phát hiện và khởi động lại container chết mà không cần người canh, (2) tự phân
    phối tải đều cho nhiều container, (3) tự điều chỉnh số lượng container theo nhu cầu — vượt quá khả
    năng thao tác tay ở quy mô lớn.'
- id: container-orchestration-q2
  node: container-orchestration
  tier: fast
  prompt: Kubernetes khác gì so với chỉ dùng docker-compose khi hệ thống chạy trên nhiều máy chủ?
  answer: docker-compose chỉ quản lý container trên một máy chủ duy nhất; nó không tự khởi động lại container
    trên máy khác nếu cả máy đó chết, và không tự phân phối container qua nhiều máy như Kubernetes.
- id: container-orchestration-q3
  node: container-orchestration
  tier: fast
  prompt: Pod là gì, và vì sao Kubernetes không quản lý container trực tiếp mà luôn quản lý qua Pod?
  answer: Pod là đơn vị nhỏ nhất Kubernetes tạo ra và lập lịch, chứa 1+ container chia sẻ network/storage.
    Kubernetes quản lý qua Pod vì đây là đơn vị nó đặt lên một máy chủ trong cluster.
- id: container-orchestration-q4
  node: container-orchestration
  tier: fast
  prompt: 'Nếu khai replicas: 3 trong một Deployment và 1 Pod bị crash, điều gì xảy ra tiếp theo, và Pod
    mới có giữ nguyên IP của Pod cũ không?'
  answer: Deployment phát hiện số Pod thực tế thấp hơn mong muốn và tự tạo Pod mới thay thế. Pod mới không
    giữ nguyên tên hay IP của Pod cũ.
- id: container-orchestration-q5
  node: container-orchestration
  tier: fast
  prompt: Vì sao client không nên gọi thẳng vào IP của một Pod cụ thể? Service giải quyết vấn đề đó bằng
    cách nào?
  answer: Vì IP của Pod không ổn định — Pod có thể bị thay thế bất cứ lúc nào. Service cấp một địa chỉ
    mạng cố định, tự động chuyển tiếp request tới bất kỳ Pod hợp lệ đang chạy.
- id: container-orchestration-q6
  node: container-orchestration
  tier: fast
  prompt: Nếu selector của Service không khớp label của Pod, hậu quả cụ thể là gì?
  answer: Service không tìm thấy Pod đích nào để chuyển tiếp — danh sách Pod đích trống, request gọi tới
    Service bị timeout hoặc từ chối, dù các Pod thực tế vẫn chạy bình thường.
- id: container-orchestration-q7
  node: container-orchestration
  tier: fast
  prompt: Nêu vai trò khác nhau của Pod, Deployment, và Service chỉ trong một câu mỗi thành phần.
  answer: 'Pod: đơn vị nhỏ nhất chứa container. Deployment: khai báo và duy trì đúng số lượng Pod mong
    muốn, tự thay Pod chết. Service: cấp địa chỉ mạng ổn định đứng trước một nhóm Pod.'
- id: infrastructure-as-code-q1
  node: infrastructure-as-code
  tier: fast
  prompt: Vì sao tạo resource cloud bằng cách bấm chuột trên console lại khó review hơn thay đổi code
    ứng dụng qua pull request?
  answer: Vì bấm chuột có hiệu lực NGAY LẬP TỨC trên hệ thống thật, không qua bước chờ người khác đọc/góp
    ý trước — khác với code phải qua pull request trước khi merge.
- id: infrastructure-as-code-q2
  node: infrastructure-as-code
  tier: fast
  prompt: Định nghĩa Infrastructure as Code trong một câu.
  answer: Là cách quản lý hạ tầng bằng cách định nghĩa hạ tầng trong file code, lưu vào Git, và review
    thay đổi qua pull request — giống quy trình dùng cho code ứng dụng.
- id: infrastructure-as-code-q3
  node: infrastructure-as-code
  tier: fast
  prompt: Phân biệt declarative với imperative bằng một câu cho mỗi loại.
  answer: 'Declarative: khai báo TRẠNG THÁI MONG MUỐN cuối cùng, công cụ tự tính cách đạt được. Imperative:
    khai báo TỪNG BƯỚC thao tác theo đúng thứ tự.'
- id: infrastructure-as-code-q4
  node: infrastructure-as-code
  tier: fast
  prompt: Terraform khác Bicep ở điểm nào về phạm vi nhà cung cấp cloud hỗ trợ?
  answer: Terraform hỗ trợ nhiều nhà cung cấp cloud (AWS, Azure, GCP...) qua cùng cú pháp HCL. Bicep chỉ
    hỗ trợ Azure.
- id: infrastructure-as-code-q5
  node: infrastructure-as-code
  tier: fast
  prompt: terraform plan và terraform apply khác nhau ở điểm nào?
  answer: plan chỉ tính toán và in ra danh sách thay đổi, không thực hiện gì trên cloud thật. apply THỰC
    SỰ THỰC HIỆN các thay đổi đó.
- id: infrastructure-as-code-q6
  node: infrastructure-as-code
  tier: fast
  prompt: Vì sao đổi tên nội bộ của một resource trong file .tf lại nguy hiểm nếu chạy apply ngay mà không
    xem plan?
  answer: Terraform hiểu đây là xoá resource cũ và tạo resource mới hoàn toàn. Nếu resource chứa dữ liệu,
    dữ liệu sẽ mất khi apply thực thi việc xoá và tạo lại.
- id: infrastructure-as-code-q7
  node: infrastructure-as-code
  tier: fast
  prompt: Configuration drift là gì, và vì sao nó xảy ra khi trộn bấm chuột console với dùng Terraform
    cho cùng resource?
  answer: Là hiện tượng trạng thái thật trên cloud lệch khỏi trạng thái mô tả trong file .tf. Xảy ra khi
    ai đó sửa resource trực tiếp qua console mà Terraform không biết.
- id: infrastructure-as-code-q8
  node: infrastructure-as-code
  tier: fast
  prompt: State file trong Terraform dùng để làm gì?
  answer: Lưu lại resource nào Terraform đang quản lý và cấu hình hiện tại, để so sánh với file .tf khi
    chạy plan/apply và biết cần tạo/sửa/xoá gì.
- id: monitoring-alerting-q1
  node: monitoring-alerting
  tier: fast
  prompt: Monitoring và Alerting khác nhau ở điểm cốt lõi nào?
  answer: Monitoring thu thập và hiển thị chỉ số, cần con người chủ động xem. Alerting tự động phát hiện
    và chủ động báo khi chỉ số vượt ngưỡng, không cần ai ngồi xem 24/7.
- id: monitoring-alerting-q2
  node: monitoring-alerting
  tier: fast
  prompt: Vì sao quy tắc CPU > 90% cần điều kiện trong 5 phút liên tục, không chỉ tại một thời điểm?
  answer: Để tránh báo động giả từ những đợt CPU tăng vọt thoáng qua tự phục hồi ngay — điều kiện liên
    tục lọc bỏ nhiễu ngắn hạn, chỉ báo khi bất thường thật kéo dài.
- id: monitoring-alerting-q3
  node: monitoring-alerting
  tier: fast
  prompt: Alert fatigue là gì, và vì sao nó nguy hiểm hơn là chỉ gây phiền?
  answer: Là hiện tượng quá nhiều alert không quan trọng khiến người vận hành lơ là mọi alert, kể cả alert
    nghiêm trọng. Nguy hiểm vì làm mất chính công cụ phát hiện sớm sự cố.
- id: monitoring-alerting-q4
  node: monitoring-alerting
  tier: fast
  prompt: Phân biệt SLI, SLO, SLA bằng một câu cho mỗi khái niệm.
  answer: SLI là chỉ số đo được thực tế. SLO là mục tiêu nội bộ team tự đặt cho SLI đó. SLA là cam kết
    chính thức với khách hàng, có ràng buộc hợp đồng.
- id: monitoring-alerting-q5
  node: monitoring-alerting
  tier: fast
  prompt: Vì sao SLO thường được đặt khắt khe hơn SLA, không đặt bằng nhau?
  answer: Để tạo khoảng đệm an toàn — nếu bằng nhau, dao động nhỏ khiến SLI tụt dưới mục tiêu nội bộ cũng
    đồng thời vi phạm hợp đồng với khách hàng.
- id: monitoring-alerting-q6
  node: monitoring-alerting
  tier: fast
  prompt: Runbook giải quyết vấn đề gì mà chỉ có Alerting không giải quyết được?
  answer: Alerting chỉ báo có vấn đề xảy ra, không hướng dẫn phải làm gì tiếp. Runbook cung cấp quy trình
    xử lý từng bước cụ thể.
- id: monitoring-alerting-q7
  node: monitoring-alerting
  tier: fast
  prompt: Một team báo cáo SLI uptime tháng này đạt 99.92% như một cam kết ràng buộc cho các tháng sau.
    Đây có đúng cách dùng SLI không?
  answer: Không đúng. SLI chỉ là một số đo lịch sử, không mang ý nghĩa dự đoán hay ràng buộc cho tương
    lai. Cam kết ràng buộc là vai trò của SLA.
- id: monitoring-alerting-q8
  node: monitoring-alerting
  tier: fast
  prompt: Một runbook viết một năm trước chưa cập nhật theo kiến trúc mới. Điều gì có khả năng xảy ra
    khi alert kích hoạt lần tới?
  answer: Người trực ban làm theo các bước cũ không còn khớp kiến trúc hiện tại — mất thời gian nhận ra
    runbook lỗi thời rồi phải tự tìm cách xử lý ngoài quy trình.
- id: monitoring-alerting-q9
  node: monitoring-alerting
  tier: fast
  prompt: Một bước runbook mô tả nguyên nhân nằm ở dịch vụ bên thứ ba không sửa được trực tiếp. Vì sao
    đây vẫn là một bước hợp lệ?
  answer: Vì mục tiêu runbook không phải luôn tự sửa được mọi thứ ngay, mà là loại bỏ nhu cầu suy nghĩ
    từ đầu cho người trực ban — xác nhận đúng nguyên nhân và biết hành động đúng vẫn có ích.
- id: big-o-complexity-q1
  node: big-o-complexity
  tier: fast
  prompt: Big-O đo cái gì — thời gian chạy tuyệt đối (giây/ms) hay tốc độ tăng của thời gian chạy?
  answer: Tốc độ tăng (growth rate) của thời gian/bộ nhớ khi kích thước đầu vào n tiến về vô cùng — không
    phải thời gian tuyệt đối, không phụ thuộc máy chạy hay ngôn ngữ.
- id: big-o-complexity-q2
  node: big-o-complexity
  tier: fast
  prompt: Vì sao O(3n + 5) được viết gọn thành O(n)?
  answer: Vì Big-O bỏ hằng số nhân (3) và thành phần bậc thấp hơn (5) — khi n tiến ra vô cùng, 3n+5 và
    n có cùng tốc độ tăng, Big-O chỉ quan tâm dạng tăng, không quan tâm hệ số.
- id: big-o-complexity-q3
  node: big-o-complexity
  tier: fast
  prompt: Binary search có điều kiện tiên quyết gì để hoạt động đúng, và nếu vi phạm thì xảy ra chuyện
    gì?
  answer: Dữ liệu phải đã được sắp xếp. Nếu chạy trên mảng chưa sắp xếp, thuật toán không ném lỗi mà cho
    kết quả sai âm thầm.
- id: big-o-complexity-q4
  node: big-o-complexity
  tier: fast
  prompt: QuickSort worst-case và average-case khác nhau ở Big-O nào, và worst-case xảy ra khi nào?
  answer: Worst-case O(n^2) khi pivot luôn là giá trị nhỏ nhất hoặc lớn nhất. Average-case O(n log n)
    khi dữ liệu ngẫu nhiên khiến pivot chia mảng thành hai phần cỡ tương đương.
- id: big-o-complexity-q5
  node: big-o-complexity
  tier: fast
  prompt: MergeSort và QuickSort (average) cùng O(n log n) thời gian — khác biệt quan trọng về không gian
    là gì?
  answer: MergeSort cần thêm O(n) bộ nhớ phụ (mảng tạm), không in-place. QuickSort in-place chỉ cần khoảng
    O(log n) bộ nhớ phụ cho ngăn xếp đệ quy.
- id: big-o-complexity-q6
  node: big-o-complexity
  tier: fast
  prompt: Một đoạn code có 2 vòng lặp for KHÔNG lồng nhau (chạy nối tiếp, mỗi vòng qua n phần tử) có Big-O
    là bao nhiêu?
  answer: O(n). Hai vòng nối tiếp cho tổng n+n=2n thao tác, bỏ hằng số nhân thành O(n) — O(n^2) chỉ xảy
    ra khi lồng nhau.
- id: big-o-complexity-q7
  node: big-o-complexity
  tier: fast
  prompt: Vì sao đo giờ chạy bằng Stopwatch trên một máy cụ thể không đủ để kết luận thuật toán A tốt
    hơn B một cách khoa học?
  answer: Vì thời gian đo bị nhiễu bởi tốc độ CPU, tải hệ thống, JIT warm-up. Kết luận khoa học cần dựa
    trên phân tích Big-O hoặc benchmark có kiểm soát với nhiều giá trị n.
- id: big-o-complexity-q8
  node: big-o-complexity
  tier: fast
  prompt: O(2^n) và O(n!) thường xuất hiện trong loại bài toán nào?
  answer: O(2^n) khi xét mọi tập con của n phần tử; O(n!) khi xét mọi hoán vị. Cả hai tăng nhanh đến mức
    n khoảng 30-40 đã vượt khả năng tính toán hợp lý.
- id: big-o-complexity-q9
  node: big-o-complexity
  tier: fast
  prompt: Cho hàm chạy hai giai đoạn nối tiếp O(n log n) và O(n). Big-O tổng thể là gì?
  answer: O(n log n). Khi cộng nhiều giai đoạn nối tiếp, Big-O tổng thể bằng giai đoạn tăng nhanh nhất.
- id: big-o-complexity-q10
  node: big-o-complexity
  tier: fast
  prompt: Vì sao nói Big-O của linear search là O(n) thực chất là đang nói về worst-case?
  answer: Vì quy ước khi không chỉ rõ trường hợp, mặc định nói worst-case (target ở cuối/không tồn tại).
    Best-case là O(1) nhưng không đại diện cho hành vi đảm bảo.
- id: cau-truc-du-lieu-nang-cao-q1
  node: cau-truc-du-lieu-nang-cao
  tier: fast
  prompt: Vì sao chèn vào đầu Linked List là O(1) nhưng chèn vào đầu List<T> là O(n)?
  answer: Linked List chỉ tạo 1 node và đổi 1 con trỏ. List<T> lưu liên tục trong mảng, chèn đầu buộc
    dịch mọi phần tử hiện có sang phải.
- id: cau-truc-du-lieu-nang-cao-q2
  node: cau-truc-du-lieu-nang-cao
  tier: fast
  prompt: Vì sao Dequeue trực tiếp từ đầu array thô là O(n), và circular buffer giải quyết thế nào?
  answer: Cách ngây thơ phải dịch mọi phần tử còn lại sang trái sau khi lấy phần tử đầu. Circular buffer
    dùng 2 chỉ số head/tail quay vòng, Dequeue chỉ tăng head — O(1).
- id: cau-truc-du-lieu-nang-cao-q3
  node: cau-truc-du-lieu-nang-cao
  tier: fast
  prompt: Big-O trung bình và worst-case của Insert/Search trên BST là gì, và điều gì gây worst-case?
  answer: Trung bình O(log n) khi cây cân đối. Worst-case O(n) khi cây lệch hẳn thành chuỗi thẳng — xảy
    ra khi dữ liệu chèn theo thứ tự đã sắp xếp.
- id: cau-truc-du-lieu-nang-cao-q4
  node: cau-truc-du-lieu-nang-cao
  tier: fast
  prompt: Min-heap và max-heap khác nhau ở tính chất nào?
  answer: 'Min-heap: mọi node cha ≤ hai con (gốc nhỏ nhất). Max-heap: mọi node cha ≥ hai con (gốc lớn
    nhất).'
- id: cau-truc-du-lieu-nang-cao-q5
  node: cau-truc-du-lieu-nang-cao
  tier: fast
  prompt: Vì sao Heap lưu bằng mảng phẳng mà không cần con trỏ Left/Right/Parent?
  answer: Chỉ số con trái/phải/cha tính trực tiếp từ chỉ số hiện tại bằng công thức cố định (2i+1, 2i+2,
    (i-1)/2) — không cần lưu tham chiếu.
- id: cau-truc-du-lieu-nang-cao-q6
  node: cau-truc-du-lieu-nang-cao
  tier: fast
  prompt: Tại sao SiftUp khi Insert vào heap chỉ cần tối đa O(log n) bước?
  answer: Vì heap luôn là cây cân đối (lưu tuần tự theo tầng), chiều cao luôn ≈ log2 n. SiftUp di chuyển
    tối đa tới gốc, tức tối đa 'chiều cao' bước.
- id: cau-truc-du-lieu-nang-cao-q7
  node: cau-truc-du-lieu-nang-cao
  tier: fast
  prompt: Chương P1 (collections.md) đã dạy gì về List/Dictionary/Queue/Stack, và chương này khác ở điểm
    nào?
  answer: P1 dạy dùng collection có sẵn của BCL và Big-O của thao tác. Chương này dạy cách cài đặt bên
    trong từ đầu để hiểu vì sao Big-O đó đúng.
- id: cau-truc-du-lieu-nang-cao-q8
  node: cau-truc-du-lieu-nang-cao
  tier: fast
  prompt: Vì sao Linked List thường chậm hơn List<T> trong thực tế dù cùng O(n) khi duyệt?
  answer: List<T> lưu liên tục, CPU đọc theo cache line hiệu quả. Linked List rải node khắp heap, mỗi
    bước di chuyển có thể là cache-miss.
- id: graph-bfs-dfs-q1
  node: graph-bfs-dfs
  tier: fast
  prompt: Big-O của BFS và DFS trên graph có V đỉnh, E cạnh là gì, và vì sao giống nhau?
  answer: Cả hai O(V + E). Cả hai ghé mỗi đỉnh một lần (O(V)) và quét hết danh sách kề (tổng O(E)) — chỉ
    khác thứ tự thăm, không khác tổng công việc.
- id: graph-bfs-dfs-q2
  node: graph-bfs-dfs
  tier: fast
  prompt: Vì sao BFS đảm bảo tìm đường đi ngắn nhất theo số cạnh, còn DFS thì không?
  answer: BFS thăm theo từng lớp — mọi đỉnh ở lớp k đã xác nhận cách xuất phát đúng k cạnh. DFS đi sâu
    một nhánh trước, có thể lạc vào đường dài trước khi chạm đích.
- id: graph-bfs-dfs-q3
  node: graph-bfs-dfs
  tier: fast
  prompt: Adjacency list và adjacency matrix khác nhau ở điểm nào về bộ nhớ và tốc độ tra cạnh?
  answer: List dùng O(V+E) bộ nhớ, tra cạnh O(deg(u)). Matrix dùng O(V^2) bộ nhớ cố định, tra cạnh O(1).
    List phù hợp graph thưa, matrix phù hợp graph dày đặc.
- id: graph-bfs-dfs-q4
  node: graph-bfs-dfs
  tier: fast
  prompt: Undirected graph khác directed graph ở đâu khi cài bằng adjacency list?
  answer: 'Directed: cạnh u->v chỉ thêm một chiều. Undirected: mỗi cạnh phải thêm cả hai chiều thủ công
    — quên một chiều làm nó biến thành directed âm thầm.'
- id: graph-bfs-dfs-q5
  node: graph-bfs-dfs
  tier: fast
  prompt: Vì sao dùng HashSet daThay là bắt buộc trong BFS/DFS, kể cả khi graph không có cycle?
  answer: Vì một đỉnh có thể được tới từ nhiều hàng xóm khác nhau. Không chặn đỉnh đã thăm sẽ enqueue/push
    trùng lặp, tăng số lần xử lý vượt O(V+E).
- id: graph-bfs-dfs-q6
  node: graph-bfs-dfs
  tier: fast
  prompt: DFS phát hiện cycle trong directed graph cần theo dõi mấy tập đỉnh, và vì sao không dùng một
    tập duy nhất?
  answer: 'Cần hai tập: đỉnh trên nhánh hiện tại và đỉnh đã xử lý xong. Dùng một tập duy nhất sẽ báo nhầm
    cycle khi một đỉnh được tới từ hai nhánh khác nhau.'
- id: graph-bfs-dfs-q7
  node: graph-bfs-dfs
  tier: fast
  prompt: Kiểm tra tồn tại đường đi từ A tới B, không quan tâm độ dài — nên chọn BFS hay DFS?
  answer: Cả hai đúng với cùng Big-O O(V+E). Nếu chỉ cần biết có tồn tại hay không, DFS đệ quy thường
    viết ngắn gọn hơn, không cần cấp Queue tường minh.
- id: sorting-algorithms-q1
  node: sorting-algorithms
  tier: fast
  prompt: Big-O worst-case của Bubble/Selection/Insertion Sort là gì? Vì sao giống nhau?
  answer: Cả ba O(n²) worst-case vì cả ba dùng 2 vòng lặp lồng nhau, mỗi vòng chạy khoảng n lần trong
    trường hợp xấu nhất.
- id: sorting-algorithms-q2
  node: sorting-algorithms
  tier: fast
  prompt: Vì sao Merge Sort luôn O(n log n) ở CẢ worst-case, không như Quick Sort?
  answer: Merge Sort luôn chia mảng làm đôi bằng nhau bất kể giá trị, cây đệ quy luôn log2(n) tầng. Quick
    Sort chia theo giá trị so pivot, pivot tệ làm cây lệch thành n tầng.
- id: sorting-algorithms-q3
  node: sorting-algorithms
  tier: fast
  prompt: Tại sao Merge Sort cần O(n) bộ nhớ phụ mà Quick Sort không cần?
  answer: Bước gộp của Merge Sort phải tạo mảng mới. Quick Sort phân hoạch bằng đổi chỗ ngay trong mảng
    gốc (in-place).
- id: sorting-algorithms-q4
  node: sorting-algorithms
  tier: fast
  prompt: Cho mảng giảm dần {9,7,5,3,1}, dùng QuickSort pivot=phần tử cuối. Đây có phải worst-case không?
  answer: Có. Phần tử cuối luôn là giá trị nhỏ nhất của đoạn trên mảng giảm dần — mỗi lần partition chỉ
    tách 1 phần tử, cây đệ quy có n tầng.
- id: sorting-algorithms-q5
  node: sorting-algorithms
  tier: fast
  prompt: Định nghĩa stable sort. Selection Sort (đổi chỗ trực tiếp) có stable không?
  answer: Stable là giữ nguyên thứ tự tương đối của các phần tử bằng nhau so với mảng gốc. Selection Sort
    bản đổi chỗ trực tiếp không stable.
- id: sorting-algorithms-q6
  node: sorting-algorithms
  tier: fast
  prompt: Với n=1.000, so sánh O(n²) và O(n log n). Con số nào lớn hơn, gấp bao nhiêu lần?
  answer: O(n²)=1.000.000, O(n log n)≈10.000. O(n²) lớn hơn khoảng 100 lần.
- id: sorting-algorithms-q7
  node: sorting-algorithms
  tier: fast
  prompt: Tại sao trong code sản xuất nên dùng .Sort() của BCL thay vì tự viết Quick/Merge Sort?
  answer: .Sort() đã tối ưu (thuật toán lai), xử lý sẵn trường hợp biên, chọn pivot thông minh tránh worst-case
    — tự viết chỉ nhằm hiểu cơ chế.
- id: recursion-binary-search-q1
  node: recursion-binary-search
  tier: fast
  prompt: Vì sao mọi hàm đệ quy đúng đều bắt buộc phải có base case?
  answer: Không có base case, hàm tự gọi vô hạn — mỗi lần gọi thêm stack frame cho tới khi cạn bộ nhớ
    stack, ném StackOverflowException.
- id: recursion-binary-search-q2
  node: recursion-binary-search
  tier: fast
  prompt: StackOverflowException có bắt được bằng try/catch không?
  answer: Không. Từ .NET Framework 2.0, nó luôn làm crash tiến trình ngay lập tức vì call stack đã cạn
    sạch, không còn bộ nhớ để xử lý exception thông thường.
- id: recursion-binary-search-q3
  node: recursion-binary-search
  tier: fast
  prompt: Binary Search chạy trên mảng chưa sắp xếp có ném exception không? Kết quả trả về đáng tin không?
  answer: Không ném exception. Kết quả có thể sai hoàn toàn — báo không tìm thấy dù phần tử tồn tại, hoặc
    trả sai chỉ số. Lỗi sai âm thầm.
- id: recursion-binary-search-q4
  node: recursion-binary-search
  tier: fast
  prompt: Tính gần đúng số so sánh tối đa của Binary Search trong mảng 1 triệu phần tử, so với Linear
    Search worst-case.
  answer: 'Binary Search: log2(1.000.000) ≈ 20 lần. Linear Search worst-case: tối đa 1.000.000 lần. Chênh
    lệch theo tốc độ tăng O(log n) vs O(n).'
- id: recursion-binary-search-q5
  node: recursion-binary-search
  tier: fast
  prompt: Vì sao Binary Search đệ quy tốn O(log n) bộ nhớ còn phiên bản lặp chỉ tốn O(1)?
  answer: Đệ quy tạo stack frame mới mỗi lời gọi, chồng lên nhau tối đa log n lần. Lặp chỉ dùng hai biến
    cập nhật tại chỗ, không tạo frame nào.
- id: recursion-binary-search-q6
  node: recursion-binary-search
  tier: fast
  prompt: Hàm đệ quy f(n) gọi f(n-1) hai lần mỗi bước, base case n=0. Bộ nhớ call stack tối đa tại một
    thời điểm là gì theo n?
  answer: Vẫn O(n), không phải O(2^n). Tổng số lời gọi là O(2^n) nhưng tại một thời điểm, call stack chỉ
    giữ các lời gọi trên một nhánh, độ sâu tối đa n.
- id: recursion-binary-search-q7
  node: recursion-binary-search
  tier: fast
  prompt: Khi nào nên chuyển một hàm đệ quy sang viết lại bằng vòng lặp?
  answer: Khi độ sâu đệ quy có thể lớn tới mức gây StackOverflowException, hoặc khi hàm chạy trong hot
    path và chi phí stack frame ảnh hưởng hiệu năng.
- id: recursion-binary-search-q8
  node: recursion-binary-search
  tier: fast
  prompt: Array.Sort() rồi Array.BinarySearch() một lần trên mảng 1000 phần tử chưa sắp có nhanh hơn quét
    tuyến tính một lần không?
  answer: Không, thường chậm hơn. Sort tốn O(n log n) cộng thêm Binary Search O(log n), trong khi Linear
    Search một lần chỉ tốn O(n).
- id: recursion-binary-search-q9
  node: recursion-binary-search
  tier: fast
  prompt: FibNgayTho(n) đúng logic nhưng chạy rất chậm với n lớn. Đúng hay sai, vì sao?
  answer: Đúng. Không có lỗi logic, nhưng các nhánh tính lại cùng giá trị nhiều lần (overlapping subproblems)
    — tổng số lời gọi tăng theo cấp lũy thừa O(2^n).
- id: dynamic-programming-co-ban-q1
  node: dynamic-programming-co-ban
  tier: fast
  prompt: Vì sao đệ quy thuần cho Fib(n) có độ phức tạp O(2^n)?
  answer: Mỗi lần gọi sinh ra hai lời gọi con, các bài con lặp lại những giá trị đã tính ở nhánh khác
    — cây gọi đệ quy phình theo cấp số nhân theo độ sâu n.
- id: dynamic-programming-co-ban-q2
  node: dynamic-programming-co-ban
  tier: fast
  prompt: Hai điều kiện bắt buộc để áp dụng DP là gì?
  answer: (1) Optimal substructure — lời giải bài lớn xây từ lời giải tối ưu bài con nhỏ hơn. (2) Overlapping
    subproblems — cùng bài con bị gọi lại nhiều lần.
- id: dynamic-programming-co-ban-q3
  node: dynamic-programming-co-ban
  tier: fast
  prompt: Memoization và tabulation khác nhau ở điểm cốt lõi nào?
  answer: Memoization là đệ quy + cache, top-down, chỉ tính bài con thật cần. Tabulation là vòng lặp +
    bảng, bottom-up, thường tính mọi bài con từ nhỏ nhất.
- id: dynamic-programming-co-ban-q4
  node: dynamic-programming-co-ban
  tier: fast
  prompt: Với Fib(30), số lần gọi hàm giảm từ bao nhiêu xuống bao nhiêu khi thêm memoization?
  answer: Từ 2.692.537 lần (đệ quy thuần) xuống 59 lần (memoization) — mỗi Fib(k) chỉ được tính thật đúng
    một lần.
- id: dynamic-programming-co-ban-q5
  node: dynamic-programming-co-ban
  tier: fast
  prompt: Trong Coin Change, nếu bỏ qua kiểm tra bang[i-xu]==int.MaxValue, điều gì xảy ra?
  answer: Phép +1 vào int.MaxValue có thể gây tràn số thành giá trị sai, khiến Math.Min chọn kết quả sai
    mà không có exception nào báo.
- id: dynamic-programming-co-ban-q6
  node: dynamic-programming-co-ban
  tier: fast
  prompt: Bài toán tìm max trong mảng bằng chia đôi có nên áp dụng memoization không?
  answer: Không nên. Có optimal substructure nhưng không có overlapping subproblems — mỗi đoạn con chỉ
    xuất hiện đúng một lần, cache sẽ luôn miss.
- id: dynamic-programming-co-ban-q7
  node: dynamic-programming-co-ban
  tier: fast
  prompt: Bước đầu tiên trong quy trình 4 bước giải bài DP mới là gì, và vì sao quan trọng hơn viết code?
  answer: Định nghĩa trạng thái (state) — xác định chính xác bài con nhỏ nhất có ý nghĩa. Sai định nghĩa
    trạng thái làm công thức truy hồi trông hợp lý nhưng cho kết quả sai.
- id: dynamic-programming-co-ban-q8
  node: dynamic-programming-co-ban
  tier: fast
  prompt: Sự khác biệt cốt lõi giữa 0/1 Knapsack và Coin Change nằm ở đâu?
  answer: Coin Change cho dùng lại không giới hạn một mệnh giá; Knapsack chỉ chọn mỗi vật 0 hoặc 1 lần
    — Knapsack phải chuyển dòng i-1 khi chọn vật i.
- id: interview-patterns-q1
  node: interview-patterns
  tier: fast
  prompt: Vì sao Two Pointers hai đầu tiến vào nhau chỉ dùng đúng trên dữ liệu đã sắp xếp?
  answer: Vì lý luận tăng/giảm con trỏ chỉ đúng khi giá trị tăng dần theo chỉ số (tính đơn điệu). Mảng
    chưa sắp có thể bỏ sót đáp án đúng.
- id: interview-patterns-q2
  node: interview-patterns
  tier: fast
  prompt: Two Pointers tìm hai số có tổng X có độ phức tạp thời gian và bộ nhớ phụ là gì?
  answer: O(n) thời gian, O(1) bộ nhớ phụ. Khoảng cách phai-trai giảm đúng 1 mỗi bước, tổng số bước tối
    đa n-1.
- id: interview-patterns-q3
  node: interview-patterns
  tier: fast
  prompt: Sliding Window độ dài cố định và thay đổi khác nhau ở điểm cốt lõi nào?
  answer: 'Cố định: khung luôn giữ đúng k phần tử, thêm 1 bỏ 1. Thay đổi: khung tự mở rộng khi hợp lệ
    và co lại khi vi phạm điều kiện.'
- id: interview-patterns-q4
  node: interview-patterns
  tier: fast
  prompt: Vì sao Sliding Window độ dài thay đổi vẫn O(n) dù có for lồng while?
  answer: Biến trai chỉ tăng không giảm trong toàn hàm — tổng số lần tăng cộng dồn tối đa n (amortized
    analysis).
- id: interview-patterns-q5
  node: interview-patterns
  tier: fast
  prompt: Dấu hiệu nào gợi ý nên nghĩ tới Sliding Window thay vì Two Pointers?
  answer: Đề bài hỏi về đoạn con liên tiếp (subarray/substring) với một điều kiện cần thoả. Two Pointers
    gợi ý bởi dữ liệu đã sắp xếp hoặc đối xứng.
- id: interview-patterns-q6
  node: interview-patterns
  tier: fast
  prompt: Bài đếm số cặp có tích là số chính phương trên mảng chưa sắp xếp — vì sao Two Pointers không
    áp dụng được?
  answer: Vì tính chất tích là số chính phương không đơn điệu — không có quy luật loại trừ một tập cặp
    khác, buộc phải duyệt toàn bộ O(n²).
- id: interview-patterns-q7
  node: interview-patterns
  tier: fast
  prompt: Công thức tongHienTai += mang[i]; tongHienTai -= mang[i-k]; thể hiện điều gì?
  answer: Khung mới và khung cũ chồng lấp k-1 phần tử — chỉ khác đúng 1 phần tử mỗi đầu, nên tổng mới
    tính từ tổng cũ bằng O(1).
- id: interview-patterns-q8
  node: interview-patterns
  tier: fast
  prompt: Bài tổng con nhỏ nhất >= target co khung khi nào?
  answer: Co khung khi khung ĐANG thoả điều kiện để tìm khung nhỏ nhất còn thoả — khác ví dụ co khung
    khi VI PHẠM điều kiện, nhưng cùng cơ chế O(n) amortized.
- id: interview-patterns-q9
  node: interview-patterns
  tier: fast
  prompt: Two Pointers cùng hướng khác Two Pointers hai đầu tiến vào nhau ở điểm nào?
  answer: Hai đầu tiến vào nhau bắt đầu từ hai phía đối lập. Cùng hướng bắt đầu gần nhau, đi cùng chiều
    với vai trò khác nhau (dò/giữ).
- id: interview-patterns-q10
  node: interview-patterns
  tier: fast
  prompt: Trong bài xoá trùng lặp tại chỗ, vì sao chỉ cần so sánh với giá trị hợp lệ gần nhất?
  answer: Vì mảng đã sắp xếp — mọi giá trị trùng nhau nằm liền kề. Với mảng chưa sắp xếp giả định này
    sai.
- id: interview-patterns-q11
  node: interview-patterns
  tier: fast
  prompt: Trong Container With Most Water, vì sao luôn di chuyển con trỏ tại vách thấp hơn?
  answer: Vì diện tích bị giới hạn bởi vách thấp hơn. Di chuyển vách cao vào trong chỉ giảm khoảng cách
    mà không tăng chiều cao giới hạn.
- id: system-design-behavioral-q1
  node: system-design-behavioral
  tier: fast
  prompt: Vì sao System Design interview không có đáp án đúng duy nhất là điểm khác biệt cốt lõi so với
    coding interview?
  answer: Vì tiêu chí đánh giá là cách suy nghĩ và đánh đổi giữa các lựa chọn kiến trúc, không phải một
    đoạn code đúng/sai rõ ràng.
- id: system-design-behavioral-q2
  node: system-design-behavioral
  tier: fast
  prompt: Bước 1 trong quy trình 4 bước System Design là gì, và vì sao bỏ qua bị đánh giá thấp?
  answer: Làm rõ yêu cầu và giới hạn quy mô. Bỏ qua khiến ứng viên thiết kế dựa trên giả định tự đặt,
    có thể sai lệch hoàn toàn so với quy mô thực tế.
- id: system-design-behavioral-q3
  node: system-design-behavioral
  tier: fast
  prompt: Database sharding theo user_id % N nghĩa là gì, và vì sao chọn đúng shard key quan trọng?
  answer: Chia dữ liệu ra N database, mỗi bản ghi vào database số user_id chia dư N. Chọn sai shard key
    khiến truy vấn phải quét toàn bộ shard.
- id: system-design-behavioral-q4
  node: system-design-behavioral
  tier: fast
  prompt: Rủi ro chính của cache-aside là gì, và vì sao chấp nhận được với URL shortener nhưng không hẳn
    với giá sản phẩm?
  answer: Dữ liệu cũ (stale) — cache giữ giá trị cũ tới khi hết TTL. URL gốc hiếm khi sửa nên rủi ro thấp;
    giá sản phẩm đổi thường xuyên nên hậu quả lớn hơn.
- id: system-design-behavioral-q5
  node: system-design-behavioral
  tier: fast
  prompt: Vì sao tài khoản celebrity nên dùng pull model thay vì push model cho Notification?
  answer: Push phải tạo bản ghi riêng cho từng follower ngay khi có bài mới — với 10 triệu follower chi
    phí rất cao. Pull chỉ ghi một bản ghi, follower tự tổng hợp khi mở app.
- id: system-design-behavioral-q6
  node: system-design-behavioral
  tier: fast
  prompt: STAR là viết tắt của gì, và phần nào thường bị bỏ sót nhất?
  answer: Situation-Task-Action-Result. Phần Action thường bị bỏ sót hoặc sơ sài nhất — nhiều người kể
    bối cảnh rồi nhảy thẳng tới kết quả.
- id: system-design-behavioral-q7
  node: system-design-behavioral
  tier: fast
  prompt: Vì sao phần Action trong STAR nên dùng chủ ngữ tôi thay vì chúng tôi?
  answer: Vì người phỏng vấn muốn đánh giá vai trò cá nhân, không phải thành tích chung của cả team.
- id: system-design-behavioral-q8
  node: system-design-behavioral
  tier: fast
  prompt: Vì sao dòng CV liệt kê tên công nghệ suông bị đánh giá thấp?
  answer: Vì không chứng minh được ứng viên đã thực sự dùng công nghệ đó giải quyết vấn đề gì — bất kỳ
    ai cũng gõ được tên công nghệ.
