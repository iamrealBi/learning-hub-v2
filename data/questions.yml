# Q&A data — nguồn sự thật duy nhất, kiểm bằng scripts/qa_lint.py (mọi câu PHẢI có answer, không trùng prompt)
questions:
- id: q-mem-01
  node: p1-memory
  tier: fast
  prompt: Khác biệt THẬT giữa value type và reference type là gì?
  answer: 'Là CÁCH SAO CHÉP: value type chép toàn bộ giá trị (bản độc lập), reference type chép tham chiếu
    (cùng một object). KHÔNG phải ''stack vs heap'' — chỗ nằm chỉ là chi tiết cài đặt.

    '
  code_ref: p1-csharp/bo-nho-va-kieu-du-lieu.md#chung_minh
- id: q-mem-02
  node: p1-memory
  tier: fast
  prompt: Một struct là field của một class thì nằm ở stack hay heap?
  answer: Heap — nó nằm inline bên trong object của class trên heap. (Bác bỏ huyền thoại 'value type luôn
    ở stack'.)
- id: q-mem-03
  node: p1-memory
  tier: deep
  prompt: GC của .NET dùng thuật toán gì? 'Mark-and-sweep' có đúng không?
  answer: 'Là tracing, generational, MARK-AND-COMPACT cho SOH (gen 0/1/2) — nén để chống phân mảnh. ''Mark-and-sweep''
    là mô tả SAI/thiếu. LOH mặc định sweep (không nén).

    '
- id: q-jwt-01
  node: p4-jwt
  tier: fast
  prompt: Vì sao nên dùng DateTime.UtcNow cho 'expires', và vì sao câu 'DateTime.Now lệch 7 giờ' là sai?
  answer: 'exp là mốc UTC. Thư viện tự chuyển DateTime.Now (Kind=Local) sang UTC nên KHÔNG lệch 7 giờ
    (cùng exp như UtcNow). Bẫy thật là Kind=Unspecified (từ Parse/DB) bị coi là UTC. Dùng UtcNow để luôn
    tường minh, không phụ thuộc Kind.

    '
  code_ref: p4-bao-mat/jwt.md#2-cap-token-code-dung
- id: q-jwt-02
  node: p4-jwt
  tier: fast
  prompt: JWT lưu trong localStorage dính lỗ hổng gì, khác cookie thế nào?
  answer: 'localStorage -> rủi ro XSS (script đọc được token). Cookie -> rủi ro CSRF, nhưng chặn được
    bằng SameSite/anti-forgery và HttpOnly khiến JS không đọc token.

    '
- id: nen-tang-q1
  node: nen-tang
  tier: fast
  prompt: Kiểu nào nên dùng để lưu số tiền, và vì sao?
  answer: decimal — biểu diễn thập phân chính xác, tránh sai số làm tròn khi cộng dồn tiền tệ.
- id: nen-tang-q2
  node: nen-tang
  tier: fast
  prompt: Khác biệt cốt lõi giữa const và readonly là gì?
  answer: const cố định lúc biên dịch (chỉ literal); readonly gán một lần lúc chạy, thường trong constructor.
- id: nen-tang-q3
  node: nen-tang
  tier: fast
  prompt: Vì sao int.TryParse an toàn hơn int.Parse khi xử lý input người dùng?
  answer: TryParse trả về bool và không ném exception với chuỗi lỗi nên không làm sập chương trình; Parse
    ném FormatException.
- id: nen-tang-q4
  node: nen-tang
  tier: fast
  prompt: (int)3.9 cho kết quả gì? Muốn 4 thì dùng cái gì?
  answer: Cho 3 (cắt phần thập phân). Muốn 4 dùng Math.Round(3.9).
- id: nen-tang-q5
  node: nen-tang
  tier: fast
  prompt: var total = 0m; — total có kiểu tĩnh là gì?
  answer: decimal — var vẫn là kiểu tĩnh, suy ra từ literal 0m.
- id: oop-q1
  node: oop
  tier: fast
  prompt: Class và object khác nhau thế nào?
  answer: Class là bản thiết kế/khuôn; object là thực thể cụ thể tạo từ class bằng new, mỗi object có
    trạng thái riêng.
- id: oop-q2
  node: oop
  tier: fast
  prompt: 'Khi nào phương thức được chọn theo kiểu thực tế lúc chạy: override hay new?'
  answer: override (kèm virtual ở lớp cha) — đó là đa hình runtime; new chọn theo kiểu khai báo lúc biên
    dịch.
- id: oop-q3
  node: oop
  tier: fast
  prompt: Nêu một điểm khác biệt then chốt giữa abstract class và interface.
  answer: abstract class chứa được field và cài đặt sẵn và chỉ kế thừa một lớp cha; interface không chứa
    field và một lớp cài đặt được nhiều interface.
- id: oop-q4
  node: oop
  tier: fast
  prompt: Đóng gói được thực hiện bằng công cụ nào trong C#?
  answer: private field kết hợp property (có validate), giấu trạng thái nội bộ và kiểm soát truy cập.
- id: oop-q5
  node: oop
  tier: fast
  prompt: Nguyên tắc DIP nói gì và vì sao hữu ích khi test?
  answer: Phụ thuộc vào trừu tượng (interface) thay vì cài đặt cụ thể; nhờ đó thay được bằng mock/fake
    khi test.
- id: oop-q6
  node: oop
  tier: fast
  prompt: Interface có được chứa field lưu trữ dữ liệu không? Nếu class implement interface mà thiếu một
    method thì chuyện gì xảy ra?
  answer: Không - interface chỉ khai báo chữ ký method/property, không có field lưu trữ. Nếu class thiếu
    implement một method, trình biên dịch báo lỗi CS0535 ngay lúc build.
- id: oop-q7
  node: oop
  tier: fast
  prompt: Default interface method (C# 8+) dùng để giải quyết vấn đề gì?
  answer: Cho phép thêm method mới vào một interface đã có nhiều lớp thực thi mà không bắt buộc mọi lớp
    cũ phải sửa code - lớp cũ tự động dùng bản mặc định.
- id: collections-linq-q1
  node: collections-linq
  tier: fast
  prompt: Cần tra cứu giá trị theo khoá cực nhanh, khoá duy nhất — chọn collection nào?
  answer: Dictionary<K,V> — tra theo khoá O(1) trung bình.
- id: collections-linq-q2
  node: collections-linq
  tier: fast
  prompt: orders.Where(...) đã chạy phép lọc ngay tại dòng đó chưa? Vì sao?
  answer: Chưa. Where là toán tử deferred, chỉ mô tả; phép lọc chạy khi query bị duyệt (foreach/ToList/Sum...).
- id: collections-linq-q3
  node: collections-linq
  tier: fast
  prompt: Khác biệt cốt lõi giữa First và FirstOrDefault?
  answer: First ném InvalidOperationException khi rỗng; FirstOrDefault trả về default(T) (null hoặc 0).
- id: collections-linq-q4
  node: collections-linq
  tier: fast
  prompt: Muốn lọc dữ liệu ngay tại database (dịch sang SQL) thì dùng IEnumerable hay IQueryable?
  answer: IQueryable<T> — lambda thành expression tree, được provider (EF Core) dịch sang SQL, lọc tại
    DB.
- id: collections-linq-q5
  node: collections-linq
  tier: fast
  prompt: Vì sao nên dùng .Any() thay cho .Count() > 0?
  answer: Any() dừng ngay khi gặp phần tử đầu tiên; Count() có thể duyệt toàn bộ nguồn.
- id: p1-async-q1
  node: async-await
  tier: fast
  prompt: Vì sao await một tác vụ I/O không làm phát sinh thread mới?
  answer: Trong lúc chờ I/O, thread được trả về thread pool; OS báo hoàn tất qua callback nên không thread
    nào đứng chờ.
- id: p1-async-q2
  node: async-await
  tier: fast
  prompt: Đoạn await A(); await B(); (mỗi cái 1s) tổng bao lâu, và sửa thế nào để còn ~1s?
  answer: '~2 giây (tuần tự). Sửa: khởi động cả hai trước rồi await Task.WhenAll(ta, tb) → ~1 giây.'
- id: p1-async-q3
  node: async-await
  tier: fast
  prompt: Vì sao nên tránh task.Result trong web app?
  answer: Nó block thread để chờ, gây deadlock (khi có SynchronizationContext) hoặc thread-pool starvation;
    dùng await thay thế.
- id: p1-async-q4
  node: async-await
  tier: fast
  prompt: Khi nào dùng WhenAny thay vì WhenAll?
  answer: 'Khi chỉ cần task đầu tiên hoàn tất: timeout, đua nhiều nguồn, lấy phản hồi nhanh nhất. WhenAll
    chờ tất cả.'
- id: p1-async-q5
  node: async-await
  tier: fast
  prompt: async void sai ở chỗ nào, ngoại lệ duy nhất được phép là gì?
  answer: Exception từ async void không bắt được ở nơi gọi nên gây crash; chỉ chấp nhận cho event handler
    UI, còn lại trả Task/Task<T>.
- id: sql-nen-tang-q1
  node: sql-nen-tang
  tier: fast
  prompt: Vì sao SQL được gọi là ngôn ngữ khai báo (declarative)?
  answer: Bạn chỉ mô tả muốn dữ liệu gì, không mô tả cách lấy từng bước; PostgreSQL (query planner) tự
    quyết định cách thực thi tối ưu.
- id: sql-nen-tang-q2
  node: sql-nen-tang
  tier: fast
  prompt: Trong câu SELECT price * 2 AS gia_doi FROM products WHERE gia_doi > 100 — câu này lỗi. Vì sao?
  answer: Alias gia_doi tạo ở bước SELECT nhưng WHERE chạy trước SELECT nên alias chưa tồn tại; phải viết
    WHERE price * 2 > 100.
- id: sql-nen-tang-q3
  node: sql-nen-tang
  tier: fast
  prompt: SELECT count(*) FROM users WHERE age <> 30 với An=30, Bình=NULL, Cường=25 trả về mấy?
  answer: 1 (chỉ Cường); dòng Bình có age NULL nên NULL <> 30 là UNKNOWN, bị loại.
- id: sql-nen-tang-q4
  node: sql-nen-tang
  tier: fast
  prompt: Kiểu nào phù hợp lưu số tiền 450000.50, và tại sao không dùng float/double precision?
  answer: numeric(p,s) ví dụ numeric(10,2); float/double là dấu phẩy động nhị phân, không chính xác tuyệt
    đối nên gây sai số tích luỹ với tiền tệ.
- id: sql-nen-tang-q5
  node: sql-nen-tang
  tier: fast
  prompt: Khác nhau giữa serial và GENERATED ALWAYS AS IDENTITY, vì sao nên ưu tiên cái sau?
  answer: serial cho phép ghi đè giá trị khoá chính âm thầm; GENERATED ALWAYS AS IDENTITY là identity
    column chuẩn SQL, chặn ghi đè vô ý trừ khi dùng OVERRIDING SYSTEM VALUE.
- id: sql-nen-tang-q6
  node: sql-nen-tang
  tier: fast
  prompt: Câu UPDATE products SET price = 0; (không có WHERE) có báo lỗi không, điều gì xảy ra?
  answer: Không báo lỗi; sửa giá của toàn bộ dòng trong bảng thành 0 vì thiếu WHERE nghĩa là áp dụng cho
    mọi dòng — lỗi logic chứ không phải lỗi cú pháp.
- id: sql-nen-tang-q7
  node: sql-nen-tang
  tier: fast
  prompt: Thứ tự thực thi logic của FROM, WHERE, SELECT, ORDER BY, LIMIT (chưa tính GROUP BY/HAVING) là
    gì?
  answer: FROM → WHERE → SELECT → ORDER BY → LIMIT/OFFSET.
- id: sql-nen-tang-q8
  node: sql-nen-tang
  tier: fast
  prompt: Vì sao SELECT * FROM demo_null WHERE stock = NULL; luôn trả về 0 dòng, cách viết đúng là gì?
  answer: stock = NULL luôn cho UNKNOWN chứ không bao giờ TRUE, kể cả khi stock thực sự NULL; phải dùng
    WHERE stock IS NULL.
- id: joins-aggregation-q1
  node: joins-aggregation
  tier: fast
  prompt: INNER JOIN và LEFT JOIN khác nhau ở điểm nào về dòng không khớp?
  answer: INNER JOIN loại bỏ dòng không khớp cả hai bên; LEFT JOIN giữ toàn bộ dòng bảng trái, điền NULL
    cho cột bảng phải khi không khớp.
- id: joins-aggregation-q2
  node: joins-aggregation
  tier: fast
  prompt: Vì sao không được viết WHERE COUNT(*) > 5?
  answer: COUNT là hàm tổng hợp chỉ tồn tại sau GROUP BY, còn WHERE chạy trước khi gom nhóm; phải dùng
    HAVING COUNT(*) > 5.
- id: joins-aggregation-q3
  node: joins-aggregation
  tier: fast
  prompt: COUNT(*) khác COUNT(col) thế nào khi col có NULL?
  answer: COUNT(*) đếm mọi dòng; COUNT(col) chỉ đếm dòng có col không NULL.
- id: joins-aggregation-q4
  node: joins-aggregation
  tier: fast
  prompt: Viết mệnh đề tìm khách chưa có đơn bằng NOT EXISTS.
  answer: SELECT c.name FROM customers c WHERE NOT EXISTS (SELECT 1 FROM orders o WHERE o.customer_id
    = c.id);
- id: joins-aggregation-q5
  node: joins-aggregation
  tier: fast
  prompt: Correlated subquery khác subquery thường ở đâu?
  answer: Correlated subquery tham chiếu cột truy vấn ngoài và chạy lại cho từng dòng ngoài; subquery
    thường độc lập, chạy một lần.
- id: p2-ef-core-1
  node: ef-core
  tier: fast
  prompt: IQueryable được thực thi lúc nào?
  answer: Khi materialize (ToList/ToListAsync, foreach, First, Count, Any), không phải lúc gọi .Where;
    LINQ là deferred.
- id: p2-ef-core-2
  node: ef-core
  tier: fast
  prompt: Hai lệnh CLI nào tạo migration rồi áp vào database?
  answer: dotnet ef migrations add <Ten> rồi dotnet ef database update.
- id: p2-ef-core-3
  node: ef-core
  tier: fast
  prompt: Khi nào nên dùng AsNoTracking()?
  answer: Khi truy vấn chỉ đọc (hiển thị/báo cáo), không định sửa và SaveChanges; nhanh và ít tốn RAM
    hơn.
- id: p2-ef-core-4
  node: ef-core
  tier: fast
  prompt: N+1 xảy ra thế nào và cách khắc phục cơ bản?
  answer: Truy cập navigation trong vòng lặp mà không nạp sẵn tạo 1 câu chính + N câu con; khắc phục bằng
    Include hoặc projection Select.
- id: p2-ef-core-5
  node: ef-core
  tier: fast
  prompt: Vì sao không nên trả IQueryable ra khỏi repository?
  answer: Vì bên ngoài có thể nối thêm LINQ chạy SQL ngoài kiểm soát, phụ thuộc DbContext đã đóng và phá
    ranh giới tầng; nên đóng bằng ToListAsync/FirstOrDefaultAsync và trả kiểu cụ thể như List<T>.
- id: minimal-api-q1
  node: minimal-api
  tier: fast
  prompt: REST dựa trên khái niệm cốt lõi nào để quyết định cách đặt tên URL và chọn HTTP method?
  answer: Tài nguyên (resource) - mỗi tài nguyên có một URL riêng viết bằng danh từ số nhiều, còn HTTP
    method diễn tả hành động lên tài nguyên đó, không nhồi động từ vào URL.
- id: minimal-api-q2
  node: minimal-api
  tier: fast
  prompt: WebApplicationBuilder và WebApplication (kết quả của Build()) khác nhau ở vai trò gì?
  answer: WebApplicationBuilder dùng để cấu hình trước khi chạy (đăng ký service, đọc config); WebApplication
    dùng để định tuyến (MapGet...) và chạy (Run()). Gọi nhầm phương thức định tuyến trên builder gây lỗi
    biên dịch CS1061.
- id: minimal-api-q3
  node: minimal-api
  tier: fast
  prompt: POST /orders tạo đơn hàng thành công thì trả status code nào và kèm header gì?
  answer: 201 Created, kèm header Location trỏ tới URL tài nguyên vừa tạo (Results.Created).
- id: minimal-api-q4
  node: minimal-api
  tier: fast
  prompt: Trong app.MapGet("/users/{id:int}", (int id) => ...), tham số id được bind từ đâu?
  answer: Từ route param {id:int} trong path; constraint :int chỉ khớp giá trị số. Gọi /users/abc không
    khớp route, trả 404 trước khi vào tới handler.
- id: minimal-api-q5
  node: minimal-api
  tier: fast
  prompt: Vì sao nên trả Results.NotFound() thay vì object rỗng với status 200?
  answer: 'Status code là hợp đồng ngữ nghĩa: 404 nói rõ không có tài nguyên; 200 + body rỗng khiến client
    hiểu nhầm là thành công.'
- id: minimal-api-q6
  node: minimal-api
  tier: fast
  prompt: Dùng PUT /products/5 để chỉ sửa một trường (ví dụ giá) có nguy cơ gì?
  answer: PUT thay thế toàn bộ tài nguyên; nếu body chỉ gửi một trường, các trường khác bị gán về giá
    trị mặc định, mất dữ liệu ngoài ý muốn. Nên dùng PATCH với DTO nhỏ chỉ chứa trường cần sửa.
- id: minimal-api-q7
  node: minimal-api
  tier: fast
  prompt: URL POST /createUser vi phạm nguyên tắc REST nào?
  answer: URL phải là danh từ số nhiều chỉ tài nguyên, không nhét động từ; hành động do HTTP method diễn
    đạt. Đúng là POST /users.
- id: minimal-api-q8
  node: minimal-api
  tier: fast
  prompt: Vì sao dùng First()/Single() trong handler tìm-theo-id có thể biến 404 hợp lệ thành 500?
  answer: First()/Single() ném InvalidOperationException khi không có phần tử khớp; nếu không bắt và chuyển
    thành Results.NotFound(), ASP.NET Core trả 500 thay vì 404 hợp lý. Nên dùng FirstOrDefault().
- id: p3-di-q1
  node: dependency-injection
  tier: fast
  prompt: AddScoped tạo bao nhiêu instance trong một request HTTP có 3 chỗ cùng yêu cầu service đó?
  answer: Đúng 1 instance, tái dùng trong suốt scope của request.
- id: p3-di-q2
  node: dependency-injection
  tier: fast
  prompt: Vì sao DbContext nên là Scoped chứ không phải Singleton?
  answer: DbContext không an toàn đa luồng và mang trạng thái theo request; Singleton sẽ chia sẻ một instance
    cho mọi request đồng thời gây lỗi dữ liệu/concurrency.
- id: p3-di-q3
  node: dependency-injection
  tier: fast
  prompt: Captive dependency là gì?
  answer: Service sống-lâu (Singleton) giữ tham chiếu tới service sống-ngắn hơn (Scoped), khiến nó bị
    giam và tồn tại sai vòng đời.
- id: p3-di-q4
  node: dependency-injection
  tier: fast
  prompt: Cách đúng để một Singleton dùng một service Scoped là gì?
  answer: Tiêm IServiceScopeFactory, mở CreateScope() mỗi lần cần, lấy Scoped qua GetRequiredService rồi
    Dispose scope.
- id: p3-di-q5
  node: dependency-injection
  tier: fast
  prompt: Nguyên tắc thiết kế nào cho phép đổi implementation mà không sửa code dùng nó, và DI hiện thực
    thế nào?
  answer: Nghịch đảo phụ thuộc (Dependency Inversion) — phụ thuộc vào abstraction; DI tiêm implementation
    qua constructor nên chỉ đổi dòng đăng ký.
- id: tai-file-an-toan-q1
  node: tai-file-an-toan
  tier: fast
  prompt: Hàm BCL nào bóc bỏ mọi thành phần đường dẫn khỏi tên file client?
  answer: Path.GetFileName — chỉ giữ phần tên cuối, loại bỏ .. và mọi phần thư mục.
- id: tai-file-an-toan-q2
  node: tai-file-an-toan
  tier: fast
  prompt: Vì sao không được tin Content-Type hay đuôi file khi phân loại?
  answer: Cả hai do client kiểm soát và có thể bịa; chỉ magic bytes (nội dung thật) mới đáng tin.
- id: tai-file-an-toan-q3
  node: tai-file-an-toan
  tier: fast
  prompt: Nên kiểm kích thước file trước hay sau khi đọc toàn bộ nội dung? Vì sao?
  answer: Trước. Từ chối sớm tránh nạp file khổng lồ vào bộ nhớ/đĩa (chống DoS) và tiết kiệm xử lý.
- id: tai-file-an-toan-q4
  node: tai-file-an-toan
  tier: fast
  prompt: Lưu file upload trong wwwroot gây rủi ro cụ thể gì?
  answer: File bị phục vụ tĩnh; nội dung độc có thể chạy dưới domain của bạn dẫn tới stored XSS/thực thi.
    Phải lưu ngoài webroot hoặc chặn thực thi.
- id: tai-file-an-toan-q5
  node: tai-file-an-toan
  tier: fast
  prompt: Vì sao đặt tên lưu bằng Guid an toàn hơn dùng tên client?
  answer: GUID do server sinh, client không kiểm soát nên loại bỏ path traversal và va chạm/ghi đè tên;
    tên client chỉ giữ để hiển thị.
- id: testing-q1
  node: testing
  tier: fast
  prompt: Khi nào dùng [Theory] thay vì viết nhiều [Fact]?
  answer: Khi cùng một logic cần kiểm với nhiều bộ dữ liệu — [Theory]+[InlineData] biến mỗi bộ thành một
    test riêng, báo lỗi rõ giá trị nào sai.
- id: testing-q2
  node: testing
  tier: fast
  prompt: Ba khối của Arrange-Act-Assert làm gì?
  answer: 'Arrange: dựng dữ liệu đầu vào. Act: gọi đúng một hành động cần kiểm. Assert: so kết quả thực
    tế với kỳ vọng.'
- id: testing-q3
  node: testing
  tier: fast
  prompt: Vì sao đặt tên test theo hành vi là tài liệu sống?
  answer: Mỗi tên nêu rõ điều kiện và hành vi mong đợi, nên đọc danh sách tên test là đọc được đặc tả
    hệ thống mà không cần đọc cài đặt.
- id: testing-q4
  node: testing
  tier: fast
  prompt: WebApplicationFactory<Program> khác test logic thuần ở điểm cốt lõi nào?
  answer: Nó khởi động toàn bộ app trong bộ nhớ và gọi endpoint http thật qua routing/DI/middleware; test
    logic thuần chỉ gọi một lớp cô lập, không qua pipeline.
- id: testing-q5
  node: testing
  tier: fast
  prompt: Vì sao mock qua interface giúp test tất định hơn?
  answer: Fake/mock cho phép điều khiển đầu ra của phụ thuộc (DB, mạng), nên kết quả không phụ thuộc yếu
    tố ngoài, chạy nhanh và luôn cho cùng kết quả.
- id: claude-code-1
  node: claude-code
  tier: fast
  prompt: Nêu 2 lệnh để quản lý ngữ cảnh phiên và khác biệt của chúng.
  answer: /compact nén lịch sử nhưng giữ ý chính (tiếp tục cùng task); /clear xoá sạch để bắt đầu task
    mới.
- id: claude-code-2
  node: claude-code
  tier: fast
  prompt: File nào là bộ nhớ dự án mà agent tự nạp mỗi phiên, và lệnh nào tạo nó?
  answer: File CLAUDE.md ở gốc repo; lệnh /init sinh bản khởi đầu.
- id: claude-code-3
  node: claude-code
  tier: fast
  prompt: Lệnh nào để thêm một MCP server?
  answer: claude mcp add <tên> -- <lệnh khởi chạy server>.
- id: claude-code-4
  node: claude-code
  tier: fast
  prompt: Muốn ghi audit trước mỗi lần agent chạy công cụ thì dùng event hook nào (PascalCase)?
  answer: PreToolUse (chạy sau thì PostToolUse); harness thực thi hook.
- id: claude-code-5
  node: claude-code
  tier: fast
  prompt: Vì sao agent chạy test xanh chưa đủ để commit?
  answer: Vì agent có thể đã sửa test cho khớp bug; phải đọc diff và tin test trước khi commit.
- id: exceptions-q1
  node: exceptions
  tier: fast
  prompt: Sự khác biệt giữa throw; và throw ex; là gì?
  answer: throw; giữ nguyên stack trace gốc; throw ex; reset stack trace, làm mất nơi lỗi thật phát sinh.
- id: exceptions-q2
  node: exceptions
  tier: fast
  prompt: finally có chạy khi try chứa return không?
  answer: Có, finally luôn chạy trước khi return thực sự trả giá trị.
- id: exceptions-q3
  node: exceptions
  tier: fast
  prompt: Nên dùng TryParse hay try/catch để đọc số người dùng nhập? Vì sao?
  answer: TryParse — vì nhập sai là tình huống thường ngày, không nên dùng exception cho control-flow
    (tốn chi phí và khó đọc).
- id: exceptions-q4
  node: exceptions
  tier: fast
  prompt: Hai guard hiện đại nào thay thế cho việc tự viết if (x == null) throw ...?
  answer: ArgumentNullException.ThrowIfNull(x) và ArgumentException.ThrowIfNullOrEmpty(s).
- id: exceptions-q5
  node: exceptions
  tier: fast
  prompt: Vì sao catch (Exception) cho mọi thứ là thói quen xấu?
  answer: Nó nuốt cả lỗi nghiêm trọng bạn không xử lý được, che giấu bug và làm khó chẩn đoán nguyên nhân.
- id: validation-q1
  node: validation
  tier: fast
  prompt: Vì sao không được tin dữ liệu từ client dù frontend đã validate rồi?
  answer: Vì kẻ tấn công (hoặc Postman, script test) có thể gọi thẳng vào API, bỏ qua hoàn toàn giao diện
    web — validation ở frontend chỉ để trải nghiệm mượt, không phải hàng rào bảo mật.
- id: validation-q2
  node: validation
  tier: fast
  prompt: Gọi API với Quantity = -5 mà không có validation gì, hậu quả cụ thể có thể là gì?
  answer: Nếu code làm Stock -= Quantity mà không kiểm tra, số âm khiến kho tăng thay vì giảm; hoặc nếu
    Quantity dùng để cấp phát vòng lặp/mảng, có thể gây crash hay treo server.
- id: validation-q3
  node: validation
  tier: fast
  prompt: Cần gọi phương thức nào trên builder.Services để bật validation tự động cho Minimal API, và
    nếu quên gọi thì chuyện gì xảy ra?
  answer: builder.Services.AddValidation(). Nếu quên gọi, attribute Data Annotations vẫn nằm trên property
    nhưng không ai kiểm tra khi chạy — dữ liệu sai lọt qua thẳng vào handler.
- id: validation-q4
  node: validation
  tier: fast
  prompt: Response lỗi validation nên có status code nào, và tại sao không phải 500?
  answer: 400 Bad Request, vì lỗi nằm ở phía client gửi dữ liệu sai định dạng — 500 chỉ dành cho lỗi phía
    server.
- id: validation-q5
  node: validation
  tier: fast
  prompt: Cho ví dụ một rule mà Data Annotations khó diễn đạt nhưng FluentValidation làm tự nhiên.
  answer: Rule liên-field như Confirm phải khớp Password, hoặc rule có điều kiện như nếu ShippingMethod
    là Express thì PhoneNumber bắt buộc — FluentValidation có .Equal(), .When() diễn đạt tự nhiên, Data
    Annotations không hỗ trợ trực tiếp.
- id: logging-exceptions-1
  node: logging-exceptions
  tier: fast
  prompt: Vì sao structured logging tốt hơn nối chuỗi?
  answer: Nó giữ message template và các trường có tên riêng biệt, cho phép truy vấn/lọc theo giá trị
    (ví dụ OrderId=42) thay vì chỉ có chuỗi phẳng.
- id: logging-exceptions-2
  node: logging-exceptions
  tier: fast
  prompt: Kể đúng thứ tự 6 log level từ thấp đến cao.
  answer: Trace, Debug, Information, Warning, Error, Critical.
- id: logging-exceptions-3
  node: logging-exceptions
  tier: fast
  prompt: IExceptionHandler.TryHandleAsync trả true nghĩa là gì?
  answer: Exception đã được xử lý xong; pipeline không chuyển tiếp cho handler khác.
- id: logging-exceptions-4
  node: logging-exceptions
  tier: fast
  prompt: Ở production, được phép đưa gì và không được đưa gì vào response lỗi?
  answer: 'Được: title, status, correlationId. Không được: stack trace, SQL, tên biến/đường dẫn nội bộ,
    thông điệp exception thô.'
- id: logging-exceptions-5
  node: logging-exceptions
  tier: fast
  prompt: Correlation id dùng để làm gì?
  answer: Nối tất cả dòng log của cùng một request lại với nhau để truy vết lỗi từ mã do client cung cấp.
- id: deploy-docker-q1
  node: deploy-docker
  tier: fast
  prompt: Vì sao stage build và stage runtime dùng hai image khác nhau?
  answer: sdk để biên dịch (nặng, nhiều công cụ), aspnet để chạy (nhỏ, ít bề mặt tấn công); multi-stage
    chỉ copy output nên image cuối nhỏ và an toàn.
- id: deploy-docker-q2
  node: deploy-docker
  tier: fast
  prompt: Lệnh nào trong Dockerfile giúp container không chạy bằng root?
  answer: USER app (chuyển sang user không đặc quyền có sẵn trong image aspnet).
- id: deploy-docker-q3
  node: deploy-docker
  tier: fast
  prompt: EXPOSE 8080 có tự động mở cổng ra host không?
  answer: 'Không; chỉ là tài liệu hoá, cần -p khi docker run hoặc ports: trong compose.'
- id: deploy-docker-q4
  node: deploy-docker
  tier: fast
  prompt: Vì sao không nên đặt mật khẩu DB bằng ENV trong Dockerfile?
  answer: Mỗi layer bất biến và đọc được qua docker history nên secret bị bake vĩnh viễn; phải truyền
    lúc runtime.
- id: deploy-docker-q5
  node: deploy-docker
  tier: fast
  prompt: 'Trong compose, condition: service_healthy giải quyết vấn đề gì?'
  answer: Đảm bảo api chỉ khởi động sau khi Postgres sẵn sàng (pg_isready), tránh lỗi kết nối lúc khởi
    động.
- id: p5-mcp-q1
  node: mcp
  tier: fast
  prompt: MCP giải bài toán tích hợp từ độ phức tạp nào xuống độ phức tạp nào?
  answer: Từ N × M xuống N + M nhờ một giao thức chung.
- id: p5-mcp-q2
  node: mcp
  tier: fast
  prompt: Primitive nào do model chủ động gọi và thường có tác dụng phụ?
  answer: Tools (model-controlled).
- id: p5-mcp-q3
  node: mcp
  tier: fast
  prompt: Lệnh CLI nào dùng để thêm một server MCP vào Claude Code?
  answer: claude mcp add <tên> -- <lệnh chạy server>.
- id: p5-mcp-q4
  node: mcp
  tier: fast
  prompt: Vì sao không nên nhúng token trực tiếp vào .mcp.json?
  answer: Dễ bị commit gây rò rỉ bí mật; nên dùng biến môi trường và .gitignore.
- id: p5-mcp-q5
  node: mcp
  tier: fast
  prompt: Đâu là ranh giới quyền thực sự của một server truy cập database?
  answer: Quyền của tài khoản/scope kết nối DB (ví dụ user readonly), thực thi ở lớp database.
- id: capstone-q1
  node: capstone
  tier: fast
  prompt: Tầng nào trong TaskFlow chịu trách nhiệm bảo toàn quy tắc 'task đã xoá không thể hoàn thành'?
  answer: Domain (P1) — bất biến đặt trong entity, không ở endpoint.
- id: capstone-q2
  node: capstone
  tier: fast
  prompt: Trong DoD, vì sao bắt buộc có một test tích hợp cho luồng 401/403?
  answer: Vì thiếu phân quyền là lỗ hổng nghiêm trọng dễ lọt; test tự động bắt được nó trước khi lên production.
- id: capstone-q3
  node: capstone
  tier: fast
  prompt: Vì sao capstone khuyến khích dùng service qua DI thay vì new trong endpoint?
  answer: DI cho phép mock/thay thế khi test và quản lý vòng đời; new thủ công tạo phụ thuộc cứng, khó
    kiểm thử.
- id: capstone-q4
  node: capstone
  tier: fast
  prompt: Nêu một cạm bẫy khi chạy TaskFlow trong Docker liên quan tới kết nối cơ sở dữ liệu.
  answer: Trong container DB không ở localhost; phải trỏ tới tên service/biến môi trường, nếu không kết
    nối thất bại.
- id: capstone-q5
  node: capstone
  tier: fast
  prompt: Trong luồng request, thành phần nào chạy trước endpoint và làm gì?
  answer: 'Middleware (xác thực JWT + logging): kiểm token, gắn ClaimsPrincipal, ghi log; chặn request
    sai trước khi tới endpoint.'
- id: generics-q1
  node: generics
  tier: fast
  prompt: Vì sao ArrayList gây boxing với int còn List<int> thì không?
  answer: ArrayList.Add nhận object nên int (value type) phải được box (cấp phát heap + copy) để thành
    object. List<int> được JIT sinh mã riêng với int nằm trực tiếp trong mảng nội bộ int[], không cần
    chuyển sang object nên không boxing.
- id: generics-q2
  node: generics
  tier: fast
  prompt: Liệt kê thứ tự bắt buộc khi kết hợp nhiều ràng buộc where.
  answer: '(1) ràng buộc chính chọn tối đa một trong class/struct/unmanaged/notnull đứng đầu; (2) base
    class tối đa một; (3) các interface; (4) new() luôn cuối cùng. Ví dụ: where T : class, IFoo, new().'
- id: generics-q3
  node: generics
  tier: fast
  prompt: IEnumerable<out T> covariant nghĩa là gì, và vì sao IList<T> không thể covariant?
  answer: Covariant nghĩa IEnumerable<Dog> được coi là IEnumerable<Animal> vì T chỉ ở vị trí trả về (chỉ
    lấy ra). IList<T> có Add(T) với T ở vị trí tham số vào; nếu covariant thì có thể Add(new Cat()) vào
    danh sách Dog, phá type-safety, nên T không được đánh dấu out.
- id: generics-q4
  node: generics
  tier: fast
  prompt: Tại sao không thể viết hai overload Foo<T>() where T:class và Foo<T>() where T:struct?
  answer: Ràng buộc where không thuộc chữ ký phương thức, nên hai method có chữ ký giống hệt (Foo<T>()),
    gây lỗi trùng định nghĩa CS0111. Muốn phân nhánh value/reference phải kiểm tra typeof(T).IsValueType
    bên trong một method duy nhất.
- id: generics-q5
  node: generics
  tier: fast
  prompt: default(int), default(string), default(bool?) lần lượt là gì?
  answer: default(int) = 0; default(string) = null; default(bool?) = null (nullable value không có giá
    trị). Reference type là null, value type là giá trị 0/struct rỗng.
- id: generics-q6
  node: generics
  tier: fast
  prompt: Counter<int>.Total và Counter<string>.Total có dùng chung ô nhớ không? Vì sao?
  answer: Không. CLR coi Counter<int> và Counter<string> là hai closed type độc lập, mỗi cái có bộ static
    field riêng. Tăng Counter<int>.Total không ảnh hưởng Counter<string>.Total.
- id: generics-q7
  node: generics
  tier: fast
  prompt: Cách đúng để so sánh bằng nhau giữa hai giá trị kiểu T trong generic là gì, và vì sao không
    dùng ==?
  answer: Dùng EqualityComparer<T>.Default.Equals(x, y). Không dùng == vì với T chưa ràng buộc thường
    không biên dịch, và với reference type == so sánh tham chiếu chứ không so nội dung. EqualityComparer<T>.Default
    tự gọi IEquatable<T> nếu có (không boxing).
- id: generics-q8
  node: generics
  tier: fast
  prompt: typeof(List<>) khác typeof(List<int>) như thế nào, và List`1 nghĩa là gì?
  answer: typeof(List<>) là open generic type definition (IsGenericTypeDefinition == true), chưa điền
    tham số kiểu, không tạo instance được. typeof(List<int>) là closed type đã điền int, tạo instance
    được. List`1 = tên List + arity (số tham số kiểu) là 1; Dictionary<,> là Dictionary`2.
- id: delegates-events-q1
  node: delegates-events
  tier: fast
  prompt: Đâu là khác biệt giữa Func<int,string> và Action<int,string>?
  answer: Func<int,string> nhận một tham số int và trả về string (kiểu cuối là kết quả). Action<int,string>
    nhận hai tham số int và string, không trả về gì (void).
- id: delegates-events-q2
  node: delegates-events
  tier: fast
  prompt: Vòng for (int i=0;i<3;i++) list.Add(() => i); rồi gọi hết cho ra gì? Vì sao? Cách sửa?
  answer: 'Ra 3,3,3 vì i là một biến duy nhất dùng chung cả vòng lặp, mọi lambda capture cùng ô nhớ và
    khi chạy i đã bằng 3. Sửa: copy vào biến nội vòng (int copy=i; () => copy) hoặc dùng foreach.'
- id: delegates-events-q3
  node: delegates-events
  tier: fast
  prompt: Khi gọi một multicast Func<int> gồm ba hàm trả 1, 2, 3 — giá trị nhận được là gì?
  answer: Là 3 — multicast chạy hết cả ba hàm nhưng chỉ trả về kết quả của hàm cuối cùng. Muốn lấy đủ
    phải duyệt GetInvocationList().
- id: delegates-events-q4
  node: delegates-events
  tier: fast
  prompt: Vì sao event an toàn hơn một field public delegate?
  answer: Vì event giới hạn bên ngoài chỉ được += và -=; việc gán = (xóa handler người khác) và raise
    (gọi) chỉ làm được bên trong lớp khai báo. Field delegate public cho phép ai cũng gán đè và tự gọi.
- id: delegates-events-q5
  node: delegates-events
  tier: fast
  prompt: Vì sao quên unsubscribe gây rò rỉ bộ nhớ, và trong tình huống nào nặng nhất?
  answer: Publisher giữ delegate, delegate giữ Target = subscriber, nên publisher tham chiếu ngược subscriber
    khiến nó không được GC. Nặng nhất khi publisher sống lâu (singleton/service) còn subscriber ngắn hạn
    (view/form). Phòng bằng -= đối xứng, IDisposable, hoặc weak event.
- id: delegates-events-q6
  node: delegates-events
  tier: fast
  prompt: Khác biệt cốt lõi giữa Func<T,bool> và Expression<Func<T,bool>>, và vì sao EF Core cần cái thứ
    hai?
  answer: Func<T,bool> đã biên dịch thành IL chạy được, chỉ gọi được. Expression<Func<T,bool>> là cây
    đối tượng mô tả cấu trúc lambda, đọc/phân tích/dịch được lúc runtime. EF Core cần nó để dịch lambda
    sang SQL chạy server-side; nếu dùng Func, EF phải tải cả bảng về rồi lọc — hỏng hiệu năng.
- id: delegates-events-q7
  node: delegates-events
  tier: fast
  prompt: Nếu một handler trong chuỗi multicast ném exception, các handler sau có chạy không?
  answer: Không. Exception làm đứt chuỗi ngay lập tức; các handler đăng ký sau nó không chạy. Muốn chạy
    hết bất chấp lỗi, tự duyệt GetInvocationList() và bọc try/catch từng phần tử.
- id: delegates-events-q8
  node: delegates-events
  tier: fast
  prompt: static x => x * 2 khác x => x * 2 chỗ nào?
  answer: 'static lambda bị cấm capture biến ngoài (dùng biến bao ngoài sẽ lỗi biên dịch). Lợi ích: khẳng
    định hàm thuần, tránh cấp phát display class ẩn khi vô tình capture — tốt cho hiệu năng và độ rõ ràng.'
- id: records-pattern-matching-q1
  node: records-pattern-matching
  tier: fast
  prompt: Điều gì thật sự định nghĩa một record, immutability hay value equality?
  answer: Value equality. Record có thể mutable (property set) nhưng vẫn là record. Bản chất record là
    compiler luôn sinh Equals/GetHashCode/operator== so theo giá trị các thành viên (cộng EqualityContract
    với record class).
- id: records-pattern-matching-q2
  node: records-pattern-matching
  tier: fast
  prompt: new Team("A", new[]{"x"}) == new Team("A", new[]{"x"}) cho kết quả gì với record Team(string
    Name, string[] Members)? Vì sao?
  answer: False. Field string[] so bằng EqualityComparer<string[]>.Default = reference equality; hai mảng
    là hai object khác nhau. Muốn True phải override Equals+GetHashCode so theo phần tử (SequenceEqual).
- id: records-pattern-matching-q3
  node: records-pattern-matching
  tier: fast
  prompt: Khác biệt property positional sinh ra giữa record class và record struct (không readonly)?
  answer: record class sinh property init (bất biến). record struct sinh property set (mutable). Muốn
    record struct bất biến phải dùng readonly record struct (sinh init + field readonly).
- id: records-pattern-matching-q4
  node: records-pattern-matching
  tier: fast
  prompt: Trong switch expression, đặt arm '> 0 =>' trước arm '> 100 =>' gây ra chuyện gì?
  answer: Arm > 100 trở thành unreachable (không bao giờ chạy được) vì > 0 đã nuốt mọi số dương kể cả
    > 100. Đây là LỖI BIÊN DỊCH CS8510 (không chỉ cảnh báo) - code sẽ không compile được. Phải xếp arm
    hẹp (> 100) trước arm rộng (> 0).
- id: records-pattern-matching-q5
  node: records-pattern-matching
  tier: fast
  prompt: x is var y khi x là null cho kết quả gì?
  answer: Luôn True, và y sẽ là null. var pattern khớp mọi giá trị, không lọc null. Muốn lọc null dùng
    is not null hoặc is { }.
- id: records-pattern-matching-q6
  node: records-pattern-matching
  tier: fast
  prompt: a with { } (ngoặc rỗng) làm gì? Object kết quả có ReferenceEquals với a không?
  answer: Tạo một bản sao nông giống hệt a. a == kết_quả là True (value equality) nhưng ReferenceEquals(a,
    kết_quả) là False (object mới). Đây là clone không phá huỷ.
- id: records-pattern-matching-q7
  node: records-pattern-matching
  tier: fast
  prompt: Vì sao record Cat và record Dog cùng kế thừa Animal, cùng Name/Age, lại không bằng nhau?
  answer: Vì Equals tự sinh so cả EqualityContract (= typeof kiểu runtime). Cat có EqualityContract ==
    typeof(Cat), Dog có typeof(Dog) nên khác nhau, không bằng dù nội dung giống hệt.
- id: records-pattern-matching-q8
  node: records-pattern-matching
  tier: fast
  prompt: Bao nhiêu slice .. được phép trong một list pattern? Cho ví dụ hợp lệ và không hợp lệ.
  answer: 'Tối đa một .. Hợp lệ: [1, .., 9], [.., x], [a, ..]. Không hợp lệ (lỗi biên dịch): [.., 3, ..]
    vì hai slice khiến compiler không biết cắt ở đâu.'
- id: collections-q1
  node: collections
  tier: fast
  prompt: Vì sao Add của List<T> là O(1) khấu hao (amortized) chứ không phải O(1) tuyệt đối?
  answer: Vì thỉnh thoảng mảng nền đầy, phải cấp mảng gấp đôi và copy toàn bộ (O(n)). Nhưng vì mỗi lần
    gấp đôi kéo dài rất nhiều lần Add rẻ, chi phí trung bình mỗi Add vẫn là O(1) — gọi là khấu hao (amortized).
- id: collections-q2
  node: collections
  tier: fast
  prompt: Một class làm key Dictionary mà chỉ override Equals, quên GetHashCode, hậu quả gì?
  answer: 'Vi phạm hợp đồng: hai key bằng nhau có thể có hash khác nhau nên rơi vào bucket khác và không
    tìm thấy — phần tử biến mất. Bắt buộc override cả hai và bảo đảm Equals suy ra cùng hash (dùng HashCode.Combine).'
- id: collections-q3
  node: collections
  tier: fast
  prompt: Khác nhau giữa dict.Add(k,v) và dict[k]=v khi khoá đã tồn tại?
  answer: Add ném ArgumentException; indexer ghi đè không lỗi. Dùng Add khi muốn phát hiện trùng khoá,
    dùng indexer khi muốn upsert.
- id: collections-q4
  node: collections
  tier: fast
  prompt: Vì sao foreach rồi list.Remove(x) bên trong lại ném exception, và hai cách sửa?
  answer: 'Enumerator phát hiện collection đổi phiên bản (_version) giữa chừng nên ném InvalidOperationException.
    Sửa: (a) list.RemoveAll(predicate); (b) duyệt ngược for (i=Count-1; i>=0; i--) + RemoveAt; (c) duyệt
    list.ToList() rồi sửa gốc.'
- id: collections-q5
  node: collections
  tier: fast
  prompt: Nên nhận tham số kiểu gì cho hàm chỉ duyệt để tính tổng, và vì sao?
  answer: IEnumerable<T> — rộng nhất, nhận được mảng, List, HashSet, kết quả LINQ; đồng thời báo rõ hàm
    không sửa collection của caller. Nhận List<T> là khoá cứng và cho phép sửa ngầm.
- id: collections-q6
  node: collections
  tier: fast
  prompt: Span<T> khác Memory<T> ở đâu; khi nào phải dùng Memory<T>?
  answer: Span<T> là ref struct, chỉ sống trên stack — không làm field, không qua async/await, không box.
    Cần giữ lát cắt vùng nhớ lâu dài hoặc truyền qua ranh giới async thì dùng Memory<T>/ReadOnlyMemory<T>
    (được phép nằm trên heap).
- id: collections-q7
  node: collections
  tier: fast
  prompt: So sánh SortedDictionary và SortedList về chèn và bộ nhớ.
  answer: 'SortedDictionary là cây đỏ-đen: chèn/xoá O(log n) nhưng tốn bộ nhớ cho node. SortedList là
    hai mảng song song: chèn O(n) (dịch mảng) nhưng liền khối, ít bộ nhớ, truy cập theo index O(1). Nhiều
    thay đổi chọn SortedDictionary; ít thay đổi/nhiều đọc theo thứ tự chọn SortedList.'
- id: collections-q8
  node: collections
  tier: fast
  prompt: '[..a, ..b] nghĩa là gì, và khác a[1..3] chỗ nào?'
  answer: '[..a, ..b] là collection expression với toán tử spread — trải mọi phần tử của a rồi b vào một
    collection mới. a[1..3] là range — lát cắt của a từ chỉ số 1 đến trước 3. Cùng ký hiệu .. nhưng khác
    ngữ cảnh (spread bên trong [] vs range khi lập chỉ mục).'
- id: q_enum_constraint
  node: generics
  tier: deep
  prompt: 'Ràng buộc `where T : Enum` mở khoá điều gì mà một `T` không ràng buộc không làm được, và vì
    sao nó khác với `where T : SomeClass` thông thường?'
  answer: '`where T : Enum` cho phép gọi các API tĩnh dành riêng cho enum trên biến kiểu T (ví dụ dùng
    `Enum.GetNames(typeof(T))`, `HasFlag`), điều mà T không ràng buộc không cho phép vì trình biên dịch
    không biết T có phải enum hay không. Nó khác `where T : SomeClass` (kế thừa lớp cụ thể) ở chỗ `Enum`
    là một ràng buộc "đặc biệt" được trình biên dịch nhận diện cho MỌI kiểu enum bất kỳ (không phải một
    lớp cụ thể duy nhất) — tương tự `Delegate` cho mọi kiểu delegate.'
- id: q_generic_delegates
  node: generics
  tier: deep
  prompt: '`Func<T, TOut>` và `Action<T>` có phải là "phép màu ngôn ngữ" riêng của C# không? Giải thích
    bản chất của chúng.'
  answer: Không. `Func<>`/`Action<>` chỉ là các generic delegate được định nghĩa sẵn trong namespace `System`
    của BCL (nhiều bản overload theo số tham số), hoạt động theo đúng cơ chế đóng kiểu (closed type) như
    `List<T>` hay bất kỳ generic class nào khác. Bạn hoàn toàn có thể tự khai báo một generic delegate
    tương đương, ví dụ `delegate TOut Transformer<T, TOut>(T input);`.
- id: q_mystack_bigo
  node: generics
  tier: deep
  prompt: Vì sao `Push` của `MyStack<T>` được coi là O(1) amortized dù thỉnh thoảng nó gọi `Array.Resize`
    tốn O(n)?
  answer: Vì mảng nội bộ được nhân đôi kích thước mỗi lần resize thay vì tăng dần từng ô, nên số lần resize
    trong N lần Push chỉ là O(log N), và tổng chi phí copy phần tử qua tất cả các lần resize là O(N) —
    chia đều ra thì trung bình mỗi lần Push chỉ tốn O(1) (chi phí amortized), dù một vài lần Push riêng
    lẻ (đúng lúc mảng đầy) sẽ tốn O(n).
- id: '9'
  node: delegates-events
  tier: deep
  prompt: Vì sao `Action<object> aObject = o => {...}; Action<string> aString = aObject;` biên dịch được,
    còn chiều ngược lại (`Action<string>` gán cho `Action<object>`) thì không? Đây gọi là gì?
  answer: 'Đây là contravariance (phản biến) theo tham số: Action<in T> cho phép một delegate nhận tham
    số kiểu cha (object) đứng thay cho biến khai báo nhận kiểu con (string), vì bất kỳ string nào truyền
    vào cũng là một object hợp lệ. Chiều ngược lại sai vì một hàm chỉ biết xử lý string không thể nhận
    một object bất kỳ (có thể không phải string) một cách an toàn.'
- id: '10'
  node: delegates-events
  tier: deep
  prompt: '`Func<string> fString = () => "x"; Func<object> fObject = fString;` — vì sao gán được mà không
    cần ép kiểu? Nếu đổi Func thành Action<string>/Action<object> ở vị trí tham số thì chiều hiệp biến
    có còn đúng không?'
  answer: 'Vì Func<out TResult> được đánh dấu out (hiệp biến — covariant): kiểu trả về cụ thể hơn (string,
    kiểu con) luôn dùng thay được cho kiểu trả về tổng quát hơn (object, kiểu cha). Đổi sang vị trí tham
    số (Action<in T>) thì chiều đảo ngược — đó là contravariance, không phải covariance: tham số phải
    nới rộng lên kiểu cha, không thu hẹp xuống kiểu con.'
- id: '11'
  node: delegates-events
  tier: deep
  prompt: Vì sao dùng async void cho event handler lại nguy hiểm hơn async Task? Nếu handler bên trong
    ném exception, ai bắt được nó?
  answer: Với async Task, exception được đóng gói vào đối tượng Task để caller await rồi try/catch. Với
    async void, không có Task nào chứa exception — nó bị ném thẳng ra SynchronizationContext/thread pool
    hiện tại ngay khi xảy ra, và nơi raise event (Ev?.Invoke()) không thể bắt được dù có bọc try/catch
    quanh đó. Chỉ chính bản thân handler mới có thể tự bắt lỗi của mình, bằng cách bọc try/catch toàn
    bộ thân handler.
- id: priority-queue-order
  node: collections
  tier: deep
  prompt: PriorityQueue<TElement, TPriority> rút phần tử ra theo tiêu chí nào, và Enqueue/Dequeue/Peek
    có độ phức tạp gì?
  answer: Luôn Dequeue phần tử có TPriority nhỏ nhất trước (min-heap), bất kể thứ tự Enqueue. Enqueue/Dequeue
    là O(log n) (sift-up/sift-down trên heap dựng bằng mảng), Peek là O(1) vì phần tử ưu tiên nhất luôn
    ở gốc heap.
- id: custom-equality-comparer
  node: collections
  tier: deep
  prompt: Muốn Dictionary<string,int> coi "AN" và "an" là cùng một khoá thì làm thế nào, và cơ chế nào
    cho phép việc đó?
  answer: Truyền một IEqualityComparer<string> tuỳ chỉnh vào constructor, ví dụ new Dictionary<string,int>(StringComparer.OrdinalIgnoreCase).
    Dictionary sẽ dùng Equals/GetHashCode của comparer này thay vì của kiểu khoá mặc định khi băm và so
    sánh.
- id: concurrent-dictionary-when
  node: collections
  tier: deep
  prompt: Khi nào nên đổi từ Dictionary<K,V> + lock thủ công sang ConcurrentDictionary<K,V>?
  answer: Khi thật sự có nhiều luồng cùng ghi đồng thời vào cùng một bảng với tần suất cao. ConcurrentDictionary
    cung cấp thao tác nguyên tử (AddOrUpdate, GetOrAdd) mà không cần khoá toàn bộ bảng, giảm tranh chấp
    so với lock thô. Nếu chỉ một luồng ghi rồi nhiều luồng chỉ đọc, Dictionary thường + đồng bộ đơn giản
    vẫn đủ.
- id: icomparer-vs-icomparable
  node: collections
  tier: deep
  prompt: IComparer<T> khác IComparable<T> ở điểm nào, và khi nào bắt buộc phải dùng IComparer<T>?
  answer: IComparable<T> triển khai ngay trên kiểu để định nghĩa một thứ tự tự nhiên duy nhất. IComparer<T>
    là đối tượng so sánh tách biệt, truyền vào constructor của SortedSet/SortedDictionary/Sort, cho phép
    nhiều cách sắp xếp khác nhau. Bắt buộc dùng IComparer<T> khi kiểu khoá không do bạn viết (ví dụ string).
- id: nen-tang-z01
  node: nen-tang
  tier: fast
  prompt: Trong 'if (tuoi = 18) { ... }' với tuoi là int, điều gì xảy ra?
  answer: 'Không biên dịch được — CS0029: không thể ngầm chuyển int (kết quả của phép gán ''='') sang
    bool. Phải dùng ''=='' để so sánh.'
- id: nen-tang-z02
  node: nen-tang
  tier: fast
  prompt: Khác biệt cốt lõi giữa vòng lặp for và while là gì?
  answer: for khai báo biến đếm, điều kiện, và bước cập nhật ngay trên một dòng (phù hợp khi biết trước
    số lần lặp); while chỉ kiểm tra điều kiện trước mỗi vòng và người viết phải tự cập nhật biến điều
    khiển bên trong thân vòng lặp (dễ quên, gây lặp vô hạn).
- id: nen-tang-z03
  node: nen-tang
  tier: fast
  prompt: out parameter dùng để làm gì, và tại sao 'int.TryParse("42", ketQua)' (thiếu out) không biên
    dịch được?
  answer: 'out cho phép method trả thêm giá trị ra ngoài qua tham số. Vì tham số đó được khai báo với
    ''out'' trong chữ ký method, lời gọi bắt buộc phải lặp lại từ khoá ''out'' — thiếu nó gây lỗi CS1620:
    Argument must be passed with the ''out'' keyword.'
- id: nen-tang-z04
  node: nen-tang
  tier: fast
  prompt: switch expression 'thu switch { 1 => "CN", 2 => "T2" }' (không có nhánh _) với thu là int có
    biên dịch được không? Vì sao?
  answer: Không — lỗi CS8509 (switch expression không exhaustive) vì hai nhánh liệt kê không bao phủ hết
    mọi giá trị int có thể có. Cần thêm nhánh mặc định '_' để xử lý mọi giá trị còn lại.
- id: nen-tang-z05
  node: nen-tang
  tier: fast
  prompt: Console.WriteLine("Xin chào {ten}") (thiếu dấu $) in ra gì, và vì sao không phải là lỗi biên
    dịch?
  answer: In ra nguyên văn 'Xin chào {ten}' vì thiếu '$' nên chuỗi không được coi là interpolated string
    — cặp {} chỉ là ký tự thường. Đây là lỗi hành vi (logic sai) chứ không phải lỗi biên dịch, vì cú pháp
    chuỗi thường vẫn hợp lệ.
- id: nen-tang-z06
  node: nen-tang
  tier: fast
  prompt: Không dùng checked, 'int wrongSilently = int.MaxValue + 1;' cho kết quả gì, và khác gì so với
    bọc trong checked(...)?
  answer: Kết quả là -2147483648 (tràn số quấn vòng về âm) mà KHÔNG có bất kỳ lỗi hay cảnh báo nào lúc
    chạy — vì mặc định C# dùng ngữ cảnh unchecked. Nếu bọc trong checked(int.MaxValue + 1), C# sẽ ném
    OverflowException để bạn phát hiện tràn số ngay lập tức thay vì để nó âm thầm sai.
- id: bo-nho-va-kieu-du-lieu-z01
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: struct và class khác nhau cơ bản ở điểm nào khi bạn gán một biến struct/class cho biến khác?
  answer: struct là value type nên gán/truyền sẽ sao chép TOÀN BỘ giá trị (hai bản độc lập); class là
    reference type nên gán/truyền chỉ sao chép THAM CHIẾU (hai tên cùng trỏ một object, sửa qua tên này
    thấy ở tên kia).
- id: bo-nho-va-kieu-du-lieu-z02
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: record struct Money(decimal Amount) khác gì so với một struct thường (vd struct Money { public
    decimal Amount; }) về mặt so sánh bằng ==?
  answer: record struct tự động sinh sẵn == (và Equals/GetHashCode) so sánh theo GIÁ TRỊ từng field, dùng
    được ngay không cần code thêm. struct thường KHÔNG có sẵn == cho kiểu tự định nghĩa (viết p1 == p2
    sẽ lỗi biên dịch), phải dùng .Equals() hoặc tự overload toán tử.
- id: bo-nho-va-kieu-du-lieu-z03
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: Nếu một class cài đặt (implement) một interface nhưng thiếu một phương thức mà interface yêu
    cầu, chuyện gì xảy ra và mã lỗi là gì?
  answer: Trình biên dịch báo lỗi CS0535 ('does not implement interface member') ngay lúc build, không
    đợi tới lúc chạy — vì interface là hợp đồng bắt buộc phải cài đặt đủ.
- id: bo-nho-va-kieu-du-lieu-z04
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: Viết int x = null; (không có dấu ?) sẽ gây lỗi gì, và cách sửa là gì?
  answer: 'Lỗi biên dịch CS0037 (''Cannot convert null to int because it is a non-nullable value type'')
    vì int thường không được phép là null. Cách sửa: khai báo x là int? (Nullable<int>) thay vì int.'
- id: bo-nho-va-kieu-du-lieu-z05
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: Tham số out dùng để làm gì, và nếu bên trong phương thức quên gán giá trị cho tham số out trước
    khi kết thúc thì lỗi gì xảy ra?
  answer: Tham số out cho phép phương thức 'trả thêm' một giá trị qua tham số đó (ngoài giá trị return
    bình thường). Nếu quên gán giá trị cho nó trước khi hàm kết thúc, trình biên dịch báo lỗi CS0177 ('The
    out parameter must be assigned before control leaves the current method').
- id: bo-nho-va-kieu-du-lieu-z06
  node: bo-nho-va-kieu-du-lieu
  tier: fast
  prompt: List<int> khác int[] (mảng) ở điểm nào khiến bạn chọn List<T> khi cần thêm phần tử dần dần?
  answer: int[] có kích thước CỐ ĐỊNH ngay khi tạo, không thể Add thêm phần tử. List<T> là kiểu tham chiếu
    trong thư viện chuẩn, tự động phình to khi gọi .Add(...), nên phù hợp khi số lượng phần tử chưa biết
    trước hoặc thay đổi theo thời gian.
- id: collections-linq-z01
  node: collections-linq
  tier: fast
  prompt: LINQ là viết tắt của gì, và nó chạy được trên những kiểu nào?
  answer: LINQ = Language Integrated Query, bộ toán tử chạy trên bất kỳ IEnumerable<T> nào (List<T>, Dictionary<K,V>,
    HashSet<T>, mảng...) và cả IQueryable<T> (vd EF Core).
- id: collections-linq-z02
  node: collections-linq
  tier: fast
  prompt: Select khác Where ở điểm cốt lõi nào?
  answer: Where lọc bớt phần tử (giữ số lượng <= nguồn) dựa trên điều kiện đúng/sai; Select biến đổi MỖI
    phần tử thành giá trị mới nhưng giữ nguyên số lượng phần tử.
- id: collections-linq-z03
  node: collections-linq
  tier: fast
  prompt: GroupBy(x => x.Key) trả về gì cho mỗi nhóm, và làm sao lấy các phần tử trong một nhóm?
  answer: Mỗi nhóm là một IGrouping có thuộc tính Key (giá trị khoá dùng để nhóm) và có thể duyệt (foreach/string.Join)
    để lấy ra các phần tử thuộc nhóm đó.
- id: collections-linq-z04
  node: collections-linq
  tier: fast
  prompt: Aggregate (không seed) trên một mảng rỗng sẽ xảy ra chuyện gì, và vì sao?
  answer: Ném InvalidOperationException, vì dạng không seed dùng phần tử đầu tiên của nguồn làm giá trị
    tích luỹ khởi đầu — mảng rỗng không có phần tử nào để bắt đầu.
- id: collections-linq-z05
  node: collections-linq
  tier: fast
  prompt: Anonymous type (new { ... }) thường được dùng khi nào trong pipeline LINQ?
  answer: Khi cần gom vài giá trị tạm thời (ví dụ trong Select sau GroupBy) mà không muốn định nghĩa hẳn
    một class/record riêng cho việc đó.
- id: collections-linq-z06
  node: collections-linq
  tier: fast
  prompt: Vì sao gọi một hàm C# tuỳ ý (không dịch được sang SQL) bên trong lambda của một IQueryable<T>
    lại gây lỗi lúc chạy?
  answer: Vì lambda trên IQueryable được lưu dưới dạng expression tree để provider (vd EF Core) dịch sang
    SQL; nếu hàm đó không có cách dịch tương ứng, provider ném NotSupportedException khi thực thi query.
- id: async-await-z01
  node: async-await
  tier: fast
  prompt: Sự khác biệt cốt lõi giữa Task và Task<T> là gì?
  answer: Task đại diện cho một công việc bất đồng bộ sẽ hoàn tất nhưng không mang giá trị kết quả; Task<T>
    cũng là một công việc bất đồng bộ nhưng khi hoàn tất sẽ mang theo một giá trị kiểu T, lấy được bằng
    await.
- id: async-await-z02
  node: async-await
  tier: fast
  prompt: Đoạn code `Task<int> tuoi = LayTuoi(); int namSau = tuoi + 5;` bị lỗi biên dịch gì, và vì sao?
  answer: Lỗi CS0029 (Cannot implicitly convert type 'Task<int>' to 'int'). Vì tuoi là đối tượng Task<int>
    (cái 'lời hứa'), không phải giá trị int bên trong nó — phải await để lấy ra giá trị thật.
- id: async-await-z03
  node: async-await
  tier: fast
  prompt: Tại sao dùng await bên trong một method không đánh dấu async lại gây lỗi biên dịch, và mã lỗi
    là gì?
  answer: 'Vì await chỉ hợp lệ trong method async — trình biên dịch cần method đó là một state machine
    bất đồng bộ để có thể tạm dừng/tiếp tục. Lỗi là CS4032: ''The await operator can only be used within
    an async method''.'
- id: async-await-z04
  node: async-await
  tier: fast
  prompt: CancellationToken là gì, và tại sao gọi Cancel() trên CancellationTokenSource không tự động
    dừng một Task.Delay nếu bạn quên truyền token vào?
  answer: CancellationToken là tín hiệu hợp tác báo 'hãy dừng sớm'. Việc huỷ chỉ có tác dụng với các lời
    gọi async NHẬN token đó làm tham số; nếu Task.Delay được gọi không kèm token, nó không hề biết token
    đã bị huỷ nên vẫn chạy hết thời gian như bình thường — runtime không tự ép dừng code không được truyền
    token.
- id: async-await-z05
  node: async-await
  tier: fast
  prompt: Vì sao viết await bên trong vòng foreach để gọi nhiều task I/O độc lập lại chậm hơn dùng Task.WhenAll,
    dù cả hai đều không có lỗi biên dịch?
  answer: Vì await trong foreach khiến mỗi vòng lặp phải chờ task hiện tại xong hẳn rồi mới khởi động
    task cho phần tử kế tiếp (tuần tự, tổng thời gian cộng dồn). Trong khi đó, khởi động tất cả các task
    trước (ví dụ qua Select) rồi mới await Task.WhenAll cho phép chúng chạy chồng thời gian song song,
    nên tổng thời gian chỉ bằng thời gian của task lâu nhất.
- id: async-await-z06
  node: async-await
  tier: fast
  prompt: LINQ Select trong biểu thức `ids.Select(id => LayTrang(id))` trả về kiểu gì, và vì sao các task
    bên trong đã 'chạy' ngay cả khi chưa await?
  answer: Trả về IEnumerable<Task<string>> — một dãy các đối tượng Task, mỗi phần tử là một task ĐÃ được
    khởi động. Điều này xảy ra vì gọi LayTrang(id) khiến method async đó chạy ngay lập tức tới điểm await
    đầu tiên bên trong nó rồi trả về một Task đại diện cho phần còn lại, chứ không phải đợi Select mới
    bắt đầu chạy.
- id: generics-z01
  node: generics
  tier: fast
  prompt: 'Khác biệt giữa `where T : class` và `where T : class?` là gì?'
  answer: 'Cả hai đều buộc T là reference type. `class` coi T là non-nullable mặc định (gán null trực
    tiếp cho tham số kiểu T sẽ phát sinh warning nullability trong ngữ cảnh #nullable enable). `class?`
    nới lỏng để T có thể được xem là nullable reference (string?) ngay từ đầu, cho phép API generic nhận
    cả string lẫn string? mà không bị cảnh báo.'
- id: generics-z02
  node: generics
  tier: fast
  prompt: Tại sao trước C# 13 không thể viết `static T Identity<T>(T value) => value;` rồi gọi `Identity(mySpan)`
    với `mySpan` là `Span<int>`? Lỗi gì xảy ra?
  answer: 'Vì ref struct (như Span<int>) trước C# 13 hoàn toàn bị cấm dùng làm đối số kiểu (type argument)
    cho một tham số kiểu generic thông thường. Trình biên dịch báo lỗi CS0306 (''The type may not be used
    as a type argument''). Phải thêm ràng buộc `where T : allows ref struct` để cho phép.'
- id: generics-z03
  node: generics
  tier: fast
  prompt: '`where T : allows ref struct` có tự động cho phép bạn gọi các member cụ thể của Span<T> (như
    .Length) bên trong thân method generic không?'
  answer: Không. `allows ref struct` chỉ gỡ bỏ lệnh cấm dùng ref struct làm T — nó không mở khoá member
    nào. Muốn gọi member cụ thể của Span<T>, phải thiết kế API nhận thẳng Span<T> thay vì T chung chung,
    hoặc thêm ràng buộc khác phù hợp.
- id: generics-z04
  node: generics
  tier: fast
  prompt: Trong bảng tổng kết ràng buộc ở mục 4.10, 4 dòng cuối (class?, Enum, Delegate, allows ref struct)
    có vai trò gì, và bạn nên đọc phần nào tiếp theo nếu chưa từng gặp chúng?
  answer: Bảng 4.10 chỉ đóng vai trò tra cứu nhanh / mục lục xem trước, không phải nơi dạy khái niệm lần
    đầu. Nếu chưa từng gặp 4 ràng buộc đó, cần đọc mục 4.11 ngay sau — nơi mỗi ràng buộc có định nghĩa
    và ví dụ chạy được đầy đủ.
- id: generics-z05
  node: generics
  tier: fast
  prompt: Nếu một lớp Order không implement IComparable<Order>, gọi `orders.Sort()` (không tham số) trên
    `List<Order>` sẽ xảy ra chuyện gì — lỗi biên dịch hay lỗi runtime? Loại exception nào?
  answer: Biên dịch OK (vì List<T>.Sort() không tham số không đòi hỏi ràng buộc IComparable<T> tại compile-time).
    Lúc chạy, Comparer<T>.Default cố tìm IComparable<T>/IComparable trên T, không thấy sẽ ném InvalidOperationException.
- id: generics-z06
  node: generics
  tier: fast
  prompt: Nếu Person không implement IComparable<Person>, làm sao vẫn sắp xếp được một List<Person> mà
    không phải sửa lớp Person?
  answer: Truyền một IComparer<Person> riêng vào List<Person>.Sort(IComparer<T>), ví dụ một lớp ByNameComparer
    implement IComparer<Person> với logic Compare tuỳ ý — không cần động vào định nghĩa lớp Person.
- id: delegates-events-z01
  node: delegates-events
  tier: fast
  prompt: Vì sao method `static string MakeString() => "x";` gán được vào biến `Func<object> makeObj =
    MakeString;` dù kiểu trả về khai báo trên delegate là `object` còn method trả `string`? Đây gọi là
    gì?
  answer: 'Vì đây là return-type covariance: method được phép trả về một kiểu con (string) cụ thể hơn
    kiểu trả về khai báo trên delegate (object), vì mọi string đều là một object hợp lệ nên luôn an toàn
    kiểu khi dùng thay.'
- id: delegates-events-z02
  node: delegates-events
  tier: fast
  prompt: Đoạn code `Func<object> fObject = () => new object(); Func<string> fString = fObject;` có biên
    dịch được không? Vì sao?
  answer: Không biên dịch được (lỗi CS0029). Covariance của Func<out TResult> chỉ cho phép gán theo chiều
    con sang cha (Func<string> gán được cho Func<object>), không được chiều ngược lại, vì một object bất
    kỳ do fObject trả về không chắc chắn là string.
- id: delegates-events-z03
  node: delegates-events
  tier: fast
  prompt: Anonymous method là gì, và nó khác lambda ở điểm cú pháp nào?
  answer: Anonymous method là một hàm không tên được định nghĩa ngay tại chỗ dùng bằng từ khoá delegate
    kèm thân {}, ra đời ở C# 2.0 (ví dụ delegate (int x) { return x*x; }). Lambda (C# 3.0) làm cùng việc
    nhưng gọn hơn, dùng cú pháp x => x*x, không cần từ khoá delegate.
- id: delegates-events-z04
  node: delegates-events
  tier: fast
  prompt: Lambda `(int x, int y = 10) => x + y` gọi bằng `withDefault(5)` cho kết quả gì, và tính năng
    này có từ phiên bản C# nào?
  answer: Kết quả là 15 (x=5, y dùng giá trị mặc định 10). Default parameter trong lambda là tính năng
    của C# 12+.
- id: delegates-events-z05
  node: delegates-events
  tier: fast
  prompt: Viết một lambda dùng params để tính tổng số lượng tuỳ ý số nguyên, và cho biết gọi `sum()` không
    truyền gì thì trả về bao nhiêu?
  answer: var sum = (params int[] xs) => xs.Sum(); Gọi sum() (không truyền đối số) trả về 0 vì mảng xs
    rỗng và Sum() của mảng rỗng là 0.
- id: delegates-events-z06
  node: delegates-events
  tier: fast
  prompt: Vì sao `var bad = (int x = 10, int y) => x + y;` không biên dịch được?
  answer: Vì tham số có giá trị mặc định (x = 10) phải đứng sau mọi tham số bắt buộc, ở đây x có default
    lại đứng trước y không có default nên trình biên dịch báo lỗi CS1737.
- id: delegates-events-z07
  node: delegates-events
  tier: fast
  prompt: init là gì, và điều gì xảy ra nếu bạn cố gán lại một property khai báo `{ get; init; }` sau
    khi đối tượng đã được khởi tạo xong?
  answer: init là một setter chỉ cho phép gán trong lúc khởi tạo đối tượng (object-initializer hoặc constructor),
    có từ C# 9+. Nếu gán lại property đó sau khi đối tượng đã khởi tạo xong (ví dụ e.Attempted = 300m
    sau khi e đã được new), trình biên dịch báo lỗi CS8852 (init-only property chỉ gán được lúc khởi tạo).
- id: delegates-events-z08
  node: delegates-events
  tier: fast
  prompt: Sau đoạn code `pipeline += A; pipeline += B; pipeline += C; pipeline -= null;`, GetInvocationList().Length
    của pipeline là bao nhiêu? Giải thích vì sao.
  answer: Vẫn là 3. -= chỉ gỡ một mục khớp hệt (cùng Target và Method) với toán hạng bên phải; null không
    khớp với A, B hay C nào trong invocation list nên phép trừ không tìm thấy gì để gỡ, delegate giữ nguyên
    cả 3 handler và không ném exception.
- id: records-pattern-matching-z01
  node: records-pattern-matching
  tier: fast
  prompt: HashSet<T> quyết định một phần tử "đã có trong tập hợp chưa" bằng cách nào, và tại sao điều
    này khiến record hoạt động "just works" như key/phần tử trong HashSet nhưng class thường thì không?
  answer: HashSet<T> dùng Equals/GetHashCode của phần tử để kiểm tra trùng lặp. Record tự sinh value equality
    (so theo giá trị thành viên) nên hai record cùng nội dung được xem là trùng dù là hai object khác
    nhau trên heap. Class thường mặc định dùng reference equality nên hai object khác địa chỉ luôn được
    coi là khác nhau, dù nội dung giống hệt, khiến Contains trả về False một cách bất ngờ.
- id: records-pattern-matching-z02
  node: records-pattern-matching
  tier: fast
  prompt: 'Trong ví dụ mục 2.2, cú pháp `record Cat(string Name, int Age) : Animal(Name, Age)` thể hiện
    điều gì, và mục nào trong chương sẽ dạy chi tiết cơ chế này?'
  answer: 'Đây là cú pháp kế thừa record: Cat là một record dẫn xuất, kế thừa từ record Animal, và gọi
    constructor của Animal với Name, Age. Mục 2.7 (Kế thừa giữa các record) dạy chi tiết cơ chế này, bao
    gồm cách Equals/GetHashCode/PrintMembers được nối theo chuỗi kế thừa.'
- id: records-pattern-matching-z03
  node: records-pattern-matching
  tier: fast
  prompt: Cú pháp `(int a, int b)` làm tham số kiểu trong `static string Sign((int a, int b) t)` là gì,
    và nó khác một record hay class ở điểm nào về mục đích sử dụng?
  answer: Đó là kiểu tuple dựng sẵn của C#, gộp nhiều giá trị có tên (a, b) thành một "gói" nhẹ mà không
    cần khai báo class/record riêng. Khác với record — vốn dùng để mô hình hoá một khái niệm nghiệp vụ
    có tên riêng, có thể mở rộng property/method — tuple thường dùng cho nhóm giá trị tạm thời, cục bộ,
    không cần định danh kiểu riêng.
- id: records-pattern-matching-z04
  node: records-pattern-matching
  tier: fast
  prompt: Theo chương này, nếu cần so sánh mảng theo phần tử trong record một cách "chuẩn thư viện" thay
    vì tự viết Equals/GetHashCode, hai hướng nào được nhắc tới, và chúng có được dạy chi tiết trong chương
    này không?
  answer: Hai hướng được nhắc tới là dùng ImmutableArray<T> kết hợp comparer, hoặc bọc bằng IStructuralEquatable.
    Cả hai được chương này gắn nhãn rõ là NGOÀI PHẠM VI chương — chỉ nêu tên để biết hướng tồn tại, người
    học cần tự tìm hiểu thêm nếu muốn dùng; chương chỉ dạy chi tiết cách tự viết Equals/GetHashCode so
    theo phần tử.
- id: records-pattern-matching-z05
  node: records-pattern-matching
  tier: fast
  prompt: Stack<T> và Queue<T> khác nhau ở thứ tự lấy phần tử ra như thế nào? Với `Stack<int>` chứa lần
    lượt 1, 2, 3 (theo thứ tự thêm vào), gọi Pop ba lần sẽ ra thứ tự nào?
  answer: 'Stack<T> là LIFO (vào sau ra trước): phần tử thêm vào gần nhất được lấy ra đầu tiên. Queue<T>
    là FIFO (vào trước ra trước): phần tử thêm vào sớm nhất được lấy ra đầu tiên. Với Stack chứa 1, 2,
    3 theo thứ tự đó, ba lần gọi Pop sẽ cho ra 3, 2, 1.'
- id: records-pattern-matching-z06
  node: records-pattern-matching
  tier: fast
  prompt: HashCode.Combine(Amount, Currency) trong ví dụ Money viết-tay dùng để làm gì, và tại sao nó
    phải được giữ đồng bộ với Equals?
  answer: 'HashCode.Combine là hàm tiện ích trộn nhiều giá trị (ở đây là Amount và Currency) thành một
    mã băm (hash code) duy nhất cho object. Nó phải đồng bộ với Equals vì quy tắc bắt buộc của .NET: hai
    object được Equals coi là bằng nhau thì PHẢI có cùng GetHashCode; nếu lệch, các cấu trúc dựa trên
    hash như Dictionary/HashSet sẽ hoạt động sai (ví dụ không tìm thấy phần tử dù nó tồn tại).'
- id: collections-z13
  node: collections
  tier: fast
  prompt: Vì sao hàm chỉ cần đếm số phần tử của một collection (không sửa, không cần chỉ số) nên nhận
    tham số kiểu IReadOnlyCollection<T> thay vì List<T>?
  answer: IReadOnlyCollection<T> chỉ đòi hỏi caller cung cấp thứ gì đó có Count và duyệt được — rộng hơn
    List<T> nhiều (nhận cả mảng, HashSet, ReadOnlyCollection...) và tự tài liệu hoá cam kết 'hàm không
    sửa collection của caller'. Nhận List<T> khoá cứng kiểu cụ thể và ngầm cho phép hàm gọi Add/Remove/Clear
    phá vỡ dữ liệu của caller.
- id: collections-z14
  node: collections
  tier: fast
  prompt: Trong 8 interface collection, interface nào cho phép đọc/ghi qua this[int] và interface nào
    chỉ cho phép đọc qua this[int]? Nêu tên cụ thể.
  answer: IList<T> cho phép đọc/ghi qua this[int] (đặt lại phần tử tại chỉ số). IReadOnlyList<T> chỉ cho
    phép đọc qua this[int] — gán qua interface này (vd xs[0] = 9) sẽ không biên dịch vì indexer chỉ có
    getter.
- id: collections-z15
  node: collections
  tier: fast
  prompt: Cho một Dictionary<SanPham,int> dùng comparer tự viết chỉ so theo trường Ma (không phân biệt
    hoa/thường), tại sao GetHashCode(SanPham obj) phải băm theo Ma.ToUpperInvariant() chứ không phải băm
    toàn bộ đối tượng?
  answer: 'Vì phải tôn trọng hợp đồng Equals/GetHashCode: nếu Equals(a,b) trả true (hai Ma giống nhau
    không phân biệt hoa/thường) thì GetHashCode(a) phải bằng GetHashCode(b). Nếu băm theo Ten hoặc toàn
    bộ đối tượng, hai SanPham có Ma bằng nhau nhưng Ten khác nhau sẽ cho hash khác nhau, vi phạm hợp đồng
    và làm ContainsKey/TryGetValue có thể trả sai (không tìm thấy phần tử dù Equals coi là bằng nhau).'
- id: collections-z16
  node: collections
  tier: fast
  prompt: Dùng SortedList<K,V> làm khoá với một class không cài IComparable<T> và không truyền IComparer<T>,
    thêm phần tử thứ hai sẽ ném exception gì, và exception đó ở lớp SortedDictionary<K,V>/SortedSet<T>
    có giống hệt không?
  answer: 'SortedList<K,V> ném InvalidOperationException với message ''Failed to compare two elements
    in the array'' (vì bên trong dùng Array.Sort/Array.BinarySearch). SortedDictionary<K,V> và SortedSet<T>
    gặp cùng nguyên nhân (khoá không so sánh được) nhưng ném ArgumentException (''At least one object
    must implement IComparable'') vì cây đỏ-đen bên trong gọi thẳng Comparer<T>.Default.Compare. Cách
    sửa ở cả ba giống nhau: cài IComparable<T> lên khoá hoặc truyền IComparer<T>.'
- id: collections-z17
  node: collections
  tier: fast
  prompt: ConcurrentQueue<T>.TryDequeue và ConcurrentStack<T>.TryPop khác Queue<T>.Dequeue/Stack<T>.Pop
    ở điểm nào khi collection rỗng?
  answer: Queue<T>.Dequeue và Stack<T>.Pop ném InvalidOperationException khi rỗng. ConcurrentQueue<T>.TryDequeue
    và ConcurrentStack<T>.TryPop không ném — chúng trả về bool (false nếu rỗng) và giá trị ra qua tham
    số out, phù hợp với ngữ cảnh đa luồng nơi trạng thái rỗng/không-rỗng có thể đổi giữa lúc kiểm tra
    và lúc lấy phần tử.
- id: collections-z18
  node: collections
  tier: fast
  prompt: SortedList<K,V> hỗ trợ truy cập theo index qua Keys[i] và Values[i] — SortedDictionary<K,V>
    có hỗ trợ tương tự không? Vì sao?
  answer: Không. SortedDictionary<K,V> bên trong là cây đỏ-đen (node liên kết qua con trỏ), không có mảng
    liền khối để truy cập O(1) theo chỉ số như SortedList<K,V> (hai mảng song song khoá/giá trị). Muốn
    lấy phần tử theo vị trí thứ i trong SortedDictionary phải duyệt O(n) hoặc chuyển sang cấu trúc khác.
- id: exceptions-z01
  node: exceptions
  tier: fast
  prompt: Nếu khối catch khai báo sai loại exception (không khớp loại thực sự được ném và cũng không phải
    lớp cha của nó), điều gì xảy ra?
  answer: Khối catch đó không chạy — exception tiếp tục bay lên (unwind) tìm catch phù hợp ở ngoài, nếu
    không có catch nào phù hợp thì chương trình crash.
- id: exceptions-z02
  node: exceptions
  tier: fast
  prompt: 'So sánh stack trace: dùng throw; thì stack trace vẫn trỏ tới đâu, còn throw ex; thì trỏ tới
    đâu?'
  answer: throw; giữ nguyên stack trace, dòng đầu tiên vẫn là nơi lỗi thật sự phát sinh (ví dụ FailDeep()).
    throw ex; reset stack trace, dòng đầu tiên trở thành chính dòng throw ex; đó, làm mất dấu vết nơi
    lỗi gốc xảy ra.
- id: exceptions-z03
  node: exceptions
  tier: fast
  prompt: using var res = new X(); khác gì so với using (var res = new X()) { ... } về phạm vi (scope)
    mà Dispose() được gọi?
  answer: using var không có dấu ngoặc giới hạn — Dispose() chỉ chạy khi biến ra khỏi scope hiện tại (thường
    là cuối phương thức/khối chứa nó), có thể giữ tài nguyên mở lâu hơn cần thiết. using (...) { } tường
    minh cho phép giới hạn scope hẹp, đóng tài nguyên ngay khi ra khỏi khối.
- id: exceptions-z04
  node: exceptions
  tier: fast
  prompt: Khi nhiều Task chạy song song đều lỗi và bạn gọi Task.WaitAll(...), loại exception nào thực
    sự được ném ra ở ngoài, và làm sao lấy được từng lỗi con?
  answer: AggregateException được ném ra (không phải loại lỗi gốc của từng task). Dùng thuộc tính InnerExceptions
    để lấy danh sách các exception con; nếu có AggregateException lồng nhau thì gọi ex.Flatten() để gộp
    về danh sách phẳng.
- id: exceptions-z05
  node: exceptions
  tier: fast
  prompt: Vì sao try/catch bao quanh lời gọi một phương thức async void không bắt được exception ném ra
    bên trong nó, trong khi async Task thì bắt được?
  answer: Với async Task, exception được lưu vào đối tượng Task và chỉ ném lại khi có await, nên try/catch
    quanh await bắt được bình thường. Với async void, không có Task nào lưu exception, lỗi ném thẳng ra
    context gọi ngay khi hàm đang chạy (không đồng bộ với điểm gọi), nên try/catch bao quanh lời gọi không
    có tác dụng.
- id: exceptions-z06
  node: exceptions
  tier: fast
  prompt: Nếu constructor của custom exception quên gọi base(message), thuộc tính Message sẽ trả về gì?
  answer: Message sẽ rơi về thông điệp mặc định chung chung của .NET (dạng "Exception of type '...' was
    thrown.") thay vì mô tả lỗi nghiệp vụ cụ thể mà bạn muốn truyền vào.
- id: loc-nang-cao-q1
  node: loc-nang-cao
  tier: fast
  prompt: SELECT * FROM t WHERE col NOT IN (1, 2, NULL); trả về bao nhiêu dòng bất kể col là gì?
  answer: 0 dòng. NOT IN giãn thành col<>1 AND col<>2 AND col<>NULL; vế cuối luôn UNKNOWN, và UNKNOWN
    lan trong AND khiến toàn bộ biểu thức không bao giờ TRUE.
- id: loc-nang-cao-q2
  node: loc-nang-cao
  tier: fast
  prompt: Khác biệt giữa LIKE và ILIKE là gì?
  answer: LIKE phân biệt hoa/thường; ILIKE (chỉ có ở PostgreSQL) không phân biệt hoa/thường. Cả hai dùng
    % (0+ ký tự) và _ (đúng 1 ký tự) làm đại diện.
- id: loc-nang-cao-q3
  node: loc-nang-cao
  tier: fast
  prompt: SELECT price BETWEEN 300 AND 200; có báo lỗi cú pháp không? Kết quả là gì?
  answer: Không báo lỗi cú pháp. BETWEEN a AND b giãn thành x>=a AND x<=b; với a=300,b=200 không giá trị
    nào thoả cả hai nên kết quả luôn FALSE (0 dòng) — lỗi logic âm thầm.
- id: loc-nang-cao-q4
  node: loc-nang-cao
  tier: fast
  prompt: COALESCE và NULLIF khác nhau ở điểm nào?
  answer: COALESCE(v1,...,vn) trả giá trị khác NULL đầu tiên (thay NULL bằng giá trị khác). NULLIF(a,b)
    trả NULL nếu a=b, ngược lại trả a (biến một giá trị cụ thể thành NULL, ví dụ tránh chia cho 0).
- id: loc-nang-cao-q5
  node: loc-nang-cao
  tier: fast
  prompt: Vì sao SELECT total / count_ FROM stats; có thể ném lỗi runtime, và cách phòng tránh?
  answer: Nếu count_ = 0, phép chia ném lỗi division by zero lúc thực thi. Phòng tránh bằng total / NULLIF(count_,
    0) — khi count_=0, NULLIF trả NULL và chia cho NULL cho kết quả NULL thay vì lỗi.
- id: loc-nang-cao-q6
  node: loc-nang-cao
  tier: fast
  prompt: SELECT DISTINCT city, country FROM visits; loại trùng theo cột nào?
  answer: Theo tổ hợp cả hai cột (city, country) — hai dòng chỉ coi là trùng khi cả city VÀ country giống
    hệt nhau, không lọc trùng riêng từng cột.
- id: loc-nang-cao-q7
  node: loc-nang-cao
  tier: fast
  prompt: Toán tử ~ khác LIKE ở điểm cốt lõi nào, và khi nào nên chọn ~?
  answer: ~ khớp theo biểu thức chính quy (regex), mạnh hơn nhiều so với %/_ của LIKE (hỗ trợ lớp ký tự,
    số lần lặp, neo đầu/cuối chuỗi). Nên chọn ~ khi cần ràng buộc định dạng chính xác như 'đúng N chữ
    số'.
- id: joins-aggregation-q6
  node: joins-aggregation
  tier: fast
  prompt: Vì sao NOT IN (SELECT khach_hang_id FROM don_hang) có thể trả về rỗng một cách sai lệch, còn
    NOT EXISTS thì không?
  answer: NOT IN (list) tương đương chuỗi <> nối bằng AND với từng phần tử; nếu list chứa một NULL, so
    sánh <> NULL cho UNKNOWN khiến cả AND không bao giờ TRUE, nên toàn bộ kết quả rỗng. NOT EXISTS không
    so sánh giá trị trực tiếp mà chỉ kiểm tra sự tồn tại, nên không bị ảnh hưởng bởi NULL.
- id: joins-aggregation-q7
  node: joins-aggregation
  tier: fast
  prompt: Đặt d.so_tien > 50 trong ON của một LEFT JOIN khác gì so với đặt trong WHERE sau LEFT JOIN đó?
  answer: 'Đặt trong ON: dòng trái không khớp vẫn được giữ (đúng bản chất LEFT JOIN). Đặt trong WHERE
    sau LEFT JOIN: vì NULL > 50 là UNKNOWN, dòng trái không khớp bị loại — LEFT JOIN bị biến thành INNER
    JOIN trên thực tế.'
- id: subquery-cte-q1
  node: subquery-cte
  tier: fast
  prompt: Subquery trong WHERE khác subquery trong FROM (derived table) ở điểm nào về vai trò trong câu
    lệnh?
  answer: Subquery trong WHERE trả về một giá trị hoặc một tập giá trị dùng để lọc dòng của truy vấn ngoài;
    subquery trong FROM (derived table) đóng vai trò một bảng nguồn để truy vấn ngoài SELECT/JOIN tiếp
    lên trên, không dùng để so sánh trực tiếp.
- id: subquery-cte-q2
  node: subquery-cte
  tier: fast
  prompt: Vì sao scalar subquery trong SELECT bắt buộc phải trả về đúng một dòng, một cột — và điều gì
    xảy ra nếu nó không khớp dòng nào (khác với khớp nhiều dòng)?
  answer: Vì kết quả phải đặt vừa vào một ô của hàng kết quả ngoài — SQL không biểu diễn được nhiều giá
    trị trong một ô. Nếu subquery trả nhiều dòng, PostgreSQL báo lỗi runtime 'more than one row returned
    by a subquery used as an expression'; nếu không khớp dòng nào, subquery trả về NULL một cách hợp lệ,
    không phải lỗi.
- id: subquery-cte-q3
  node: subquery-cte
  tier: fast
  prompt: Correlated subquery khác subquery thường (không tương quan) ở điểm nào, và vì sao correlated
    subquery thường chạy chậm hơn với bảng lớn?
  answer: Correlated subquery tham chiếu cột của truy vấn ngoài nên phải đánh giá lại cho từng dòng ngoài;
    subquery thường độc lập, chỉ tính một lần. Vì chạy lại nhiều lần (tối đa bằng số dòng ngoài), correlated
    subquery dễ chậm hơn khi bảng lớn, đặc biệt nếu bên trong nó quét toàn bảng mỗi lần.
- id: subquery-cte-q4
  node: subquery-cte
  tier: fast
  prompt: Vì sao NOT IN (subquery) có thể trả về kết quả rỗng một cách sai lệch, còn NOT EXISTS thì không
    bị vấn đề này?
  answer: Nếu subquery của NOT IN trả về tập chứa NULL, so sánh giá trị với NULL cho UNKNOWN, và phép
    phủ định/AND ẩn bên trong NOT IN khiến toàn bộ điều kiện thành UNKNOWN (coi như FALSE) cho mọi dòng
    — dẫn tới kết quả rỗng bất ngờ. NOT EXISTS không so sánh giá trị trực tiếp, chỉ hỏi 'có dòng khớp
    hay không', nên không bị NULL trong subquery ảnh hưởng.
- id: subquery-cte-q5
  node: subquery-cte
  tier: fast
  prompt: CTE (WITH) có phải luôn nhanh hơn subquery lồng trực tiếp không? Giải thích ngắn gọn.
  answer: Không. Từ PostgreSQL 12, CTE không đệ quy có thể được trình tối ưu inline (nhúng) như một subquery
    thường, trừ khi ép MATERIALIZED, dùng đệ quy, hoặc được tham chiếu nhiều lần. Hiệu năng thực tế cần
    kiểm chứng bằng EXPLAIN ANALYZE, không nên giả định.
- id: subquery-cte-q6
  node: subquery-cte
  tier: fast
  prompt: Recursive CTE gồm hai phần nào, nối với nhau bằng từ khoá gì, và điều kiện gì khiến nó dừng
    đệ quy?
  answer: Gồm anchor member (truy vấn khởi tạo, không tham chiếu tên CTE) và recursive member (truy vấn
    tham chiếu lại chính tên CTE), nối bằng UNION hoặc UNION ALL. Nó dừng khi recursive member, chạy trên
    tập kết quả mới nhất, không còn sinh ra dòng nào nữa.
- id: subquery-cte-q7
  node: subquery-cte
  tier: fast
  prompt: Vì sao nên ưu tiên UNION ALL hơn UNION trong hầu hết recursive CTE thực chiến?
  answer: Vì UNION khử trùng lặp bằng cách so sánh toàn bộ cột sau mỗi vòng lặp, tốn chi phí hơn UNION
    ALL; đồng thời nếu CTE có cột luôn tăng dần (như cấp độ), mỗi dòng luôn khác nhau nên UNION không
    loại được vòng lặp — điều kiện dừng tường minh (WHERE cap < N) mới thực sự đáng tin cậy.
- id: subquery-cte-q8
  node: subquery-cte
  tier: fast
  prompt: Viết truy vấn dùng EXISTS (không dùng IN) để tìm khách hàng có ít nhất một đơn hàng, cho bảng
    customers(id) và orders(id, customer_id).
  answer: SELECT c.id FROM customers c WHERE EXISTS (SELECT 1 FROM orders o WHERE o.customer_id = c.id);
- id: window-functions-q1
  node: window-functions
  tier: fast
  prompt: OVER() khác GROUP BY ở điểm cốt lõi nào về số dòng trả về?
  answer: GROUP BY gộp N dòng đầu vào thành ít dòng hơn (mỗi nhóm một dòng), mất chi tiết dòng gốc; OVER()
    giữ nguyên toàn bộ N dòng gốc trong kết quả, chỉ thêm một cột tính từ cửa sổ (window) mà dòng đó thuộc
    về — không gộp dòng.
- id: window-functions-q2
  node: window-functions
  tier: fast
  prompt: PARTITION BY trong OVER(...) có tác dụng gì, và nó khác GROUP BY ở đâu dù ý tưởng "chia nhóm"
    giống nhau?
  answer: 'PARTITION BY chia các dòng thành nhiều nhóm con theo giá trị cột, và window function tính riêng
    cho từng nhóm — giống ý tưởng GROUP BY. Khác biệt: PARTITION BY KHÔNG gộp dòng, mỗi dòng gốc vẫn xuất
    hiện trong kết quả kèm giá trị tổng hợp của nhóm nó thuộc về, trong khi GROUP BY thay N dòng bằng
    một dòng đại diện mỗi nhóm.'
- id: window-functions-q3
  node: window-functions
  tier: fast
  prompt: Cho hai dòng đồng hạng nhất theo ORDER BY, dòng thứ ba sẽ nhận hạng bao nhiêu với RANK(), và
    bao nhiêu với DENSE_RANK()?
  answer: RANK() cho hạng 3 (nhảy số, bỏ qua hạng 2 vì đã có 2 dòng chiếm hạng 1). DENSE_RANK() cho hạng
    2 (không nhảy số, hạng luôn liên tục theo số mức giá trị khác nhau đã xuất hiện).
- id: window-functions-q4
  node: window-functions
  tier: fast
  prompt: Vì sao không thể viết WHERE ROW_NUMBER() OVER (...) = 1 trực tiếp trong cùng một câu SELECT?
    Cách khắc phục là gì?
  answer: 'Vì window function được tính SAU giai đoạn WHERE trong thứ tự thực thi logic của PostgreSQL
    (FROM -> WHERE -> GROUP BY -> HAVING -> window function -> SELECT -> ORDER BY) — tại thời điểm WHERE
    chạy, giá trị window function chưa tồn tại. Khắc phục: bọc câu lệnh có window function trong một CTE
    (WITH ... AS (...)) hoặc subquery ở FROM, rồi lọc bằng WHERE ở câu lệnh bên ngoài.'
- id: window-functions-q5
  node: window-functions
  tier: fast
  prompt: SUM(x) OVER (ORDER BY y) khác SUM(x) OVER () (không có ORDER BY) như thế nào về kết quả?
  answer: SUM(x) OVER (ORDER BY y) tính tổng LUỸ KẾ (cộng dồn từ dòng đầu cửa sổ đến dòng hiện tại theo
    thứ tự y, vì frame mặc định là RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW). SUM(x) OVER ()
    không có ORDER BY tính tổng TOÀN BỘ cửa sổ và lặp lại đúng giá trị đó ở mọi dòng.
- id: window-functions-q6
  node: window-functions
  tier: fast
  prompt: LAG(cot) ở dòng đầu tiên của một cửa sổ trả về giá trị gì, và vì sao?
  answer: Trả về NULL, vì không có dòng nào đứng trước dòng đầu tiên trong cửa sổ (theo ORDER BY) để LAG
    lấy giá trị.
- id: window-functions-q7
  node: window-functions
  tier: fast
  prompt: Muốn tính "so với tháng trước, chỉ trong cùng một vùng" mà không bị lẫn dữ liệu vùng khác khi
    dùng LAG(), cần thêm điều gì vào OVER(...)?
  answer: Thêm PARTITION BY <cột vùng> vào OVER(...) của LAG(), để nó chỉ tìm dòng trước đó TRONG CÙNG
    PARTITION (cùng vùng) thay vì tìm trên toàn bộ tập dữ liệu bất kể vùng.
- id: window-functions-q8
  node: window-functions
  tier: fast
  prompt: LAST_VALUE() với frame mặc định của OVER() có tự động trả về dòng cuối cùng thật sự của cả partition
    không? Vì sao đây là cạm bẫy nguy hiểm?
  answer: Không. Frame mặc định khi có ORDER BY là RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW,
    nên LAST_VALUE() chỉ "thấy" đến dòng hiện tại, không thấy toàn bộ partition — kết quả thường trùng
    với giá trị của chính dòng đang xét. Đây là cạm bẫy nguy hiểm vì câu lệnh chạy không lỗi và kết quả
    trông hợp lý, nhưng sai về nghiệp vụ; phải tự mở rộng frame bằng ROWS BETWEEN UNBOUNDED PRECEDING
    AND UNBOUNDED FOLLOWING để lấy đúng dòng cuối của cả partition.
- id: constraints-q1
  node: constraints
  tier: fast
  prompt: Vì sao PRIMARY KEY có thể coi là UNIQUE + NOT NULL gộp lại? Cho ví dụ lỗi minh hoạ từng phần.
  answer: Vì khai báo PRIMARY KEY tự động tạo một unique index (B-tree) trên cột đó và bắt buộc cột không
    được NULL. Vi phạm phần UNIQUE cho lỗi 'duplicate key value violates unique constraint'; vi phạm phần
    NOT NULL cho lỗi 'null value in column ... violates not-null constraint'.
- id: constraints-q2
  node: constraints
  tier: fast
  prompt: Loại index nào được PostgreSQL dùng để ép ràng buộc PRIMARY KEY? Vì sao loại đó phù hợp hơn
    loại còn lại cho khoá chính?
  answer: B-tree, không phải Hash. B-tree hỗ trợ cả so sánh bằng lẫn so sánh khoảng/sắp xếp (<, >, BETWEEN,
    ORDER BY), phù hợp với cách khoá chính thường được dùng để tra cứu và sắp xếp. Hash index chỉ hỗ trợ
    so sánh bằng.
- id: constraints-q3
  node: constraints
  tier: fast
  prompt: Bảng books(id PK, author_id FK REFERENCES authors(id) ON DELETE CASCADE). Xoá một tác giả đang
    có 3 cuốn sách thì điều gì xảy ra?
  answer: Cả 3 dòng trong books tham chiếu tới tác giả đó cũng bị xoá theo, vì ON DELETE CASCADE lan truyền
    việc xoá từ bảng cha sang bảng con.
- id: constraints-q4
  node: constraints
  tier: fast
  prompt: Cho bảng emails(id PK, email text UNIQUE) đã có 2 dòng với email = NULL. Việc chèn dòng thứ
    3 cũng có email = NULL có bị chặn bởi UNIQUE không? Vì sao?
  answer: Không bị chặn. UNIQUE không coi hai giá trị NULL là 'trùng nhau' (vì NULL nghĩa là không xác
    định), nên có thể chèn bao nhiêu dòng NULL tuỳ ý. Đây là bẫy UNIQUE/NULL kinh điển.
- id: constraints-q5
  node: constraints
  tier: fast
  prompt: Cột price numeric(10,2) DEFAULT 0 (không có NOT NULL). Câu INSERT INTO t (price) VALUES (NULL)
    sẽ lưu giá trị gì cho price? Vì sao không phải 0?
  answer: Lưu NULL. DEFAULT chỉ áp dụng khi câu INSERT không cung cấp giá trị cho cột; ở đây giá trị NULL
    được truyền tường minh, nên PostgreSQL ghi đúng những gì được truyền, không thay bằng giá trị mặc
    định.
- id: constraints-q6
  node: constraints
  tier: fast
  prompt: Muốn thêm CHECK (age >= 18) vào bảng users đã có 10000 dòng, trong đó có 5 dòng age = 15. Lệnh
    ALTER TABLE users ADD CONSTRAINT ... CHECK (age >= 18); sẽ thành công hay lỗi?
  answer: 'Lỗi: ''check constraint ... is violated by some row''. PostgreSQL quét toàn bộ dữ liệu hiện
    có trước khi chấp nhận constraint mới; phải sửa/xoá 5 dòng vi phạm trước, rồi mới ADD CONSTRAINT lại
    được.'
- id: constraints-q7
  node: constraints
  tier: fast
  prompt: Khác biệt cú pháp giữa việc thêm NOT NULL và thêm CHECK/UNIQUE/FOREIGN KEY vào một bảng đã tồn
    tại là gì?
  answer: NOT NULL dùng ALTER TABLE ... ALTER COLUMN <cot> SET NOT NULL (và gỡ bằng DROP NOT NULL), vì
    nó là thuộc tính của cột chứ không phải named constraint độc lập. Các loại còn lại (CHECK, UNIQUE,
    FOREIGN KEY, PRIMARY KEY) dùng chung cú pháp ALTER TABLE ... ADD CONSTRAINT <ten> <loai> (...).
- id: thiet-ke-schema-q1
  node: thiet-ke-schema
  tier: fast
  prompt: Phân biệt "candidate key" và "primary key" bằng một câu.
  answer: Candidate key là mọi cột (hoặc tổ hợp cột) đủ điều kiện làm khoá chính (duy nhất, không NULL);
    primary key là một candidate key được chọn làm khoá chính chính thức — một bảng có thể có nhiều candidate
    key nhưng chỉ một primary key.
- id: thiet-ke-schema-q2
  node: thiet-ke-schema
  tier: fast
  prompt: Vì sao nên ưu tiên surrogate key (id tự tăng) hơn natural key (như email) làm PRIMARY KEY khi
    khoá đó sẽ bị bảng khác tham chiếu?
  answer: Vì natural key có thể đổi giá trị theo thời gian; nếu đã bị FOREIGN KEY tham chiếu, đổi giá
    trị sẽ bị PostgreSQL từ chối trừ khi có ON UPDATE CASCADE ở mọi nơi tham chiếu (dễ sót). Surrogate
    key không mang ý nghĩa nghiệp vụ nên không bao giờ cần đổi.
- id: thiet-ke-schema-q3
  node: thiet-ke-schema
  tier: fast
  prompt: Bảng A(id PK, x, y) có khoá chính một cột và đã đạt 1NF. Bảng này có tự động đạt 2NF không?
    Vì sao?
  answer: Có. Vi phạm 2NF chỉ xảy ra khi khoá chính là composite và có cột không-khoá phụ thuộc một phần
    khoá. Với khoá một cột, mọi cột không-khoá đương nhiên phụ thuộc toàn bộ khoá, nên tự động đạt 2NF.
- id: thiet-ke-schema-q4
  node: thiet-ke-schema
  tier: fast
  prompt: Cho bảng orders(id PK, customer_id FK, customer_city) trong đó customer_city suy ra được từ
    bảng customers. Đây là vi phạm chuẩn hoá dạng nào?
  answer: 'Vi phạm 3NF — phụ thuộc bắc cầu: customer_city phụ thuộc vào customer_id (cột không-khoá khác),
    không phụ thuộc trực tiếp vào khoá chính id.'
- id: thiet-ke-schema-q5
  node: thiet-ke-schema
  tier: fast
  prompt: Tại sao quan hệ N-N không thể hiện thực bằng cách thêm một cột khoá ngoại vào bảng A trỏ sang
    bảng B?
  answer: Vì một cột chỉ lưu được một giá trị mỗi dòng nên chỉ trỏ được tới đúng một dòng bên kia. Cần
    bảng trung gian, mỗi dòng đại diện một cặp liên kết cụ thể, cho phép cả A và B lặp lại ở nhiều dòng
    trung gian khác nhau.
- id: thiet-ke-schema-q6
  node: thiet-ke-schema
  tier: fast
  prompt: Bảng trung gian enrollments(student_id FK, course_id FK) không có PRIMARY KEY. Hậu quả cụ thể
    là gì, và PostgreSQL có tự báo lỗi không?
  answer: Có thể chèn trùng lặp cùng một cặp (student_id, course_id) nhiều lần (ghi danh trùng). PostgreSQL
    không tự báo lỗi vì không có ràng buộc nào bị vi phạm — đây là lỗi logic âm thầm; sửa bằng cách thêm
    PRIMARY KEY (student_id, course_id).
- id: thiet-ke-schema-q7
  node: thiet-ke-schema
  tier: fast
  prompt: Nêu một tình huống cụ thể (có số liệu) mà denormalize là quyết định hợp lý, và điều kiện bắt
    buộc đi kèm là gì?
  answer: 'Ví dụ: tỷ lệ đọc:ghi 500:1, JOIN+SUM mất 40ms so với đọc cột lưu sẵn dưới 1ms, endpoint gọi
    hàng nghìn lần/phút. Điều kiện bắt buộc: phải có cơ chế đồng bộ rõ ràng (cập nhật trong cùng transaction
    hoặc trigger), nếu không dữ liệu sẽ lệch âm thầm.'
- id: index-transaction-q1
  node: index-transaction
  tier: fast
  prompt: Vì sao B-tree index giúp WHERE email = '...' nhanh hơn nhưng thường không giúp WHERE email LIKE
    '%example.com'?
  answer: B-tree lưu giá trị đã sắp xếp theo thứ tự từ đầu chuỗi, nên tra cứu theo tiền tố hoặc so sánh
    bằng rất nhanh. Mẫu LIKE '%...' bắt đầu bằng ký tự đại diện ở đầu khiến B-tree không thể loại trừ
    nhanh phần nào của cây — PostgreSQL thường phải quét toàn bảng thay vì dùng index.
- id: index-transaction-q2
  node: index-transaction
  tier: fast
  prompt: Trong output EXPLAIN ANALYZE, con số nào phản ánh thời gian thực tế (mili-giây), và con số nào
    chỉ là ước lượng chi phí nội bộ?
  answer: actual time=... và Execution Time là thời gian thực tế tính bằng mili-giây (chỉ xuất hiện khi
    dùng ANALYZE). cost=0.00..1791.00 là đơn vị chi phí ước lượng nội bộ của PostgreSQL, không phải thời
    gian.
- id: index-transaction-q3
  node: index-transaction
  tier: fast
  prompt: Vì sao thêm nhiều index vào một bảng lại làm INSERT chậm hơn?
  answer: Vì mỗi INSERT không chỉ ghi một dòng vào bảng chính mà còn phải cập nhật (chèn và cân bằng lại)
    từng cấu trúc B-tree của mọi index liên quan tới bảng đó — càng nhiều index, càng nhiều cấu trúc phải
    cập nhật đồng thời.
- id: index-transaction-q4
  node: index-transaction
  tier: fast
  prompt: Sau khi một câu lệnh bên trong BEGIN...COMMIT bị lỗi (ví dụ vi phạm CHECK), việc gọi tiếp một
    câu SELECT vô hại trong cùng transaction có chạy được không? Vì sao?
  answer: Không chạy được — PostgreSQL trả lỗi 'current transaction is aborted, commands ignored until
    end of transaction block'. Sau khi một lệnh lỗi, toàn bộ transaction bị đánh dấu aborted; phải ROLLBACK
    trước khi thực hiện bất kỳ câu lệnh nào khác.
- id: index-transaction-q5
  node: index-transaction
  tier: fast
  prompt: Trong bốn chữ cái ACID, chữ nào đảm bảo dữ liệu đã COMMIT không bị mất dù server mất điện ngay
    sau đó?
  answer: Durability — PostgreSQL ghi thay đổi vào write-ahead log trên đĩa trước khi báo COMMIT thành
    công cho ứng dụng, nên dữ liệu đã commit tồn tại vĩnh viễn dù có sự cố ngay sau đó.
- id: index-transaction-q6
  node: index-transaction
  tier: fast
  prompt: Mức isolation mặc định của PostgreSQL là gì? Ở mức đó, đọc cùng một dòng hai lần trong cùng
    transaction có đảm bảo ra cùng kết quả không?
  answer: Read Committed là mặc định. Không đảm bảo — nếu một transaction khác commit thay đổi ở giữa
    hai lần đọc, lần đọc sau có thể thấy giá trị mới hơn (anomaly non-repeatable read), chỉ được ngăn
    ở mức REPEATABLE READ trở lên.
- id: index-transaction-q7
  node: index-transaction
  tier: fast
  prompt: Write skew là gì, và tại sao REPEATABLE READ không ngăn được nó nhưng SERIALIZABLE thì ngăn
    được?
  answer: Write skew là khi hai transaction đồng thời đọc dữ liệu chồng lấn rồi mỗi bên ghi vào một dòng
    khác nhau dựa trên điều kiện đọc được, dẫn tới kết quả tổng thể sai dù mỗi UPDATE riêng lẻ hợp lệ.
    REPEATABLE READ chỉ phát hiện xung đột khi hai transaction ghi đè cùng một dòng vật lý, nên không
    bắt được write skew. SERIALIZABLE phân tích cả phụ thuộc đọc-ghi chéo giữa các transaction nên phát
    hiện và từ chối một bên.
- id: index-transaction-q8
  node: index-transaction
  tier: fast
  prompt: Nếu ứng dụng dùng isolation level SERIALIZABLE và thỉnh thoảng nhận lỗi could not serialize
    access, đây có phải là bug cần sửa ở tầng SQL không? Ứng dụng nên xử lý thế nào?
  answer: Không phải bug SQL — đây là hành vi được kỳ vọng của SERIALIZABLE dưới tải đồng thời, đảm bảo
    tính đúng đắn thay vì để lọt anomaly. Ứng dụng phải bắt lỗi này (SQLSTATE 40001) và tự động thử lại
    toàn bộ transaction từ đầu.
- id: ef-core-q1
  node: ef-core
  tier: fast
  prompt: DbContext có phải là bản thân kết nối TCP tới database không? Nó thật sự đại diện cho điều gì?
  answer: Không. DbContext là một phiên làm việc (session) — nó quản lý cấu hình kết nối, tập hợp các
    DbSet<T>, và change tracker; kết nối TCP thật do Npgsql mở/đóng bên dưới khi cần, không phải là chính
    DbContext.
- id: ef-core-q2
  node: ef-core
  tier: fast
  prompt: DbSet<Order> Orders dùng để làm gì, và khi nào dữ liệu thật sự được đọc từ database?
  answer: DbSet<Order> là điểm bắt đầu để viết truy vấn LINQ (và gọi Add/Remove) trên bảng Orders. Dữ
    liệu chỉ thật sự được đọc khi thực thi (materialize) truy vấn, ví dụ ToListAsync(), FirstOrDefaultAsync(),
    hay foreach — không phải ngay khi khai báo DbSet hay viết Where.
- id: ef-core-q3
  node: ef-core
  tier: fast
  prompt: Điều gì xảy ra nếu một entity không có thuộc tính nào khớp quy ước đặt tên khoá chính?
  answer: 'EF Core ném InvalidOperationException: "The entity type ''...'' requires a primary key to be
    defined" khi build model, vì nó không tự suy luận được đâu là khoá chính; phải cấu hình tường minh
    bằng [Key] hoặc Fluent API HasKey.'
- id: ef-core-q4
  node: ef-core
  tier: fast
  prompt: AsNoTracking() khác gì so với hành vi mặc định của EF Core, và nên dùng khi nào?
  answer: AsNoTracking() tắt việc giữ snapshot theo dõi thay đổi cho truy vấn đó; mặc định EF Core luôn
    giữ snapshot để so sánh khi SaveChanges. Nên dùng AsNoTracking() khi truy vấn chỉ để đọc/hiển thị,
    không có ý định sửa rồi gọi SaveChanges() trên các entity đó.
- id: ef-core-q5
  node: ef-core
  tier: fast
  prompt: Điều gì xảy ra (có báo lỗi không) nếu bạn sửa thuộc tính của một entity đọc bằng AsNoTracking()
    rồi gọi SaveChangesAsync()?
  answer: Không có lỗi/exception nào cả, nhưng thay đổi bị bỏ qua hoàn toàn một cách âm thầm — vì entity
    đó không nằm trong change tracker của DbContext, SaveChangesAsync() không biết để sinh UPDATE.
- id: ef-core-q6
  node: ef-core
  tier: fast
  prompt: FirstOrDefaultAsync khác FirstAsync ở điểm nào khi không tìm thấy phần tử khớp?
  answer: FirstOrDefaultAsync trả về null nếu không tìm thấy phần tử khớp; FirstAsync ném InvalidOperationException
    ("Sequence contains no elements") trong cùng tình huống.
- id: ef-core-q7
  node: ef-core
  tier: fast
  prompt: Add() trên DbSet<T> có ngay lập tức ghi dữ liệu xuống database không? Vì sao?
  answer: Không. Add() chỉ chuyển trạng thái của entity trong change tracker thành Added (hoàn toàn trong
    bộ nhớ); phải gọi SaveChanges()/SaveChangesAsync() thì EF Core mới sinh và gửi câu lệnh INSERT xuống
    database.
- id: ef-core-q8
  node: ef-core
  tier: fast
  prompt: Vì sao AddDbContext<T> thường đăng ký DbContext với vòng đời scoped thay vì singleton?
  answer: DbContext được thiết kế để sống ngắn hạn và giữ trạng thái (change tracker) đặc thù cho một
    đơn vị công việc; singleton sẽ khiến change tracker phình to không giới hạn và không an toàn khi nhiều
    request/luồng dùng chung một DbContext cùng lúc (EF Core không thread-safe cho một instance dùng đồng
    thời). Scoped tạo instance mới, sạch, cho mỗi HTTP request.
- id: ef-core-quan-he-q1
  node: ef-core-quan-he
  tier: fast
  prompt: Navigation property có ánh xạ tới một cột trong database không? Nếu không, quan hệ thật sự được
    lưu bằng gì?
  answer: Không. Navigation property là thuộc tính C# dùng để điều hướng giữa các entity liên quan trong
    code; quan hệ thật sự được lưu trong database bằng cột khoá ngoại (foreign key) trên bảng phía "nhiều"
    (ví dụ Book.AuthorId).
- id: ef-core-quan-he-q2
  node: ef-core-quan-he
  tier: fast
  prompt: Nếu không Include() và không bật lazy loading, việc truy cập một navigation property tập hợp
    (ví dụ author.Books) trả về gì?
  answer: Null hoặc một tập hợp rỗng (tuỳ có khởi tạo = new() sẵn hay không) — không có exception, chỉ
    là dữ liệu chưa được nạp, dễ gây hiểu nhầm là 'không có dữ liệu con'.
- id: ef-core-quan-he-q3
  node: ef-core-quan-he
  tier: fast
  prompt: Vấn đề N+1 query là gì — mô tả bằng số lượng truy vấn cụ thể với N bản ghi cha?
  answer: 1 truy vấn ban đầu để lấy danh sách cha, cộng thêm N truy vấn riêng biệt (mỗi cha một truy vấn)
    để lấy dữ liệu con — tổng cộng N+1 lượt truy vấn.
- id: ef-core-quan-he-q4
  node: ef-core-quan-he
  tier: fast
  prompt: Vì sao Include() giúp tránh được N+1, xét về số lượt round-trip tới database?
  answer: Include() gộp việc nạp dữ liệu con vào cùng một truy vấn (thường dùng JOIN) với truy vấn lấy
    danh sách cha, nên chỉ tốn 1 lượt round-trip bất kể có bao nhiêu bản ghi cha.
- id: ef-core-quan-he-q5
  node: ef-core-quan-he
  tier: fast
  prompt: ThenInclude() nạp tiếp navigation property của entity nào — entity gốc hay kết quả của bước
    Include/ThenInclude liền trước?
  answer: Của kết quả bước Include/ThenInclude liền trước nó, không phải của entity gốc ban đầu.
- id: ef-core-quan-he-q6
  node: ef-core-quan-he
  tier: fast
  prompt: Vì sao lazy loading dễ khiến N+1 trở nên khó phát hiện hơn so với việc thiếu Include() (không
    bật lazy loading)?
  answer: Vì với lazy loading, dòng code truy cập navigation property trông giống hệt một phép đọc thuộc
    tính bình thường trong bộ nhớ — không có dấu hiệu nào cho thấy nó âm thầm kích hoạt một truy vấn SQL
    mới.
- id: ef-core-quan-he-q7
  node: ef-core-quan-he
  tier: fast
  prompt: Explicit loading khác eager loading ở điểm nào về thời điểm và cách gọi?
  answer: Eager loading (Include) nạp dữ liệu con tường minh ngay trong truy vấn ban đầu; explicit loading
    nạp bằng một lệnh riêng (Entry(...).Collection(...).LoadAsync()), gọi sau khi đã có entity cha, chỉ
    khi thật sự cần.
- id: ef-core-quan-he-q8
  node: ef-core-quan-he
  tier: fast
  prompt: Khai báo navigation property tập hợp chỉ ở một phía của quan hệ N-N gây ra hậu quả gì?
  answer: EF Core hiểu đây là quan hệ N-N một chiều thay vì hai chiều; phía không khai báo sẽ không có
    cách truy cập chiều ngược lại qua code C#, cố dùng sẽ gặp lỗi biên dịch CS1061.
- id: ef-core-migration-q1
  node: ef-core-migration
  tier: fast
  prompt: dotnet ef migrations add có làm thay đổi gì trên database thật không? Nếu không, nó làm gì?
  answer: Không. Nó chỉ so sánh model C# với ModelSnapshot gần nhất rồi sinh ra file code C# mới trên
    ổ đĩa (chứa Up/Down); phải chạy dotnet ef database update thì thay đổi mới thật sự được áp xuống database.
- id: ef-core-migration-q2
  node: ef-core-migration
  tier: fast
  prompt: Method Down trong file migration dùng để làm gì, và khi nào nó được chạy?
  answer: Down chứa các thao tác hoàn tác đúng những gì Up của migration đó đã làm; nó được chạy khi rollback
    (dotnet ef database update <tên-migration-trước>) lùi qua migration này.
- id: ef-core-migration-q3
  node: ef-core-migration
  tier: fast
  prompt: HasData khác seeding thủ công ở điểm nào về thời điểm chạy và yêu cầu dữ liệu biết trước?
  answer: HasData chạy một lần duy nhất khi migration chứa nó được áp dụng, và yêu cầu dữ liệu (kể cả
    khoá chính) phải cố định biết trước lúc viết code. Seeding thủ công chạy mỗi lần ứng dụng khởi động,
    tự kiểm tra điều kiện, và có thể dùng dữ liệu tính toán lúc chạy (ví dụ đọc biến môi trường).
- id: ef-core-migration-q4
  node: ef-core-migration
  tier: fast
  prompt: Sau khi rollback qua một migration có DropColumn trên một cột từng có dữ liệu thật, dữ liệu
    cũ của cột đó có được khôi phục lại không?
  answer: Không. Down chỉ khôi phục lại cấu trúc (thêm lại cột/bảng), không khôi phục dữ liệu đã bị DROP
    — dữ liệu thật đã mất vĩnh viễn từ lúc Up chạy DROP COLUMN/DROP TABLE.
- id: ef-core-migration-q5
  node: ef-core-migration
  tier: fast
  prompt: dotnet ef migrations remove có xoá được một migration đã chạy database update thành công trên
    database dev của chính bạn không?
  answer: Không. EF Core từ chối với thông báo yêu cầu revert trước. Phải rollback bằng dotnet ef database
    update <tên-migration-trước> để gỡ migration khỏi __EFMigrationsHistory trước, rồi mới migrations
    remove được.
- id: ef-core-migration-q6
  node: ef-core-migration
  tier: fast
  prompt: Nếu đổi tên thuộc tính Name thành FullName qua hai lần migrations add riêng biệt thay vì sửa
    cùng lúc, migration sinh ra dùng RenameColumn hay DropColumn/AddColumn? Hậu quả là gì?
  answer: 'Dùng cặp DropColumn/AddColumn, vì EF Core không biết đó là cùng một phép đổi tên. Hậu quả:
    DropColumn xoá vĩnh viễn dữ liệu cột Name, AddColumn tạo cột FullName trống — mất dữ liệu âm thầm
    không có exception cảnh báo.'
- id: ef-core-migration-q7
  node: ef-core-migration
  tier: fast
  prompt: Sửa Name của một dòng HasData đã tồn tại (giữ nguyên Id) rồi migrations add lại sinh ra thao
    tác gì?
  answer: UpdateData — EF Core so sánh theo khoá chính không đổi, nhận ra là sửa dòng đã có chứ không
    phải thêm mới.
- id: dependency-injection-q1
  node: dependency-injection
  tier: fast
  prompt: AddScoped<T>() tạo bao nhiêu instance khi CÙNG một request gọi GetRequiredService<T>() ba lần?
  answer: Đúng 1 instance — Scoped tái dùng cùng một instance trong suốt một scope (mặc định là một request
    HTTP), bất kể được yêu cầu bao nhiêu lần bên trong scope đó.
- id: dependency-injection-q2
  node: dependency-injection
  tier: fast
  prompt: Vì sao một class tự new dependency của nó bên trong constructor lại khó unit test?
  answer: Vì không có cách nào từ bên ngoài thay thế dependency đó bằng một bản giả/mock — class luôn
    dùng đúng implementation cụ thể bị new cứng bên trong, nên test luôn phải chạy với implementation
    thật.
- id: dependency-injection-q3
  node: dependency-injection
  tier: fast
  prompt: Captive dependency là gì, và ASP.NET Core mặc định phản ứng thế nào khi phát hiện nó lúc khởi
    động?
  answer: Captive dependency là khi một service sống lâu hơn (thường Singleton) giữ tham chiếu trực tiếp
    tới một service sống ngắn hơn (thường Scoped) qua constructor injection. Mặc định (Development, ValidateScopes
    = true), builder.Build() sẽ ném InvalidOperationException ngay khi khởi động thay vì để lỗi âm thầm
    xảy ra lúc runtime.
- id: dependency-injection-q4
  node: dependency-injection
  tier: fast
  prompt: Cách đúng để một Singleton cần dùng một service Scoped mà không tạo captive dependency là gì?
  answer: Không tiêm Scoped trực tiếp qua constructor. Thay vào đó, tiêm IServiceScopeFactory vào Singleton,
    rồi mỗi khi cần dùng thì tự CreateScope(), lấy service Scoped bằng GetRequiredService từ scope.ServiceProvider,
    dùng xong Dispose scope đó.
- id: dependency-injection-q5
  node: dependency-injection
  tier: fast
  prompt: Vì sao constructor injection được ưu tiên hơn Service Locator (tự gọi IServiceProvider.GetService<T>()
    bên trong logic nghiệp vụ)?
  answer: Constructor injection khai báo dependency một cách tường minh trong chữ ký constructor. Service
    Locator giấu dependency thật sự bên trong thân hàm, khiến lỗi quên đăng ký chỉ lộ ra sâu bên trong
    lúc runtime thay vì rõ ràng ngay ở chữ ký.
- id: dependency-injection-q6
  node: dependency-injection
  tier: fast
  prompt: Nếu bạn resolve một type chưa được đăng ký trong IServiceCollection từ một Minimal API handler,
    điều gì xảy ra khi có request gọi tới, và lỗi đó xuất hiện ở giai đoạn nào?
  answer: 'Request đó trả về 500 Internal Server Error, với ngoại lệ InvalidOperationException: Unable
    to resolve service for type .... Đây là lỗi runtime, chỉ xảy ra khi có request thật gọi tới — code
    vẫn biên dịch bình thường.'
- id: dependency-injection-q7
  node: dependency-injection
  tier: fast
  prompt: Vì sao một Singleton có trạng thái mutable (như bộ đếm dùng chung) thường cần đồng bộ hoá, nhưng
    thường không cần với trạng thái tương tự trong một service Scoped?
  answer: Singleton chỉ có một instance duy nhất dùng chung cho mọi request đồng thời — nhiều luồng có
    thể cùng đọc/ghi cùng lúc, gây race condition. Scoped có instance riêng cho mỗi request, nên không
    bị nhiều request khác chia sẻ cùng instance.
- id: routing-model-binding-q1
  node: routing-model-binding
  tier: fast
  prompt: Route template {id:int} khác gì so với {id} khi client gửi một giá trị không phải số?
  answer: '{id} (không constraint) vẫn khớp route nhưng bước binding sau đó thất bại khi ép sang int →
    400 Bad Request. {id:int} loại giá trị không phải số ngay từ bước khớp route → nếu không route nào
    khác khớp thì 404 Not Found.'
- id: routing-model-binding-q2
  node: routing-model-binding
  tier: fast
  prompt: Vì sao tham số string? sort trong MapGet("/products", (string? sort) => ...) không cần viết
    [FromQuery]?
  answer: Vì sort là kiểu đơn giản (string) và tên của nó không khớp bất kỳ route parameter nào trong
    template /products — Minimal API tự suy luận nguồn là query string.
- id: routing-model-binding-q3
  node: routing-model-binding
  tier: fast
  prompt: Một handler khai (ProductInput a, AddressInput b) với cả hai đều là record (kiểu phức tạp),
    không có attribute. Điều gì xảy ra?
  answer: 'Ở request đầu tiên khớp route đó, ASP.NET Core ném InvalidOperationException: Failure to infer
    one or more parameters → trả về 500 Internal Server Error, vì Minimal API chỉ cho phép một tham số
    tự suy luận bind từ JSON body.'
- id: routing-model-binding-q4
  node: routing-model-binding
  tier: fast
  prompt: Header có nằm trong chuỗi suy luận tự động (route → service → query → body) không? Muốn bind
    từ header phải làm gì?
  answer: Không. Header luôn phải khai [FromHeader] tường minh (có thể kèm Name = "..." nếu tên header
    khác tên biến C#); không có suy luận tự động cho header.
- id: routing-model-binding-q5
  node: routing-model-binding
  tier: fast
  prompt: 'Cho route /products/{id:int} và request PUT /products/5 thiếu header Content-Type: application/json
    dù có body JSON hợp lệ. Server trả gì?'
  answer: 415 Unsupported Media Type — vì thiếu Content-Type đúng, ASP.NET Core không xác định được cách
    parse body nên từ chối trước khi thử bind.
- id: routing-model-binding-q6
  node: routing-model-binding
  tier: fast
  prompt: MapGroup mang lại lợi ích gì ngoài việc gộp tiền tố URL?
  answer: Cho phép áp dụng một lần các cấu hình chung (như RequireAuthorization, endpoint filter) cho
    toàn bộ endpoint trong nhóm, đảm bảo tính nhất quán và tránh quên áp dụng ở một endpoint lẻ.
- id: routing-model-binding-q7
  node: routing-model-binding
  tier: fast
  prompt: Vì sao route /products/{id} (không constraint) và /products/featured dễ gây nhầm lẫn hơn /products/{id:int}
    và /products/featured?
  answer: Không có constraint, {id} khớp mọi chuỗi kể cả "featured", khiến việc route nào được ưu tiên
    khớp trở nên mơ hồ. Thêm :int loại "featured" khỏi route id ngay từ bước khớp, làm rõ ràng hai route
    không chồng lấn.
- id: configuration-options-q1
  node: configuration-options
  tier: fast
  prompt: Biến môi trường nào quyết định file appsettings.{Environment}.json nào được nạp?
  answer: ASPNETCORE_ENVIRONMENT. Không đặt thì mặc định Production.
- id: configuration-options-q2
  node: configuration-options
  tier: fast
  prompt: Giữa appsettings.json và appsettings.Development.json, file nào được nạp sau và do đó thắng
    khi trùng khoá?
  answer: appsettings.Development.json được nạp sau appsettings.json nên đè lên; biến môi trường OS và
    tham số dòng lệnh còn đè lên cả hai file này.
- id: configuration-options-q3
  node: configuration-options
  tier: fast
  prompt: Vì sao nên dùng Options pattern (class C#) thay vì đọc trực tiếp IConfiguration["Key"] ở khắp
    nơi trong code?
  answer: Vì IConfiguration["Key"] dùng chuỗi rời rạc không được kiểm tra lúc biên dịch — sai chính tả
    âm thầm trả về null. Options pattern gom cấu hình vào class C# có thuộc tính thật, được IDE/compiler
    hỗ trợ, và tiêm được qua DI.
- id: configuration-options-q4
  node: configuration-options
  tier: fast
  prompt: IOptionsSnapshot<T> có lifetime gì, và điều gì xảy ra nếu tiêm nó vào một service Singleton?
  answer: Scoped. Tiêm vào Singleton gây captive dependency, ném InvalidOperationException lúc khởi động.
- id: configuration-options-q5
  node: configuration-options
  tier: fast
  prompt: Trong ba loại IOptions<T> / IOptionsSnapshot<T> / IOptionsMonitor<T>, loại nào đúng cho một
    Singleton cần thấy cấu hình thay đổi lúc đang chạy?
  answer: IOptionsMonitor<T> — bản thân nó là Singleton (tiêm an toàn vào Singleton khác) và đọc .CurrentValue
    luôn cập nhật, khác IOptions<T> chỉ đọc một lần lúc khởi động.
- id: configuration-options-q6
  node: configuration-options
  tier: fast
  prompt: Nếu quên gọi builder.Services.Configure<EmailOptions>(...) nhưng vẫn tiêm IOptions<EmailOptions>
    vào một endpoint, chuyện gì xảy ra khi request tới?
  answer: Không có exception. IOptions<EmailOptions>.Value trả về một EmailOptions mới với giá trị mặc
    định của C# cho từng thuộc tính — lỗi âm thầm, không phải lỗi biên dịch hay crash runtime.
- id: configuration-options-q7
  node: configuration-options
  tier: fast
  prompt: GetValue<int>("Email:Port") sẽ có hành vi gì nếu giá trị JSON tại khoá đó là một chuỗi không
    phải số, ví dụ "abc"?
  answer: Ném InvalidOperationException lúc gọi (runtime), vì không thể ép kiểu chuỗi "abc" sang int.
- id: validation-q6
  node: validation
  tier: fast
  prompt: Số dư tài khoản không đủ để rút tiền là validation dữ liệu hay business rule? Nên trả mã HTTP
    nào?
  answer: Business rule (cần truy vấn trạng thái hệ thống), không phải validation định dạng. Nên trả 409
    Conflict hoặc 422 Unprocessable Entity, không phải 400.
- id: validation-q7
  node: validation
  tier: fast
  prompt: Khi validate một List<OrderItem> và phần tử thứ 2 (index 1) sai, key lỗi trong response trông
    như thế nào?
  answer: Dạng Lines[1].Quantity — dùng chỉ số index trong ngoặc vuông để chỉ đúng phần tử sai trong danh
    sách.
- id: middleware-q1
  node: middleware
  tier: fast
  prompt: 'Middleware trong ASP.NET Core thực thi theo cấu trúc nào: tuần tự (hàng đợi) hay lồng nhau
    (nested)?'
  answer: Lồng nhau — middleware đăng ký trước bọc middleware đăng ký sau. Phần trước next() chạy theo
    thứ tự đăng ký; phần sau next() chạy theo thứ tự ngược lại.
- id: middleware-q2
  node: middleware
  tier: fast
  prompt: Điều gì xảy ra nếu một middleware không gọi await next()?
  answer: Pipeline dừng lại tại đó (short-circuit) — mọi middleware và endpoint phía sau không chạy. Có
    thể là chủ đích hoặc lỗi quên gọi next().
- id: middleware-q3
  node: middleware
  tier: fast
  prompt: Vì sao UseAuthorization() phải đặt sau UseRouting()?
  answer: UseAuthorization cần biết endpoint nào đã được match (do UseRouting xác định) để kiểm tra endpoint
    đó có RequireAuthorization() hay không.
- id: middleware-q4
  node: middleware
  tier: fast
  prompt: Nếu sửa context.Response.Headers sau khi response đã bắt đầu gửi, chuyện gì xảy ra?
  answer: 'Ném InvalidOperationException: Headers are read-only, response has already started — vì HTTP
    yêu cầu gửi header trước body.'
- id: middleware-q5
  node: middleware
  tier: fast
  prompt: UseStaticFiles() thường đặt ở đâu trong pipeline và vì sao?
  answer: Đặt sớm nhất (trước UseRouting). Nếu request khớp file tĩnh có sẵn, nó trả file ngay và short-circuit,
    tránh tốn chi phí routing/authorization không cần thiết.
- id: middleware-q6
  node: middleware
  tier: fast
  prompt: Cho hai middleware A (đăng ký trước) và B (đăng ký sau), cả hai log trước và sau next(). Thứ
    tự in ra console là gì?
  answer: A-trước, B-trước, [endpoint chạy], B-sau, A-sau — vì A bọc B nên phần sau của A luôn in cuối
    cùng.
- id: middleware-q7
  node: middleware
  tier: fast
  prompt: app.Run(...) khác app.Use(...) ở điểm nào?
  answer: app.Run là terminal middleware — không nhận tham số next, luôn kết thúc pipeline tại đó. app.Use
    nhận next và có thể chọn gọi hoặc không gọi middleware kế tiếp.
- id: xu-ly-loi-toan-cuc-q1
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: Vì sao không nên viết try/catch giống nhau ở mọi endpoint thay vì xử lý lỗi toàn cục?
  answer: Vì nó lặp code ở mọi endpoint và rất dễ để sót — chỉ cần một endpoint mới quên copy khối catch
    là hệ thống có hai định dạng lỗi khác nhau tồn tại song song.
- id: xu-ly-loi-toan-cuc-q2
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: UseExceptionHandler phải được đặt ở đâu trong pipeline, và vì sao?
  answer: Gần đầu pipeline nhất có thể, vì middleware bọc theo thứ tự đăng ký — nó chỉ bắt được exception
    từ middleware/endpoint đăng ký sau nó.
- id: xu-ly-loi-toan-cuc-q3
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: ProblemDetails là gì và tại sao dùng nó thay vì tự bịa cấu trúc JSON lỗi riêng?
  answer: ProblemDetails là định dạng JSON chuẩn hoá cho lỗi HTTP (RFC 7807), gồm các trường cố định như
    title, status, detail, instance — giúp mọi client đọc và xử lý lỗi theo cùng một cấu trúc.
- id: xu-ly-loi-toan-cuc-q4
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: IExceptionHandler.TryHandleAsync trả về false có ý nghĩa gì?
  answer: Nghĩa là handler này không xử lý được exception đó — nhường lại cho handler tiếp theo đã đăng
    ký, hoặc để hành vi mặc định của framework chạy.
- id: xu-ly-loi-toan-cuc-q5
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: Vì sao lỗi validation (400) không nên được xử lý bằng cách throw exception rồi để IExceptionHandler
    bắt?
  answer: Vì IExceptionHandler mặc định trả 500 (lỗi không mong đợi phía server), trong khi lỗi validation
    là lỗi phía client. Dùng exception cho validation khiến client hiểu nhầm đây là lỗi server.
- id: xu-ly-loi-toan-cuc-q6
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: Trường nào trong ProblemDetails không nên chứa exception.ToString() hoặc exception.StackTrace
    ở production, và vì sao?
  answer: Trường detail (hoặc bất kỳ trường nào khác) — stack trace lộ ra cấu trúc nội bộ hệ thống, là
    lỗ hổng bảo mật cho kẻ tấn công.
- id: xu-ly-loi-toan-cuc-q7
  node: xu-ly-loi-toan-cuc
  tier: fast
  prompt: Nếu bạn gọi app.UseExceptionHandler() không tham số nhưng quên builder.Services.AddExceptionHandler<T>(),
    chuyện gì xảy ra khi có exception?
  answer: 'Không có handler nào được gọi — hành vi rơi về mặc định của framework. Đây là lỗi câm: không
    cảnh báo lúc build, chỉ lộ khi thực sự test endpoint gây lỗi.'
- id: openapi-swagger-q1
  node: openapi-swagger
  tier: fast
  prompt: OpenAPI là một công cụ hay một định dạng đặc tả? Giải thích khác biệt với Swagger UI.
  answer: OpenAPI là một định dạng đặc tả (file JSON/YAML mô tả API), không phải công cụ. Swagger UI là
    một công cụ đọc đặc tả đó và hiển thị cho con người.
- id: openapi-swagger-q2
  node: openapi-swagger
  tier: fast
  prompt: Cần gọi hai phương thức nào để bật tính năng sinh OpenAPI có sẵn trong .NET 9+, và mỗi phương
    thức làm gì?
  answer: builder.Services.AddOpenApi() đăng ký dịch vụ sinh đặc tả; app.MapOpenApi() mở endpoint HTTP
    (mặc định /openapi/v1.json) để trả về file đặc tả đó.
- id: openapi-swagger-q3
  node: openapi-swagger
  tier: fast
  prompt: Nếu gọi AddOpenApi() nhưng quên MapOpenApi(), gọi /openapi/v1.json sẽ trả về gì?
  answer: Trả về 404 Not Found — ứng dụng vẫn chạy bình thường, chỉ là chưa có route nào phục vụ đường
    dẫn đó.
- id: openapi-swagger-q4
  node: openapi-swagger
  tier: fast
  prompt: WithSummary và WithDescription khác nhau ở điểm gì?
  answer: WithSummary là dòng tóm tắt ngắn (hiển thị làm tiêu đề); WithDescription là đoạn mô tả dài hơn,
    giải thích chi tiết hành vi endpoint.
- id: openapi-swagger-q5
  node: openapi-swagger
  tier: fast
  prompt: Produces<T>(200) cung cấp thông tin gì cho đặc tả OpenAPI mà nếu không gọi, framework có thể
    suy luận thiếu chính xác?
  answer: Nó khai báo tường minh schema (cấu trúc field, kiểu dữ liệu) của response ứng với đúng status
    code đó — hữu ích khi endpoint có nhiều nhánh trả về khác kiểu nhau.
- id: openapi-swagger-q6
  node: openapi-swagger
  tier: fast
  prompt: Vì sao không nên luôn để /openapi/v1.json và Swagger UI mở công khai ở production cho mọi loại
    API?
  answer: Vì file đặc tả liệt kê toàn bộ route nội bộ, kiểu dữ liệu, và đôi khi thông tin nghiệp vụ nhạy
    cảm — với API nội bộ, để lộ ra Internet là trao bản đồ hệ thống cho người ngoài dò quét.
- id: openapi-swagger-q7
  node: openapi-swagger
  tier: fast
  prompt: Khi nào nên chọn Swashbuckle thay vì AddOpenApi/MapOpenApi thuần?
  answer: Khi cần giao diện trực quan để người dùng tự bấm thử API trên trình duyệt mà không cần Postman,
    hoặc dự án đã quen thuộc với hệ sinh thái Swashbuckle từ trước.
- id: goi-api-ngoai-q1
  node: goi-api-ngoai
  tier: fast
  prompt: Vì sao gọi new HttpClient() bên trong mỗi request lại nguy hiểm dưới tải cao?
  answer: Mỗi new HttpClient() mở một socket TCP riêng; sau khi đóng, socket kẹt ở trạng thái TIME_WAIT
    trước khi hệ điều hành thu hồi. Dưới tải cao, số socket TIME_WAIT tích luỹ nhanh hơn tốc độ giải phóng,
    dẫn tới cạn cổng khả dụng (socket exhaustion).
- id: goi-api-ngoai-q2
  node: goi-api-ngoai
  tier: fast
  prompt: IHttpClientFactory giải quyết đồng thời hai vấn đề nào so với new HttpClient() mỗi request và
    so với một static HttpClient dùng chung mãi mãi?
  answer: 'So với new HttpClient() mỗi request: tránh socket exhaustion nhờ tái sử dụng handler. So với
    static HttpClient dùng chung mãi mãi: tránh stale DNS, vì factory luân phiên loại bỏ và tạo handler
    mới định kỳ.'
- id: goi-api-ngoai-q3
  node: goi-api-ngoai
  tier: fast
  prompt: GetFromJsonAsync<T> sẽ ném exception gì nếu body response không phải JSON hợp lệ?
  answer: System.Text.Json.JsonException. Đây là lý do phải kiểm tra IsSuccessStatusCode trước khi tin
    tưởng body là JSON hợp lệ.
- id: goi-api-ngoai-q4
  node: goi-api-ngoai
  tier: fast
  prompt: Khi HttpClient.Timeout hết hạn, loại exception nào được ném ra, và tại sao bắt nhầm TimeoutException
    là một lỗi phổ biến?
  answer: TaskCanceledException (kế thừa từ OperationCanceledException), không phải TimeoutException.
    Nếu code chỉ catch (TimeoutException), exception timeout thật sự sẽ không được bắt.
- id: goi-api-ngoai-q5
  node: goi-api-ngoai
  tier: fast
  prompt: EnsureSuccessStatusCode() làm gì, và nó ném loại exception gì khi status code không phải 2xx?
  answer: Nó kiểm tra status code của response; nếu không nằm trong khoảng 200-299, ném HttpRequestException
    với thông điệp mô tả status code cụ thể, và thuộc tính StatusCode để đọc lại status gốc.
- id: goi-api-ngoai-q6
  node: goi-api-ngoai
  tier: fast
  prompt: Vì sao đăng ký AddHttpClient("PaymentApi", ...) với BaseAddress sẵn lại tốt hơn gọi factory.CreateClient()
    rồi tự set BaseAddress ở mỗi nơi dùng?
  answer: Named client gom cấu hình vào một chỗ đăng ký duy nhất, tránh lặp lại và sai lệch cấu hình.
    Nếu quên set BaseAddress ở client không tên, gọi URL tương đối sẽ ném InvalidOperationException ngay
    lúc chạy.
- id: goi-api-ngoai-q7
  node: goi-api-ngoai
  tier: fast
  prompt: Polly giải quyết vấn đề gì mà retry/circuit breaker tự viết tay dễ làm sai?
  answer: Retry tự viết tay dễ quên backoff tăng dần và dễ retry nhầm cả lỗi vĩnh viễn (như 400). Circuit
    breaker tự viết tay khó cài đúng ngưỡng và thời gian ngắt mạch. Polly cung cấp sẵn cả hai chính sách
    đã kiểm chứng.
- id: goi-api-ngoai-q8
  node: goi-api-ngoai
  tier: fast
  prompt: response.Content.ReadFromJsonAsync<T>() gọi hai lần trên cùng một response sẽ có vấn đề gì?
  answer: HttpContent là một stream chỉ đọc được một lần. Đọc lần thứ hai sẽ gây lỗi hoặc trả về dữ liệu
    rỗng — nếu cần dùng lại, phải đọc một lần thành biến rồi xử lý từ biến đó.
